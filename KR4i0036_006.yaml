body:
  text: 詩人玉屑卷六宋魏慶之撰命意總説凡為詩當使挹之而源不窮咀之而味愈長隱居詩詩當使一覽無遺語盡而意不窮曽子固以意為主魏文帝曰文以意為主以氣為輔以詞為衛先意義後文詞詩以意義為主文詞次之意深義髙雖文詞平易自是竒作世人見古人語句平易倣效之而不得其意義便入鄙野可笑劉貢甫詩話老杜劔閣詩云吾將罪真宰意欲剗疊嶂與太白捶碎黃鶴樓剗却君山好語亦何異然劔閣詩意在削平僣竊尊崇王室凛凛有義氣捶碎剗却之語但一味豪放了故昔人論文字以意為主䂬溪詩話古詩之意詩者不可言語求而得必將觀其意焉故其譏刺是人也不言其所為之惡而言其爵位之尊車服之美而民疾之以見其不堪也君子偕老副笄六珈赫赫師尹民具爾瞻是也其頌美是人也不言其所為之善而言其容貌之盛冠佩之華而民安之以見其無愧也緇衣之宜兮敝豫又改為兮服其命服朱芾斯皇是也東坡詩之為言率皆樂而不淫憂而不困怨而不怒哀而不愁如緑衣傷巳之詩也其言不過曰我思古人俾無訧兮擊鼓怨上之詩也其言不過曰土國城漕我獨南行至軍旅數起大夫久役止曰自詒伊阻行役無期度思其危難以風焉不過曰茍無飢渴而巳至於言天下之事美盛德之形容固不言而可知其與憂愁思慮之作孰能優遊不迫也孔子所以有取焉謝顯道説晦庵論詩有兩重陳文蔚説詩先生曰謂公不曉文義則不得只是不見那好處如昔人賦梅云踈影橫斜水清淺暗香浮動月黃昏這十四字誰人不曉得然而前輩直恁地稱嘆説他形容得好是如何這箇便是難説須要自得他言外之意須是看得他物事有精神方好若看得有精神自是活動有意思跳擲呌喚自然不知手之舞之足之蹈之這個有兩重曉得文義是一重識得意思好處是一重有渾然意思江西之詩自山谷一變至楊廷秀又再變遂至今日越要巧越醜差楊大年輩文字雖要巧然巧中自有渾然意思便巧也使得不覺歐公早漸漸要説出然歐公詩自好所以喜梅聖俞詩蓋枯淡之中自有意思歐公最喜朝士送行兩句云曉日都門道微涼苑樹秋又深喜常建兩句云曲徑通幽處禪房花木深自言平生要學不得今人都不識此意只是要鬬事使難字便謂之好文字晦庵誠齋論句外之意詩有句中無其辭而句外有其意者巷伯之詩蘇公刺暴公之譛巳而曰二人同行誰為此禍杜云遣人向市賖香杭喚婦出房親自饌上言其力貧故曰賖下言其無使令故曰親又東歸貧路自覺難欲别上馬身無力上有相干之意而不言下有戀别之意而不忍又朋酒日歡會老夫今始知嘲其獨遺巳而不招也又夏日不赴而云野雪興難乘此不言熱而反言之也唐人云葛溪漫淬干將劔却是猿聲斷客腸又釣臺如今亦有垂綸者自是江魚賣得錢唐人長門怨錯把黃金買詞賦相如自是薄情人崔道融云如今却羡相如富獨有人間四壁居陵陽謂須先命意凡作詩須命終篇之意切勿以先得一句一聮因而成章如此則意不多屬然古人亦不免如此如述懷即事之類皆先成詩而後命題者也室中語思而得之古人為詩貴於意在言外使人思而得之故言之者無罪聞之者足以戒也近世詩人惟杜子美最得詩人之體如國破山河在城春草木深感時花濺淚恨别鳥驚心山河在明無餘物矣草木深明無人矣花鳥平時可娛之物見之而泣聞之而恐則時可知矣他皆類此不可遍舉迂叟不帶聲色王維書事云輕隂閣小雨深院晝慵開坐看蒼苔色欲上人衣來舒王云若耶溪上踏莓苔興盡張帆載酒回汀草岸花渾不見青山無數逐人來兩詩皆含不盡之意子由謂之不帶聲色意在言外聖俞嘗語余曰詩家雖率意造語亦難若意新語工得前人所未道者斯為善也必能狀難寫之景如在目前含不盡之意見於言外然後為至賈島云竹籠拾山果瓦瓶擔石泉姚合云馬隨山鹿放人逐野禽棲等是山邑荒僻官况蕭條不如縣古槐根出官清馬骨髙為工余曰工者如是狀難寫之景含不盡之意何詩為然聖俞曰作者得於心覽者會以意若嚴維栁塘春水漫花塢夕陽遲則天容時態融和駘蕩豈不在目前乎又如溫庭筠雞聲茅店月人迹板橋霜賈島怪禽啼曠野落日恐行人則道路辛苦羈旅愁思豈不見於言外乎金陵語録冷於陂水淡於秋逺陌初窮到渡頭賴是丹青不能畫畫成應遣一生愁右行色詩故待制司馬公所作也公諱池是生丞相溫公梅聖俞嘗言詩之工者寫難狀之景如在目前含不盡之意見於言外此詩有焉有不盡之意鮑當孤鴈云更無聲接續空有影相隨孤則孤矣豈若子美孤鴈不飲啄飛鳴猶念羣誰憐一片影相失萬里雲含不盡之意乎老杜補遺宫詞云監宫引出暫開門隨例雖朝不是恩銀鑰却收金鎖合月明花落又黃昏斷句極佳意在言外而幽怨之情自見不待明言之也詩貴乎如此若使一覽而意盡亦何足道哉漁隱詩要有野意人之為詩要有野意蓋詩非文不腴非質不枯能始腴而終枯無中邉之殊意味自長風人以來得野意者惟淵明耳如太白之豪放樂天之淺陋至於郊寒島瘦去之益逺豫嘗欲作野意亭以居一日題山石云山花有空相江月多清暉野意寫不盡微吟浩忘歸人多與之吾終恐其不似也休齋詩話狀索寞之意淇川人楊萬畢字通一梧桐夜雨詩云千里暮雲山巳黑一燈孤館酒初醒索寞之意盡於此詩史立意深逺李義山錦瑟詩云錦瑟無端五十絃一絃一柱思華年莊生曉夢迷蝴蝶望帝春心託杜鵑滄海月明珠有淚藍田日暖玉生煙此情可待成追憶只是當時巳惘然山谷道人讀此詩殊不曉其意後以問東坡東坡云此出古今樂志云錦瑟之為器也其絃五十其柱如之其聲也適怨清和案李詩莊生曉夢迷蝴蝶適也望帝春心託杜鵑怨也滄海月明珠有淚清也藍田日暖玉生煙和也一篇之中曲盡其意史稱其瑰邁竒古信然細素雜記用意精深贈同遊詩喚起忩全曙催歸日未西無心花裏鳥更與盡情啼山谷曰吾兒時每哦此詩而了不解其意自謫峽川吾年五十八矣時春晚憶此詩方悟之喚起催歸二鳥名若虛設故人不覺耳古人於小詩用意精深如此况其大者乎催歸子規鳥也喚起聲如絡緯圓轉清亮偏於春曉鳴亦謂之春喚冷齋升按此詩喚起催歸固是二鳥名然題曰贈同遊者實有微意蓋忩巳全曙鳥方喚起何其遲也日猶未西鳥巳催歸何其蚤也豈二鳥無心不知同遊者之意乎更與我盡情而啼早喚起而遲催歸也句中命意詩有一篇命意有句中命意如老杜上韋見素詩布置如此是一篇命意也至其道遲遲不忍去之意則曰尚憐終南山回首清渭濵其道欲與見素别則曰常擬報一飯况懷辭大臣此句中命意也蓋如此然後頓挫髙雅詩眼語新意妙退之征蜀聮句云始去杏飛蜂及歸栁嘶􅘪語新意妙詩曰昔我往矣楊栁依依今我來思雨雪霏霏記時也苕溪漁隱曰山谷亦有去時魚上氷歸來燕哺兒之句雪浪齋日記措意陳克子髙作贈别詩云淚眼生憎好天色離腸偏觸病心情雖韓偓溫庭筠未嘗措意至此許彥周詩話含意陳無巳云山谷最愛舒王扶輿度陽熖窈窕一川花謂包含數箇意王直方詩話委曲司空圖唐末竟能全節自守其詩有緑樹連村暗黃花入麥稀誠可貴重又云四座賔朋兵亂後一川風月笛聲中句法雖可及而意甚委曲許彥周詩話説愁意豫絶喜李頎詩云逺客坐長夜雨聲孤寺秋請量東海水看取淺深愁蓋作客涉逺適當窮秋暮投孤村古寺中夜不能寐起坐悽惻而聞簷外雨聲其為一時襟抱不言可知而此兩句十字中盡其意態海水喻愁非過語也隨筆用意太過東坡跋李端叔詩卷云暫借好詩消永夜每逢佳處輒參禪蓋端叔詩用意太過參禪之語所以警之云東坡工於命意東坡和貧士詩云夷齊耻周粟髙歌誦虞軒祿産彼何人能致綺與園古來避世士死灰或餘煙末路益可羞朱墨手自研淵明初亦仕絃歌本誠言不樂乃徑歸視世嗟獨賢此詩言夷齊自信其去雖武王周召不能挽之使留若四皓自信其進雖祿産之聘亦為之出蓋古人無心於功名信道而進退舉天下萬世之是非不能回奪伯夷之非武王綺園之從祿産自合為世所笑不當有名偶然聖賢辨論之於後乃信於天下非其始望故其名之傳如死灰之餘煙也後世君子既不能以道進退又不能忘世俗之毁譽多作文以自明其出處如答客難解嘲之類皆是也故曰朱墨手自研韓退之亦云朱丹自磨研若淵明初亦仕絃歌本誠言蓋無心於名雖晉末亦仕合於綺園之出其去也亦不待以微罪行不樂乃徑歸合於夷齊之去其事雖小其不為功名纍其進退蓋相似使其易地未必不追蹤二子也東坡作文工於命意必超然獨立於衆人之上非如昔人稱淵明以退為髙耳故又發明如此詩眼意脈貫通打起黃鶯兒莫教枝上啼啼時驚妾夢不得到遼西此唐人詩也人問詩法於韓公子蒼子蒼令參此詩以為法汴水日馳三百里扁舟東下更開帆旦辭杞國風微北夜泊寧陵月正南老樹挾霜鳴窣窣寒花承露落毿毿茫然不悟身何處水色天光共蔚藍此韓子蒼詩也人問詩法於吕公居仁居仁令參此詩以為法後之學詩者熟讀此二篇思過半矣小園解后録唐人嘗詠十日菊自緣今日人心别未必秋香一夜衰世以為工蓋不隨物而盡如酒盞此時須在手菊花明日便愁人自覺氣不長東坡亦云休休明日黃花蝶也愁也然雖變其語終有此過豈在謫所遇時感慨不覺發是語乎豫寓吳江值重九有鬢緣心事隨時改依舊在天涯多情惟有籬邉黃菊到處能華詩人讀之凄然以為有含憤意休齋造語誠齋論造語法初學詩者須用古人好語或兩字或三字如山谷猩猩毛筆平生幾兩屐身後五車書平生二字出論語身後二字晉張翰云使我有身後名幾兩屐阮孚語五車書莊子言惠施此四句乃四處合來又春風春雨花經眼江北江南水拍天春風春雨江北江南詩家常用杜云且看欲盡花經眼退之云海氣昏昏水拍天此以四字合三字入口便成詩句不至生硬要誦詩之多擇字之精始乎摘用久而自出肺腑縱橫出沒用亦可不用亦可陵陽論荆公造語劉威有詩云遙知楊栁是門處似隔芙蕖無路通意勝而語不勝王介甫用其意而易其語曰漫漫芙蕖難覔路蕭蕭楊栁獨知門室中語陵陽論用禪語古人作詩多用方言今人作詩復用禪語蓋是厭塵舊而欲新好也室中語語要警䇿陸士衡文賦云立片言以居要乃一篇之警䇿此要論也文章無警䇿則不足以傳世蓋不能竦動世人如老杜及唐人諸詩無不如此但晉宋間人専致力於此故失於綺靡而無髙古氣味老杜詩云語不驚人死不休所謂驚人語即警䇿也童蒙訓忌用工太過詩語大忌用工太過蓋鍊句勝則意必不足語工而意不足則格力必弱此自然之理也紅稻啄餘鸚鵡粒碧梧棲老鳯凰枝可謂精切而在其集中本非佳處不若暫止飛烏將數子頻來語燕定新巢為天然自在其用事若宓子彈琴邑宰日終軍棄繻英妙時雖字字皆本出處然比今日朝廷須汲黯中原將帥憶亷頗雖無出處一字而語意自到故知造語用事雖同出一人之手而優劣自異信乎詩之難也蔡寬夫詩話語不可熟韓子蒼言作詩不可太熟亦須令生近人論文一味忌語生往往不佳東坡作聚逺樓詩本合用青山緑水對野草間花此二字太熟故易以雲山煙水此深知詩病者豫然後知陳旡已所謂寧拙毋巧寧朴旡華寧粗旡弱寧僻旡俗之語為可信復齋漫録點石化金王君玉謂人曰詩家不妨間用俗語尤見工夫雪止未消者俗謂之待伴嘗有雪詩待伴不禁鴛瓦冷羞明常怯玉鈎斜待伴羞明皆俗語而採拾入句了無䀶類此點瓦礫為黃金手也余謂非特此為然東坡亦有之避謗詩尋醫畏病酒入務又云風來震澤帆初飽雨入松江水漸肥尋醫入務風飽水肥皆俗語也又南人以飲酒為軟飽北人以晝寢為黑甜故東坡云三杯軟飽後一枕黑甜餘此亦用俗語也西清詩話簡妙唐人有詩云山僧不解數甲子一葉落知天下秋及觀元亮詩云雖無紀歷志四時自成歲便覺唐人費力如桃源記言尚不知有漢無論魏晉可見造語之簡妙蓋晉人工造語而元亮其尤也唐子西語録綺靡溫庭筠湖隂曲警句云吳波不動楚山碧花壓欄干春晝長庭筠工於造語極為綺靡花間集可見矣更漏子一詞尤佳其詞云玉爐香紅蠟淚偏照畫堂秋思眉翠薄鬢雲殘夜長衾枕寒梧桐樹三更雨不道離情正苦一葉葉一聲聲空階滴到明漁隱詠物詩造語詠物詩不待分明説盡只髣佛形容便見妙處如魯直酴醿詩云露濕何郎試湯餅日烘荀令炷爐香義山雨詩云摵摵度瓜園依依傍水軒此不待説雨自然知是雨也後來陳旡巳諸人多用此體吕氏童蒙訓東坡詩云賦詩必此詩定知非詩人此或一道也魯直作詠物詩曲當其理如猩猩筆詩平生幾兩屐身後五車書其必此詩哉同上作不經人道語盛次仲孔平仲同在館中雪夜論詩平仲曰當作不經人道語曰斜拖闕角龍千丈淡抹牆腰月半稜坐客皆稱竒絶次仲曰此句甚佳惜其未大乃曰看來天地不知夜飛入園林總是春平仲乃服其工句中眼唐詩有曰長因送人處憶得别家時又曰舊國别多日故人無少年而荆公東坡用其意作古今不經人道語荆公詩曰木末北山煙苒苒草根南澗水泠泠繅成白雪桑重緑割盡黃雲稻正青東坡曰春畦雨過羅紈膩夏壠風來餅餌香如華嚴經舉果知因譬如蓮花方其吐花而果具蘂中造語之工至於荆公山谷東坡盡古今之變荆公江月轉空為白晝嶺雲分瞑作黃昏又曰一水護田將緑繞兩山排闥送青來東坡海棠詩曰只恐夜深花睡去髙燒銀燭照紅粧又曰我擕此石歸袖中有東海山谷曰此詩謂之句中眼學者不知此妙韻終不勝冷齋夜詁筆力髙妙沙草則衆人所謂水邉林下之物所與遊處者牛羊鷗鳥耳而荆公造而為語曰眠分黃犢草坐占白鷗沙其筆力髙妙殆若天成凡貧賤則語言不為人所敬信歲寒則無如松竹魯直造而為語曰語言少味無阿堵氷雪相看有此君其語便韻禁臠務去陳言有一士人携詩相示首篇第一句云十月寒者余曰君亦讀老杜詩觀其用月字乎其曰二月巳風濤則記風流之蚤也曰因驚四月雨聲寒五月江深草閣寒蓋不當寒五月風寒冷佛骨六月風日冷蓋不當冷今朝臘月春意動蓋未當有春意雖不盡如此如三月桃花浪八月秋髙風怒濤閏八月初吉十月江平穩之類皆不繫月則不足以實録一時之事若十月之寒境無所發明又不足記録退之謂惟陳言之務去者非必塵俗之言止為無益之語耳然吾輩文字如十月寒者多矣方當共以為戒也詩眼下字誠齋論用字詩有實字而善用之者以實為虛杜云弟子貧原憲諸生老伏虔老字蓋用趙充國請行上老之有用文語為詩句者尤工杜云侍臣雙宋玉戰䇿兩穰苴蓋用如六五帝四三王陵陽論下字之法僕嘗請益曰下字之法當如何公曰正如奕棊三百六十路都有好著顧臨時如何耳僕復請曰有二字同意而用此字則穩用彼字則不穩豈率於平仄聲律乎公曰固有二字一意而聲且同可用此而不可用彼者選詩云庭臯木葉下雲中辨煙樹還可作庭臯樹葉下雲中辨煙木至此唯可默曉未易言傳耳室中語陵陽論下字因謁公公云巳同路公弼作詩送令伯叔器名垍於案間取以相示曰雒邑風流餘此老故家文獻有諸孫可為紀實內有句云船擁清溪尚一樽僕曰船擁清溪擁字有所自不公曰何故獨問擁字僕曰蓋不曽見人用耳公曰李白送陶將軍詩將軍出使擁樓船非一船也響字潘邠老云七言詩第五字要響如返照入江翻后壁歸雲擁樹失山村翻字失字是響字也五言詩第三字要響如圓荷浮小葉細麥落輕花浮字落字是響字也所謂響者致力處也豫竊以為字字當活活則字字自響吕氏童蒙訓一字師蕭楚才知漂陽縣張乖崖作牧一日召食見公几案有一絶云獨恨太平無一事江南間殺老尚書蕭改恨作幸字公出視藁曰誰改吾詩左右以實對蕭曰與公全身公功髙位重姦人側目之秋且天下一統公獨恨太平何也公曰蕭弟一字之師也又鄭谷在袁州齊巳携詩詣之有早梅詩云前村深雪裏昨夜數枝開谷曰數枝非早也未若一枝齊巳不覺下拜自是士林以谷為一字師陶嶽五代補改一字璧門金闕倚天開五見宫花落古槐明日扁舟滄海去却將雲氣望蓬萊此劉貢甫詩也自館中出知曹州時作舊云雲裏荆公改作雲氣王直方詩話一字用意錢內翰希白晝景詩云雙蜂上簾額獨鵲裊庭柯裊一字最其所用意處然韋蘇州聽鶯曲有時斷續聽不了飛去花枝猶裊裊巳落第二矣復齋漫録一字之工詩句以一字為工自然頴異不凡如靈丹一粒點鐵成金也浩然云微雲淡河漢踈雨滴梧桐上句之工在一淡字下句之工在一滴字若非此兩字亦烏得為佳句也哉如陳舍人從易偶得杜集舊本文多脫誤至送蔡都尉云身輕一鳥其下脫一字陳公因與數客各用一字補之或云疾或云落或云起或云下莫能定其後得一善本乃是身輕一鳥過陳公歎服余謂陳公所補四字不工而老杜一過字為工也如鍾山語録云瞑色赴春愁下得赴字最好若下起字便是小兒語也無人覺來往下得覺字大好足見吟詩要一兩字功夫觀此則知余之所論非鑿空而言也漁隱妙在一字李太白詩吳姬壓酒喚客嘗見新酒初熟江南風物之美工在壓字老杜畫馬詩戲拈秃筆掃驊騮初無意於畫偶然天成工在拈字栁詩汲井漱寒齒工在汲字工部又有所喜用字如修竹不受暑野航恰受兩三人吹靣受和風輕燕受風斜受字皆入妙老坡尤愛輕燕受風斜以謂燕迎風低飛乍前乍却非受字不能形容也至於能事不受相促迫莫受二毛侵雖不及前句警䇿要自穩偃爾詩眼歐陽公下字歐陽永叔詞云堤上遊人逐畫船拍堤春水四垂天緑楊樓上出鞦韆此等語皆絶妙只一出字是後人著意道不到處侯鯖録東坡下字東坡作病鶴詩嘗寫三尺長脛瘦􅥟闕其一字使任德翁輩下之凡數字東坡徐出其藁蓋閣字也此字既出儼然如見病鶴矣東坡詩敘事言簡而意盡惠州有潭潭有潛蛟人未之信也虎飲水其上蛟尾而食之俄而浮骨水上人方知之東坡以十字道盡云潛鱗有飢蛟掉尾取渴虎言渴則知虎以飲水而召災言飢則蛟食其肉矣唐子西語録善用俗字數物以個謂食為喫甚近鄙俗獨杜子美善用之云峽口驚猿聞一個兩個黃鸝鳴翠栁却繞井桐添個個臨岐意頗切對酒不能喫樓頭喫酒樓下卧梅熟許同朱老喫蓋篇中大槩竒特可以映帶之也忌重疊字白樂天寄劉夢得詩有嘆蚤白無兒之句劉贈詩曰莫嗟華髮與無兒却是人間久逺期雪裏髙山頭白蚤海中仙果子生遲于公必有髙門慶謝守何煩曉鏡悲幸免如斯分非淺祝君長詠夢熊詩注云髙山本髙於門使之髙二字意殊古之詩流曉此唐人忌重疊用字者甚多東坡一詩有兩耳字韻亦曰義不同三山老人語倒一字語乃健王仲至召試館中試罷作一絶題云古木森森白玉堂長年來此試文章日斜奏罷長楊賦間拂塵埃看畫牆荆公見之甚歎愛為改作奏賦長楊罷且云詩家語如此乃健下字人不能到霄漢瞻佳士泥塗任此身只一任字即人不到處自衆人必曰嘆曰愧獨無心任之所謂視如浮雲不易其介者也繼云秋天正搖落回首大江濵大知並觀傲睨天地汪汪萬頃奚足云哉下雙字極難詩下雙字極難須使七言五言之間除去五字三字外精神興致全見於兩言方為工妙唐人記水田飛白鷺夏木囀黃鸝為李嘉祐詩摩詰竊取之非也此兩句好處正在添漠漠隂隂四字此乃摩詰為嘉祐點化以自見其妙如李光弼將郭子儀軍一號令之精彩數倍不然嘉祐本句但是詠景耳人皆可到要之當令如老杜無邊落木蕭蕭下不盡長江衮衮來與江天漠漠鳥雙去風雨時時龍一吟等乃為超絶近世王荆公新霜浦溆綿綿白薄晚林巒往往青與蘇子瞻浥浥爐香初泛夜離離花影欲搖春此可以追配前作也石林詩話詩人玉屑卷六
