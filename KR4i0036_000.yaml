body:
  text: 詩人玉屑目録詩文評類卷一詩辨第一滄浪謂當學古人之詩凡五條詩法晦庵謂胸中不可著一字世俗言語晦庵抽關啓鑰之論誠齊翻案法誠齊又法趙章泉詩法章泉謂規模既大波瀾自闊章泉論詩貴乎似章泉題品三聯章泉謂可與言詩章泉學詩吳思道學詩龔聖任學詩白石詩說凡二十條滄浪詩法卷二詩評第三誠齊品藻中興以來諸賢詩誠齊題品諸楊詩誠齊評李杜蘇黃詩體誠齊評為詩隱蓄發露之異誠齊以畫為真以真為畫臞翁詩評滄浪詩評詩體上滄浪編諸名家詩體凡百十一體詩體下總論凡三條蜂腰體隔句體偷春體折腰體絶絃體五仄體回文體五句法六句法促句法平頭換韻法促句接韻法拗句七言變體絶句變體第三句失粘八句仄入格進退格凡二條平側各押韻雙聲疊韻凡二條扇對法此與前隔句體同蹉對法離合體人名藥名卷三句法有三種句錯綜句法影略句法象外句折句佳句雄偉句雄健句一人名而分用之句兩句純好難得兩句不可一意置早意於殘晚中置靜意於喧動中句中有眼句中當無虛字句法不當重疊言簡而意不遺之句句豪而不畔於理句中有問答之詞誠齊論一句三意誠齊論驚人句誠齊稱李大方警句誠齊論警句陵陽論警句少陵坡谷句法蔣道士詩句省題詩句灘聲句清健句詩句可入畫燕詩唐人句法朝㑹宫掖懷古送别地名人名寫景詠物造理入畫典重清新竒偉綺麗刻琢自然寒苦豪壯工巧精絶閒適幽野羈旅佳境警䇿引帶連珠句中字相對合璧句中意相關實字粧句虛字粧句首用虛字輕重對宋朝警句五言七言卷四風騷句五言凡百八十六聮七言凡一百聮卷五口訣三不可八句法四不四深二要二廢四離六迷七至七德三多三偷十難十易十戒十貴二十四名初學蹊徑初學學古晦庵誨人學陶柳選詩韋蘇州晦庵誨人學六朝李杜陵陽誨人學韋詩又讀少陵詩學古人詩凡三條吕居仁誨人向背凡四條悟入去陋忌俗忌隨人後勤讀多為陵陽謂詩本於讀書陵陽論詩本於學藝熟必精不可彊作不可泛泛不可費力不可作意不露斧鑿不可露斧鑿粘皮骨不可粘皮著骨言其意不言其名不可太著題得其短處得意貴開闢詩要聮屬次韻詩貴傳逺詩有正邪得人印可自成一家詩不可言什詩有力量焚詩卷六命意總論以意為主先意義後文詞古詩之意晦庵論詩有兩重有渾然意思誠齊論句外之意陵陽謂先須命意思而得之不帶聲色意在言外有不盡之意詩要有野意狀索寞之意立意深逺用意精深句中命意語新意妙措意含意委曲說愁意用意太過東坡工於命意意脉貫通造語誠齊論造語法陵陽論荆公造語陵陽論用禪語語要警䇿忌用工太過語不可熟㸃石化金簡妙綺靡詠物詩造語作不經人道語句中眼筆力髙妙務去陳言下字誠齊論用字陵陽論下字之法陵陽論下字響字一字師又改一字一字用意一字之工妙在一字歐陽公下字東坡下字善用俗字忌用疊字倒一字語乃健下字人不能到下雙字極難卷七用事三易詩不貴用事不可有意用事使事不為事使反其意而用之用事要無迹事如巳出天然渾厚用其事而隱其語作詩須飽其材料兩句用一事用自已詩為故事用其意用其語妙於用事不拘故事用事天然用事清切用事的當用事精確用事精密假事詳盡用人名用經史中語皆用古語一字不茍不可牽彊不可牽出處晦翁詩誠齊論用經語誠齊論用事以俗為雅誠齊使事法陵陽論用事誤用事失事實用事失照管用事未盡善用事重疊率爾用事壓韻工於押韻巧於押韻古今詩用韻落韻不可强押韻古詩不拘韻重押韻凡三條和韻工妙為韻所牽屬對六對誠齊稱木天金地之對陵陽謂對偶不必拘繩墨巧對屬對精切對偶親切銖兩不差無斧鑿痕一字不茍老杜對偶不可參以異代佳對的對竒對借對凡三條不可泥對退之古詩故避屬對卷八煅煉總論鍊字鍊格鍊意鍊韻旬煆月鍊句中有眼詩貴造微求其疵而去之剩一字老杜陵陽謂少陵改詩樂天皮日休歐公東坡山谷荆公王平甫王仲至韓子蒼論用工之過㳂襲誠齊論㳂襲誠齊論淵明子美無巳詩相似誠齊論東坡介甫詩流麗相似東坡陵陽論山谷誠齊論山谷詩山谷取唐人詩山谷倣歐公詩簡齊吳可同機軸有家法暗合子美模寫東坡承襲其意用其意取其意意同辭異辭同意異即舊為新摹擬剽竊相襲凡三條襲全句依倣太甚屋下架屋著力太過不約而合古人亦有所相襲祖習不足道述者工於作者述者不及作者不㳂襲不蹈襲奪胎換骨總論誠齊論奪胎換骨意同辭異當有别意㸃化尤更精巧用古人意精彩數倍㸃化古詩句優於古卷九托物取况誠齊論比擬托興托物以寓意托物子美托物諷興興與訕異戒訕謗詩有補於世有三百篇之㫖歐陽公詩荆公詩秋後竹夫人詩聞蟬詩歸燕詩啄木詩贈釣者詩紅梅詩御栁詩夏雲詩初月詩于瀆詩唐備詩溫厚之氣規誡子美詩魏野詩規勸白戰禁體物語歐蘇雪詩溪堂雪詩蒲鞋詩誠齊霰詩卷十含蓄總說尚意句含蓄意含蓄子美含蓄元微之詩語意有無窮之味詩趣天趣竒趣野人趣登髙臨逺之趣詩思總說有佳思詩思悽惋詩思不出二百里詩味詩境體用十不可言用勿言體言其用而不言名不名其物胡五峰謂晦庵此詩有體而無用風調髙古為難薛能劉白平淡先組麗而後平淡非力所能卒造平淡晦庵云間適苕溪漁隱車蓋亭絶句自得要到自得處方是詩變態縛虎韓文公唐扶詩不能變態圓熟好詩如彈丸詞勝小石調綺麗不可以綺麗害正氣富貴富貴佳致非窮兒家語詩原乎心善言富貴品藻韓退之栁子厚杜牧之賈閬仙李長吉劉夢得常建李義山王荆公項斯白樂天趙倚樓謝蝴蝶鮑孤鴈夏英公王文穆王琪薛簡肅公荆公以三詩取三士葛敏修賀方回蘇後湖曹翰伍喬劉子先龍太初姚嗣宗白馬詩毛國英卷十一詩病詩病有八細較諸病至寶丹㸃鬼簿算博士倒用字狂怪近似鵝腿子漫塘評劉啓之詩病礙理害理好句而理不通礙理長恨歌古柏行鷓鴣詩鷺鷥詩邑人詩考證評考證卷十二品藻古今人物韓詩諸公品藻相如六代初日芙蓉彈丸脫手評鮑謝諸詩品藻古今勝語歷論諸家左太冲詩鮑昭淵明論子厚樂天淵明詩韓杜四家集李杜諸人詩人各有所得老杜之仁心優於樂天唐人方干苦吟句蹈襲句擅場詩中有助語詩言志王蘇黃杜王黃晚年詩蘇黃韓無咎蘇子美吕吉甫慈母溪四雨先得之句謝伯景田舍翁火爐頭之作詩可以觀人卷十三兩漢古詩十九首蘇李晦菴論垓下帳中之歌晦菴論大風歌王仲宣劉公幹六代總論褒貶不同五言之警䇿阮嗣宗張茂先潘安仁張景陽陸士衡劉越石郭景純三謝靈運惠連元暉靖節清淡之宗蕭統論淵明不可及悠然見南山晦菴論歸去來辭歐陽公論歸去來辭李格非論歸去來辭休齊論歸去來辭詞簡理足詩人以來無此句得此生酒詩知道悟道辨詩品所論淵明詩坡谷歎淵明之絶識東坡論淵明詩山谷論淵明詩秦太虛效淵明挽辭貧士詩止酒詩責子詩卷十四草堂墓志銘元稹作宋子京贊少游進論冷齊魯訔序王彥輔序半山老人畫像贊三百篇之後便有子美老杜似孟子晦菴論杜詩陵陽論詩能盡寫物之工用詩書語詩史胸中吞幾雲夢學老杜之法工妙至到人不可及一飯未嘗忘君妙絶古今古今絶唱髙雅大體優柔感諷髙深詩有近質處大雅堂三種句畫山水詩詞氣如百金戰馬有抔土障黃流氣象九日詩送人詩䕫州後詩貴其備村陋句卷十五王維輞川之勝詩中有畫畫中有詩造意之妙與造物相表裏晦菴謂詩清而少氣骨韋蘇州清深妙麗自成一家巳為當時所貴逸詩韋詩流麗古詩勝律詩蘇後湖讀韋詩而有感絶唱詩有深意孟浩然坐詩窮髙逺韻髙才短岑參詩山谷贊秀句韓文公掀雷决電變詩格用意改一字遂失一篇之意公末年詩閒逺有味南溪始泛後山論退之詩琴操送李願歸盤谷序晉公賡酬聮句彈琴詩評退之詩子由陋聖德詩韓栁警句栁儀曹東坡評栁州詩休齊評子厚詩詩眼評子厚詩南澗中詩絶妙古今古今絶唱天賦不可及兩句有不盡之意孟東野賈浪仙論郊島詩寒澀僧敲月下門棹穿波底月桑乾長江二詩苦吟唐人陋於聞道郊之胸次形於詩句韓愈詩枯寂氣味郊寒島瘦玉川子月蝕詩有所思飄逸可喜評茶歌山中絶句李長吉品題晦菴論李賀詩髙軒過古錦囊楊花撲帳春雲熱桃花亂落如紅雨劉賔客獨步元和用意深逺明月可中庭平淮西詩樂天評詩碁詩常建佳句卷十六白香山五長造理達道達者之詞秀句工於對草詩昭君同調寒食詩桑落酒海圖屏風詩玲瓏歌東坡似樂天纎艷不逞甘露詩陵陽重厚之論老嫗解詩玉溪生九日詩殺風景斫桂樹詞意深妙髙情逺意淺近王建托實宫詞花蕊夫人詩尤工宫詞雜他人詩舊跋山居詩望夫石詩杜牧之二十八字史論好異絶句遣懷詩陵陽論赤壁詩命意之失吳興張水戲分司洛陽杜荀鶴惟在一聮中韓致元不忘君看天憶帝都絶句香奩集晚唐詩小巧無風騷氣味陵陽論晚唐詩格卑淺誠齊論晚唐詩誠齊論晚唐詩有三百篇之遺味卷十七西崑體宗李義山佳句歐公矯崑體荆公晚年喜稱義山溫公稱其佳句六一居士六一之義歐公自負只欲平易佳句㑹趙公詩才髙不見牽强之迹蘇子美以詩得名絶句聖俞子美梅都官工於平淡自成一家句句精鍊寄馬遵詩莫打鴨石曼卿晦菴論其詩西湖處士疏影橫斜邵康節出處大略半山老人一唱三歎得子美句法託意少作晚年詩精深華妙格髙體下用意髙妙力去陳言善下字用事精切清景霜筠雪竹自然紀實落星寺詩西山寺詩梅花詩碁詩虎圖集句猿鶴不知詩病秋菊落英雪堂如天花變現長於譬喻海棠詩梅花詩芙蓉城詩三良詩與王慶源詩語意髙妙詩意佳絶詠物詩首四句便能寫盡一洗萬古南遷以後精深華妙文過有理波瀾浩渺簟紋如水帳如煙失於粗蘇過詩卷十八涪翁宗派圖得意句乞猫詩少作竒語句相似蘇黃相譏有補於世少游文潛評論出竒之過過於出竒用新竒字誠齊紀逸詩陳履常得意詩相似句秀句鴈詩近世詩人莫及學詩如學仙衒耀太甚冦國寶詩秦太虛品題詩甚麗嚴重髙古諸詩張秦捨舊圖新張文潛佳句自然竒逸不食煙火人語韓子蒼語意妙絶冬日詩茶筅子詩王逢原佳句蔡天啓申王畫馬圖詩佳句荆公詩俞秀老清老品藻警聮袁世弼遒麗竒壯荆公手寫其詩郭功甫鳳凰臺詩警句金山行山居清逸詩聖俞以為李白後身賀方回望夫石張子野三影佳句東坡詩謝無逸有古意佳句邢敦夫龍眼圖詩幼敏潘邠老天下竒才胡少汲與劉邦直詩山字韻詩徐仲車佳作楊公濟菜詩張藝叟西征二絶唐子西佳句王仲至聮句絶句卷十九中興諸賢誠齊白石之評周益公曽茶山陸放翁劉忠肅勸駕詩韋齊先生病翁楊誠齊康伯可姜堯章敖器之趙章泉韓澗泉歐陽伯威曽景建馬古洲吳明老蕭千岩黃白石孫花翁孫南叟蕭梅坡劉伯寵游伯莊劉改之趙南塘趙天樂東臯子戴石屏髙九萬髙菊澗杜小山劉後村李莊簡王武臣黃景說徐思叔黃小園馮雙溪左經臣劉溪翁游塘林方北山危逢吉裘元量趙伯林王從周劉良佐鄒應可武允蹈黃岩老陳覺民葉水心論唐詩壁間詩諸賢絶句葉靖逸嶽王墳詩髙九萬龍洲道人卷二十禪林酸饀氣無蔬筍氣靈徹船子和尚道潛仲殊惠洪福州僧惠詮清順癩可顯忠悟清希晝志南圓悟病僧方外吕洞賔韓湘元真子唐求希夷先生蜀道士斸藥翁羅浮仙間却一溪雲張亶六言詩蔡真人詞閨秀薛氏慎氏二十八字媒費氏七歲女荆公女倡周女靈異湘中女鬼仙砑光帽紀夢鬼詩小碧箋題詩吳城龍女巴峽夜吟緑裙紅袖詩餘朝無咎評太白六一東坡東坡卜算子東坡蝶戀花山谷櫽括醉翁亭記荆公山谷賀方回秦少游林和靖李景舒信道章質夫舊詞臣等謹按詩人玉屑二十卷宋魏慶之編慶之字醇甫號菊莊建安人是編前有淳祐甲辰黃易序稱其有才而不屑科第惟種菊千叢日與騷人佚士觴咏於其間蓋亦宋末江湖一派也宋人喜為詩話裒集成編者至多傳於今者惟阮閲詩話總龜無名氏詩林廣記胡仔苕溪漁隱叢話及慶之是編卷帙為富然總龜蕪雜廣記挂漏均不及胡魏兩家之書仔書作於髙宗時所録北宋人語為多慶之書作於度宗時所録南宋人語較備二書相輔宋人論詩之概亦略具矣慶之書以格法分類與仔書體例稍殊其兼采齊已風騷㫖格僞本詭立句律之名頗失簡擇又如禁體之中載蒲鞋詩之類亦殊猥陋論韓愈精衛銜石填海人皆譏造次我獨賞專精二句為勝錢起曲終人不見江上數峰青二句之類是非亦未平允然采托既䋣菁華斯寓鍾嶸所謂披沙揀金往往見寶者亦庶幾焉固論詩者所必資也乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀詩人玉屑原序詩之有評猶醫之有方也評不精何益於詩方不靈何益於醫然惟善醫者能審其方之靈善詩者能識其評之精夫豈易言也哉詩話之編多矣總龜最為踈駁其可取者惟苕溪叢話然貪多務得不泛則冗求其有益於詩者如披砂揀金悶悶而後得之故觀者或不能終卷友人魏菊莊詩家之良醫師也乃立新意别為是編自有詩話以來至於近世之評論慱觀約取科别其條凡升髙自下之方繇粗入精之要靡不登載其格律之明可凖而式其鑒裁之公可研而核其斧藻之有味可咀而食也既又取三百篇騷選而下及宋朝諸公之詩名勝之所品題有補於詩道者盡擇其精而録之蓋始焉束以法度之嚴所以正其趨向終焉極夫古今之變所以冨其見聞是猶倉公華他按病處方雖庸醫得之猶可藉以巳疾而况醫之善者哉方今海內詩人林立是書既行皆得靈方取寶囊玉屑之飯瀹之以冰甌雪碗薦之以菊英蘭露吾知其換骨而仙也必矣姜白石云不知詩病何由能詩不觀詩法何由知病人非李杜安能徑詣聖處吾黨盍相與懋之君名慶之字醇甫有才而不屑科第惟種菊千叢日與騷人佚士觴詠於其間閣學游公受齊先生嘗賦詩嘉之有種菊幽探計何早想應苦吟被花惱之句視其所好事以知其人焉淳祐甲辰長至日玉林黃叔暘序
