body:
  text: 詩人玉屑巻九宋魏慶之撰托物取况詩之取况日月比君后龍比君位雨露比徳澤雷霆比刑威山河比邦國隂陽比君臣金玉比忠烈松竹比節義鸞鳳比君子燕雀比小人誠齋論比擬白樂天女道士詩云姑山半峯雪瑶水一枝蓮此以花比美婦人也東坡海棠云朱唇得酒暈生臉翠袖巻紗紅映肉此以美婦人比花也山谷酴醿云露濕何郎試湯餅日烘荀令炷爐香此以美丈夫比花也山谷此詩出竒古人所未有然亦是用荷花似六郎之意托興子美登慈恩寺塔詩譏天寳時事也山者人君之象泰山忽破碎則人君失道矣賢不肖混淆而清濁不分故曰涇渭不可求天下無綱紀文章而上都亦然故曰俯視但一氣焉能辨皇州於是思古之聖君不可得故曰回首呌虞舜蒼梧雲正愁是時明皇方眈於淫樂而不已故曰惜哉瑶池飲日宴崑崙丘賢人君子多去朝廷故曰黄鵠去不息哀鳴何所投惟小人貪竊禄位者在朝故曰君看隨陽鴈各有稻粱謀三山老人語錄托物以寓意詩人詠物形容之妙近世為最如梅聖俞蝟毛蒼蒼磔不死銅盤矗矗釘頭生吳雞闘敗絳幘碎海蚌抉出真珠明誦此則知其詠芡也東坡海山仙人絳羅襦紅綃中單白玉膚不須更待妃子笑風骨自是傾城姝誦此則知其詠荔支也張文潛平池碧玉秋波瑩綠雲擁扇青瑶柄水仙宫女闘新粧輕歩凌波踏明鏡誦此則知其詠蓮花也如唐彦謙詠牡丹詩云為雲為雨徒虚語傾國傾城不在人羅隠詠牡丹詩云若教解語應傾國任是無情也動人非不形容但不能臻其妙處耳蘇黄又有詠花詩皆托物以寓意此格尤新竒前人未之有也東坡謝杜沂遊武昌以酴醿見恵詩云凄凉吳宫闕紅粉埋故苑至今㣲月夜笙簫來絶巘餘姸入此花千載尚清婉山谷詠水仙花詩云凌波仙子生塵韈水上盈盈歩㣲月是誰招此斷腸魂種作寒花寄愁絶詠桃花絶句云九疑山中蕚綠華黄雲承韈到羊家真筌蟲蝕詩句斷猶託餘情開此花余嘗因庭下黄白菊花相間開遂效此格作詩詠之曰何處金錢與玉錢化為蝴蝶夜翩翩青絲網住芳叢上開作秋花取意姸金玉錢事見杜陽雜編唐穆宗時禁中花開夜有蛺蝶數萬飛集花間宫人以羅巾撲之無有獲者上令張網空中得數百遲明視之皆庫中金玉錢也古人有詠玉簮花詩云燕罷瑶池阿母家飛瓊扶上紫香車玉簮墜地無人拾化作東南第一花漁隠托物梅聖俞有續金針詩格張天覺有律詩格洪覺範有禁臠此三書皆論詩也聖俞金針詩格云詩有内外意内意欲盡其理外意欲盡其象内外意含蓄方入詩格如旌旗日暖龍蛇動宫殿風㣲燕雀髙旌旗喻號令日暖喻明時龍蛇喻君臣言號令當明時君所出臣奉行也宫殿喻朝廷風㣲喻政教燕雀喻小人言朝廷政教纔出而小人向化各得其所也如島嶼分諸國星河共一天言明君理化一統也天覺律詩格辨諷刺云諷刺則不可怒張怒張則筋骨露矣若廟堂生莾草巖谷死伊周之類也未如花濃春寺靜竹細野池幽花濃喻媚臣秉政春寺比國家竹細野池幽喻君子在野未見用也沙鳥晴飛逺漁人夜唱閒沙鳥晴飛逺喻小人見用漁人比君子夜不明之象言君子處昏亂朝退而樂道也芳草有情皆礙馬好雲無處不遮樓芳草比小人馬喻勢利之輩雲喻謟佞之臣樓比鈞衡之地若此之類可為言近而意深不失風騷之體也其説數十悉皆類此覺範禁臠云杜子美詩言山間野外事意在譏刺風俗如三絶句曰楸樹馨香倚釣磯斬新花蘂未應飛言後進暴貴可榮觀也不如醉裏風吹盡可忍醒時雨打稀言其恩重材薄眼見其零落不若未受恩眷時雨比天恩以雨多故致花易壊也門外鸕鷀久不來沙頭忽見眼相猜言貪利小人畏君子之譏其短也自今以後知人意一日須來一百回言君子䝉以養正瑾瑜匿瑕山藪藏疾不發其惡而小人未革面謟諛不知愧耻也無數春笋滿林生柴門宻掩斷人行㑹須上畨看成竹客至從嗔不出迎言唯守道為歲寒也前軰多法其意作之如韓稚圭詩曰風定曉枝蝴蝶閙雨勻春圃桔橰閒又蔡持正詩曰風揺熟果時聞落雨滴餘花亦自香亦以雨比天恩也桔橰比宰相功業之就巳退閒矣時公在相州作熟果比大臣黜落時公在安州覺範舊遊天覺之門宜其論詩之相似也余謂論詩若此皆非知詩者善乎山谷之言曰彼喜穿鑿者棄其大旨取其發興於所遇林泉人物草木魚蟲以為物物皆有所託如世間商度隠語者則詩委地矣漁隠子美托物杜子美詩有冷蘂踈枝半不禁語固佳矣而不若山意衝寒欲放梅為尤妙又荷葉荷花凈如拭此有得於佛書以清凈荷華喻人性之意故梅之髙放荷之清凈獨子美識之休齋諷興興與訕異自古工詩未嘗無興也覩物有感焉則有興今之作詩者以興近乎訕也故不敢作而詩之一義廢矣老杜萵苣詩云兩旬不甲拆空惜埋泥滓野莧迷汝來宗山實於此皆興小人盛而掩抑君子也至髙適題處士菜園則云耕地桑柘間地肥菜常熟為問葵藿資何如廟堂肉則近乎訕矣作詩者茍知興之與訕異始可言詩矣古今詩話戒訕謗詩者人之情性也非彊諫爭於廷怨忿詬於道怒鄰罵座之為也其人忠信篤敬抱道而居與時乖逢遇物悲喜同牀而不察並世而不同情之所不能堪因發於呻吟調笑之聲胷次釋然而聞者亦有所勸勉比律吕而可歌列干羽而可舞是詩之美也其發為訕謗侵陵引頸以承戈披襟而受矢以快一時之忿者人皆以為詩之禍是失詩之㫖非詩之過也山谷詩有補於世錢惟演為洛師留守置驛貢花識者鄙之蔡君謨加法造小團茶貢之富彦國嘆曰君謨乃為此也坡作荔枝歎云我願天公憐赤子莫生尤物為瘡痏雨順風調百榖登民不飢寒為上瑞君不見武夷溪邉粟粒芽前丁後蔡相籠加吾君盛徳豈在此致養口腹何陋耶又不見洛陽丞相忠孝家可憐亦進姚黄花補世之語不能易也嘗愛李敬方汴河直進舡詩云汴水通淮利最多生人為害亦相和東南四十三州地取盡膏脂是此河此等語皆可為炙背之獻也䂬溪有三百篇之㫖聶夷中河南人有詩曰二月賣新絲五月糶新榖醫得眼前瘡剜却心頭肉孫光憲謂有三百篇之㫖此亦為詩史詩史歐陽公詩慶歴中西師未解晏元獻公為樞宻使㑹大雪置酒西園歐陽永叔賦詩云須憐鐵甲冷徹骨四十餘萬屯邉兵晏曰昔韓愈亦能作言語赴裴度㑹但云園林窮勝事鐘皷樂清時不曽如此合閙孔溪談苑荆公詩荆公送吕望之赴臨江詩云黄雀有頭顱長行萬里餘想因君出守暫得免苞苴詩纔二十字耳崇仁愛抑奔競皆具焉何以多為能行此言則虐生類以飽口腹刻疲民以肥權勢者寡矣秋後竹夫人詩吕居仁詠秋後竹夫人詩云與君宿昔尚同牀正坐西風一夜凉便學短檠牆角棄不如團扇篋中藏人情易變乃如此世事多虞秪自傷却笑班姬與陳后一生辛苦望專房晁無咎詩不見班姬與陳后寜聞衰落尚專房居仁用此語也漁隠聞蟬詩吳興陸䝉老嘗為常之晉陵宰頗喜作詩時州幕官有好䜛謗同列者一日同㑹忽聞蟬聲幕官謂陸曰君既能詩可詠此也陸辭之不可因即席為之曰綠隂深處汝行藏風露從來是稻粱莫倚髙枝縱繁響也應囬首顧螳蜋因以是譏之其人愧而少戢庚溪詩話歸燕詩張九齡為相有謇諤匪躬之誠明皇怠於政事李林甫隂中傷之方秋明皇令髙力士持白羽扇賜焉九齡作賦以謝曰茍效用之得所雖殺身而何忌又曰縱秋氣之移奪終感㤙於篋中又作歸燕詩貽林甫曰海燕雖㣲𦕈乘春亦暫來豈知泥滓濺只見玉堂開棲户時䨇入華堂日幾回無心與物競鷹隼莫相猜林甫知其必退恚怒稍解明皇雜錄啄木詩治平中有吉州吉水令忘其姓名治邑嚴酷有野人馬道為啄木詩諷之曰翠翎迎日動紅觜響煙蘿不顧泥丸及唯貪得食多才離枯朽木又上最髙柯吳楚圉林闊茫茫争奈何令見其詩稍緩刑時人目曰馬啄木翰府名談贈釣者詩范希文有贈釣者詩曰江上往來人盡愛鱸魚美君看一葉舟出沒風濤裏不徒作也同上紅梅詩毗陵薦福寺紅梅閣士大夫多留題惟程給事致道嘗有詩其略曰春風如醇酒着物物不知居然北枝後迨此白日遲春風日浩蕩醉色囬氷肌所恨培雪根向來歲寒枝差池弄芳晩坐令顔色移顔色固嫵媚清香無故時意新語妙又有規戒不茍作也庚溪詩話御栁詩陳恭公執中以衛尉寺丞知梧州驛遞上䟽乞立儲貳真宗嘉其敢言翌日臨朝袖其䟽以示執政歎奬久之召為右正言然為王冀公所忌一日真宗賦御溝栁詩宣示宰相兩省皆和進恭公因進詩曰一度春來一度新翠光長得照龍津君王自愛天然色恨殺昭陽學舞人東軒筆錄夏雲詩章子厚謫雷州過小貴州南山寺有僧奉忠子厚見之巳而倚檻看雲曰夏雲多竒峯真善比類忠曰曽記夏雲詩甚竒曰如峯如火復如綿飛過㣲隂落檻前大地生靈乾欲死不成霖雨謾遮天初月詩夏鄭公竦評老杜初月詩㣲升紫塞外巳隠暮雲端以為意主肅宗也鄭公善評詩者也吾觀退之煌煌東方星奈此衆客醉其順宗時作也東方謂憲宗在儲也隠居詩話于瀆詩于瀆為詩頗干教化對花詩云花開蝶滿枝花謝蝶還稀唯有舊巢燕主人貧亦歸盧懐杼情唐備詩詩曰天若無雪霜青松不如草地若無山川何人重平道題路傍木云狂風㧞倒樹樹倒根巳露上有數枝藤青青猶未悟又曰一日天無風四溟波盡息人心風不吹波浪髙百尺皆恊騷雅同上温厚之氣作詩不知風雅之意不可以作詩詩尚譎諫唯言之者無罪聞之者足以戒乃為有補而渉於毁謗聞者怒之何補之有觀東坡詩只是譏誚朝廷殊無温柔敦厚之氣以此人故得而罪之若是伯淳詩聞者自然感動因舉伯淳和温公諸人禊飲詩云未須愁日暮天際乍輕隂又泛舟詩云只恐風花一片飛何其温厚也龜山語錄規誡子美詩杜子美送嚴武還朝詩公若登台輔臨危莫愛身勸以仗節死義也三山老人語錄魏野詩魏野贈王文正公詩西杞東封都了畢好來相伴赤松遊贈冦萊公詩好去上天辭將相却來平地作神仙勸之使退也近世士人與上官詩無非諛辭未聞有規勸之語如此者同上又啄木詩云千林啄如盡一腹餒何妨有詩人規誡之風歐公詩話規勸韓魏公初罷相出鎮長安或獻詩云是非莫問門前客得失須憑塞上翁引取碧油紅斾去鄴王臺畔醉春風公以為然即請守相州苕溪漁隠曰先君有言近世士人與上官詩無非諛詞未聞有規勸之語者或者獻詩於魏公勸其辭分陜之重而為晝錦之榮可謂能規勸矣幕府燕閑録白戰禁體物語詩禁體物語此學詩者類能言之歐公守汝隂與客賦雪詩於聚星堂舉此令徃徃坐客皆閣筆但非能者耳若能者則出入縱横何可拘礙鄭谷亂飄僧舎茶煙濕宻洒歌樓酒力㣲非不去體物語而氣格如此之卑蘇子瞻凍合玉樓寒起粟光揺銀海眩生花超然飛動何害其言玉樓銀海退之兩篇力欲去此弊雖㝠搜竒譎亦不免縞帶銀盃之句杜子美暗度南樓月寒深北渚雲初不避雲月字若隨風且開葉帶雨不成花則退之兩篇殆無以過之也石林詩話歐蘇雪詩六一居士守汝隂日因雪㑹客賦詩詩中玉月梨梅練絮白舞鵝鶴銀等事皆請勿用詩曰新陽力㣲初破蕚客隂用壯猶相薄朝寒稜稜風莫犯暮雪緌緌止還作驅馳風雲初慘淡炫晃山川漸開廓光芒可愛初日照潤澤終為和氣爍美人髙堂晨起驚幽士虚窻靜聞落酒壚成徑集缾罌獵騎尋蹤得狐貉龍蛇掃起斷復續猊虎團成呀且攫共貪終歲飽麰麥豈恤空林饑鳥雀沙墀朝賀迷象笏桑野行歌沒芒屩乃知一雪萬人喜顧我不飲胡為樂坐看天地絶氛埃使我胷襟如洗㵸脱遺前言笑塵雜搜索萬象窺㝠漠潁雖陋邦文士多巨筆人人把矛槊自非我為發其端凍口何由開一噱其後東坡居士出守汝隂禱雨張龍公祠得小雪與客㑹飲聚星堂忽憶歐陽文忠公作守時雪中約客賦詩禁體物語於艱難中特出竒麗爾來四十餘年莫有繼者僕以老門生繼公後雖不足追配先生而賔客之美殆不减當時公之二子又適在郡故輒舉前令各賦一篇詩曰窻前暗響鳴枯葉龍公拭手行初雪映空先集疑有無作態斜飛正愁絶衆賔起舞風竹亂老守先醉霜松折恨無翠袖㸃横斜秪有孤燈照明㓕歸來尚喜更鼓暗晨起不待鈴索掣未嫌長夜作衣稜却怕初陽生眼纈欲浮大白追餘賞幸有回飈驚落屑模糊檜頂獨多時歴亂瓦溝裁一瞥汝南先賢有故事醉翁詩話誰續説當時號令君聽取白戰不許持寸鐵自二公賦詩之後未有繼之者豈非難措筆乎漁隠谿堂雪詩西南地温少雪余及壯年止一二年見之自退居天國谿堂山深氣嚴隂嶺叢薄無冬而不雪毎一賞翫必命諸子賦詩為樂既而襲蹈剽略不免渉前人餘意因戯取聲色氣味富貴勢力數字離為八章止四句以代一日之謔且知余之好不在於世俗所爭而在於雪也仍效歐陽公體不以鹽玉鶴鷺為比不使皓白䌓素等字聲石泉凍合竹無風夜色沉沉萬境空試向靜中閒側耳隔窻撩亂撲春蟲色閑來披氅學王恭姑射羣仙邂逅逢只為肌膚酷相似遶庭無處覔行蹤氣半夜欺凌范叔袍更兼風力助威豪地爐火暖猶無奈怪得山村酒價髙味兒童龜手握輕明漸碾搶旗入鼎烹擬欲為之修水記恵山泉冷釀泉清富天工呈瑞足人心平地今聞一尺深此為豐年報消息滿田何止萬黄金貴海風吹浪去無邉倐忽凝為萬頃田五月京塵渇人肺不知價直幾多錢勢髙下橫斜薄又濃破窻踈戸苦相攻莫言造物渾無意好醜都來失舊容力萬石千鈞積累成未應忽此一毫輕寒松瘦竹本清勁昨夜分明聞折聲玉局文蒲鞋詩劉章子克明江左人事湖南馬氏有蒲鞋詩云吳江浪浸白蒲春越女初挑一様新纔自繡窻離玉指便隨羅襪上香塵石榴裙下從容久玳瑁筵前整頓頻今日髙樓鴛瓦上不知抛擲是何人誠齋霰詩雪花遣汝作前鋒勢頗張皇欲暗空篩瓦巧尋踈處漏跳階誤到暖邉融寒聲帶雨山難白冷氣侵人火失紅方訝一冬喧較甚今宵敢嘆卧如弓詩人玉屑巻九
