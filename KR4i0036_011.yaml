body:
  text: 詩人玉屑卷十一宋魏慶之撰詩病詩病有八沈約一曰平頭第一第二字不得與第六第七字同聲如今日良宴會歡樂莫具陳今歡皆平聲二曰上尾第五字不得與第十字同聲如青青河畔草鬱鬱園中栁草栁皆上聲三曰蜂腰第三字不得與第五字同聲如聞君愛我井竊欲自修飾君井皆平聲欲飾皆入聲四曰鶴膝第五字不得與第十五字同聲如客從遠方來遺我一書札上言長相思下言久離别來思皆平聲五曰大韻如聲鳴為韻上九字不得用驚傾平榮字六曰小韻除大一字外九字中不得有兩字同韻如遙條不同七曰旁紐八曰正紐十字內兩字疊韻為正紐若不共一紐而有雙聲為旁紐如流久為正紐流栁為旁紐八種惟上尾鶴膝最忌餘病亦皆通細較詩病聖俞語豫曰嚴維詩栁塘春水漫花塢夕陽遲則天容時態融和駘蕩如在目前又劉貢父詩話云此一聯細細較之夕陽遲則繫花春水漫不須栁也如老杜深山催短景喬木易高風則了無瑕纇苕溪漁隱曰春水漫不須栁此真確論但夕陽遲則繫花此論殊非是蓋夕陽遲乃繫於塢初不繫花以此言之則春水漫不必栁塘夕陽遲豈獨花塢哉余嘗愛西清詩話載吳越王時宰相皮光業每以詩為卩任嘗得一聯云行人折栁和輕絮飛燕銜泥帶落花自負警䇿以示同僚衆爭嘆譽裴光約曰二句偏枯不為工蓋栁當有絮泥或無花此論乃得詩之膏肓矣六一居士詩話至寶丹王岐公詩喜用金玉珠碧以為富貴而其兄謂之至寶丹也後山詩話點鬼簿算博士王楊盧駱有文名人議其疵曰楊好用古人姓名謂之點鬼簿駱好用數對謂之算博士玉泉子倒用字和東坡金山詩云雲峯一隔變炎涼猶喜重來飯積香維摩經云維摩詰往上方有國號香積以衆香鉢盛滿香飯悉飽衆會故今僧舍廚名香積二字不可顚倒也漁隱狂怪石介作三豪詩略云曼卿豪於詩永叔豪於文杜默豪於歌也永叔亦贈默詩云贈之三豪篇而我濫一名默之詩所謂飛花送酒舞前筵者即無雪事矣贈王子直詩云水底笙歌蛙兩部山中奴𨽻橘千頭雖愛其語之工然南史孔德璋門庭之內草萊不剪中有蛙鳴或問之曰欲為陳蕃乎曰我以此當兩部鼓吹何必效陳蕃即無笙歌之説藝苑雌黃近似高英秀者吳越國人與贊寧為詩友口給好罵滑稽每見眉目有異者必噂短於其後人號惡喙薄徒嘗譏名人詩病云李義山覽漢史云王莽弄來曽半破曹公將去便平沉定是破船詩李羣玉詠鷓鴣云方穿詰曲﨑嶇路又聽鉤輈格磔聲定是梵語詩羅隱云雲中雞犬劉安過月裏笙歌煬帝歸定是鬼詩杜荀鶴云今日偶題題似著不知題後更誰題此衛子詩也不然安有四蹄贊寧笑謝而已西清詩話程師孟知洪州於府中作靜堂自愛之無日不到作詩題於石曰每日更忙須一到夜深長是點燈來李元規見而笑曰此乃是登溷之詩乎東軒筆録羅隱題牡丹云若教解語應傾國任是無情也動人曹唐曰此乃詠子女障子耳隱曰猶勝足下作鬼詩乃誦唐漢武要王母詩云樹底有天春寂寂人間無路月茫茫豈非鬼詩耶丹楊集聖俞嘗云詩句義格雖通語涉淺俗而可笑者亦其病也如盡日覔不得有時還自來本謂詩之好句難得耳説者云此是人家失貓兒人以為笑歐公詩話文潛賦虎圖詩末云煩君衛吾寢振此蓬蓽陋坐令盜肉鼠不敢窺白晝或云此却是貓兒詩也又大旱詩云天邊趙盾益可畏水底武侯方醉眠時人以為幾於湯燖右軍也王直方詩話鵝腿子有舉人以詩謁汴帥王智興智興曰莫有鵝腿子否謂鶴膝也盧氏雜説漫塘評劉啓之詩病劉啓之以詩自許漫塘先生得其詩讀至韓蘄王廟詩中兩句云皇天有意存趙孤蘄王登壇鬼神泣先生掩卷曰此未識作詩法也詩家以杜少陵稱首正謂其無一篇不寓尊君敬上之意如北征詩云桓桓陳將軍仗義奮忠烈都人望翠華佳氣向金闕煌煌太宗業樹立甚宏達洗兵馬云成王功大心轉小郭相謀深古來少司徒清鑒懸明鏡尚書氣與秋天杳先後重輕非茍作也今顧指高宗為趙孤謂皇天眷命有意存趙孤而蘄王登壇鬼神便泣氣勢却如此其盛毋乃抑君父之太過而揚臣子之已甚乎語録礙理害理灃陽道傍有甘泉寺因萊公丁謂曾留行記從而題詠者甚衆碑牌滿屋孫風有評仲酌泉曾頓轡謂之禮佛遂南行高堂下瞰炎荒路轉使高僧薄寵榮人獨傳道余獨恨其語無别自古以直道見黜者多矣豈皆貪寵榮者哉又有人云此泉不洗千年恨留與行人戒覆車害理尤甚萊公之事亦例為覆車乎因過之偶為數韻其間有云已憑靜止鑑忠精更遣清冷洗讒喙蓋指二公也䂬溪句好而理不通詩人貪求好句而理有不通亦語病也如袖中諌草朝天去頭上宫花侍燕歸誠為佳句矣但進諫必以章疏無用藁之理唐人有云姑蘇城外寒山寺夜半鐘聲到客船説者亦云句則佳矣其如三更不是撞鐘時如賈島哭僧云寫留行道影焚却坐禪身時謂之燒殺活和尚此尤可笑若步隨青山影坐學白塔骨又獨行潭底影數息樹邊身皆是島詩何精粗頓異歐公詩話礙理潘大臨字邠老有登漢陽高樓詩曰兩屐上層樓一目略千里説者以為著屐豈可登樓又嘗賦潘庭之清逸樓詩有云歸來陶隱居拄頰西山雲或謂既已休官安得手扳而拄之也王直方詩話長恨歌古柏行白樂天長恨歌云峨眉山下少人行峨眉在嘉州與幸蜀全無交涉杜詩云霜皮溜雨四十圍黛色參天二千尺四十圍乃是徑十尺無乃太細長乎皆文章之病也鷓鴣詩林逋云草泥行郭索雲木呌鉤輈鉤輈格磔謂鷓鴣聲也詩話筆談皆美其善對然鷓鴣未嘗栖木而鳴惟低飛草中孫莘老知福州有荔枝十絶句云兒童竊食不知禁格磔山禽滿院飛蓋譜言荔枝未經人摘百禽不敢近或已經摘飛鳥蜂蟻競來食之或謂鷓鴣既不登木又非庭院之禽性又不嗜荔枝夏月即非鷓鴣之時語意雖工亦詩之病也鷺鷥詩張仲達詠鷺鷥詩云滄海最深處鱸魚銜得歸張文寶曰佳則佳矣爭奈鷺鷥觜腳太長也荆湖近事邑人詩方諤有贈邑令詩云琴彈永日得古意印鎖經秋生蘚痕句雖佳但印上不是生蘚處不若前輩詩云雨後有人耕緑野月明無犬吠花村思清句雅又見令之教化仁愛民樂於耕耨且無盜賊之警也翰府名談考證少陵與太白獨厚於諸公凡言太白十四處至云世人皆欲殺吾意獨憐才醉眠秋共被攜手日同行三夜頻夢君情親見君意其情好可想遁齋間覽謂二人名既相逼不能無相忌是以庸俗之見而度賢哲之心也豫故不得不辨古詩十九首非止一人之詩也行行重行行樂府以為枚乘作則其他可知矣古詩十九首行行重行行玉臺作兩首自越鳥巢南枝以下别為一首當以選為正文選長歌行只有一首青青園中葵者郭茂倩樂府有兩首次一首乃仙人騎白鹿者仙人騎白鹿之篇豫疑此詞岧岧山下亭以下其義不同當又别是一首郭茂倩不能辨也文選飲馬長城窟古詞無人名玉臺以為蔡雍作古詞之不可讀者莫如巾舞歌文義漫不可解又古將進酒芳樹石榴豫章行等篇皆使人讀之茫然又朱露雉子班艾如張思悲翁上之回等只二三句可解寧非歲久文字訛舛而然耶木蘭歌促織何唧唧文苑英華作唧唧何切切又作嚦嚦樂府作唧唧復唧唧又作促織何唧唧當從樂府也願馳千里足郭茂倩樂府願借明馳千里足酉陽雜爼作願馳千里明駝足漁隱不考妄為之辨木蘭歌文苑英華直作韋元甫名考郭茂倩樂府有兩篇其後篇乃元甫所作也木蘭歌最古然朔氣傳金柝寒光照鐵衣之語已似太白必非漢魏人也班婕妤怨歌行文選直作班姬之名樂府以為顏延年作諸葛孔明梁甫吟步出齊東門遙望蕩隂里樂府解題作遙望隂陽里今青州有隂陽里田疆古冶子解題作田疆固野子南北朝人惟張正見詩最多而最無足省發所謂雖多亦奚以為西清詩話載朝文元家所藏陶詩有問來使一篇云爾從山中來早晚發天目我屋南山下今生幾叢菊薔薇葉已抽秋蘭氣當馥歸去來山中山中酒應熟豫謂此篇誠佳然其體製氣象與淵明不類得非太白逸詩後人謾取以入陶集耶文苑英華有太白代寄翁參樞先輩七言律一首乃晚唐之下者又有五言律三首其一送客歸吳其二送友生歸峽中其三送袁明甫任長江集本皆無之其家數在大歷正元間亦非太白之作又有五言雨後望月一首望夫石一首冬日歸舊山一首皆晚唐之語又有秦樓出佳麗四句亦不類太白皆是後人假名也文苑英華有送史司馬赴崔相公幕一首云崢嶸丞相府清切鳳凰池羡爾瑤臺鶴高棲璚樹枝歸來晴日好吟弄惠風吹正有乘軒樂初當學舞時珍禽在羅網微命若遊絲願托周周羽相銜漢水湄此或太白之逸詩也不然亦是盛唐人作太白集中少年行只有數句類太白其他皆淺近浮俗非太白之作必誤入也酒渴愛江清一詩文苑英華作暢當而黃伯思注杜集編作少陵詩非也迎旦東風騎蹇驢決非唐人氣象只似白樂天言語今者世俗圖畫以為少陵詩漁隱亦辨其非矣而黃伯思編入杜集非也少陵有避地逸詩一首云避地歲時晚竄身筋骨勞詩書逐牆壁奴僕亦旌旄行在近聞信此生隨所遭神堯舊天下會見出腥臊題下公自注云至德二載丁酉作此則真少陵語今書市諸本並不見有舊蜀本杜詩並無注釋雖編年而不分古近二體其間略有公自注而已今豫章庫本以為翻鎮江蜀本雖無雜注又分古律其編年亦且不同近寶慶間海南漕臺新刋杜集亦以為蜀本雖刪去假坡之注亦有王原叔以下九家而趙注比他本最詳皆非舊蜀本也杜集注中坡曰者皆是托名假偽漁隱雖嘗辨之而人尚疑之蓋無至當之説以指其偽也今舉一端將不辨而自明矣如楚岫千峰翠注云景差蘭臺春望千峰楚岫翠萬木郢城隂且五言始於李陵蘇武或云枚乘則漢以前五言古詩尚未有之寧有戰國時已有五言律句耶觀此可以一笑而悟矣亦幸其有此漏逗也杜集中有詩曰者亦坡曰之類其間半偽半真尤為淆亂惑人此深可嘆然具眼者自默識之耳崔皓渭城少年行百家選作兩首自秦川以下别為一首郭茂倩樂府止作一首文苑英華亦只作一首當從樂府英華為是玉川子天下薄夫苦耽酒之詩荆公百家選只作一篇本集自天上白日悠悠懸以下别為一首當從荆公為正太白詩斗酒渭城邊壚頭耐醉眠者乃岑參之詩誤入公集太白塞上曲騮馬新跨紫玉鞍者乃王昌齡詩亦誤入昌齡本有二篇前篇乃秦時明月漢時關者也孟浩然集有贈孟郊一首按東野乃正元元和間人而浩然終於開元二十八年時代懸遠其詩亦不似浩然必誤入不可不辨也杜詩五雲高太甲六月曠摶扶太甲之義殆不可曉得非高太乙耶乙誤為甲蓋亦相近以星對風庶從其類也杳杳東山攜漢妓泠泠修竹待王歸攜漢妓無義理疑是攜妓去蓋子美於絶句每喜對偶耳臆見如此更俟宏識荆公百家詩選蓋本於唐人英靈間氣集其初明皇德宗薛稷劉希夷王適韋述之詩無少增損次序亦同孟浩然但增其數儲光羲後方是荆公自去取前卷讀之盡佳非其選擇之精蓋盛唐人之詩無不可觀者至於大歷以後其去取深不滿人意况唐人如沈宋王楊盧駱陳拾遺張曲江賈至王維獨孤及韋應物孫逖祖詠劉眘虛綦母潛劉長卿李長吉諸公皆大名家李杜韓栁元白以家有其集故不載而此集無之荆公當時所選但據宋次道家之所有耳其序乃言觀唐詩者觀此足矣豈不誣哉今人但以荆公所選斂衽而莫敢議可嘆也荆公有一家但取一二首而不可讀者如曹唐二首其一首云年少風流好丈夫大家望拜執金吾間眠曉日聽鶗鴂笑倚東風仗轆轤深院吹笙從漢婢靜街調馬任奚奴牡丹花下鉤簾看獨憑紅肌捋虎鬚此不足以書屏幛但可與閭巷小人為文背之詞又買劒一首云青天露拔雲霓泣黑地潛擎鬼魅愁但可與巫師念誦也唐人類集一代之詩不特英靈間氣極玄又玄也顧陶作唐詩類選竇常有南薰集韋縠有才調集又有正聲集不記何人有小選集選詞苑瓊華雅言系述其他必尚有之也豫嘗見方子通墓志言唐詩有八百家子通所藏有五百家今則世不見有惜哉栁子厚漁翁夜傍西巖宿之詩東坡刪去後二句使子厚復生亦必心服謝眺洞庭張樂地瀟湘帝子遊雲去蒼梧野水還江漢流停驂我悵望輟棹子夷猶廣平聽方藉茂陵將見求心事俱已矣江上徒離憂豫謂廣平聽方藉茂陵將見求一聯亦可削去只用八句尤為渾然不知識者以為如何詩人玉屑卷十一
