body:
  text: 詩人玉屑卷十三宋魏慶之撰兩漢古詩十九首古人𣺌邈人代難詳推其文體固是炎劉之制非衰周之唱鍾嶸詩評讀古詩十九有及曹子建詩如明月入高樓流光正徘徊之類詩皆思深遠而有餘意言有盡而意無窮也學者當以此等詩常自涵養自然下筆高妙呂氏童䝉訓蘇李蘇子卿李少卿之徒工為五言雖文律各異雅正之音亦雜而詞意簡遠指事言情自非有為而為則文不妄作唐元稹撰子美墓誌秦少游云蘇李之詩長於高妙晦庵論垓下帳中之歌項羽所作垓下帳中之歌其詞慷慨激烈有千載不平之餘憤若其成敗得失則亦可以爲强不知義者之深戒晦庵論大風歌文中子曰大風安不忘危其覇心之存乎美哉乎其言之大也漢之所以有天下而不能爲三代之王其以是夫然自千載以來人主之詞亦未有若是其壯麗而奇偉者也嗚呼雄哉王仲宣仲宣詩其源出於李陵若發愀愴之辭文秀而質羸在曹劉間别構一體方陳思不足比魏文有餘詩評劉公幹公幹詩其源出於古詩仗氣愛奇動多振絶貞骨陵霜高風跨俗但氣過其文然陳思已往少稱獨歩詩評六代總論漢魏後陵遲衰微訖於有晉太康中三張二陸兩潘一左勃然復興踵武前王流風末𣲖亦文章之中興也永嘉時貴黄老尚虛談于時篇什理過其辭淡然寡欲爰及江表微波尚傳孫綽許詢桓庾諸公詩皆平典以道德論建安風力盡矣於是郭景純用俊士之才變創其體劉越石仗清剛之氣賛成厥美使彼衆我寡亦未動俗逮義熈中謝益壽斐然之作永嘉有謝靈運才高辭盛富艷難蹤固以含劉跨郭凌轢潘左故知陳思爲建安之傑公幹仲宣陸機爲輔此皆五言之冠冕文辭之命世也詩評晦庵云齊梁間人詩讀之使人四肢皆懶慢不收拾褒貶不同六朝諸人之詩不可不熟讀如蕭慤芙蓉露下落楊栁月中疎鍜鍊至此自唐以來無人能及也退之云齊梁及陳隋衆作等蟬噪此語吾不敢議亦不敢從許彥周詩話五言之警䇿阮籍詠懷子卿雙鳬稽康雙鸞茂先寒食平叔單衣安仁倦暑景陽苦雨靈運鄴中士衡擬古越石感亂景純游仙王微風月謝客山水叔元離燕明遠戍邊太冲詠史延之入洛陶公詠貧之製惠連搗衣之作斯皆五言之警策者也所謂篇章之珠澤文彩之鄧林乎鍾嶸詩評下同阮嗣宗嗣宗詩其源出於風雅無雕蟲之巧而詠物詠懷可以舒性靈發幽思言猶耳目之内情寄八荒之外洋洋乎源於風雅使人忘其鄙近自致遠大詩評張茂先茂先詩其源出於王粲其體浮艷興託多奇巧用文以其妍冶雖名高曩代而敦亮之士猶恨兒女情多風流氣少謝康樂云張公雖復千箱猶一體耳今置之甲品疑弱乙之中品恨少在季孟之間耳詩評潘安仁潘安仁詩源出於仲宣翰林嘆其翩翩奕奕如翔禽之羽毛衣帔之綃縠猶尚淺於陸機則機爲深矣謝混云潘詩爛若舒錦無處不佳陸文如披沙揀金往往得寳余嘗言陸事如海潘才如江詩評張景陽景陽詩其源出於王粲文體華凈少病累有巧構形似之言雄於潘岳靡於太冲風流調達實曠代之高才其辭葱蒨音韻鏗鏘使人味之亹亹不絶詩評陸士衡士衡詩其源出於陳思才高辭贍舉體華密氣少於公幹文劣於仲宣但尚規矩不貴綺錯有傷直寄之奇也且咀嚼英華厭飫膏澤故文章之源泉也張嘆其大異信矣人云古詩其源出於國風陸機擬詩十二首文澤以麗意悲而切驚心動魂幾於一字千金詩評劉越石越石詩其源出於王粲善爲悽戾之辭且有清拔之氣琨既體良才又離厄運故善叙䘮亂多感恨之言詩評晦庵曰劉琨詩高東晉詩已不逮前人齊梁益浮薄矣郭景純景純詩憲潘岳文體相輝彪炳可翫變中元平淡之體故稱中興第一翰林以爲詩首遊仙之作辭多慷慨乏𤣥遠之詩宗詩評文選注云遊仙之制文多自敘志狹中區而辭無俗累三謝唐子西語錄云三謝詩靈運爲勝當就選中寫出熟玩方知其優劣也又云江左諸謝詩文見文選者六人希逸無詩宣遠叔源有詩不工今取靈運惠連元暉詩合六十四篇爲三謝詩是三人者詩至元暉語益工然蕭散自得之趣亦復少減漸有唐風矣於此可以觀世變也又云靈運在永嘉因夢惠連遂有池塘生春草之句元暉在宣城因登三山遂有澄江淨如練之句二公妙處蓋在於鼻無堊目無膜爾鼻無堊斤將曷運目無膜鎞將曷施所謂混然天成天球不琢者歟靈運如矜名道不足適已物可忽清暉能娛人遊子澹忘歸元暉詩如春草秋更綠公子未西歸大江流日夜客心悲未央等語皆得三百篇之餘韻是以古今以為奇作靈運池塘生春草園柳變鳴禽世人多不解此語為工蓋欲以奇求之爾此語之工正在無所用意猝然與景相遇得以文章不假繩削故非常情之所能到詩家妙處當須以此為根本而思苦言難者往往不悟石林詩話惠連三謝才思富健恨其蘭玉早彫長轡未騁秋懷搗衣之作雖靈運銳思何以加焉詩評元暉元暉詩其源出於謝琨微傷細宻一章之中自有玉石然奇章秀句足使叔原失歩明遠變色詩評靖節清淡之宗淵明意趣眞古清淡之宗詩家視淵明猶孔門視伯夷也西清詩話蕭統論淵明鍾嶸評淵明詩為古今隱逸詩人之宗余謂陋哉斯言豈足以盡之不若蕭統云淵明文章不羣詞彩精拔跌宕昭彰獨超衆類抑揚爽朗莫之與京橫素波而傍流干青雲而直上語時事則指而可想論懷抱則曠而且眞加以貞志不休安道苦節不以躬耕為恥不以無財為病自非大道篤志與道汚隆孰能如此乎此言盡之矣漁隱不可及淵明詩所不可及者冲澹深粹出於自然若曾用力學然後知淵明詩非著力之所能成龜山語錄悠然見南山東坡以淵明有採菊東籬下悠然見南山而無識者以見為望不啻碔砆之與美玉予觀樂天效淵明詩有云時傾一樽酒坐望東南山然則流俗之失久矣惟韋蘇州答長安丞裴稅詩有云採菊露未晞舉頭見秋山乃知眞得淵明詩意而東坡之說為可信晦庵論歸去來辭歐陽公言兩晉無文章幸獨有歸去來辭一篇耳然其詞義夷曠蕭散雖託楚聲而無其尤怨切蹙之病云歐陽公論歸去來辭六一居士惟重陶淵明歸去來以為江左高文當世莫及涪翁云顏謝之詩可謂不遺鑪錘之功矣然淵明之牆數仞而不能窺也東坡晚年尤喜淵明詩在儋耳遂盡和其詩荆公在金陵作詩多用淵明詩中事至有四韻詩全使淵明詩者遯齋閑覽李格非論歸去來辭李格非善論文章嘗曰諸葛孔明出師表劉伶酒德頌陶淵明歸去來辭李令伯乞養親表皆沛然如肝肺中流出殊不見斧鑿痕是數君子在後漢之末西晉之間初未嘗欲以文章名世而其詞意超邁如此冷齋夜話休齋論歸去來辭陶淵明罷彭澤令賦歸去來而自命曰辭迨今人歌之頓挫抑揚自協聲律蓋其詞高甚晉宋而下欲追躡之不能漢武帝秋風詞盡蹈襲楚辭未甚敷暢歸去來則自出機杼所謂無首無尾無終無始前非歌而後非辭欲斷而復續將作而遽止謂洞庭鈞天而不淡謂霓裳羽衣而不綺此其所以超然乎先秦之世而與之同軌者也詞簡理足飲酒詩云衰榮無定在彼此更共之山谷云此是西漢人文章他人多少言語盡得此理䂬溪詩話詩人以來無此句荆公嘗言其詩有奇絶不可及之語如結廬在人境而無車馬喧問君何能爾心遠地自偏由詩人以來無此句也然則淵明趣向不羣詞彩精拔晉宋之間一人而已苕溪漁隱曰荆公詩云先生歲晚事田園魯叟遺書廢討論問訊桑麻憐已長按行松菊喜猶存農人調笑追尋壑稚子歡呼出候門遥謝載醪袪惑者吾今欲辨已忘言所謂四韻全使淵明詩者即此詩是也得此生東坡云秋菊有佳色裛露掇其英泛此忘憂物遠我遺世情一觴雖獨進杯盡壺自傾日入羣動息歸鳥趨林鳴笑傲東軒下聊復得此生靖節以無事為得此生則見役於物者非失此生耶酒詩飲酒詩云客養千金軀臨化消其寳寳不過軀軀化則寳亡矣人言靖節不知道吾不信也知道東坡拈出淵明談理之詩有曰採菊東籬下悠然見南山二曰笑傲東軒下聊復得此生三曰客養千金軀臨化消其寳皆以為知道之言蓋絺章繪句嘲風弄月雖工何補若觀道者出語自然超詣非常人能蹈其軌轍也韻語陽秋悟道彭澤歸去來辭云既自以心為形役奚惆悵而獨悲是此老悟道處若人能用此兩句出處有餘裕也許彥周詩話辨詩品所論淵明詩魏晉間人詩大抵專攻一體如侍晏從軍之類故後來相與祖習者亦但因所長而取之耳謝靈運擬鄴中七子與江淹雜擬是也梁鍾嶸作詩品皆云某人詩出於某人亦以此爲然論陶淵明乃以爲出應璩此語不知其所據應璩詩不多見惟文選載其百一詩一篇所謂下流不可處君子愼厥初者與陶詩了不相類五臣注引文章錄云曹爽多違法度璩作詩以刺在位若百分有補於一者淵明正以脫略世故超然物外爲適顧區區在位者何足累其心哉且此老何嘗有意欲以詩自名而追取一人而模倣之此乃當時文士與進取而爭長者所爲何期此老之淺蓋嶸之陋也石林坡谷歎淵明之絶識山谷云東坡在潁州時因歐陽叔弼讀元載傳嘆淵明之絶識遂作詩云淵明求縣令本縁食不足束帶向督郵小屈未爲辱翻然賦歸去豈不念窮獨重以五斗米折腰營口腹云何元相國萬鍾不滿欲胡椒銖兩多安用八百斛以此殺其身何翅抵鵲玉往者不可悔吾其反自燭淵明隱約栗里柴桑之間或飯不足也顏延年送錢二十萬即日送酒家與蓄積不知紀極至藏胡椒八百斛者相去遠近豈直睢陽蘇合彈與蜣蜋糞丸比哉東坡論淵明詩東坡云古之詩人有擬古之作矣未有追和古人者也追和古人則始於東坡吾於古人無所甚好獨好淵明之詩淵明作詩不多然其詩質而實綺癯而實腴自曹劉鮑謝李杜諸人皆莫及也山谷論淵明詩山谷云寧律不諧而不使句弱寧用字不工不使語俗此庾開府之所長也然有意於爲詩也至於淵明則所謂不煩繩削而自合者雖然巧於斧斤者多疑其拙窘於檢括者輒病其放孔子曰甯武子其知可及也其愚不可及也淵明之拙與放豈可爲不知者道哉道人曰如我按指海印發光汝暫舉心塵勞先起說者曰若以法眼觀無俗不眞若以世眼觀無眞不俗淵明之詩要當與一丘一壑者共之耳秦太虛效淵明挽辭淵明自作挽辭秦太虛亦效之余謂淵明之辭了達太虛之辭哀怨淵明三首今錄其一云有生必有死早死非命促昨暮同爲人今旦在鬼錄魂氣散何之枯形寄枯木嬌兒索父啼良久撫我哭得失不復知是非安能覺千秋萬歲後誰知榮與辱但恨在世時飲酒不得足太虛云嬰釁徒窮荒茹哀與世辭官來錄我槖吏來檢我屍籐束木皮棺藁葬路傍陂家鄉在萬里妻子天一涯孤魂不敢歸惴惴猶在兹昔添柱下史通籍黄金嬰奇禍一朝作飄零至於斯弱孤未堪事返骨定何時修途繚山海豈勉從闍維荼毒復荼毒彼蒼那得知歲均瘴江急鳥獸鳴時悲空濛寒雨零慘淡隂風吹殯宫生蒼蘚紙錢挂空枝無人設薄奠誰與飯黄淄亦無挽歌者空有挽歌辭東坡謂太虛齊死生了物我戲出此語其言過矣此言淵明可以當之若太虛者情鍾世志意戀生理一經遷謫則不能自釋遂怏忿而作此辭豈眞若是乎漁隱貧士詩貧士詩云九十行帶索饑寒况當年近一名士作詩云九十行帶索榮公老無依余謂之曰陶詩本非警䇿因有君詩乃見陶之工或譏余貴耳賤目後錯舉兩聯人多不能辨其孰爲陶孰爲今詩也則爲解曰榮啓期事近出列子不言榮公可知九十則老可知行帶索則無依可知五字皆贅也若淵明意謂至於九十猶不免行而帶索則自少壯至於長老其饑寒艱苦宜如此窮士之所以可深悲也此所謂君子於其言無所茍而已矣古人文章必不虛設耳詩眼止酒詩止酒詩云坐止高䕃下歩止蓽門裏好味止園葵大歡止稚子余嘗反覆味之然後知淵明之用意非獨止酒而於此四者皆欲止之故坐止於樹䕃之下則廣厦華堂吾何羡焉歩止於蓽門之裏則朝市聲利吾何趨焉好味止於噉園葵則五鼎方丈吾何欲焉大歡止於戲稚子則燕歌趙舞吾何樂哉在彼者難求而在此者易爲也淵明固窮守道安於丘園疇肯以此而易彼乎漁隱責子詩山谷云陶淵明責子詩曰白髪被兩鬢肌膚不復實雖有五男兒總不好紙筆阿舒已二八懶惰故無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覔棃與栗天運茍如此且進盃中物觀淵明此詩想見其人慈祥戲謔可觀也俗人便謂淵明諸子皆不肖而淵明愁歎見於詩耳又云杜子美詩陶潛避俗翁未必能達道觀其著詩篇頗亦恨枯槁達士豈是足黙識蓋不早生子賢與愚何其挂懷抱子美困頓於三川蓋爲不知者詬病以爲拙於生事又往往譏議宗文宗武失學故聊解嘲耳其詩名曰遣可解也俗人便爲譏病淵明所謂癡人前不得說夢也詩人玉屑巻十三
