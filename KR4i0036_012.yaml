body:
  text: 詩人玉屑巻十二宋魏慶之撰品藻古今人物古今詩人雖各有評而總論諸賢不容類析者復萃於此韓詩周詩三百篇雅麗理訓誥曽經聖人手議論安敢到五言出漢時蘇李首更號東都漸瀰漫𣲖别百川導建安能者七卓犖變風操逶迤晉宋間氣象日凋耗中間數鮑謝比近最清澳齊梁及陳隋衆作等蟬噪國朝盛文章子昂始高蹈勃興得李杜萬類困陵暴後來相繼生亦各臻閫奥有窮者孟郊受材實雄驁宜觀洞古今象外逐幽好横空盤硬語妥帖力排奡敷柔肆紆餘奮猛巻海潦韓薦士詩諸公品藻相如舉人過失難於當其尤者臧孫之犯門斬關惟孟椒能數之臧紇謂國有人焉必椒也其難如此司馬相如竊妻滌器開巴蜀以困苦鄉邦其過已多至於封禪書則謟諛蓋天性不復自新矣子美猶云竟無宣室召徒有茂陵求李白亦云果得相如草仍餘封禪文和靖獨不然曰茂陵他日求遺藁尤喜曾無封禪書言雖不迫責之深矣李商隱云相如解草長門賦却用文君取酒錢亦舍其大論其細也舉其大者自西湖始其後有譏其謟諛之態死而不已正如捕逐冦盜先爲有力者所獲搤其亢而騎其項矣餘人從旁助捶縳耳䂬溪六代顏延之常問鮑昭已與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩如鋪錦列繡亦雕繢滿眼南史顏延之傳范雲婉轉清便如流風囘雪丘遲㸃綴映媚似落花依草南史梁丘遲江總傷於浮艷南史本傳初日芙蓉彈丸脫手古人論詩多矣吾獨愛湯惠休稱謝靈運爲初日芙蓉沈約稱王筠爲彈丸脫手兩語最當人意初日芙蓉非人力所能爲而精彩華妙之意自然見於造化之外然靈運諸詩可以當此者亦無幾彈丸脫手雖是輸寫便利動無違礙然其精圓快速發之在手筠亦未能盡石林評鮑謝諸詩爲詩欲詞格清美當看鮑昭謝靈運渾成而有正始以來風氣當看淵明欲清深閒淡當看韋蘇州栁子厚孟浩然王摩詰賈長江欲氣格豪逸當看退之李白欲法度備足當看杜子美欲知詩之源流當看三百篇及楚詞漢魏等詩前軰云建安才六七子開元數兩三人前軰所取其難如此予嘗與能詩者論書止於晉而詩止於唐蓋唐自大歴以來詩人無不可觀者特晚唐氣象衰繭耳雪浪齋日記品藻古今勝語池塘生春草園栁變鳴禽世多不解此語爲工蓋欲以奇求之耳此詩之工正在無所用意卒然與景相遇備以成章不假繩削故非常情之所能到詩家妙處當須以此爲根本而思苦言艱者往往不悟鍾嶸詩評論之最詳其略云思君如流水既非前所即目高臺多悲風亦惟所見清晨登隴首若無故實明月照積雪非出經史古今勝語多非假補皆由直尋顏延之謝莊尤爲繁密於時化之故大明太始中文章殆同書鈔近任昉王元長等辭不貴奇競須新事邇來作者寖以成俗遂乃句無虛語語無虛字牽聯補衲蠧文已甚自然英旨罕遇其人余每愛此言簡切明白易曉但觀者未嘗留意耳自唐以後既變以律體固不能無拘窘然茍大手筆亦自不妨削鐻於神志之間斵輪於甘苦之外也石林詩話歴論諸家詩之興作兆基邃古唐歌虞詠始載典謨商頌周雅方陳金石其後研志緣情二京彌甚含毫瀝思魏晉彌繁李都尉鴛鴦之詞纒綿巧妙班婕妤霜雪之句發越清迥平子桂林理在文外伯喈翠鳥意盡行間河朔人物王劉爲稱首洛陽才子潘左爲覺先乃若子建之牢籠羣彥士衡之藉甚當時並文苑之羽儀詩人之龜鑑駱賔王爲詩格高指遠若在天上物外神仙㑹集雲行鶴駕想見飄然之状李太白集左太冲詩振衣千仞岡濯足萬里流使人飄飄有世表意宋子京鮑昭淵明鮑昭詩華而不弱陶潛詩切事情但不文耳論子厚樂天淵明詩子厚之貶其憂悲憔悴之嘆發於詩者特爲酸楚閔已傷志固君子所不免然亦何至是卒以憤死未爲達理也樂天既退閒放蕩物外若眞能脫屣軒冕者然榮辱得失之際銖銖校量而自矜其達每詩未嘗不著此意是豈眞能忘之者哉亦力勝之耳惟淵明則不然觀其貧士責子與其他所作當憂則憂遇喜則喜忽然憂樂兩忘則隨所遇而皆適未嘗有擇於其間所謂超世遺物者要當如是而後可也觀三人之詩以意逆志人豈難見以是論賢不肖之實亦何可欺乎蔡寛夫詩話韓杜杜之詩韓之文法也詩文各有體韓以文爲詩杜以詩爲文故不工耳蘇子瞻曰子美之詩退之之文魯公之書皆集大成者也學詩當以子美爲師有規矩故可學退之於詩本無解處以才高而好耳淵明之爲詩寫其胷中之妙耳學杜不成不失爲工無韓之才與陶之妙而學其詩終爲樂天耳後山詩話四家集王荆公以李太白杜子美韓退之歐陽永叔詩編爲四家集以歐公居太白之上公曰太白詞語迅快然十句九句言婦人酒耳冷齋夜話李杜諸人作詩者陶冶物情體㑹光景必貴乎自得蓋格有高下才有分限不可强力至也譬之秦武陽氣蓋全燕見秦王則戰掉失色淮南王安雖爲神仙謁帝猶輕其舉止此豈由素習哉余以謂少陵太白當險阻艱難流離困躓意欲卑而語未嘗不高至於羅隱貫休得意於偏霸誇雕逞奇語欲高而意未嘗不卑乃知天稟自然有不能易也西清詩話詩人各有所得詩人各有所得清水出芙蓉天然去雕飾此李白所得也或看翡翠蘭苕上未掣鯨魚碧海中此老杜所得也横空盤硬語妥帖力排奡此韓愈所得也荆公老杜之仁心優於樂天老杜茅屋爲秋風所破歌云自今䘮亂少睡眠長夜沾濕何由徹安得廣厦千萬閒大庇天下塞士俱歡顏風雨不動安如山嗚呼何時眼前突兀見此屋吾廬獨破受凍死亦足樂天新製布裘云安得萬里裘蓋裹周四垠穏煖皆如我天下無寒人新製綾襖成百姓多寒無可救一身獨暖亦何情心中爲念農桑苦耳裏如聞饑姓名偶見二人集亦未必不爲幸也蔡寛夫詩話唐人王右丞韋蘇州澄淡精緻格在其中豈妨於道哉賈浪仙誠有警句視其全篇意思殊餒大抵附於寒澁方可致才亦為體之不備也司空圖方干方干詩清潤小巧蓋未升曹劉之堂或者取之大過余未曉也王賛嘗稱之曰鏝饑滌骨冰瑩霞絢嘉殽自將不吮餘雋麗不葩芬苦不癯棘當其得志倐與神㑹孫郃嘗稱之曰其秀也蕋於常花其鳴也靈鼉於衆響其所作登靈隱峰詩云山疊雲霞際川傾世界東送喻坦之詩云風塵辭帝里舟楫到家林此直兒童語也寄喻鳬云寒蕪隨楚盡落葉渡淮稀而送喻坦之下第又云過楚寒方盡浮淮月正沉贈路明府詩云吟成五字句用破一生心而贈喻鳬又云纔吟五字句又白幾莖鬚稱心寺中島云雲接停猿樹花藏浴鶴泉而寄越上人又云忩接停猿樹巖飛浴鶴泉其語言重複如先有以見其窘也至於野渡波揺月空城雨翳鐘白猿垂樹忩邊月紅鯉驚鈎竹外溪義行相識處貧過少年時等句誠無愧於王孫所賞韻語陽秋苦吟句蹈襲句陳去非嘗謂余言唐人皆苦思作詩所謂吟安一箇字撚斷數莖鬚句向夜深得心從天外歸蟾蜍影裏清吟苦舴艋舟中白髪生之類者是也故造語皆工得句皆奇但韻格不高故不能參少陵之逸歩後之學詩者儻能取唐人語而掇入少陵繩墨歩驟中此速肖之術也余嘗以此語少藴少藴李益詩云開門風動竹疑是故人來沈亞之詩云徘徊花上月虛度可憐宵皆佳句也鄭谷掇取而用之乃云睡輕可忍風敲竹飲散那堪月在花眞可與李沈作奴僕由是論之作詩者興致先自高遠則去非之言可用儻不然便與鄭都官無異欲識爲詩苦秋霜苦在心杜牧之爲人性僻耽佳句語不驚人死不休杜詩搜天斡地覔詩情元稹白集序擅塲唐人燕集必賦詩推一人擅塲郭曖尚升平公主盛集李端擅塲送劉相巡江淮錢起擅塲李肇國史補詩中有助語詩中有助語若牀頭歴日無多子借問别來大瘦生之句子與生字初不當輕重漫叟詩話詩言志孫少述栽竹詩曰更起粉牆高百尺莫令牆外俗人看晏臨淄曰何用粉牆高百尺任教牆外俗人看處士之節宰相之量各言其志王蘇黄杜詩欲其好則不能好矣王介甫以工蘇子瞻以新黄魯直以奇而杜子美之詩奇常工易新陳莫不好也後山集王黄晚年詩東坡嘗以所作小詞示無咎文潛曰何如少游二人皆對云少游詩似小詞先生小詞似詩陳無已云荆公晚年詩傷工魯直晚年詩傷奇王直方詩話蘇黄晦庵云蘇黄只是今人詩蘇才豪黄費安排韓無咎晦庵云韓無咎詩做着者儘和平有中原之舊無南方啁哳之音蘇子美呂吉甫子美詩笠澤鱸肥人膾玉洞庭橘熟客分金呂吉甫詩魚出清波庖膾玉菊含寒露酒浮金蘇勝於呂蓋人客兩字雖無亦可慈母溪徐師川言作詩自立意不可蹈襲前人因誦其所作慈母溪詩且言慈母溪與望夫山相對望夫山詩甚多而慈母溪古今無人題詩末兩句云離鸞只說閨中事䑛犢那知母子情呂氏童䝉訓四雨介甫云棃花一枝春帶雨桃花落亂如紅雨朱簾暮捲西山雨皆警句也然不若院落深沉杏花雨爲佳予謂杏花雨固佳然而棃花院落溶溶月栁絮池塘淡淡風却於風月上寫出栁絮棃花尤有精神然嘗欲轉移兩句作溶溶院落棃花月淡淡池塘栁絮風此老杜紅稻啄餘鸚鵡粒碧梧棲老鳳凰枝格也休齋先得之句曼卿一日春初見階砌初生之草其屈如鈎而顏色未變因得一句云草屈金鉤緑未囘遂作早春一篇旬日方足成曰簷垂氷筯晴先滴草屈金鉤緑未囘其不逮先得之句遠甚始知詩人一篇之中率是先得一聯云或一句其最警拔者是也桐江詩話謝伯景歐陽文忠公詩話稱謝伯景之句如園林換葉梅初熟不若庭草無人隨意緑也池舘無人燕學飛不若空梁落燕泥也蓋伯景句意凡近似所謂西崑體而王胄薛道衡峻潔可喜也隱居詩話田舍翁火爐頭之作杜彬好評詩李建勲匿孫魴於齋中伺彬至以魴詩訪之彬曰此非有風雅但得田舍翁火爐頭之作爾魴遽出讓彬曰非有風雅固聞命矣擬田舍翁無乃太過乎彬笑曰子夜坐句云劃多灰漸冷坐久席成痕此非田舍翁火爐上所作而何闔坐大笑詩可以觀人呂獻可誨嘗云丁謂詩有天門九重開終當掉臂入王元之禹偁讀之曰入公門猶鞠躬如也天門豈可掉臂入乎此人必不忠後果如其言高齋詩話詩人玉屑巻十二
