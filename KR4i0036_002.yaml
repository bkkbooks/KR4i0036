body:
  text: 詩人玉屑卷二宋魏慶之撰詩評第三誠齋品藻中興以來諸賢詩自隆興以來以詩名家者林謙之范至能陸務觀尤延之蕭東父近時後進有張鎡功父趙蕃昌父劉翰武子黃景説巖老徐似道淵子項安世平甫鞏豐仲至薑夔堯章徐賀恭仲汪經仲權前五人皆有詩集傳世謙之常稱重其友万翥次雲詩云秋明河漢外月近斗牛旁延之有云去年江南荒趂逐過江北江北不可住江南歸未得有寄友人云胸中襞積千般事到得相逢一語無又台州秩滿而歸云送客漸稀城漸逺歸塗應減兩三程東夫飲酒云信腳到太古一登嶽陽樓不作蒼茫去真成浪蕩逰三年夜郎客一拖洞庭秋得句鷺飛處看山天盡頭猶嫌未竒絶更上嶽陽樓又荒村三月不肉味併與瓜茄倚閣休造物於人相補報問天賖得一山秋至能有云月從雪後皆竒夜天到梅邊别有春功父云斷橋斜取路古寺未關門絶似晚唐人詠金林禽花云梨花風骨杏花粧黃薔薇云已從槐借葉更染菊為裳寫物之工如此余歸自金陵功父送末章云何時重來桂隱軒為我醉倒春風前看人喚作詩中仙看人喚作飲中仙此詩超然矣昌父云紅葉連村雨黃花獨徑秋詩窮真得瘦酒薄不禁愁武子云自鋤明月種梅花又云吹入征鴻數字秋淵子云暖分煨芋火明借績麻燈又客路二千零五十向人猶自説歸耕平甫題釣臺醉中偶爾間伸腳便被劉郎賣作名恭仲云碎斫生柴爛煮詩又有姚宋佐輔之一絶句云梅花得月太清生月到梅花越樣明梅月蕭踈兩竒絶有人踏月繞花行僧顯萬亦能詩萬松嶺上一間屋老僧半間雲半間三更雲去作行雨回頭方羡老僧間又梅詩探枝春色牆頭朵闌入風光竹外梢又河橫星斗三更後月過梧桐一丈髙又有龎右甫者使敵過汴京云蒼龍觀闕東風外黃道星辰北斗邊月照九衢平似水健兒吹笛內門前誠齋題品諸楊詩吾族前輩諱存字正叟諱朴字元素諱杞字元卿諱輔世字昌英皆能詩元卿年十八第進士其叔正叟賀之云月中丹桂輸先手鏡裏朱顔正後生吾鄉民俗稻未熟摘而蒸之舂以為米其飯絶香元素有詩云和露摘殘雲淺碧帶香炊出玉輕黃余先太中貧常作小茅屋三間而未有門扉于元卿求一扉元卿以絶句送至云三間茅屋獨家村風雨蕭蕭可斷魂舊日相如猶有壁如今無壁更無門昌英有絶句云碧玉寒塘瑩不流紅蕖影裏立沙鷗便當不作南溪看當得西湖十里秋梧州詩人瀘溪先生安福王民瞻名廷圭弱冠貢入京師太學已有詩名有絶句云江水磨銅鏡面寒釣魚人在蓼花灣回頭貪看新月上不覺竹竿流下灘紹興間宰相秦檜力主和戎之議鄉先生胡邦衡名銓時為編修官上書乞斬檜謫新州民瞻送行詩一封朝上九重關是日清都虎豹寒百辟動容觀奏議幾人回首愧朝班名髙北斗星辰上身落南州瘴海間不待百年公議定漢廷行召賈生還大厦原非一木支要將獨力拄傾危癡兒不了公家事男子要為天下竒當日姦諛皆膽落平生忠義祗心知端能飽喫新州飯在處江山足護持有歐陽安永上飛語告之除名竄辰州孝宗登極召為國子監簿以老請奉祠除直敷文閣宮觀誠齋評李杜蘇黃詩體問余何意棲碧山笑而不答心自間桃花流水窅然去别有天地非人間又相隨遙遙訪赤城三十六曲水回縈一溪初入千花明萬壑度盡松風聲此李太白詩體也麒麟圖畫鴻鴈行紫極出入黃金印又白摧朽骨龍虎死黑入太隂雷雨垂又指揮能事回天地訓練強兵動鬼神又路經灔澦雙蓬鬢天入滄浪一釣舟此杜子美詩體也明月易低人易散歸來呼酒更重看又當其下筆風雨快筆所未到氣已吞又醉中不覺度千山夜聞梅香失醉眠又李白畫像西望太白橫峨岷眼髙四海空無人大兒汾陽中令君小兒天台坐忘身平生不識髙將軍手涴吾足乃敢嗔此東坡詩體也風光錯綜天經緯草木文章帝杼機又澗松無心古鬚鬛天球不瑑中粹溫又兒呼不蘇驢失腳猶恐醒來有新作此山谷詩體也誠齋評為詩隱蓄發露之異太史公曰國風好色而不淫小雅怨誹而不亂左氏傳曰春秋之稱微而顯志而晦婉而成章盡而不汙此詩與春秋紀事之妙也近世詞人間情之靡如伯有所賦趙武所不得聞者有過之無不及焉是得謂好色而不淫乎惟晏叔原云落花人獨立微雨燕雙飛可謂好色而不淫矣唐人長門怨云珊瑚枕上千行淚不是思君是恨君是得為怨誹而不亂乎惟劉長卿云月來深殿早春到後宮遲可謂怨誹而不亂矣近世陳克詠李伯時畫寧王進史圖云汗簡不知天上事至尊新納夀王妃是得為微為晦為婉為不汙穢乎惟李義山云侍宴歸來更漏永薛王沉醉夀王醒可謂微婉顯晦盡而不汙矣以畫為真以真為畫杜蜀山水圖云沱水流中座岷山赴此堂白波吹粉壁青嶂插雕梁此以畫為真也曽吉父云斷崖韋偃樹小雨郭熙山此以真為畫也臞翁詩評因暇日與弟姪輩評古今諸名人詩魏武帝如幽燕老將氣韻沉雄曹子建如三河少年風流自賞鮑眀逺如飢鷹獨出竒矯無前謝康樂如東海揚帆風日流麗陶彭澤如絳雲在霄舒卷自如王右丞如秋水芙蕖倚風自笑韋蘇州如園客獨繭暗合音徽孟浩然如洞庭始波木葉微脫杜牧之如銅丸走坂駿馬注坡白樂天如山東父老課農桑言言皆實元微之如李龜年説天寶遺事貌悴而神不傷劉夢得如鏤氷雕瓊流光自照李太白如劉安雞犬遺響白雲核其歸存恍無定處韓退之如囊沙背水惟韓信獨能李長吉如武帝承露盤無補多欲孟東野如埋泉斷劒卧壑寒松張籍如優工行鄉飲酬獻秩如時有詼氣栁子厚如髙秋獨眺霽晚孤吹李義山如百寶流蘇千絲鐡網綺密瓌妍要非適用本朝蘇東坡如屈注天潢倒連滄海變眩百怪終歸雄渾歐公如四瑚八璉止可施之宗廟荆公如鄧艾縋兵入蜀要以嶮絶為功山谷如陶宏景祗詔入宫析理談元而松風之夢故在梅聖俞如關河放溜瞬息無聲秦少遊如時女步春終傷婉弱後山如九臯獨唳深林孤芳沖寂自妍不求賞識韓子蒼如梨園按樂排比得倫吕居仁如散聖安禪自能竒逸其他作者未易殫陳獨唐杜工部如周公製作後世莫能擬議滄浪詩評大歷以前分眀别是一副言語晚唐分眀别是一副言語本朝諸公分明别是一副言語如此見得方許具一隻眼盛唐人有似粗而非粗處盛唐人有似拙而非拙處五言絶句衆唐人是一樣少陵是一樣韓退之是一樣王荆公是一樣本朝諸公是一樣盛唐人詩亦有一二濫觴晚唐者晚唐人詩亦有一二可入盛唐者要當論其大槩耳唐人與本朝人詩未論工拙直是氣象不同唐人命題言語亦自不同雜古人之集而觀之不必見詩望其題引而知其為唐人今人矣大歷之詩髙者尚未失盛唐下者漸入晚唐矣晚唐之下者亦墮野狐外道鬼窟中或問唐詩何以勝我朝唐人以詩取士故多專門之學我朝之詩所以不及也詩有詞理意興南朝人尚詞而病於理本朝人尚理而病於意興唐人尚意興而理在其中漢魏之詩詞理意興無迹可尋漢魏古詩氣象混沌難以句摘晉以還方有佳句如陶淵明採菊東籬下悠然見南山謝靈運池塘生春草之句謝所以不及陶者康樂之詩精工淵眀之詩質而自然耳謝靈運無一字不佳黃初之後惟阮籍詠懷之作極為髙古有建安風骨晉人舍陶淵明阮嗣宗外惟左太沖髙出一時陸士衡獨在諸公之下顔不如鮑鮑不如謝文中子獨取顔非也建安之作全在氣象不可尋枝摘葉靈運之詩已是徹首尾成對句矣是以不及建安也謝眺之詩已有全篇似唐人者當觀其集方知之戎昱在盛唐為最下已濫觴晚唐矣戎昱之詩有絶似晚唐者權德輿之詩卻有絶似盛唐者權德輿或有似韋蘇州劉長卿處顧况詩多在元白之上稍有盛唐風骨處冷朝陽在大歷才子中最為下馬戴在晚唐諸人之上劉滄吕溫亦勝諸人李瀕不全是晚唐間有似劉隨州處陳陶之詩在晚唐人中最無可觀薛逢最淺俗大歷以後吾所深取者李長吉栁子厚劉言史權德輿李涉李益耳大歷後劉夢得之絶句張籍王建之樂府吾所深取耳李杜二公正不當優劣太白有一二妙處子美不能道子美有一二妙處太白不能作子美不能為太白之飄逸太白不能為子美之沉鬱太白夢遊天姥吟逺别離等子美不能道子美北征兵車行垂老别等太白不能作論詩以李杜為凖挾天子以令諸侯也少陵詩法如孫吳李白詩法如李廣少陵如節制之師李杜數公如金翅擘海香象渡河下視郊島輩直蛩吟草間耳觀太白詩者要識真太白處太白天才豪逸語多率然而成者學者於每篇中要識其安身立命處可也少陵詩憲章漢魏而取材於六朝至其自得之妙則前輩所謂集大成者也人言太白仙才長吉鬼才不然太白天仙之詞長吉鬼仙之詞耳髙岑之詩悲壯讀之使人感慨孟郊之詩刻苦讀之使人不歡玉川之怪長吉之瑰詭天地間自欠此體不得韓退之琴操極髙古正是本色非唐諸賢所及釋皎然之詩在唐諸僧之上唐詩僧有法震法照無可護國靈一清江不特無本齊已貫休也集句惟荆公最長胡笳十八拍混然天成絶無痕迹如蔡文姬肝肺間流出擬古惟江文通最長擬淵明似淵明擬康樂似康樂擬左思似左思擬郭璞似郭璞獨擬李都尉一首不似西漢耳雖謝康樂擬鄴中諸子之詩亦氣象不類至於劉玄休擬行行重行行等篇鮑眀逺代君子有所思之作仍是其自體耳和韻最害人詩古人酬唱不次韻此風始盛於元白皮陸而本朝諸賢乃以此而鬬工遂至往復有八九和者孟郊之詩憔悴枯稿其氣局促不伸退之許之如此何耶詩道本正大孟郊自為之艱阻耳孟浩然諸公之詩諷味之久有金石宫商之聲唐人七言律詩當以崔灝黃鶴樓為第一唐人好詩多是征戍遷謫行旅離别之作往往尤能感動人意蘇子卿詩幸有弦歌曲可以喻中懷請為逰子吟泛泛一何悲絲竹厲清聲慷慨有餘哀長歌正激烈中心愴以摧欲展清商曲念子不能歸今人觀之必以為一篇重復之甚豈特如蘭膏絲竹弦歌之語耶古詩正不當以此論也十九首青青河畔草鬱鬱園中栁盈盈樓上女皎皎當窗牖娥娥紅粉粧纎纎出素手一連六句皆用疊字在首今人必以為句法重復之甚古詩正不當以此論也任昉哭范僕射詩一首中凡兩用生字韻三用情字韻夫子值狂生千齡萬恨生猶是兩義猶我故人情生死一交情欲以遣離情三字皆同一意天厨禁臠謂平韻可重押若或平或仄韻則不可彼以八仙歌言之耳何見之陋耶詩話謂東坡兩耳字韻二耳義不同故可重押亦非也劉公幹贈五官中郎將詩昔我從元后整駕至南鄉過彼豐沛都與君共翺翔元后蓋指曹操至南鄉謂伐劉表之時豐沛都喻操譙郡也王仲宣從軍詩云籌䇿運帷幄一由我聖君聖君亦指操也又曰竊慕負鼎翁願厲朽鈍姿是欲效伊尹負鼎干湯以伐夏也是時漢帝尚存而二子之言如此一曰元后一曰聖君正與荀彧比曹操為髙光同科春秋誅心之法二子其何逃古人贈答多相勉之詞蘇子卿云願君崇令德隨時愛景光李少卿云努力崇明德皓首以為期劉公幹云勉哉修令德北面自寵珍杜子美云君若登台輔臨危莫愛身往往此意髙達夫贈王徹云吾知十年後季子多黃金金何足道又甚於以名位期人者此達夫偶然漏逗處也詩體上風雅頌既亡一變而為離騷再變而為西漢五言三變而為歌行雜體四變而為沈宋律詩五言起於李陵蘇武或云枚乘七言起於漢武柏梁四言起於漢楚王傅韋孟六言起於漢司農谷永三言起於晉夏侯湛九言起於髙貴鄉公以時而論則有建安體漢末年號曹子建父子及鄴中七子之詩黃初體魏年號與建安相接其體一也正始體魏年號嵇阮諸公之詩太康體晉年號左思潘嶽二張三陸諸公之詩元嘉體宋年號顔鮑謝諸公之詩永明體齊年號齊諸公之詩齊梁體通兩朝而言之南北朝體通魏周而言之與齊梁體一也唐初體唐初猶襲陳隋之體盛唐體景雲以後開元天寶諸公之詩大歷體大歷十才子之詩元和體元白諸公晚唐體本朝體通前後而言之元祐體蘇黃陳諸公江西宗𣲖體山谷為之宗以人而論則有蘇李體李陵蘇武也曹劉體子建公幹也陶體淵眀也謝體靈運也徐庾體徐陵庾信也沈宋體佺期之問也陳拾遺體陳子昂也王楊盧駱體王勃揚炯盧照鄰駱賔王也張曲江體始興文獻公九齡也少陵體太白體髙達夫體髙常侍適也孟浩然體岑嘉州體岑參也王右丞體王維也韋蘇州體韋應物也韓昌黎體栁子厚體韋栁體蘇州與儀合言之李長吉體李商隱體即西崑體也盧同體白樂天體元白體微之樂天其體一也杜牧之體張籍王建體謂樂府之體同也賈浪仙體孟東野體杜荀鶴體東坡體山谷體后山體后山本學杜其語之似者但數篇他或似而不全又其他則本其自體耳王荆公體公絶句最髙其詩得意處髙出蘇黃陳之上而與唐人尚隔一關邵康節體陳簡齋體陳去非與義也亦江西之𣲖而小異楊誠齋體其初學半山后山最後亦學絶句於唐人已而盡棄諸家之作而别出機杼蓋其自序如此又有所謂選體選詩時代不同體製隨異今人例用五言古詩為選體柏梁體漢武帝與羣臣共賦七言每句韻後人謂此體為柏梁玉臺體玉臺集乃徐陵所序漢魏六朝之詩皆有之或者但謂纎艷者為玉臺體其實不然西崑體即李啇隱體然兼溫庭筠及本朝楊劉諸公而名之也香奩體韓渥之詩有裾裙脂粉之語有香奩集宫體梁簡文傷於輕靡時號宫體又有古詩有近體即律詩也有絶句有雜言有三五七言自三言而終以七言隋鄭世翼有此詩有半五六言晉傅休奕鴻雁生塞北之篇是也有一字至七字唐張南丈雪月花草等篇是也又隋人應詔有三十字詩凡三句七言一句九言不足為法故不列於此也有三句之歌髙祖大風歌是也古華山畿二十五首各三句之詞其他古人詩多如此者有兩句之歌荆卿易水歌是也又古詩青驄白馬共戲樂女兒子之類皆兩句之詞有一句之歌漢書抱鼓不平董少年一句之歌也又漢童謡千乘萬騎上北邙梁童謡青絲白馬夀陽來皆一句也有口號或四句或八句有歌行古有鞠歌行放歌行長歌行短歌行又有單以歌名者單以行名者不可枚述有樂府漢武帝定郊祀立樂府採齊楚趙魏之聲以入樂府以其音調可被於絃歌也樂府俱備諸體兼統衆名也有楚詞屈宋以下效楚詞體者皆謂之楚詞有琴操古有水仙操辛德源所作别鶴操髙陵牧子所作曰謡沈炯有獨酌謡王昌齡有箜篌謡穆天子之傳有白雲謡也曰吟古詞有隴頭吟樂府有梁父吟相如有白頭吟曰詞選有漢武秋風詞樂府有木蘭詞曰引古曲有霹靂引走馬引飛龍引曰詠選有五君詠唐儲光羲有羣鴟詠曰曲古有大堤曲梁簡文有烏栖曲曰篇選有名都篇京洛篇白馬篇曰唱魏眀帝有氣出唱曰弄古樂府有江南㺯曰長調曰短調有四聲有八病四聲設於周顒八病嚴於沈約又有以嘆名者古詞有楚妃嘆明君嘆以怨名者文選有四怨樂府有獨處怨以樂名者齊武帝有估家樂朱臧質有石城樂以别名者杜子美有無家别垂老别新婚别也以思名者太白有靜夜思有全篇雙聲疊韻者東坡經字韻詩是也有全篇字皆平聲者天隨子夏日詩四十字皆平聲又有一句全平聲一句全仄聲有全篇字皆仄聲者梅聖俞酌酒與婦飲之詩是也有律詩上下句雙用韻者第一句第三五七句押一仄韻第二句第四第六句押一平韻唐章碣有此體不足為法謾列於此以備其體耳又有四句平入之體四句仄入之體無關詩道今皆不取有轆轤韻者雙入雙出有進退韻者一進一退有古詩一韻兩用者文選曹子建美女篇用兩難字謝康樂述祖德詩用兩人字其後多有之有古詩一韻三用者文選任彥升哭范僕射詩三用情字也有古詩三韻六七用者古焦仲卿妻詩是也有古詩重用二十許韻者焦仲卿妻詩是也有古詩旁取六七許韻者韓退之此日足可惜篇是也凡雜用東冬江陽庚青六韻歐陽公謂退之遇寬韻則故旁入他韻非也此乃用古韻耳於焦韻自見之有古詩全不押韻者古採蓮曲是也有律詩至百五十韻者少陵有古韻律詩白樂天亦有之而本朝王黃州有百五十韻五言律有律詩止三韻者唐人有六句五言律如李益詩漢家今上郡秦塞古長城有日雲常慘無風沙自驚當今天子聖不戰四夷平是也有律詩徹首尾對者少陵多此體不可概舉有律詩徹首尾不對者盛唐諸公有此體如孟浩然詩挂席東南望青山水國遙軸轤爭利涉來往接風潮問我今何適天台訪石橋坐看霞色晚疑是石城標又水國無邊際之篇又李太白牛渚西江夜之篇皆文從字順音韻鏗鏘八句皆無對偶有後章字接前章者選曹子建贈白馬王彪之詩是也有四句通者如少陵神女峯娟妙昭君宅有無曲留眀怨惜夢盡失歡娛是也有絶句折腰者有八句折腰者有擬古有連句有集句有分題古人分題或各賦一物如云送某人分題得某物也亦曰探題有分韻有用韻有和韻有借韻如押四支韻可借八微或十二齊一韻也有協韻楚詞及選詩多用協韻有今韻有古韻如韓退之此日足可惜詩用古韻也蓋選詩多如此有古律陳子昂及盛唐諸公多此體有今律有頷聮有發端有落句結句也有十字對劉眘虛滄浪千萬里日夜一孤舟有十字句常建曲徑通幽處禪房花木深等是也有十四字對劉長卿江客不堪頻北望塞鴻何事又南飛是也有十四字句崔皓黃鶴一去不復返白雲千載空悠悠太白鸚鵡西飛隴山去芳洲之樹何青青是也有扇對又謂之隔句對如鄭都官昔年共照松溪影松折荒碑僧已無今日還思錦城事雪銷花謝夢何如等是也蓋以第一句對第三句第二句對第四句有借對孟浩然厨人具雞黍稚子摘楊梅太白水舂雲母碓風掃石楠花少陵竹葉於人既無分菊花從此不須開言之者有是也有就對者又曰當句有對如少陵小院回廊春寂寂浴鳬飛鷺晚悠悠李嘉祐孤雲獨鳥川光暮萬井千山一氣秋是也前輩於文亦多此體如王勃龍光射牛斗之墟徐孺下陳蕃之榻乃就句對也論雜體則有風人上句述一語下句釋其義如古子夜歌讀曲歌之類多用此體藁砧古樂府藁砧今何在山上復安山何日大刀頭破鏡飛上天五雜爼見樂府兩頭纎纎亦見樂府盤中玉臺集蘇伯玉妻作寫之盤中屈曲成文也回文起於竇滔之妻織錦以寄其夫也反覆舉一字而誦皆成句無不押韻反覆成文也李公詩格有此二十字詩離合字相拆合成文孔融漁父屈節之詩是也雖不關詩道之重輕其體製亦古至於建除鮑眀逺有建除詩詩每句首冠以建除平滿等字其詩雖佳蓋鮑本工詩非因建除之體而佳也字謎人名卦名數名藥名州名之詩只成戲論不足為法也又有六甲十屬之類及藏頭歇後等體今皆削之近世有李公詩格泛而不備惠洪天厨禁臠最為誤人今此卷有旁參二書者蓋其是處不可易也詩體下總論古人文章自應律度未嘗以音韻為主自沈約增崇韻學其論文則曰欲使宫羽相變低昂殊節若前有浮聲則後須切響一篇之內音韻盡殊兩句之中輕重悉異妙逹此旨始可言文自後浮巧之語體製漸多如傍犯蹉對假對雙聲疊韻之類詩又有正格偏格類例極多故有三十四格十九圗四聲八病之類今略有數條如徐陵云陪逰馺娑騁纎腰於結風長樂鴛鴦奏新聲於度曲又云厭長樂之踈鐘勞中宫之緩箭雖兩長樂義不同不為重復此為傍犯如九歌云蕙殽蒸兮蘭芳奠桂酒兮椒漿蒸蕙殽對奠桂酒今倒用之謂之蹉對又自朱耶之狼狽致赤子之流離不唯赤對朱耶對子兼狼狽流離乃獸名對鳥名又如厨人具雞黍稚子摘楊梅以雞對楊如此之類皆為假對如幾家村草裏吹唱隔江聞幾家村草吹唱隔江皆雙聲如月影侵簪冷江光逼履清侵簪逼履皆疊韻詩第二字側入謂之正格如鳯厯軒轅紀龍飛四十春之類第二字平入謂之偏格如四更山吐月殘夜水明樓之類唐名輩詩多用正格如杜甫詩用偏格者十無二三筆談江左體引韻便失粘既失粘則若不拘聲律然其對偶特精則謂之骨含蘇李體浣花流水水西頭主人為卜林塘幽已知出郭少塵事更有澄江銷客愁無數蜻蜓齊上下一雙鸂鷘對沉浮東行萬里堪乘興須向山隂上小舟杜子美卜居蜂腰體頷聮亦無對偶然是十字敘一事而意貫上二句及頸聮方對偶分明謂之蜂腰格言若已斷而復續也下第唯空囊如何住帝鄉杏園啼百舌誰醉在花傍淚落故山逺病來春草長知音逢豈易孤棹負三湘賈島下第詩隔句體破題與頷聮便作隔句對若施之於賦則曰幾思靜話對夜雨之禪床未得重逢照秋燈於影室也幾思聞靜話夜雨對禪床未得重相見秋燈照影堂孤雲終負約薄宦轉堪傷夢繞長松榻遙焚一炷香鄭谷弔僧詩偷春體其法頷聮雖不拘對偶疑非聲律然破題已的對矣謂之偷春格言如梅花偷春色而先開也無家對寒食有淚如金波斫却月中桂清光應更多仳離放紅蘂想像嚬青娥牛女漫愁思秋期猶渡河杜子美寒食月詩折腰體謂中失粘而意不斷渭城朝雨裛輕塵客舍青青栁色新勸君更盡一杯酒西出陽關無故人王維贈别絶絃體其語似斷絃而意存如絃絶而其意終在也燕鴻去後湖天逺欲寄知音問水居七嵗弄竿今八十錦鱗吞釣不吞書僧謙寄逺五仄體晏元獻守汝隂梅聖俞往見之將行公置酒潁河上因言古人章句中全用平聲製字穩帖如枯桑知天風是也恨未見側字詩聖俞既引舟遂作五仄體寄公云月出斷岸口影照别舸背且獨與婦飲頗勝俗客對月漸上我席瞑色亦稍退豈必在秉燭此景已可愛西清詩話回文體謂倒讀亦成詩也潮隨暗浪雪山傾逺浦漁舟釣月明橋對寺門松徑小巷當泉眼石波清迢迢逺樹江天曉靄靄紅霞晚日晴遙望四山雲接水碧峰千點數鷗輕東坡題金山寺五句法此格即事遣興可作如題物贈送之類則不可用曲江蕭條秋氣髙芰荷枯折隨風濤逰子空嗟垂二毛白石素沙亦相蕩哀鴻獨呌求其曹杜子美即事非今亦非古長歌激烈梢林莽比屋豪華固難數吾人甘作心似灰弟姪何傷淚如雨杜子美六句法此法但可放言遣興不可寄贈杜子美云烈士惡多門小人自同調名利茍可取殺身傍權要何當官曺清爾輩堪一笑山谷云三公未白首十輩擁朱輪只有人看好何益百年身但願身無事清樽對故人促句法止於兩體三句一換韻或平聲或側聲皆可江南秋色推煩暑夜來一枕芭蕉雨家在江南白鷗浦一生未歸鬢如織傷心日暮楓葉赤偶然得句應題壁蘆花如雪灑扁舟正是滄江蘭杜秋忽然驚起散沙鷗平生生計如轉蓬一身長在百憂中鱸魚正美負秋風平頭換韻法東坡作太白贊云天人幾何同一漚謫仙非謫乃其逰揮斥八極隘九州化為兩鳥鳴相酬一鳴一止三千秋開元有道為少留縻之不得矧肯求東望太白橫峨岷眼髙四海空無人大兒汾陽中令君小兒天台坐忘身平生不識髙將軍手涴吾足矧敢嗔作詩一笑君應聞一韻七句方換韻又是平聲其法不得雙殺雙殺者不得此法也禁臠促句換韻法魯直觀伯時畫馬詩云儀鸞供帳叨蝨行翰林濕薪爆竹聲風簾官燭淚縱橫木穿石槃未渠透坐窗不遨令人瘦貧馬百囓逢一豆眼明見此玉花驄徑思著鞭隨詩翁城西野眺尋小紅此格禁臠謂之促句換韻其法三句一換韻三疊而止此格甚新人罕用之余嘗以此格為鄙句云青玻璃色瑩長空爛銀盤挂屋山東晚涼徐度一襟風天分風月相管領對之技癢誰能忍吟哦自恨詩才窘掃寬露坐發興新浮蛆琰琰拋青春不妨舉盞成三人漁隱拗句魯直換字對句法如只今滿坐且尊酒後夜此堂空月明清談落筆一萬字白眼舉觴三百杯田中誰問不納履坐上適來何處蠅鞦韆門巷火新改桑柘田園春向分忽乘舟去值花雨寄得書來應麥秋其法於當下平字處以仄字易之欲其氣挺然不羣前此未有人作此體獨魯直變之苕溪漁隱曰此體本出於老杜如寵光蕙葉與多碧點注桃花舒小紅一雙白魚不受釣三寸黃甘猶自青外江三峽且相接斗酒新詩終日踈負鹽出井此溪女打鼓發船何郡郎沙上草閣栁新暗城邉野池蓮欲紅似此體甚多聊舉此數聮非獨魯直變之也今俗謂之拗句者是也禁臠七言變體律詩之作用字平側世固有定體衆共守之然不若時用變體如兵之出竒變化無窮以驚世駭目如老杜詩云竹裏行厨洗玉盤花邊立馬簇金鞍非關使者徴求急自識將軍禮數寬百年地闢柴門逈五月江深草閣寒看弄漁舟移白日老農何有罄交歡此七言律詩之變體也漁隱絶句變體韋蘇州云南望青山滿禁闈曉陪鴛鷺正差池共愛朝來何處雪蓬萊宮裏拂松枝老杜云山瓶乳酒下青雲氣味濃香幸見分鳴鞭走送憐漁父洗盞開嘗對馬軍此絶句律詩之變體也同上第三句失粘七言律詩至第三句便失粘落平側亦别是一體唐人用此甚多但今人少用耳如老杜云搖落深知宋玉悲風流儒雅亦吾師悵望千秋一灑淚蕭條異代不同時江山故宅空文藻雲雨荒臺豈夢思最是楚宫俱泯滅舟人指點到今疑嚴武云漫向江頭把釣竿懶眠沙草愛風湍莫倚善題鸚鵡賦何須不著鵕鸃冠腹中書籍幽時曬肘後醫方靜處看興發會能馳駿馬終須重到使君灘韋應物云夾水蒼山路向東東南山豁大河通寒樹依微逺天外夕陽明滅亂流中孤村幾嵗臨伊岸一雁初晴下朔風為報洛橋逰宦侣扁舟不繫與心同此三詩起頭用側聲故第三句亦用側聲八句仄入格唐末蜀川有唐求放曠踈逸方外人也吟詩有所得即將稿撚為丸投入瓢中後卧病投瓢於江曰兹文茍不沉沒得之者方知吾苦心耳瓢至新渠江有識者曰此唐山人詩瓢也接得十才二三題鄭處士隱居曰不信最清曠及來愁已空數點石泉雨一溪霜葉風業在有山處道成無事中酌盡一杯酒老夫顔亦紅古今詩話進退格鄭谷與僧齊已黃損等共定今體詩格云凡詩用韻有數格一曰葫蘆一曰轆轤一曰進退葫蘆韻者先二後四轆轤韻者雙出雙入進退韻者一進一退失此則繆矣余按倦逰録載唐介為臺官廷疏宰相之失仁廟怒謫英州别駕朝中士大夫以詩送行者頗衆獨李師中待制一篇為人傳誦詩曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重於山並遊英俊顔何厚未死姦諛骨已寒天為吾君扶社稷肯教夫子不生還此正所謂進退韻格也按韻略難字第二十五山字第二十七寒字又在二十五而還字又在二十七一進一退誠合體格豈率爾而為之哉近閲冷齋夜話載當時唐李對答語言乃以此詩為落韻詩蓋渠伊不見鄭谷所定詩格有進退之説而妄為云云也湘素雜記子蒼於五言八句近體詩亦用此格其詩云盜賊猶如此蒼生困未蘇今年起安石不用哭包胥子去朝行在人應問老夫髭鬚衰白盡瘦地日擕鉏蓋蘇夫在十虞字韻胥鉏在九魚字韻平側各押韻唐末有章竭者乃以八句詩平側各有一韻如東南路盡吳江畔正是窮愁暮雨天鷗鷺不嫌斜兩岸波濤欺得送風船偶逢島寺停帆看深羡漁翁下釣眠今古若論英達算鴟夷髙興固無邊自號變體此尤可怪者也蔡寬夫詩話雙聲疊韻南史謝莊傳曰王元謨問莊何者為雙聲何者為疊韻答曰互護為雙聲磝碻為疊韻某按古人以四聲為切韻紐以雙聲疊韻必以五音為定蓋謂東方喉聲為木音西方舌聲為金音南方齒聲為火音北方唇聲為水音中央牙聲為土音也雙聲者同音而不同韻也疊韻者同音而又同韻也互護同為唇音而二字不同韻故謂之雙聲磝碻同為牙音而二字又同韻故謂之疊韻若倣佛熠耀騏驥慷慨咿喔霡霂皆雙聲也若侏儒童蒙崆洞巃嵸螳蜋滴瀝皆疊韻也按李羣玉詩曰方穿詰曲﨑嶇路又聽鈎輈格磔聲詰曲﨑嶇乃雙聲也鈎輈格磔乃疊韻也學林新編東坡作吃語詩江干髙居堅關扃耕犍躬駕角挂經孤航繫舸菰茭隔笳鼓過軍雞狗驚解襟顧景各箕踞擊劒髙歌幾舉觥荆笄供膾愧攪聒乾鍋更戞甘瓜羮漫叟詩話扇對法此與前隔句體同律詩有扇對格第一與第三句對第二與第四句對如杜少陵哭台州司户蘇少監詩云得罪台州去時危棄碩儒移官蓬閣後榖貴殁前夫東坡和鬱孤臺詩云解后陪車馬尋芳謝眺洲凄涼望鄉國得句仲宣樓又唐人絶句亦用此格如去年花下留連飲暖日夭桃鶯亂啼今日江邊容易别淡煙衰草馬頻嘶之類是也漁隱蹉對法僧惠洪冷齋夜話載介甫詩云春殘葉密花枝少睡起茶多酒盞踈多字當作親世俗傳寫之誤洪之意蓋欲以少對密以踈對親豫作荆南教官與江朝宗匯者同僚偶論及此江云惠洪多妄誕殊不曉古人詩格此一聮以密字對踈以多字對少正交股用之所謂蹉對法也藝苑雌黃離合體前雖不取此特存其大略耳藥名詩起自陳亞非也東漢已有離合體至唐始著藥名之號如張籍答鄱陽客詩云江臯嵗暮相逢地黃葉霜前半夏枝子夜吟詩向松桂心中萬事豈君知是也西清詩話禽言詩當如藥名詩用其名字隱入詩句中造語穩貼無異尋常詩乃為造微入妙如藥名詩云四海無逺志一溪甘遂心逺志甘遂二藥名也禽言詩云喚起窗全曙催歸日未西喚起催歸二禽名也梅聖俞禽言詩如泥滑滑苦竹岡之句皆善造語者也漁隱人名荆公詩有老景春可惜無花可留得莫嫌栁渾青終恨李太白之句以古人姓名藏句中蓋以文為戲或者謂前無此體自公始見之余讀權德輿集其一篇云藩宣秉戎寄衡石崇勢位言紀信不留弛張良自愧樵蘇則為愜瓜李斯可畏不顧榮宦尊每陳農畝利家林類巖巘負郭躬斂積忌滿寵生嫌養蒙恬勝利踈鐘皓月曉晚景丹霞異澗谷永不變山梁兾無纍論自王符肇學得展禽志從此直不疑支離踈世事則權德輿已嘗為此體乃知古今文章之變殆無遺藴德輿在唐不以詩名然詞亦雅暢此篇雖主意在别立體然不失為佳製也石林詩話藥名嘗見近世作藥名詩或未工要當字則正用意須假借如日側柏隂斜是也若側身直上天門東風月前湖夜湖東二字即非正用孔毅夫有詩云鄙性嘗山野尤甘草舍中鈎簾隂卷柏障壁坐防風客土依雲實流泉架木通行當歸老矣已逼白頭翁又此地龍舒國池隍獸血餘木香多野橘石乳最宜魚古瓦松杉冷旱天麻麥踈題詩非杜若箋膩粉難書漫叟詩話詩人玉屑卷二
