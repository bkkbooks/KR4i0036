body:
  text: 詩人玉屑卷十八宋魏慶之撰涪翁宗派圖吕居仁近時以詩得名自言傳衣江西嘗作宗派圖自豫章以降列陳師道潘大臨謝逸洪芻饒節僧祖可徐俯洪朋林敏修洪炎汪革季錞韓駒李彭朝冲之江端本楊符謝薖夏槐林敏功潘大觀何覬王直方僧善權高荷合二十五人以為法嗣謂其源流皆出豫章也其宗派圖序數百言大略云唐自李杜之出焜耀一世後之言詩者皆莫能及至韓柳孟郊張籍諸人激昂奮勵終不能與前作者竝元和以後至國朝歌詩之作或傳者多依效舊文未盡所趣惟豫章始大出而力振之抑揚反覆盡兼衆體而後學者同作並和雖體制或異要皆所傳者一豫故録其名字以遺來者余竊謂豫章自出機杼别成一家清新竒巧是其所長若言抑揚反覆盡兼衆體則非也元和至今騷翁墨客代不乏人觀其英詞傑句真能發明古人不到處卓然成立者甚衆若言多依效舊文未盡所趣又非也所列二十五人其間知名之士有詩句傳於世為時所稱道者止數人而已其餘無聞焉亦濫登其列居仁此圖之作選擇弗精議論不公余是以辨之漁隱得意句蜀人石翼黃魯直在黔中時游從最久嘗言見魯直自矜詩一聯云人得交遊是風月天開圖畫即江山以為晚年最得意每舉以教人而終不能成篇蓋不欲以常語雜之然魯直自有山圍燕坐圖畫出水作夜忩風雨來余以謂氣格當勝前聯也石林詩話乞猫詩乞猫詩秋來鼠輩欺猫死窺瓮翻盆攪夜眠聞道狸奴將數子買魚穿栁聘銜蟬雖滑稽而可喜千歲而下讀者如新後山詩話少作世傳山谷七歲作牧童詩云騎牛遠遠過前村吹笛風斜隔隴聞多少長安名利客機關用盡不如君桐江詩話魯直少警悟八歲作詩送人赴舉云送君歸去明主前若問舊時黃庭堅謫在人間今八年此已非髫稚語矣奇語山谷謂洪龜父曰甥最愛老舅詩中何語龜父舉蜂房各自開户牖蟻穴或夢封侯王黃流不解涴明月碧樹為我生凉秋以為深類工部山谷云得之矣腸字韻茶詩山谷日和云曲几團蒲聽煮湯煎成車聲繞羊腸東坡見之云黃九怎得不窮張文潛嘗謂余曰黃九似桃李春風一杯酒江湖夜雨十年燈真是奇語苕溪漁隱曰汪彥章有千里江山漁笛晚十年燈火客氈寒之句效山谷體也余亦嘗效此體作一聯云釣艇江湖千里夢客氊風雪十年寒王直方詩話句相似魯直過平輿懷李子先詩世上豈無千里馬人中難得九方臯題徐孺子祠堂詩白屋可能無孺子黃堂不是缺陳蕃二詩命意絶相似蓋歎知音者難得耳漁隱蘇黃相譏元祐文章世稱蘇黃然二公當時爭名互相譏誚東坡嘗云黃魯直詩文如蝤蛑江珧柱格韻高絶盤飱盡廢然不可多食多食則發風動氣山谷亦云蓋有文章妙一世而詩句不逮古人者此指東坡而言也二公文章自今視之世自有公論豈至各如前言蓋一時爭名之詞耳俗人便以為誠然遂為譏議所謂蚍蜉撼大樹可笑不自量者耶漁隱有補於世讀魯直詩如見魯仲連李太白不敢復論鄙事雖若不適用然不為無補於世少游文潛評論山谷舊所作詩文名以焦尾弊帚少游云每覽此編輒悵然終日殆忘食事邈然有二漢之風今交遊中以文墨稱者未見其比所謂珠玉在傍覺我形穢也有學者問文潛模範曰看退聽藁蓋山谷在館中時自號所居曰退聽堂王直方詩話出奇之過後山謂魯直作詩過於出奇誠哉是言也如和文潛贈無咎詩本心如日月利欲食之既王聖涂二亭歌絶去藪澤之羅兮官于落羽洪玉父云魯直言羅者得落羽以輸官凡此之類出奇之過也漁隱過於出奇唐人不學杜詩惟唐彥謙與今黃庶謝景初學之魯直黃之子謝之壻其於二父猶子美之於審言也然過於出奇不如杜之遇物而奇也三江五湖平漫千里因風景而奇耳後山詩話用新奇字黃庭堅喜作詩得名好用南朝人語專求古人未使之一二奇字綴葺而成詩自以為工其實所見之僻也故句雖新奇而氣乏渾厚吾嘗作詩題其編後略曰端求古人遺琢抉手不停方其得璣羽往往失鵬鯨蓋謂是也隱居詩話誠齊紀逸詩豫昔為零陵丞嘗肩輿過一野寺前壁間有山谷親筆一詩豫小立肩輿誦之三過既歸書之止記一聯云春將國豓薰花骨日借黃金縷水紋今集中無之陳履常得意詩書當快意讀易盡客有可人期不來世事相違每如此好懷百歲幾回開其後又寄黃充前四句云俗子推不去可人廢招呼世事每如此我生亦何娛蓋無已得意故兩見之復齊漫録相似句樂天有詩云醉貌如霜葉雖紅不是春東坡有詩云兒童誤喜朱顔在一笑那知是酒紅鄭谷有詩云衰鬢霜供白愁顏酒借紅老杜有詩云髮少何勞白顏衰肯更紅無已詩云髮短愁催白顏衰酒借紅皆相類也然無已初出此一聯大為當時諸公所稱賞王直方詩話秀句陳留市中有刀鑷工隨其所得為一日費醉吟於市負其子以行歌江端禮以為達者為作傳而要無已作詩有閉門十日雨吟作饑鳶聲之句大為山谷所愛山谷亦擬作有云養性霜刀在閲人清鏡空王直方鴈詩杜牧之早鴈云仙掌月明孤影過長門燈暗數聲來六一居士汴河聞鴈云野岸栁黃霜正白五更驚破客愁眠皆言幽怨羈旅聞鴈聲而生愁思至後山則不然但云遠道勤相喚羈懷誤作愁則全不蹈襲也漁隱近世詩人莫及無已賦宗室畫詩滕王蛺蝶江都馬一紙千金不當價又作曾子固挽辭丘園無起日江漢有東流近世詩人莫及許彥周詩話學詩如學仙無已詩云學詩如學仙時至骨自換山谷亦有學詩如學道之句若語意俱勝當以無已為優王直方議論不公遂云陳三所得豈其苗裔耶意謂其出於山谷不足信也漁隱衒耀太甚無已嘗作小妓歌行兩篇其一云春風永巷閉娉婷長使青樓誤得名不惜捲簾通一顧怕君著眼未分明其一云當年不嫁惜娉婷傅白施朱作後生說與傍人須早計隨宜梳洗莫傾城山谷云無已他日作詩語極高古至於此篇則顧影裴回衒耀太甚王直方詩話冦國寶詩黃葉西陂水漫流籧篨風急送扁舟夕陽暝色來千里人語雞聲共一邱冦國寶徐州人久從陳無已學乃知文章淵源有所自來亦不難辨恨不得多見之也石林詩話秦太虛品題東玻嘗有書薦少游於荆公云向屢言高郵進士秦觀太虛公亦粗知其人今得其詩文數十首拜呈詞格高下固已無逃於左右外此博綜史傳通曉佛書若此類未易一一數也荆公答書云示及秦君詩適葉致遠一見亦以謂清新婉麗鮑謝似之公奇秦君口之而不置我得其詩手之而不釋又聞秦君嘗學至言妙道無乃笑我與公嗜好過乎漁隱詩甚麗少游詩甚麗如翡翠側身窺緑醑蜻蜓偷眼避紅粧又海棠花發麝香眠又青蟲相對吐秋絲之句是也雪浪齊日記嚴重高古雨砌墮危芳風軒納飛絮之類李公擇以為謝家兄弟得意不能過也少游過嶺後詩嚴重高古自成一家與舊作不同呂氏童䝉訓諸詩少游汝南自教官日郡將向宗回團練有登城詩少游次韻兩篇占沄沄汝水抱城根野色偷春入燒痕千㸃湘妃枝上淚一聲杜宇水邊魂遙憐鴻隙陂穿路尚想元和賊負恩粉蝶朱垣都過了恍如陶侃夢天門庖煙起處認孤村天色清寒不見痕車輞湖邊梅濺淚壺公祠畔月銷魂封疆盡是春秋國廟食多懷將相恩試問李斯長嘆後誰牽黃犬出東門又嘗於程文通㑹間賦牽牛花詩云銀漢初移漏欲殘步虛人倚玉欄干仙衣染得天邊碧乞與人間向曉看又一歲太守王左丞二月十一日生日程文通諸人前期袖壽詩草謁少游問曰左丞生日必有佳作少游以詩草示之乃壓小青字韻俱盡首云元氣鍾英偉東皇賦炳靈蓂敷十一莢椿茂八千齡汗血來西極摶風出北溟諸人愕然相視讀畢俱不敢出袖中之草唯唯而退桐江詩話張秦捨舊圖新元祐初與秦少游張文潛論詩二公謂不然久之東坡先生以為一代之詩當推魯直二公遂捨舊而圖新其初改轅易轍如枯絃敝軫雖成聲而跌宕不滿人耳少焉遂使師曠忘味鍾期改容也張文潛佳句文潛詩云新月已生飛鳥外落霞更在夕陽西蓋用郎士元送楊中丞和番耳郎詩云河陽飛鳥外雪嶺大荒西元祐中諸公以上巳日㑹西池王仲至有二詩文潛和之最工云翠浪有聲黃帽動春風無力彩旗垂少游有已煩逸少書陳迹更屬相如賦上林之句諸人亦以為難及王直方詩話頃見朝無咎舉文潛斜日兩竿眠犢晚春波一頃去鳬寒自以為莫能及苕溪漁隱曰文潛夜直館中詩云蒼龍挂斗寒垂地翡翠浮花暖作春亦佳句也石林詩話白頭青鬢隔存沒落日斷霞無古今此文潛過宋都詩氣格似不減老杜也千山送客東西路一樹照人南北枝此王康功詩語意新奇王直方詩話自然奇逸文潛詩自然奇逸非他人可及如秋明樹外天客燈青映壁城角冷吟霜淺山寒帶水旱日白吹風川鳴半夜雨卧冷五更秋之類迥非時流雖是天資亦學可及學者若能常玩味此等語自然有變化處也呂氏童䝉訓不食煙火人語文潛先與周翰公擇輩來飲余家作長句後數十日再同東坡來讀其詩嘆息云此不是喫煙火食人道底言語蓋其間有潄井消午醉掃花坐晚凉衆緑結夏帷老紅駐春粧之句也此詩首句云朝衫衝曉塵歸帽障夕陽日月馬上過詩書篋中藏造語極工王直方詩話韓子蒼語意妙絶李伯時畫太一真人卧一大蓮葉中手執書卷仰讀蕭然有物外思韓子蒼有詩題其上云太一真人蓮葉舟脫巾露髮寒颼颼輕風為帆浪為楫卧看玉宇浮中流中流蕩漾翠綃舞穩如龍驤萬斛舉不是峯頭十丈花世間那得葉如許龍眠畫手老入神尺素幻出真天人恍然坐我水仙府蒼煙萬頃波粼粼玉堂學士今劉向禁直岧嶤九天上不須對此融心神㑹植青藜夜相訪子蒼此詩語意妙絶真能詠盡此畫也漁隱冬日詩子蒼有和李上舍冬日詩最為世所推故商老有黃葉之句全篇云北風吹日晝多隂日暮擁階黃葉深倦鵲繞枝翻凍影飛鴻摩月墮孤音推愁不去如相覔與老無期稍見侵顧藉微官少年事病來那復一分心復齊謾録茶筅子詩子蒼謝人寄茶筅子詩云看君眉宇真龍種猶解橫身戰雪濤廬駿元亦有此詩云到底此君高韻在清風兩腋為渠生皆善賦詠者然盧優於韓漁隱王逢原佳句逢原集中佳句頗多如讀老杜詩鐫劖物象三千首照耀乾坤四百春瓜洲渡云風力引雲行玉馬水光連日動金蛇謝滿子權寄詩云九原黃土英靈活萬古青天霹靂飛桐江詩話蔡天啓申王畫馬圖詩東坡集中有申王畫馬圖詩即天啓作氣格有類東坡世因誤收入其後姑蘇居世英家刋東坡前後集遂刪去今録之云天寶諸王愛名馬千金爭致華軒下當時不獨玉花驄飛電流雲絶瀟灑兩坊岐薛寧與申憑陵內廄多清新肉騣汗血盡龍種紫袍玉帶真天人驪山射獵包原隰御前急詔穿圍入揚鞭一蹙破霜蹄萬騎如風不能入鴈飛兔走驚絃開翠華鞍轡從天回五家錦繡遍山谷百里舄珥遺塵埃青騾蜀棧起超忽高凖濃蛾散荆棘苜蓿連天鳥自飛五陵佳氣春蕭瑟漁隱叢話佳句天啓詩城響濤頭入江昏雨腳斜栁間黃鳥路波底白鷗天皆佳句松江詩最奇云斷蓬帆影天平入夾鏡波光水倒流雪浪齊日記荆公詩王荆公在鍾山有馬甚惡蹄囓不可近一日兩校牽至庭下告公請鬻之天啓時在坐曰世安有不可調之馬第久不騎驕耳即起捉其騣一躍而上不用銜勒馳數十里而還荆公大壯之即作集句詩贈之蔡子勇成癖能騎生馬駒者後有身著青衫騎惡馬日行三百尚嫌遲心源落落堪為將却是君王未備知士大夫自是盛傳荆公以將帥之材許之紹聖初章申公當國首欲進天啓侍從㑹執政有不悅者乃出為永興軍路提舉常平因欲稍遷為帥㑹丁內艱不果猶是用荆公遺意也石林詩話俞秀老清老品藻俞紫芝揚州人少有高行不娶得浮屠氏心法所至翛然而工於詩王荆公居鍾山秀老數相往來尤愛重之每見於詩所謂公詩何以解人愁初日芙蕖映碧流未怕元劉爭獨步不妨陶謝與同遊是也秀老嘗有夜深童子喚不起猛虎一聲山月高之句尤為荆公所賞和云新詩比舊仍增峭若許追攀莫太高秀老卒於元祐初惜時無發明者不得與林和靖一流概見於隱逸其弟淡字清老亦不娶滑稽善諧謔洞曉音律能歌荆公亦喜之晚年作漁家傲等樂府數闋每山行即使淡歌之然淡使酒好罵不若秀老之恬靜一日見公云吾欲為浮屠但貧無錢買祠部耳公欣然為置祠部淡約日祝髮既過期寂無耗公問其然淡徐曰吾思僧亦不易為公所贈祠部已送酒家償舊債矣公為之大笑黃魯直贈淡詩其一有云有客夢超俗去髮脫儒冠平明視清鏡正爾良獨難蓋述荆公事也苕溪漁隱曰魯直與清老同學所謂後數年見之儒冠自若也則清老實曾為僧可知而此以為祠部送酒家償舊債石林之言非也石林詩話警聯俞紫芝字秀老喜作詩人未知之荆公愛焉手寫其一聯有時俗事不稱意無限好山都上心於所持扇衆始異焉弟清老亦修潔可喜俱從山谷遊山谷所書釣魚船上謝三郎一帖石刻在金山寺雞林每入貢輒市摸本數百以歸亦秀老詞也潘子真詩話松聲詩其詞極佳萬壑搖蒼煙百灘度流水下有跨驢人蕭蕭吹凍耳冷齊夜話袁世弼遒麗奇壯世弼能為詩慕韋應物而遒麗奇壯過之王介甫嘗手書世弼贈郭功父詩云方山憶共泛金船屈指于今五六年風送梨花吹醉面月和溪水上歸韉浮生聚散應難料末路窮通盡偶然欲問故人牢落事鹿裘深入白雲眠世弼自號遁翁臨死一篇尤佳青靄千峯瞑悲風萬古呼其誰掛寶劒應有奠生芻皎月東方隕長松夜壑枯山泉吾所愛聲到夜臺無王直方詩話荆公手寫其詩荆公居金陵為功甫手寫所賦詩一軸有從來多病王僧祐自小能文謝惠連各厭塵勞思物外莫辭攜手訪林泉又曰雪後姑溪水更深𡨕𡨕寒雨作連隂旅懷未可頓消遣思與洛生溪上吟此兩篇世弼贈功甫詩也世弼年十七題百尺山詩云瓊田收𥝧稏玉溜注琅玕讀書最苦因爾臞瘠沒時才三十四歲自作墓銘述其平生有詩文十卷號遁翁集潘子真詩話郭功甫鳯凰臺詩郭功甫嘗與王荆公登金陵鳯凰臺追次李太白韻援筆立成一座盡傾白句人能誦之郭詩罕有記者今俱紀之太白云鳯凰臺上鳯凰遊鳯去臺空江自流吳宫花草埋幽徑晉代衣冠成古邱三山半落青天外二水中分白鷺洲總為浮雲能蔽日長安不見使人愁功甫云高臺不見鳯凰遊浩浩長江入海流舞罷青蛾同去國戰殘白骨尚盈邱風搖落日吹行棹潮擁新沙換故洲結綺臨春無處覔年年荒草向人愁餘話警句郭祥正字功父自梅聖俞贈詩有採石月下聞謫仙以為李白後身緣此有名功父有金山行鳥飛不盡暮天碧漁歌忽斷蘆花風大為荆公所賞東坡守錢塘功父過之出詩一軸示東坡先自吟誦聲振左右既罷謂坡曰祥正此詩幾分來坡曰十分來也祥正驚喜問之坡曰七分來是讀三分來是詩豈不十分也王直方詩話金山行功甫金山行造語豪壯世多不見全篇今録于左方金山杳在滄溟中雪崖冰柱浮仙宮乾坤扶持自今古日月髣佛纒西東我泛靈槎出塵世搜索異境窺神工一朝登臨重歎息四時想像何其雄捲簾夜閣挂北斗來鯨駕浪吹長空舟摧岸斷豈足數往往霹靂捶蛟龍寒蟾八月蕩瑶海秋光上下磨青銅鳥飛不盡暮天碧漁歌忽斷蘆花風蓬萊久聞未成往壯觀絶致遙應同潮生潮落夜還曉物與數㑹誰能窮百年形影浪自苦便欲此地安微躬白雲南來入遠望又起歸興隨征鴻漁隱山居功甫曾題人山居一聯云謝家莊上無多景只有黃鸝三兩聲荆公命工繪為圖自題其上云此是功甫題山居詩處即遣人以金酒鐘并圖遺之遁齊閒覽清逸詩袁世弼南昌人宦遊當塗時功甫尚未冠也世弼愛其才薦於梅聖俞自爾有聲功甫嘗謂吾大父清逸云教載汲引袁二丈力也蒿埋三尺不敢忘其賜功甫既壯頗恃其才力下筆曾不經意論者或惜其造語無刻勵之功清逸云如功甫豈易得但置作者中便覺有優劣耳正如晉楚之輕剽不當威文之節制也清逸嘗有詩戲之云休恨古人不見我尤喜江東獨有君盡性阿戎從幼異人疑太白是前生雲間鸞鳯人間現天上麒麟地上行詩律暮年誰可敵筆端談笑掃千兵潘子真詩話聖俞以為李白後身梅聖俞採石月贈功甫云採石月下訪謫仙夜披錦袍坐釣船醉中愛月江底懸以手弄月身翻然不應暴落饑蛟涎便當騎魚上青天青山有冢人謾傳却來人間知幾年在昔孰識汾陽王納官貰死義難忘今觀郭裔奇俊郎眉目真似攻文章死生往復猶康莊樹穴探環知姓羊李白從永王璘之辟璘敗當誅郭子儀請解官以贖有詔長流夜郎聖俞用此事尤為親切若非姓郭亦難用矣漁隱賀方回望夫石賀鑄字方回嘗作一絶題于定林寺云破冰泉脉潄籬根壞衲遙疑挂樹猿蠟屐舊痕尋不見東風先為我開門荆公見之大相稱賞緣此知名方回嘗作望夫石詩云亭亭思婦石下閲幾人代蕩子長不歸山椒久相待微雲䕃髮彩初月輝娥黛秋雨疊苔衣春風舞羅帶宛然姑射人矯首塵𡨕外陳迹遂無窮佳期從莫再脫如魯秋氏妄結桑下愛玉質委淵沙悠悠復安在交游間無不愛之王直方詩話張子野三影子野嘗有詩云浮萍斷處見山影又長短句云雲破月來花弄影又云隔牆送過鞦韆影竝膾炙人口世謂張三影高齊詩話佳句子野詩筆老健歌詞乃其餘波耳湖洲西溪詩云浮萍斷處見山影野艇歸時聞草聲與豫和詩云愁似鰥魚知夜永懶同蝴蝶為春忙若此之類亦可追配古人而世俗但稱其歌詞昔周昉畫人物皆入神品而世但知有周昉士女蓋所謂未見好德如好色者也東坡東坡詩子野能為詩及樂府至老不衰居錢塘蘇子瞻作倅時年已八十餘視聽不衰家猶蓄聲妓子瞻嘗贈以詩云詩人老去鶯鶯在公子歸來燕燕忙蓋全用張氏故事戲之石林詩話謝無逸有古意謝無逸學古高潔文詞煆煉篇篇有古意尤工於詩豫嘗愛其送董元達詩云讀書不作儒生酸躍馬西入金城關塞垣苦寒風氣惡歸來面皺鬢眉斑先皇召見延和殿議論慷慨天開顏謗書盈篋不復辨脫身來看江南山長江袞袞蛟龍怒扁舟此去何當還大梁城裏定相見玉川破屋應數間又寄隱居士詩云處士骨相不封侯卜居但得林塘幽家藏玉唾幾千卷手校韋編三十秋相知四海孰青眼高卧一庵今白頭襄陽耆舊節獨苦只有龎公不入州淮南潘邠老與之甚熟二公皆老死布衣士議惜之漫叟詩話佳句謝逸字無逸臨川韻人勝士也工詩能文黃魯直讀其詩曰朝張流也恨未識之耳無逸詩曰老鳯垂頭噤不語枯木槎丫噪春鳥又曰貪夫蟻旋磨冷官魚上竹又曰山寒石髮瘦水落溪毛雕皆為魯直所稱賞冷齊夜話邢敦夫龍眠圖詩雙井黃叔達字知命初自江南來與彭城陳履常俱謁法雲禪師于城南夜歸過龍眠李伯時知命衣白衫騎驢緣道搖頭而歌履常負杖挾囊于後一市大驚以為異人伯時因畫為圖而邢敦夫作長歌云長安城頭烏欲棲長安道上行人稀浮雲捲盡暮天碧但有明月流清輝君獨騎驢向何處頭上倒著白接䍦長吟搔首望明月不學山翁醉似泥到得城中燈火閙小兒拍手欄街笑道傍觀者那得知相逢疑是南山皓龍眠居士畫無比搖毫弄筆長風起酒酣閉目望窮途紙上軒昂無乃似君不學長安游俠誇少年臂鷹挾彈章臺道君不能提攜長劒取靈武指揮猛士驅貔虎胡為腳踏梁宋塵終日飄飄無定所武陵桃源春欲暮白水青山起煙霧竹杖芒鞋歸去來頭巾好掛三花樹惇夫時年未一十也王直方詩話幼敏邢居實字惇夫年少豪邁所與游皆一時名士年十四五時嘗作明妃引末云安得壯士霍嫖姚縳取呼韓作編户諸公多稱之既卒余收拾其殘草編成一集號曰呻吟惇夫自少便多憮悴感慨之意其作秋懷詩云高歌感人心心悲將奈何其作棗陽道中感興有意問山神此生復來否已而果卒於漢東惇夫之卒也山谷以詩哭之云詩到隨州更老成江山為助筆縱橫眼看白璧埋黃壤何况人間父子情蓋謂惇夫與其父歆向也王直方詩話潘邠老天下奇才白鳥沒飛煙微風逆上船江從樊口轉山自武昌連日月懸終古乾坤别逝川羅浮南斗外黔府古河邊波浪三江口風雲八字山斷崖東北際虛艇有無間卧栁堆生岸跳魚水搗灣悠然小軒冕幽興滿鄉關西山連虎穴赤壁隱龍宫形勝三分國波流萬世功沙明拳宿鷺天闊退飛鴻最羡魚竿客歸船雨打蓬落日春江上無人倚杖時私蛙鳴鼓吹官栁舞腰肢獵退頻翻臂漁深數治絲我猶無彼是風豈有雄雌此邠老江間所賦也邠老唐太僕卿季荀之後衢之曾孫鯁之子寓居齊安得句法於東坡頃與洪駒父徐師川洎豫友善山谷嘗稱邠老天下奇才也其為詩文他皆稱是年未五十以殁良可惜也潘子真詩話胡少汲與劉邦直詩胡少汲與劉邦直詩夢魂南北昧平生邂逅相逢意巳傾楚國山川千疊遠隋堤煙雨一帆輕我無健筆翻三峽君有長才肅五兵同是行人更分手不堪風樹作離聲少汲後生中豪士也讀書作文殊不塵埃使之不倦雖競爽者未易追也同是行人更分手佳句也邂逅相逢意已傾已道了劉三十一矣山字韻詩少汲宣和間在河朔作漕日同官陳亨伯輩唱和山字韻詩少汲最後和成人皆歎服詩云章句飄飄續小山古風蕭瑟筆追還海鵬共擊三千里鐵馬同歸十二間功業㑹看鐘鼎上聲華已在縉紳間他年記憶憐衰老為報西川引一班苕溪漁隱曰元豐間王平甫有海鵬未擊三千里天馬須歸十二間之句甚為一時諸公所稱道今少汲乃云海鵬共擊三千里鐵馬同歸十二間豈非剽平甫之句但易此三字以為已作耶桐江詩話徐仲車佳作徐積字仲車古之獨行也於陵仲子不能過然其詩文則怪而放如玉川子此一反也耳聵甚畫地為字乃始通語終日面壁坐不與人接而四方事無不周知其詳雖新且密無不先知此二反也苕溪漁隱曰余嘗記仲車二詩有云淮之冰淮之水春風吹春風洗青於藍緑染指魚不來鷗不起㶑㶑灧灧天盡頭秪見孤帆不見舟殘陽欲落未落處盡是人間今古愁今古愁可奈何莫使騷人聞棹歌我曹盡是浩歌客笑聲酒面春風和又詠蒲扇詩云妾有一尺絹以為身上衣自織青溪蒲團團手中持朝攜麥隴去暮汲井泉歸無人不看妾不使見蛾眉皆佳作也東坡楊公濟菜詩楊蟠字公濟嘗為蓴菜詩云休說江東春日妍到來且覔鑑湖船鶴生嫩頂浮新紫龍脫香髯帶舊涎玉割鱸魚迎刃滑香炊稻飯落匙圓歸期不待秋風起漉酒調羮任我年時人以為讀其詩不必食蓴羮然後知其味也王直方詩話張藝叟西征二絶張舜民字藝叟邠人也通練西事稍能詩從高遵裕西征回中作詩二絶一云靈州城下千株栁總被官軍斫作薪他日玉關歸去路將何攀折贈行人一云青銅峽裏韋州路十去從軍九不回白骨似沙沙似雪將軍莫上望鄉臺為轉運判官李察奏聞得罪貶郴州監稅東坡唐子西佳句子西上張天覺內前行云內前車馬撥不開文德殿下宣麻回紫微侍郎拜右相中使押赴文昌臺此語善於叙事質而不俚又云周公禮樂未要作致身姚宋亦不惡向來兩翁當國年民間斗米才四錢此語善於諷諭當而有理皆可法也湖上云佳月明作哲好風聖之清栖禪暮歸云草青仍過雨山紫更斜陽語意俱新漁隱王仲至聯句仲至與少游謁恭敏李公飯于燕間堂即席聯句云黃葉山頭初帶雪緑波尊酒暫回春欽臣已聞璧月瓊枝句更著朝雲暮雨人觀老愧紅粧翻曲妙喜逢佳客放懷新欽臣天明又出桃源去仙境何時再問津觀絶句仲至使遼回謁恭敏李公席中賦詩云穹廬三月已淹留白草黃雲見即愁滿袖塵埃何處洗李家池上海棠洲復齊謾録詩人玉屑卷十八
