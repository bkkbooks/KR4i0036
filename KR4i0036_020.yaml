body:
  text: 詩人玉屑卷二十宋魏慶之撰禪林酸饀氣唐詩僧中葉以後其名字班班為時所稱者甚多然詩皆不傳如經來白馬寺僧到赤烏年數聯僅見文士所録而已陵遲至貫休齊已之徒其詩雖存然無足言矣中間惟皎然最為傑出故其詩十卷獨全亦無甚過人處近世僧學詩者極多皆無超然自得之氣往往反拾掇模倣士大夫所殘棄又自作一種體格律尤凡俗世謂之酸饀氣子瞻贈惠通詩云語帶江霞從古少氣含蔬筍到公無嘗語人曰頗解蔬筍語否為無酸饀氣也聞者無不皆笑石林詩話無蔬筍氣東坡言僧詩要無蔬筍氣固詩人龜鑑今時誤解便作世網中語殊不知本分家風水邊林下氣象蓋不可無若盡洗去清拔之韻使與俗同科又何足尚齊已云春深遊寺客花落閉門僧惠崇云曉風飄磬遠暮雪入廊深之句華實相副顧非佳句耶天聖間閩僧可士有送僧詩云一鉢即生涯隨緣度歲華是山皆有寺何處不為家笠重吳天雪鞋香楚地花他年訪禪室寧憚路岐賖亦非肉食者能到也西清詩話靈徹靈徹詩僧中第一如海月生殘夜江春入暮年窗風枯硯水山雨慢琴絃前輩評此詩云轉石下千仞江雪浪齊日記相逢盡道休官去林下何曾見一人世俗相傳以為俚諺慶歷中許元為發運使因修江岸得斯石於池陽江水中始知為靈徹詩也集古録船子和尚華亭船子和尚有偈曰千尺絲綸直下垂一波才動萬波隨夜靜水深魚不食滿船空載月明歸叢林盛傳想見其為人山谷倚曲音歌成長短句曰一波才動萬波隨簑笠一鈎絲金鱗正在深處千尺也須垂吞又吐信還疑上鉤遲水寒江靜滿目青山載明月歸冷齊夜話道潛吳僧道潛有標致常自姑蘇歸西湖經臨平道中作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲東坡赴官錢塘過而見之大稱賞已而相尋於西湖一見如舊相識及坡移守東徐潛往訪之館於逍遙堂士大夫爭識之東坡饌客罷約而俱來紅粧擁隨之東坡遣一妓前乞詩潛援筆而成曰寄語巫山窈窕娘好將魂夢惱襄王禪心已作沾泥絮不逐春風上下狂一坐大驚自是名聞海內然性褊憎凡子如仇嘗作詩曰去歲春風上國行爛窺紅紫厭平生而今眼底無姚魏浪蘂浮花懶問名士論以此少之道潛作詩追法淵明其語有逼真處曰數聲柔櫓蒼茫外何處江村人夜歸又曰隔林倣佛聞機杼知有人家在翠微漁隱曰余細味之句格固佳但不類淵明豈得謂之逼真若東坡和陶詩前山正可數後騎且勿驅此方是逼真處惠洪不善評詩不足憑也時從東坡在黃州士大夫以書抵坡曰聞日與詩僧相從豈非隔林倣佛聞機杼者乎真東山勝游也坡以書示潛誦前句笑曰此吾師七字師號冷齊夜話東坡長短句云村南村北響繅車參差詩云隔林髣佛聞機杼知有人家在翠微秦少游云菰蒲深處疑無地忽有人家笑語聲三詩大同小異皆奇句也高齊詩話仲殊瑞麟香暖玉芙蓉畫蠟凝輝到曉紅數㸃漏移衙仗北一番雨滴甲樓東夢遊黃闕鸞巢外身卧彤幃虎帳中報道譙門初日上起來簾幕李花風僧仲殊詩也王安中守平江日㑹客仲殊亦預焉繼以疲倦先起熟寐于黃堂中不知客散及覺日已曈曨因罰以此詩始放去瑞麟安中家所造香也遺珠潤州北固樓賦詩曰北固樓前一笛風碧雲飛盡建康宫江南二月多芳草春在濛濛煙雨中雲齊廣録元豐末張詵樞言龍圖之守杭也一日宴客湖上劉以巨濟僧仲殊在焉樞言命即席賦詩曲巨濟先唱云憑誰妙筆橫掃素縑三百尺天下應無此是錢塘湖上圖仲殊遽云一般竒絶雲淡天高秋夜月費盡丹青只這些兒畫不成樞言又出梅花邀二人同賦仲殊云却作前章曰江南二月猶有枝頭千㸃雪邀上芳尊却占東君一半春巨濟不復繼也後陳襲善云我為續之曰尊前眼底南國風光都在此移過江來從此江南不復開復齊謾録惠洪崇勝寺後有竹千餘竿獨一根秀出人呼為竹尊者洪覺範為賦詩云高節長身老不枯平生風骨自清癯愛君修竹為尊者却笑寒松作大夫未見同參木上座空餘聽法石於菟戲將秋色供齊鉢抹月批風得飽無黃太史見之喜因手為書之以故名顯遺珠近時僧洪覺範頗能詩其題李訴畫像云淮隂北面師廣武其氣豈止吞項羽公得李祐不肯誅便知元濟在掌股此詩當與黔安並驅也頃年僕在長沙相從彌年其他詩亦甚佳如云含風廣殿聞碁響度日長廊轉栁隂頗似文章巨公所作殊不類衲子又善作小詞情思婉約似秦少游至如仲殊參寥雖名世皆不能及許彥周詩話遽解如曰夜色中旬後虛堂坐幾更隔溪猿不呌當檻月初生又曰後夜客來稀幽齊獨掩扉月中無事立草際一螢飛余時方十六七心不然之洪覺範詩云已收一霎掛龍雨忽起千巖攧鷂風掛龍對攧鷂皆方言古今人未嘗道又云麗句妙於天下白高才俊似海東青又云文如水行川氣如春在花皆奇句也雪浪齊日記淵林誦之淵林曰此退之澄觀我欲收斂加冠巾換句也冷齊夜話福州僧南方浮圖能詩者多矣往往多不顯其名福州有一僧作詩百餘篇其中佳句有云虹收千嶂雨潮展半江天又有詩云詩因試客分題僻棊為饒人下子低不減古人古今詩話惠詮東吳僧惠詮佯狂垢汚而詩語清婉嘗書湖上一山寺壁曰落日寒蟬鳴獨歸林下寺柴扉夜未掩片月隨行屨惟聞犬吠聲步入青蘿去東坡一見為和其後曰但聞煙外鐘不見煙中寺幽人行未已草露濕芒屨惟應山頭月夜夜照來去詮竟以此詩知名竹坡詩話云余觀東坡和詮詩未嘗不喜其清絶過人遠甚晚遊錢塘始得詮詩乃知其幽深清遠自有林下一種風流東坡老人雖欲回三峽倒流之瀾與溪壑爭流終不近也冷齊夜話清順西湖僧清順頥然清苦多佳句嘗賦十竹詩曰城中寸土如寸金幽軒種竹只十箇春風愼勿長兒孫穿我階前緑苔破又有久從林下遊頗識林下趣從渠緑隂繁不礙清風度閒來石上眠落葉不知數一鳥忽飛來啼破幽絶處荆公遊湖上愛之乃稱揚其名坡晚年亦與之遊甚多酬唱冷齊夜話癩可近時詩僧祖可被惡疾人號癩可善權者亦能詩人物清癯人目為瘦權可得之雄爽權得之清淡可詩如清霜羣木落盡見西山秋又谷口未斜日數峯生夕隂皆佳句也西清詩話癩可東溪集有詩云傴步入蘿徑綿延趣冞深僧居不知處髣佛清磬音石梁邀屢度始見青松林谷口未斜日數峯生夕隂凄風薄喬木萬竅作龍吟摩挲緑苔石書此慰幽尋漁隱癩可詩云琴到無絃聽者希古今唯有一鍾期幾回擬鼓陽春曲月滿虛堂下指遲晦翁嘗大書此詩刻石于家栁溪近録顯忠王荆公書一絶句於壁間云竹裏編茅倚石根竹莖疏處見前村閒眠盡日無人到自有清風為掃門蓋詩僧顯忠詩也洪駒父詩話悟清前輩好稱僧悟清鳥歸花影動魚沒浪痕圓以為句意俱新然余讀後梁沈君攸臨水詩云花落圓紋出風急細流翻乃知魚沒浪痕圓之句出於此復齊謾録希晝劉氏傳記載煬帝既誅薛道衡乃云尚能道空梁落燕泥否蓋道衡詩嘗有是句楊公談苑載僧希晝北宫書亭云花露盈蟲穴梁塵墮燕泥豫以謂鍊句雖工而致思不逮於薛矣麈史志南僧志南詩云古木隂中繫短篷杖藜扶我過橋東沾衣欲濕杏花雨吹面不寒楊栁風晦庵嘗跋其卷云南詩清麗有餘格力間暇無蔬筍氣如云云余深愛之後作書薦至袁梅岩袁有詩云上人解作風騷話雲谷書來特地誇楊栁杏花風雨後不知詩軸在誰家栁溪近録圓悟圓悟未識晦庵嘗和其梅花詩云獨憐萬木凋零後屹立風霜慘淡中晦庵自是與之酬唱栁溪近録病僧唐末一山寺有僧卧病因自題其户曰枕有思鄉淚門無問疾人塵埋牀下履風動架頭巾適有部使者經從過寺中惻然憐之邀歸墳菴療治後部使者貴顯因言於朝遂令天下寺置延壽寮專養病僧也庚溪詩話方外呂洞賔鍾弱翁帥平凉一方士通謁從牧童牽黃犢立於庭下弱翁異之指牧童曰道人頗能賦此乎笑曰不煩我語是兒能之牧童乃操筆大書云草鋪橫野六七里笛弄晚風三兩聲歸來飽飯黃昏後不脫蓑衣卧月明既去郡人見方士擔兩大甕長歌出郭迹之不見兩甕乃二口豈洞賔耶西清詩話回先生過湖州東林沈氏飲醉以石榴皮書其家東老菴之壁云西鄰已富憂不足東老雖貧樂有餘白酒釀來緣好客黃金散盡為收書東老沈氏之老自謂也東坡呂洞賔自詠云朝遊北海暮蒼梧袖裏青蛇膽氣粗三入嶽陽人不識朗吟飛過洞庭湖談苑韓湘韓湘字清夫文公猶子也落魄不羈文公勉之學湘曰湘之所學非公知之公令作詩以觀其志詩曰青山雲水窟此地是吾家後夜流瓊液凌晨咀綘霞琴彈碧玉調爐鍊白朱砂寶鼎存金虎元田養白鴉一瓢藏世界三尺斬妖邪解造逡巡酒能開頃刻花有人能學我同共看仙葩公覽而戲之曰子能奪造化耶湘曰此事甚易公為開樽湘聚土以盆覆之良久花開乃碧花二朵於花間擁出金字詩一聯云雲橫秦嶺家何在雪擁藍關馬不前公未曉其句意湘曰事久可驗遂告去未幾公以佛骨事謫官潮州一日塗中遇雪俄有人冒雪而來乃湘也湘曰憶花上之句乎正今日事也公詢其地即藍關嗟嘆久之曰吾為汝足此詩詩曰一封朝奏九重天夕貶潮陽路八千本為聖朝除弊政敢將衰朽惜殘年雲橫秦嶺家何在雪擁藍關馬不前知汝遠來應有意好收吾骨瘴江邊公别湘詩曰人才為世古來多如子雄文世孰過好待功名成就日却抽身去上煙蘿湘别公詩云舉世都為名利醉伊余獨向道中醒他時定是飛升去衝破秋空一㸃青青瑣集𤣥真子𤣥真子張志和㑹稽人守真養氣卧冰不冷入水不濡顔魯公守湖州日與賔客唱和為漁父詞志和曰西塞山前白鳥飛桃花流水鱖魚肥青蒻笠緑蓑衣斜風細雨不須歸坐客嘆服不已後果傳之唐求唐末蜀州有唐求放曠疏逸方外人也吟詩有所得即將藁撚為丸投大瓢中後卧病投瓢於江曰兹瓢茍不沉沒得之者方知吾苦心耳瓢至新渠江有識者曰此唐山人詩瓢也接得十才二三題鄭處士隱居云不信最清曠及來愁已空數㸃石泉雨一溪霜葉風業在有山處道成無事中酌盡一杯酒老夫顏亦紅古今詩話希夷先生陳摶字圖南隱居武當山後徙華山雲臺觀周世宗召至京師賜號白雲先生太宗朝再召賜號希夷先生摶負經綸之才歷五季離亂每聞一朝革命顰蹙數日一日方乘驢遊華隂市聞太祖登極大笑曰天下自此定矣俗有詩云十年蹤跡走紅塵回首青山入夢頻紫陌縱遊爭及睡朱門雖貴不如貧愁聞劒㦸扶危主悶見笙歌聒醉人攜取舊書歸舊隱野花啼鳥一般春青瑣陳希夷先生每睡則半載或數月近亦不下月餘題西峯曰為愛西峯好吟頭盡日昂岩花紅作陳溪水緑成行幾夜礙新月半山無夕陽寄言嘉遁客此處是仙鄉蜀道士秦川北絶頂之上有隗囂宫宫之宏麗莫得狀之今為壽山寺寺有三門門限琢青石為之瑩徹如琉璃色余嘗待月納涼夕處朝遊不離於是爾後入蜀蜀有道士謂余曰囂宫石門限下詩記之乎余曰余為孩童逮乎壯年遊處於此未嘗見有詩道士微哂曰子若後遊但於石門限下上際求之丙戌歲蜀破還秦至則訪求之果得一絶云詳觀此篇飄飄然有神仙體裁遠近詞人競來諷味那知道士非控鯉駕鶴之流乎奇哉奇哉詩曰越溪道士人不識上天下天鶴一隻洞門深鎖玉窗寒滴露研朱寫周易斸藥翁紫芝兮春荑黃精乎秋肥余未始與老辭兮老余辭李文叔與李伯時書記太山所遇斸藥翁所歌味其辭甚文而有理蓋為士而終遁者耶抑如古之避世者言出於口自不違於理而又文者耶安得窮探極覽萬或覬一如昔人者與之邂逅也耶耄矣已矣安得適吾願耶趙章泉吃嗒羅浮仙近有人遊羅浮宿留巖谷間中夜見一人身無衣而紺色覆體意必仙也乃再拜問道其人了不顧但長嘯數聲響振林木歌詩云雲來萬嶺動雲去天一色長嘯兩三聲空山秋月白西清詩話閒却一溪雲范致虛居方城有高士館於家自言昔乃白髮社翁遇師授以神藥今年踰下壽顔渥如丹有孺子色既久告歸留一絶末句云莫訝杖藜歸去早舊山間却一溪雲西清詩話張亶張亶熙寧中夢行入空中聞天風海濤聲振林木徐見海中樓闕金碧瓊裾琅珮者數百人揖亶出紙請賦詩細視筆硯皆碧玉色且戒之曰此間文章要似隱起鸞鳯當與織女機杼分巧過是乃人間語耳亶成一絶句云天風吹散赤城霞染出連雲萬樹花誤入醉鄉迷去路傍人應笑忘還家有仙人曰子詩佳絶未免近凡酌酒一杯極甘寒忽覺身墮萬仞山而寤六言詩心事千莖白髮生涯一片青山空林有雪相待野路無人自還李王好書神仙隱遁之詞豈非遭罹多故欲脫世網而不得者耶東坡蔡真人詞陳東靖康間嘗飲於京師酒樓有倡打坐而歌者東不顧乃去倚欄獨立歌望江南詞音調清越東不覺傾聽視其衣服皆故弊時以手揭衣爬搔肌膚綽約如雪乃復呼使前再歌之其詞曰䦨干曲紅揚繡簾旌花嫩不禁纖手捻被風吹去意還驚眉黛蹙山青鏗鐵板間引步虛聲塵世無人知此曲却騎黃鶴上瑶京風冷月華清東問何人製曰上清蔡真人詞也歌罷得數錢即下樓亟遣僕追之已失矣夷堅志閨秀薛氏五代末濠梁人南楚材遊陳頴間頴守欲子妻之楚材已娶薛氏以受頴守之恩遣人歸取琴書之屬似無還意薛氏善書畫能屬文自對鑑圖其形並作詩寄之曰欲下丹青筆先拈玉鑑端已驚顔寂寞漸覺鬢凋殘淚眼描將易愁腸寫出難恐君渾忘却時展畫圖看楚材見而慚焉與之偕老唐宋遺史愼氏天祐中毗陵有愼氏本儒家女王史嚴灌夫娶之數年無子因拾其過而出焉愼氏慨然登舟留詩一章為别曰當時心事已相關雨散雲飛一餉間便掛孤帆從此去不堪重過望夫山灌夫覽而愧乃留之唐宋遺史二十八字媒白藕作花風已秋不堪殘睡更回頭晚雲帶雨歸飛急去作西窗一夜愁此趙德麟細君王氏所作也德麟既鰥居因見此篇遂與之為親余以為二十八字媒也王直方詩話費氏費氏蜀之青城人以才色入蜀宫後主嬖之號花蘂夫人效王建作宫詞百首國亡入備後宫太祖聞之召使陳詩誦其國亡詩云君王城上竪降旗妾在深宫那得知十四萬人齊解甲更無一箇是男兒太祖悅蓋蜀兵十四萬而王師才數萬爾後山詩話七歲女唐如意中有女子七歲能詩則天令賦之皆應聲而就其兄别之則天令作詩送兄曰别路雲初起離亭葉正飛所嗟人異鴈不作一行歸荆公女荆公女吳安持之妻工詩嘗寄荆公曰西風不入小窗紗秋意應憐我憶家極目江山千萬恨依然和淚看黃花冷齊夜話倡周氏陳筑字夢和莆田人崇寧初登第為福州古田尉既至官惑一倡周氏周能詩嘗贈筑云夢和殘月過樓西月過樓西夢已迷喚起一聲腸斷處落花枝上鷓鴣啼首句蓋寓筑之字也又春晴詩云瞥然飛過誰家燕驀地香來甚處花深院日長無箇事一瓶春水自煎茶夷堅志靈異湘中女番禺鄭僕射嘗遊湘中宿于驛樓夜遇女子誦詩云紅樹醉秋色碧溪彈夜絃佳期不可再風雨杳如年頃刻不見樹萱録鬼仙春草萋萋春水緑海棠開盡飄香玉繡嶺宫前白髮人猶唱開元太平曲忽然湖上片雲飛不覺舟中雨濕衣折得荷花渾忘却空將荷葉蓋頭歸浦口潮來初渺漫蓮舟溶漾採花難芳心不愜空歸去㑹待潮回再摘看皆鬼仙所作或夢中所作也東坡砑光帽冦元弼言去年春徐州通判李陶有子年十七八素不善作詩忽詠落花詩流水難窮目斜陽易斷腸誰同砑光帽一曲舞山香父驚問之若有物憑者自云是謝中舍問砑光帽事云西王母宴羣仙有舞者戴砑光帽簪花舞山香一曲未終花皆落去東坡紀夢李真言字希古嘗夢至一宫殿有數百妓拋毬人唱一詩覺而記三首云侍宴黃昏未肯休玉階夜色月如流朝來自覺承恩最笑倩傍人認繡毬隋家宫殿鎖清秋曾見嬋娟揚繡毬金鑰玉蕭俱寂寂一天明月照高樓堪恨隋家幾帝王舞腰挼盡繡鴛鴦如今重到拋毬處不是金爐舊日香侯鯖録鬼詩酉陽雜爼載鬼詩兩篇山谷喜道之其一曰長安女兒踏春陽無處春陽不斷腸舞袖弓彎渾忘却蛾眉空帶九秋霜其二曰流水涓涓芹吐芽織烏西飛客還家荒村無人作寒食殯宫明月空梨花洪駒父詩話小碧箋題詩長安南山下一書生作小圃蒔花木一日有金犢車從數女奴皆艷麗下飲于庭邀生同坐甚欵洽將别出小碧箋題詩曰相思無路莫相思風裏楊花只片時惆悵深閨獨歸處曉鶯啼斷緑楊枝侯鯖録吳城龍女魯直自黔安出峽登荆州江亭柱間有詞曰簾卷曲欄獨倚江展暮天無際淚眼不曾晴家在吳頭楚尾數㸃雪花亂委撲漉沙鷗驚起詩句欲成時沒入蒼煙叢裏魯直讀之悽然曰似為豫發也不知何人所作所題筆勢妍軟欹斜類女子而有淚眼不曽晴之句不然則是鬼詩也是夕有女子絶艷夢於魯直曰我家豫章吳城山附客舟至此墮水死不得歸登江亭有感而作不意公能識之魯直驚寤謂所親曰此必吳城小龍女也冷齊夜話巴峽夜吟建隆初有人泊舟巴峽夜聞人詠曰秋徑填黃葉懸崖露草根猿聲一叫斷客淚數重痕搢紳脞說緑裙紅袖梁伯升者肄業廢宅中夢一女子緑裙紅袖呼曰梁君聽妾幽恨之句詩曰卜得上峽日秋來風浪多江陵一夜雨腸斷木蘭歌同上詩餘朝無咎評朝無咎評本朝樂章云世言柳耆卿之曲俗非也如八聲甘州云漸霜風凄慘關河冷落殘照當樓此唐人語不減高處矣歐陽永叔浣溪沙云堤上遊人逐畫船拍堤春水四垂天緑楊樓外出鞦韆要皆絶妙然只一出字自是後人道不到處蘇東坡詞人謂多不諧音律然居士詞橫放傑出自是曲中縳不住者黃魯直間作小詞固高妙然不是當家語自是著腔子唱好詩晏元獻不蹈襲人語而風調間雅如舞低楊柳樓心月歌盡桃花扇底風知此人不住三家村也張子野與柳耆卿齊名而時以子野不及耆卿然子野韻高是耆卿所乏處近世以來作者皆不及秦少游如斜陽外寒鴉萬㸃流水繞孤村雖不識字亦知是天生好言語苕溪漁隱曰無已稱今代詞手惟秦七黃九耳唐諸人不逮也無咎稱魯直詞不是當家語自是著腔子唱好詩二公在當時品題不同如此自今視之魯直詞亦有佳者第無多子耳少游詞雖婉美然格力失之弱二公之言殊過譽也復齊謾録太白鼎州滄水驛有菩薩蠻云平林漠漠煙如織寒山一帶傷心碧暝色入高樓有人樓上愁玉梯空佇立宿鳥歸飛急何處是歸程長亭更短亭曾子宣家有古風集此詞乃太白作也古今詩話六一歐陽永叔送劉貢父守維揚作長短句云平山欄檻倚晴空山色有無中平山堂望江左諸山甚近或以為永叔短視故云東坡笑之因賦快哉亭道其事云長記平山堂上欹枕江南煙雨杳杳沒孤鴻認得醉翁語山色有無中蓋山色有無非煙雨不能然也藝苑雌黃東坡後山詩話謂退之以文為詩子瞻以詩為詞如教坊雷大使之舞雖極闕之工要非本色余謂後山之言過矣子瞻佳詞最多其間傑出者如大江東去浪淘盡千古風流人物赤壁詞明月幾時有把酒問青天中秋詞落日繡簾卷庭下水連空快哉亭詞乳燕飛華屋悄無人桐隂轉午初夏詞明月如霜好風如水清景無限夜登燕子樓詞楚山修竹如雲異材秀出千林表詠笛詞玉骨那愁瘴霧冰肌自有仙風詠梅詞東武南城新堤固漣漪初溢宴流杯亭詞冰肌玉骨自清凉無汗夏夜詞有情風萬里卷潮來無情送潮歸别參寥詞缺月掛疏桐漏斷人初靜秋夜詞霜降水痕收淺碧鱗鱗露遠洲九日詞諸詞皆絶去筆墨蛙徑間直造古人不到處真可使人一唱而三嘆若謂以詩為詞是大不然子瞻自言平生不善唱曲故間有不入腔處非盡如此後山乃比之教坊雷大使舞是何比况愈下蓋其謬也漁隱東坡卜算子東坡作卜算子云缺月掛疏桐漏斷人初靜時見幽人獨往來縹眇孤鴻影驚起却回頭有恨憑誰省揀盡寒枝不肯棲寂寞沙汀冷魯直見之稱其韻力高勝不類食煙火人語非胸中有萬卷書下筆無一㸃塵俗氣安能若是哉詞話東坡蝶戀花東坡蝶戀花詞花襯殘紅青杏小燕子來時緑水人家繞枝上柳綿吹又少天涯何處無芳草牆裏鞦韆牆外道牆外行人牆裏佳人笑笑漸不聞聲漸香多情却被無情惱蓋行人多情佳人無情耳詞話山谷櫽括醉翁亭記歐陽公知滁日自號醉翁因以名亭作記山谷櫽括其詞合以聲律作瑞鶴仙云環滁皆山也望蔚然深秀琅琊山也山行六七里有翼然泉上醉翁亭也翁之樂也得之心寓之酒也更野芳佳木風高日出景無窮也游也山肴野蓛酒冽泉香沸觥籌也太守醉也喧譁衆賔歡也况宴酣之樂非絲非竹太守樂其樂也問當時太守為誰醉翁是也一記凡數百言此詞備之矣山谷其善櫽括如此風雅遺音荆公山谷荆公小詞云平岸小橋千嶂抱揉藍一水縈花草茅屋數間窗窈窕人不到柴門自有清風掃略無塵土思山谷小詞云春未透花枝瘦正是愁時候極為學者所稱賞秦堪嘗有小詞云春透水波明寒峭花枝瘦蓋法山谷也雪浪齊日記賀方回賀方回妙於小詞吐語皆蟬蛻塵埃之表晏叔源王逐客俱當溟涬然第之山谷嘗手寫所作青玉案者置之几研間時闕玩味闕凌波不過橫塘路但目送飛鴻去錦瑟華年闕與度闕幽徑綺窗朱户只有春知處碧雲冉冉衡臯暮彩筆空題斷腸句試問離愁都幾許一川煙草滿城風絮梅子黃時雨山谷云此詞少游能道之作小詩曰少游醉卧古藤下無復愁眉唱一杯解道江南斷腸句而今唯有賀方回冷齊夜話秦少游少游到郴州作長短句云霧失樓臺月迷津渡桃源望斷無尋處可堪孤館閉春寒杜鵑聲裏斜陽暮驛寄梅花魚傳尺素砌成此恨無重數郴江幸自繞郴山為誰流下瀟湘去東坡絶愛其尾兩句自書於扇曰少游巳矣雖萬人何贖冷齊夜話少游小詞奇麗詠歌之想見其神情在絳闕道山之間詞曰栁邊沙外城郭春寒退花影亂鶯聲碎飄零疏酒盞離别寬衣帶人不見碧雲暮合空相對憶昔西池㑹鴛鴦同飛蓋攜手處今誰在日邊清夢斷鏡裏朱顏改春去也落紅萬㸃愁如海林和靖林和靖工於詩文善為詞嘗作㸃綘唇云金谷年年亂生春色誰為主餘花落處滿地和煙雨又是離歌一闋長亭暮王孫去萋萋無數南北東西路乃草詞爾謂終篇無草字李景舒信道李景有曲闕手捲闕上玉鈎或改為珠簾舒信道七曲云十年馬上春如夢或改云如春夢非所謂遇知音漫叟章質夫章質夫詠楊花詞東坡和之朝叔用以為東坡如毛嬙西施淨洗腳面與天下婦人鬭好質夫豈可比是則然矣余以為質夫詞中所謂傍珠簾散漫垂垂欲下依前被風扶起亦可謂曲盡楊花妙處東坡所和雖高恐未能及詩人議論不公如此耳舊詞舊詞高雅非近世所及如撲蝴蝶一詞不知誰作非惟藻麗可喜其腔調亦自婉美詞云煙條雨葉緑遍江南岸思歸倦客尋芳來較晚岫邊紅日初斜陌上飛花正滿凄凉數聲羌管怨春短玉人應在明月樓中畫眉懶蠻箋錦字多時魚鴈斷恨隨去水東流事與行人共遠羅衾舊香猶暖漁隱詩人玉屑卷二十
