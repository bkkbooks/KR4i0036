body:
  text: 詩人玉屑卷十四宋魏慶之撰草堂墓志銘元稹作余讀詩至杜子美而知古人之才有所總萃焉始唐虞時君臣以賡歌相和是後人繼作歷夏商周千餘年仲尼緝拾選練取其干預教化之尤者三百篇其餘無聞焉騷人作而怨憤之態繁然猶去風雅日近尚相比擬秦漢以來采詩之官既廢天下俗謡民謳歌頌諷賦曲度嬉戲之詞亦隨時間作至漢武帝賦柏梁詩而七言之體具蘇子卿李少卿之徒尤工為五言雖句讀文律各異雅鄭之音亦雜而詞意濶遠指事言情自非有為而為則文不妄作建安之後天下之士遭罹兵戰曹氏父子鞍馬間為文往往橫槊賦詩故其遒壯抑揚怨哀悲離之作尤極於古晉世風概稍存宋齊之間教失根本士以簡慢矯飾相尚文章以風容色澤放曠精清為高蓋吟寫性靈流連光景之文也意義格力無取焉陵遲至梁陳淫艷刻飾佻巧小碎之極又宋齊之所不取也唐興學官大振歷世之能文者互書而又沈宋之流研練精切穩順聲勢謂之律詩由是而後文變之體極焉而又好古者遺近務華者去實效齊梁則不逮於晉魏工樂府則力屈於五言律切則骨格不存閒暇則纎穠莫備至於子美所謂上薄風雅下該沈宋言奪蘇李氣吞曹劉掩顔謝之孤高雜徐庾之流麗盡得古今之體勢而兼人人之所獨專如使仲尼考煆其旨要尚不知貴其多乎哉茍以為能無可不可則詩人已來未有如子美者是時山東人李白亦以奇文取稱時人謂之李杜余觀其壯浪縱恣擺去拘束模寫物象及樂府歌詩誠以差肩於子美至若鋪陳終始排比聲韻大或千言次猶數百詞氣奮邁而風調清深屬對律切而脫棄凡近則李尚不能歷其藩翰况堂奧乎苕溪漁隱宋子京作唐史杜甫贊秦少游作進論皆本元稹之說意同而詞異耳宋子京贊唐興詩人承陳隋風流浮靡相矜至宋之問沈佺期等研揣聲音浮切不差而號律詩競相沿襲逮開元間稍裁以雅正然恃華者質反好麗者壯違人得一概皆自名所長至甫渾涵汪茫千彚萬狀兼古今而有之他人不足甫乃厭餘殘膏賸馥沾丐後人多矣故元稹謂詩人以來未有如子美者甫又善陳時事律切精深至千言不少衰世號詩史昌黎韓愈於文章愼許可至歌詩獨推曰李杜文章在光熖萬丈長誠可信云少游進論杜子美之於詩實集衆家之長適當其時而已昔蘇武李陵之詩長於高妙曹植劉公幹之詩長於豪逸陶潛阮籍之詩長於冲淡謝靈運鮑昭之詩長於峻潔徐陵庾信之詩長於藻麗子美者窮高妙之格極豪逸之才包冲淡之趣兼峻潔之姿備藻麗之態而諸家之作所不及焉然不集諸子之長子美亦不能獨至於斯也豈非適當其時故耶孟子曰伯夷聖之清者也伊尹聖之任者也栁下惠聖之和者也孔子聖之時者也孔子之謂集大成嗚呼子美亦集詩之大成者歟冷齊魯訔序騷人雅士同知祖尚少陵同欲模楷聲韻同苦其意律深嚴難讀也余謂少陵老人初不事艱澀左隱以病人其平易處有賤夫老婦初可道者至其深純宏妙千言不可追迹則序事穩實立意渾大遇物寫難狀之景紓情出不說之意借古的確感時深遠若江海浩溔以沼切大水貌風雲蕩泊蛟龍黿鼉出沒其間而變化莫測風澄雲霽象緯回薄錯峙偉麗細大無不可觀又云其敻邈高聳則若鑿太虛而噭萬籟其馳驟怪駭則若仗天策而騎箕尾其直截峻整則若儼鈎陳而界雲漢樞機日月開闔雷電昂昂然神其謀梃其勇握其正以高視天壤趨入作者之域所謂真粹氣中人也公之詩分而為六家孟郊得其氣焰張籍得其簡麗姚合得其清雅賈島得其奇僻杜牧薛能得其豪健陸龜䝉得其贍博皆出公之奇偏爾尚軒然自號一家赫世烜俗後人師擬不暇矧合之乎風雅而下唐而上一人而已是知唐之言詩公之餘波及爾王彥輔序唐興承陳隋之遺風浮靡相矜莫崇理致開元之間去雕篆黜浮華稍裁以雅正雖絺句繪章人得一概各爭所長如太羮𤣥酒者則薄滋味如孤峯絶岸者則駭廊廟穠華可愛者乏風骨爛然可珍者多玷缺逮至子美之詩周情孔思千彚萬狀茹古涵今無有端涯森嚴昭煥若在武庫見戈㦸布列蕩人耳目非特意語天出尤工於用字故卓然為一代冠而歷世千百膾炙人口半山老人畫像贊吾觀少陵詩謂與元氣侔力能排天斡九地壯顔毅色不可求浩蕩八極中生物豈不稠醜妍巨細千萬殊竟莫見以何雕鎪惜哉命之窮顚倒不見收青衫老更斥餓走半九州瘦妻僵前子仆後穰穰盜賊森戈矛吟哦當此時不廢朝廷憂嘗願天子聖文臣各伊周寧令吾廬獨破受凍死不忍四海赤子寒颼颼傷屯悼屈止一身嗟時之人我所羞所以見公像再拜涕泗流推公之心古亦少願起公死從之遊三百篇之後更有子美六經之後便有司馬遷三百五篇之後便有杜子美六經不可學亦不須學故作文當學司馬遷作詩當學杜子美二書亦須常讀所謂不可一日無此君也唐子西語録老杜似孟子孟子七篇論君與民者居半其欲得君蓋以安民也觀杜陵詩云窮年憂黎元嘆息腸內熱又云誰能叩君門下令減征賦寄梅學士詩幾時高議排金門長使蒼生有環堵茅屋為秋風所破歌安得眼前突兀見此屋寧令吾廬獨破受凍死亦足見其志大庇天下仁心廣大真得孟子之所存矣東坡問老杜何如人或言似司馬遷但能名其詩耳吾謂老杜似孟子蓋原其心也䂬溪晦庵論杜詩杜詩初年甚精細晚年曠逸不可當如自秦川入蜀諸詩分明如畫乃其少作也杜甫夔州以前詩佳夔州以後自出規摹不可學陵陽論詩能盡寫物之工杜少陵詩云兩箇黃鸝鳴翠栁一行白鷺上青天王維詩云漠漠水田飛白鷺隂隂夏木囀黃鸝極盡寫物之工後來唯陳無已有云黑雲映黃槐更著白鷺度無愧前人之作室中語用詩書語子美多用經書語如曰車轔轔馬蕭蕭未嘗外入一字如曰濟潭鱔發發春草鹿呦呦皆渾然嚴重如入天陛赤墀植璧鳴玉法度森嚴然後人不敢用者豈所造語膚淺不類耶黃尚明詩話詩史先生以詩鳴於唐凡出處去就動息勞佚悲歡憂樂忠憤感激好賢惡惡一見於詩讀之可以知其世學士大夫謂之詩史孫僅序唐書列女傳王圭微時母盧氏嘗云子必貴但未知汝與游者圭一日引房𤣥齡杜如晦過之母曰汝貴無疑所載止此而已質之少陵詩事未究也送重表姪王砅云我之曾老姑爾之高祖母爾祖未顯時歸為尚書婦則圭母杜氏非盧氏也又云隋朝大業末房杜俱交友長者來在門荒年自糊口家貧自供給客位但箕帚俄頃羞頗珍寂寞人散後入怪鬢􅀢空吁嗟為之久自陳剪髻鬟鬻市充沽酒上云天下亂宜與英俊厚向竊窺數公經綸亦俱有次問最少年虬髯十八九子等成大名皆因此人手下云風雲合龍虎一吟吼願展丈夫雄得辭兒女醜秦王時在坐真氣驚户牖及乎貞觀初尚書踐台斗夫人常肩輿上殿稱萬壽六宫師柔順法則化妃后至尊均嫂叔盛事垂不朽其上下詳締如此且一婦人識真主於側微尤偉甚史缺失而謬誤獨少陵載之號詩史信矣桐江詩話云西清詩話辨王圭母姓杜不姓盧引少陵詩為證今觀其詩不特不姓盧乃王圭之妻非母也史氏之訛如此少陵詩云我之曾老姑爾之高祖母爾祖未顯時歸為尚書婦即知王圭之妻也西清詩話胸中吞幾雲夢洞庭天下壯觀自昔騷人墨客題之者衆矣如水涵天影濶山拔地形高四顧疑無地中流忽有山鳥飛應畏墮帆遠却如閒皆見稱於世然未若孟浩然氣蒸雲夢澤波撼嶽陽城則洞庭空曠無際氣象雄張如在目前至讀子美詩則又不然吳楚東南拆乾坤日夜浮不知少陵胸中吞幾雲夢也同上學老杜之法老杜詩凡一篇皆工拙相半古人文章類如此皆拙而無取使其皆工則峭急無古氣如李賀之流是也然後世學者當先學其工精神氣骨皆在於此如望嶽詩云齊魯青未了洞庭詩云吳楚東南拆乾坤日夜浮語既高妙有力而言東嶽與洞庭之大無過於此後來文士極力道之終有限量益知其不可及望嶽第二句如此故先云岱宗夫何如洞庭詩先如此故後云親朋無一字老病有孤舟使洞庭詩無前兩句而皆如後兩句語雖健終不工望嶽詩無第二句而云岱宗夫何如雖曰亂道可也今人學詩多得老杜平慢處乃鄰女效顰耳詩眼工妙至到人不可及詩人以一字為工世固知之惟老杜變化開闔出奇無窮殆不可以形迹捕詰如江山有巴蜀棟宇自齊梁則其遠數千里上下數百年只在有與自兩字間而吞山川之氣俯仰古今之懷皆見於言外滕王亭子粉牆猶竹色虛閣自松聲若不用猶與自兩字則餘八字凡亭子皆可用不必滕王也此皆工妙至到人力不可及而此老獨雍容閒肆出於自然略不見其用力處今人多取其已用字模倣用之偃蹇狹陋盡成死法不知意與境㑹出言中節凡字皆可用也石林詩話一飯未嘗忘君太史公論詩以為國風好色而不淫小雅怨誹而不亂以豫觀之是特識變風變雅耳烏覩詩之正乎昔先王之澤衰然後變風發乎情雖衰而未竭是以猶止於禮義以為賢於無所止者而已若夫發於性止於忠孝者其詩豈可同日而語哉古今詩人衆矣而杜子美為首豈非以其流落饑寒終身不用而一飯未嘗忘君也歟東坡妙絶古今有問荆公老杜詩何故妙絶古今公曰老杜固嘗言之讀書破萬卷下筆如有神東臯雜録古今絶唱杜子美詩古今絶唱也李伯紀杜工部集序高雅大體山谷嘗言少時曾誦薛能詩云青春背我堂堂去白髮欺人故故生孫莘老問曰此何人詩對曰老杜莘老云杜詩不如此後山谷語傳師云庭堅因莘老之言遂曉老杜詩高雅大體傳師云若薛能詩正俗所謂欺世耳詩眼優柔感諷劉攽詩話載子美詩云蕭條六合內人少虎狼多少人愼勿投虎多信所過饑有易子食獸猶畏虞羅言亂世人惡甚於虎狼也豫觀老杜潭州詩岸花飛送客檣燕語留人與前篇同意喪亂之際人無樂善喜士之心至於一將一迎曾不若岸花檣燕也詩在優柔感諷不在逞豪放而致詬怒也隱居詩話高深讀少陵詩如馳騖晉楚之郊以言其高則鄧林千巖楩楠杞梓扶疏摩雲以言其深則溟波萬頃蛟龍黿鼉徜徉排空拭背極目方且心駭神悸莫知所以若其甄别名狀實難為功韓退之推其光焰萬丈長殆謂是矣鄭卬序詩有近質處子美之詩詞有近質者如麻鞋見天子垢膩腳不襪之句所謂轉石於千仞之山勢也學者尤效之而過甚豈遠大者難窺乎王琪序大雅堂豫謫居黔州盡書子美兩川夔峽詩以遺丹稜楊素翁俾刻之石使大雅之音久湮沒而復盈三巴之耳素翁又欲作高屋廣楹庇此石因請名焉豫名之曰大雅堂仍為作記其略云由杜子美以來四百餘年斯文委地文章之士隨其所能傑出時輩未有升子美之堂者况室家之好耶余嘗欲隨欣然㑹意處箋以數語終以汩沒世俗初不暇給雖然子美詩妙處乃在無意於文夫無意而意已至非廣之以國風雅頌深之以離騷九歌安能咀嚼其意味闖然入其門耶故使後生輩自求之則得之深矣使後之登大雅堂者能以余說而求之則思過半矣彼喜穿鑿者棄其大旨取其發興於所遇林泉人物草木魚蟲以為物物皆有所託如世間商度隱語者則子美之詩委地矣山谷三種句禪宗論雲門有三種語其一為隨波逐浪句謂隨物應機不主故常其二為截斷衆流句謂超出言外非情識所到其三為函蓋乾坤句謂泯然皆契無間可伺其深淺以是為序余嘗戲為學子言老杜詩亦有此三種語但先後不同以波漂菰米沉雲黑露冷蓮房墜粉紅為函蓋乾坤句以落花遊絲白日靜鳴鳩乳燕青春深為隨波逐浪句以百年地僻柴門迥五月江深草閣寒為截斷衆流句若有解此當與渠同參石林詩話畫山水詩畫山水詩少陵數首無人可繼者惟荆公觀燕公山水詩前六句東坡煙江疊嶂圖一詩差近之苕溪漁隱曰少陵題畫山水數詩其間古風二篇尤為超絶荆公東坡二詩悉録于左時時哦之以快滯悶少陵奉先劉少府新畫山水障歌云堂上不合生楓樹怪底江山起煙霧聞君掃却赤縣圖乘興遣畫滄洲趣畫師亦無數好手不可遇對此融心神知君重豪素豈但祈嶽與鄭䖍筆跡遠過楊契丹得非𤣥圃裂無乃瀟湘翻悄然坐我天姥下耳邊已似聞清猿反思前夜風雨急乃是滿城鬼神入元氣淋漓障猶濕真宰上訴天應泣野亭春還雜花遠漁翁暝踏孤舟立滄浪水深青溟濶欹岸側島秋毫末不見湘妃鼓瑟時至今斑竹臨江活劉侯天機精愛畫入骨髓自有五兒郎揮灑亦莫比大兒聰明到能添老樹顚崖裏小兒心孔開貌得山僧及童子若耶溪雲門寺吾獨胡為在泥滓青鞋布襪從此始戲題王宰畫山水圖歌云十日畫一水五日畫一石能事不受相促迫王宰始肯留真跡壯哉崑崙方壺圖挂君高堂之素壁巴陵洞庭日本東赤岸水與銀河通中有雲氣隨飛龍舟人樵子入浦溆山水盡亞洪濤風尤工遠勢古莫比咫尺應須論萬里焉得并州快剪刀剪取吳松半江水荆公題燕侍郎山水圖云往時濯足瀟湘浦獨上九疑尋二女蒼梧之野煙漠漠斷壠連岡散平楚暮年傷心波浪阻不意畫中能更覩燕公侍書燕王府王求一筆終不與奏論讞死誤當赦全活至今何可數仁人義士埋黃土秪有粉墨歸囊楮東坡書王定國所藏煙江疊嶂圖云江上愁心千疊山浮空積翠如雲煙山耶雲耶遠莫知煙空雲散山依然但見兩崖蒼蒼暗絶谷中有百道飛來泉縈林絡石隱復見下赴谷口為奔川川平山開林麓斷小橋野店依山前行人稍度喬木外漁舟一葉江吞天使君何從得此本㸃綴毫末分清妍不知人間何處有此境徑欲往買二頃田君不見武昌樊口幽絶處東坡先生留五年春風搖江天漠漠暮雲捲雨山姢姢丹楓翻鴉伴水宿長松落雪驚醉眠桃花流水在人世武陵豈必皆神仙江山清空我塵土雖有去路尋無緣還君此畫三歎息山中故人應有招我歸來篇許彥周詩話詞氣如百金戰馬老杜陷賊時有哀江頭詩曰少陵野老吞聲哭春日潛行曲江曲江頭宫殿鎖千門細栁新蒲為誰緑憶昔霓旌下南苑苑中萬物生顏色昭陽殿裏第一人同輦隨君侍君側輦前才人帶弓箭白馬嚼嚙黃金勒翻身向天仰射雲一箭正墜雙飛翼明眸皓齒今何在血汚游魂歸不得清渭東流劒閣深去住彼此無消息人生有情淚沾臆江水江花豈終極黃昏胡騎塵滿城欲往城南望城北豫愛其詞氣如百金戰馬注坡驀澗始履平地得詩人之遺法如白樂天詩詞甚工然拙於紀事寸步不遺猶恐失之此所以望老杜之藩垣而不及也有抔土障黃流氣象凡人作詩中間多起問答之辭往往至數十言收拾不得便覺氣象委帖子美贈衛處士詩略云焉知二十載重上君子堂昔别君未婚兒女忽成行怡然敬父執問我來何方若使他人道到此下須更有數十句而甫便云問答未及已兒女羅酒漿此有抔土障黃流氣象謾齊語録九日詩孟嘉落帽前人以為勝絶子美九日詩云羞將短髮還吹帽笑倩傍人為正冠其文雅曠達不減昔人故謂詩非力學可致正須胸中度世耳后山詩話送人詩劉路左車為豫言嘗收得唐人雜編時人詩册有送惠二歸故居詩云惠子白駒瘦歸溪惟病身皇天無老眼空谷滯斯人崖蜜松花熟山杯竹葉新柴門了生事黃綺未稱臣真子美語也白駒或作驢字洪駒父詩話八哀詩紀行詩八哀詩在古風中最為大筆崔德符嘗論斯文可以表之雅頌中古作者莫及也兩紀行詩發秦州至鳳凰臺發同谷縣至成都府合二十四首皆以經行為先後無復差舛昔韓子蒼嘗論此詩筆力變化當與太史公諸贊並駕學者宜常諷誦之少陵詩總目夔州後詩好作奇語自是文章一病但當以理為主理得而辭順文章自然出羣拔萃觀子美到䕫州後詩退之自潮州還朝後文皆不煩繩削而自合矣山谷貴其備以子美之忠厚疑若無愧於論交其投贈哥舒翰開府詩開府當朝傑論兵邁古風先鋒百勝在略地兩隅空其美之可謂至矣及潼關吏詩則曰哀哉桃林戰百萬化為魚請囑防關將謹勿學哥舒何其先後之相戾若是哉槩以純全之道亦未能無疵也藝苑雌黃村陋句解憂詩云減米散同舟路難思同濟句來雲濤盤衆力亦不細呀帆瞥眼過飛櫓本無蒂得失瞬息間致遠思恐泥百慮視安危分明曩賢計兹理庶可廣拳拳期勿替杜詩固無敵然自致遠以下句真村陋也此取其瑕疵世人雷同不復譏評過矣然亦不能掩其美也東坡詩人玉屑卷十四
