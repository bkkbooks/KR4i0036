body:
  text: 詩人玉屑卷三宋魏慶之撰句法有三種句命屬題意如有神助歸於自然之句命題立意援筆立成歸於容易之句命題用意求之不得歸於苦求之句金針錯綜句法老杜云紅稻啄殘鸚鵡粒碧梧棲老鳯凰枝舒王云繅成白雪桑重緑割盡黃雲稻正青鄭谷云林下聽經秋苑鹿江邊掃葉夕陽僧以事不錯綜則不成文章若平直敘之則曰鸚鵡啄殘紅稻粒鳯凰棲老碧梧枝以紅稻於上以鳯凰於下者錯綜之也言繅成則知白雪為絲言割盡則知黃雲為麥也秦少遊得其意特發竒語其作睡足軒則曰長年憂患百端慵開斥僧坊頗有功地徹蔽虧僧界靜人除荒穢玉奩空青天併入揮毫裏白鳥時來隱几中最是人間佳絶處夢殘風鐡響丁東冷齋影略句法鄭谷詠落葉未嘗及雕零飄墜之意人一見之自然知為落葉詩曰返蟻難尋穴歸禽易見窠滿廊僧不厭一箇俗嫌多冷齋象外句唐僧多佳句其琢句法比物以意而不指言一物謂之象外句如無可上人詩曰聽雨寒更盡開門落葉深是落葉比雨聲也又曰微陽下喬木逺燒入秋山是微陽比逺燒也用事琢句妙在言其用而不言其名耳折句六一居士詩云靜愛竹時來野寺獨尋春偶過溪橋俗謂之折句盧贊元雪詩云想行客過梅橋滑免老農憂麥壠乾效此格也余亦嘗云鸚鵡杯且酌清濁麒麟閣懶畫丹青漁隱佳句宋莒公見公佳句皆書於齋壁如無可奈何花落去似曽相識燕歸來靜尋啄木藏身處間看遊絲到地時樓臺冷落收燈夜門巷蕭條掃雪天已定復搖春水色似紅如白野棠花之類後人不可及青箱雜記雄偉句吳江長橋詩世稱三聮子美云雲頭灔灔開金餅水面沉沉卧綵虹楊次公云八十丈虹晴卧影一千頃玉碧無瑕鄭毅夫云插天螮蝀玉腰闊跨海鯨鯢金背髙歐永叔謂子美此句雄偉余謂次公毅夫兩聮粗豪較以子美之句二公殊少醖藉也漁隱雄健句句法之學自是一家工夫昔嘗問山谷耕田欲雨刈欲晴去得順風來者怨山谷云不如千巖無人萬壑靜十步回頭五步坐此專論句法不論義理蓋七言詩四字三字作兩節也此句法出黃庭經自上有黃庭下關元已下多此體張平子四愁詩句句如此雄健穩愜至五言詩亦有三字二字作兩節者老杜云不知西閣意肯别定留人肯别耶定留人耶山谷尤愛其深逺間雅蓋與上七言同詩眼一人名而分用之句一人名而分用之者如劉越石宣尼悲獲麟西狩泣孔邱謝惠連雖好相如逹不同長卿慢等語若非前後相映帶殆不可讀然要非全美也唐初餘風猶未殄陶冶至杜子美始淨盡矣兩句純好難得劉昭禹云五言如四十個賢人著一個屠酤不得覔句若掘得玉匣子有􅔄有蓋但精心必獲其寶然昔人園林變鳴禽竟不及池塘生春草餘霞散成綺不及澄江靜如練春水船如天上坐不若老年花似霧中看間几硯中窺水淺不如落花徑裏得泥香停杯嗟别久不及對月喜家貧神林社日鼓不若茅屋午時雞此數公未始不精心以此知其全寶未易多得沼溪兩句不可一意晉宋間詩人造語雖秀拔然大抵上下句多出一意如魚戲新荷動鳥散餘花落蟬噪林逾靜鳥鳴山更幽之類非不工矣終不免此病蔡寬夫詩話王荆公以風定花猶落對鳥鳴山更幽則上句靜中有動下句動中有靜沈括存中述筆談置早意於殘晚中置靜意於喧動中唐詩曰海日生殘夜江春入暮年置早意於殘晚中有曰驚蟬移别栁鬪雀墮間庭置靜意於喧動中山谷句中有眼句中眼者世九不能解王荆公欲新政作雪詩曰勢合便宜包地勢功成終欲放春回農家不念豐年瑞只欲青雲萬里開冷齋句中當無虛字或問余東坡有言詩至於杜子美天下之能事畢矣老杜之前人固未知有老杜後世安知無過老杜者余曰如一片花飛減却春若詠落花則語意皆盡所以古人既未到決知後人更無好語如畫馬詩云玉花却在御榻上榻上庭前屹相向則曹將軍能事與造化之功皆不可以有加矣至其他吟詠人情摸寫物景皆如是也老杜謝嚴武詩云雨映行宫辱贈詩山谷云只此雨映兩字寫出一時景物此句便雅健余然後曉句中當無虛字詩眼句法不當重疊淮海小詞云杜鵑聲裏斜陽暮東坡曰此詞髙妙但既云斜陽又云暮則重出也欲改斜陽作簾櫳余曰既言孤館閉春寒似無簾櫳公曰亭傳雖未必有簾櫳有亦無害余曰此詞本摸寫牢落之狀若曰簾櫳恐損初意先生曰極難得好字當徐思之然余因此曉句法不當重疊詩眼言簡而意不遺之句或有稱詠松句云影搖千尺龍蛇動聲撼半天風雨寒者一僧在坐曰未若雲影亂鋪地濤聲寒在空或以語聖俞聖俞曰言簡而意不遺當以僧語為優王直方詩話句豪而不畔於理吟詩喜作豪句須不畔於理方善如東坡觀崔白冬景圖云扶桑大繭如甕盎天女織綃雲漢上往來不遣鳯銜梭誰能鼓臂投三丈此語豪而甚工石敏若橘林文中詠雪有燕南雪花大於掌氷柱懸簷一千丈之語豪則豪矣然安得爾髙屋耶余觀李太白北風行云燕山雪花大如席秋浦歌云白髮三千丈其句可謂豪矣奈無此理何如秦少遊秋日絶句云連卷雌霓挂西樓逐雨追晴意未休安得萬粧相向舞酒酣聊把作纒頭此語亦豪而工矣藝苑雌黃句中有問答之詞古人造語俯仰紆餘各有態小麥青青大麥枯誰當穫者婦與姑丈夫何在西擊胡凡此句中每涵問答之詞大麥乾枯小麥黃問誰腰鐮胡與羌句法實有所自潘子真詩話誠齋論一句有三意詩有一句七言而三意者杜云對食暫餐還不能退之云欲去未到先思回有一句五言而兩意者陳後山云更病可無醉猶寒已自和誠齋論驚人句詩有驚人句杜山水障堂上不合生楓樹怪底江山起煙霧又斫却月中桂清光應更多白樂天云遙憐天上桂華孤為問姮娥更要無月中幸有間田地何不中央種兩株韓子蒼衡嶽圗故人來自天柱峯手提石廩與祝融兩山坡陀幾百里安得置之行李中此亦是用東坡云我持此石歸袖中有東海杜牧之云我欲東召龍伯公上天揭取北斗柄蓬萊頂上斡海水水盡見底看海空李賀云女媧錬石補天處石破天驚逗秋雨誠齋稱李大方警句李方叔之孫大方字允蹈少時嘗作思故山賦諸公間稱之以為似邢居實晚得一鶡冠今為雜買場寄豫詩一篇多有警句如三百年來今幾秋天地自老江自流如笛聲吹起白玉盤正照御前楊栁碧如可憐一代經綸業不抵鍾山幾首詩如後院落花人不到黃鸝飛逐石榴隂大似唐人誠齋論警句士大夫間有口傳一兩聮可喜而莫知其所本者如人情似紙畨畨薄世事如棊局局新又飽諳世事慵開眼會盡人情只點頭又薄有田園歸去好苦無官况莫來休又賀人休官重碧杯中天更大軟紅塵裏夢初收竟不知何人詩也又有嘲巧宦而事反拙者當初只謂將勤補到底翻為㺯巧成此本可笑陵陽論警句公嘗曰昨嘗與吕居仁間論前輩所作上元詩居仁曰晏元獻云梅臺冷落收燈夜花巷清虛掃雪天最佳直是説得出不可及後見吕郎中有詩云江城氣候猶含雪草市人家已挂燈豈用晏意耶室中語少陵坡谷句法前人文章各有一種句法如老杜今君起拖春江流豫亦江邊具小舟同心不減骨肉親每語見許文章伯如此之類老杜句法也東坡秋水今幾竿之類自是東坡句法魯直夏扇日在搖行樂亦云聊此魯直句法也學者若能遍考前作自然度越流輩吕氏童蒙訓蔣道士詩句衡州蔣道士云石壓雪斜出岸懸花倒生後因太守怒不掃地辱之守見詩愛而召之乃上詩曰春來不是人慵掃為惜莓苔襯落花守悔焉欲招之飲蔣有詩謝曰敲開敗籜露新竹拾上落花粧舊枝復為湘人所重青瑣省題詩句湘靈鼓瑟落句曲終人不見江上數峯青含蓄不盡意或謂錢起得之夢未必然也韓昌黎精衛銜石填海篇有人皆譏造次我獨賞專精則語意超詣不可以加矣灘聲句宿龍宮灘詩浩浩復湯湯灘聲抑更揚魯直云退之裁聽水句尤見工所謂浩浩湯湯抑更揚者非客裏夜卧飽聞此聲安能周旋妙處如此耶韓詩補注清健句三過門中老病死一彈指頃去來今句法清健天生對也陸務觀詩云老病已全惟欠死貪嗔雖盡尚餘癡不失望東坡而近世亦無人能到此藜藿野人詩話詩句可入畫吕居仁春日即事云雪消池館初春後人倚闌干欲暮時此自可入畫人之情意物之容態二句盡之遺珠燕詩歐陽公愛王君玉燕詞煙徑掠花飛逺逺曉窗驚夢語匆匆梅聖俞以為不若李堯夫花前語澀春猶冷江上飛髙雨乍晴遺珠唐人句法朝會閶闔開黃道衣冠拜紫宸杜甫退朝花底散歸院栁邊迷杜甫晚出左掖碧霄傳鳯吹旭日在龍旗楊巨源春日獻聖夀爐煙添栁重禁漏出花遲同前鈎陳霜騎肅御道雨師清皇甫冉東郊迎氣御爐香熖暖馳道玉聲寒竇叔向春日應制金闕曉鐘開萬户玉階仙仗擁千官崔灝早朝花眀劍珮星初沒栁拂旌旗露未乾同前宫掖春風開紫殿天樂下珠樓李白宫中行樂詞鶯歌聞太掖鳯吹繞􅌡洲同前鐘來宮轉漏月過閣移隂喻坦之宿省中鶯歸漢宫栁花隔杜陵煙郎士元春宴玉階聞墜葉羅幌見飛螢沈佺期長門怨繡户香風暖紗窗曙色新李白夢裏君王近宫中河漢髙劉方平長信宫竹外仙亭出花間輦路分喬知之應制一聲啼鳥禁門靜滿地落花春日長王隨長樂鐘聲花外盡龍池栁色雨中深錢起闕下贈裴舍人懷古粉牆猶竹色虛閣自松聲杜甫野花留寶靨蔓草見羅裙杜甫琴臺江山九秋後風月六朝餘杜牧企望竹送清溪月苔移玉座春杜甫玄元皇帝廟輦路江楓暗宫庭野草春司空曙金陵懷古峴首羊公愛長沙賈誼愁孟浩然送王昌齡之嶺南二女竹上淚湘妃水底魂韓愈泊三江口碑巳無文字人猶敬子孫任藩經墮淚碑野廟向江春寂寂斷碑無字草芊芊李羣玉黃陵廟晴川歷歷漢陽樹春草凄凄鸚鵡洲崔灝登黃鶴樓送别人分千里外興在一杯中李白别宋之悌飲中相顧色送後獨歸情韓愈人由戀德泣馬亦别羣鳴韓愈寄王中丞九江春水濶三峽暮雲深陳陶湓城贈别住接猿啼處行逢鴈過時許渾送客歸峽州塞草連天暮邊風動地秋張似送王相公赴幽州楊栁北歸路蒹葭南渡舟許渾泊松江渡落葉淮邊雨孤山海上秋錢起送人長亭呌月新秋鴈官渡含風古樹蟬武元衡送韋秀才赴滑州蟬聲驛路秋山裏草色河橋落照中韓翊送人歸青州地名水落魚龍夜山空鳥鼠秋杜甫弓抱關西月旗翻渭北風岑參送李太保充渭北節度雲送關西雨風傳渭北秋岑參客舍寄李嚴二山人秋草靈光殿寒雲曲阜城韓翊送故人歸魯明月雙流水清風八詠樓嚴維送人入金華樓看滄海日門聽浙江潮宋之問天竺寺人離京口日潮送嶽陽船周賀送楊嶽江流嶓冡雨帆入漢隂山方干金州客瓜步早潮吞建業蒜山晴雪照揚州朱文長樹隔五陵秋色早水連三晉夕陽多張喬人名草生元亮徑花暗子雲居王績田家雲藏神女館雨到楚王宫皇甫冉巫山髙春山子敬宅古木謝敷家朱文長贈别江山清謝眺草木媚邱遲張子容贈張司勳去思今武子餘教昔文翁釋皎然送李中丞暮雨揚雄宅秋風向秀園李郢園居黃霸初臨郡陶濳未去官李嘉祐江隂道中作阮籍生涯懶嵇康意氣踈王績思家江繞武侯籌筆地雨昏張載勒銘山唐彥謙興元沈氏莊劉琨坐嘯風清塞謝眺裁詩月滿樓武元衡酬嚴司空見寄寫景人煙寒橘柚秋色老梧桐李白樹交花兩色溪合水重流蔣别南溪别業鳥歸沙有迹帆過浪無痕賈島江亭晚望江樹臨洲晚沙禽對水寒劉長卿七里灘秋應為紅葉雨不厭蒼苔李義山霜空極天靜寒月帶江流張説風度蟬聲逺雲開鴈路長隋王胄雨晴草木窮秋後山川落照時杜