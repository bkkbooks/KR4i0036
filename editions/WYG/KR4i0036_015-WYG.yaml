body:
  text: 詩人玉屑巻十五宋魏慶之撰王維輞川之勝桃紅復含宿雨栁綠更帶春烟花落家童未掃鶯啼山客猶眠毎哦此句令人坐想輞川春日之勝此老傲睨閑適於其閒也漁隠詩中有畫畫中有詩味摩詰之詩詩中有晝觀摩詰之畫畫中有詩詩曰藍溪白石出玉山紅葉稀山路元無雨空翠濕人衣此摩詰之詩也或曰非也好事者以補摩詰之遺東坡造意之妙與造物相表裏中嵗頗好道晚家南山陲興來毎獨往勝事空自知行到水窮處坐㸔雲起時偶然值林叟談笑無囬期此詩造意之妙至與造物相表裏豈直詩中有畫哉觀其詩知其蟬蜕塵埃之中浮游萬物之表者也山谷老人云余頃年登山臨水未嘗不讀王摩詰詩顧知此老胷次定有泉石膏肓之疾後湖集晦庵謂詩清而少氣骨王維以詩名開元間遭禄山亂陷賊中不能死事平復幸不誅其人既不足言詞雖清雅亦萎弱少氣骨獨山中人與望終南迎送神為勝韋蘇州清深妙麗韓子蒼云韋蘇州少時以三衛郎事元宗豪縱不羈元宗崩始折節務讀書然余觀其人為性髙潔鮮食寡欲所居掃地焚香而坐與豪縱者不類其詩清深妙麗雖唐詩人之盛亦少其比又豈似晚節把筆學為者豈蘇州自序之過歟苕溪漁隠曰韓子蒼云韋蘇州少時以三衛郎事元宗豪縱不羈余因記唐宋遺史云章應物赴大司馬杜鴻漸宴醉宿驛亭醒見二佳人在側驚問之對曰郎中席上與司空詩因令二樂妓侍寢問記得詩否一妓强記乃誦曰髙髻雲鬟宮様粧春風一曲杜韋娘司空見慣渾閒事斷盡蘇州刺史腸觀此則應物豪縱不羈之性暮年猶在也子蒼又云余觀韋蘇州為性髙潔鮮食寡欲所居掃地焚香而坐此是韋集後王欽臣所作序載國史補之語但恐溢美耳自成一家蘓州歌行才麗之外頗近興諷其五言詩又髙雅閒澹自成一家之體今之秉筆者誰能及之然當蘇州在時人亦未甚愛重必待身後然後貴之白樂天巳為當時所貴劉太真與章蘇州書云顧著作來巴足下郡齋燕集想亦示何情致暢茂遒逸之如此宋齊間沈謝吴何始精於理意縁情體物備詩人指後之傳者甚失其源惟足下制其横流師摯之始闗雎之亂於足下之文見之矣則知蘇州詩為當時所貴如此燕集所作乃兵衞森畫㦸燕寢凝清香也王直方詩話逸詩俗吏閒居少同人㑹面難偶隨香署客來訪竹林歡暮館花㣲落春城雨暫寒甕間聊共酌莫使宦情䦨陪王郎中尋孔徵君詩也獨有宦遊人偏驚物候新雲霞出海曙梅栁渡江春淑氣催黄鳥晴光轉綠蘋忽聞歌古調歸思欲霑巾和晉陵陸丞早春遊望詩也二篇皆佳作而韋集逸去余家有顧陶所編唐詩有之故附見於此復齋謾録韋詩流麗徐師川云人言蘇州詩多言其古淡乃是不知言蘇州詩自李杜以來古人詩法盡廢惟蘇州有六朝風致最為流麗呂氏童蒙訓古詩勝律詩韋應物古詩勝律詩李徳裕武元衡則律詩勝古詩五字句又勝七字張籍王建詩格極相似李益古律詩相稱然皆非應物之比也隠居詩話蘇後湖讀韋詩而有感余毎讀蘇州漠漠帆來重冥冥鳥去遲之語未嘗不茫然而思喟然而嘆嗟乎此余晚泊江西十年前夢耳自余犇竄南北山行水宿所歴佳處固多欲求此夢了不可得豈蒹葭莽蒼無三湘七澤之壯雪蓬煙艇無風檣陣馬之竒乎抑吾且老矣壯懐銷落塵土坌沒而無少日烟霞之想也慶長筆端丘壑固自不凡當為余圗蘇州之句於壁使余隠几静對神游八極之表耳後湖集絶唱蘇州云落葉滿空山何處尋行迹東坡用其韻曰寄語庵中人飛空本無迹此非才不逮蓋絶唱不當和也如東坡羅漢賛空山無人水流花開此八字還許人再道否許彦周詩話詩有深意蘇州詩身多疾病思田里邑有流亡愧俸錢郡中宴集云自慚居處崇未覩斯民康余謂士君子當切切作此語彼一意供租専事土木而視民如讎者得無愧此詩乎䂬溪孟浩然坐詩窮孟浩然詩不才明主弃多病故人踈唐元宗聞之曰卿自弃朕朕何弃卿孟貫詩不伐有巢樹多移無主花周世宗聞之曰朕伐叛弔民何謂有巢無主二子正坐詩窮所謂轉喉觸諱漫叟詩話髙逺浩然詩掛席㡬千里名山都未逢泊舟潯陽郭如見香爐峯但詳看此等語自然髙逺吕氏童䝉訓韻髙才短子瞻謂浩然詩韻髙而才短如造内法酒手而無材料耳後山詩話岑參詩浩然夜歸鹿門寺歌曰山寺鳴鐘晝巳昏魚梁渡頭爭渡喧岑参巴南舟中夜書事詩云渡頭欲黄昏歸人爭渡喧岑詩語簡而意盡優於孟也漁隠山谷贊山谷題浩然畫像詩浩然平生出處事跡悉能道盡乃詩中傳也其詩云先生少也隠鹿門爽氣洗盡塵埃昏賦詩真可凌鮑謝短褐豈愧公卿尊故人私邀伴禁直誦詩不顧龍鱗逆風雲感㑹雖有時顧此定知毋枉尺襄江渺渺泛清流梅殘臘月年年愁先生一徃今㡬秋後來誰復釣槎頭漁隠秀句明皇世章句之風大得建安體論者推李翰林杜工部為尤介其間能不愧者惟吾鄉之孟先生也先生之作遇景入詠不拘竒抉異令齷齪東人口者涵涵然有干霄之興若公輸氏當巧而不巧也北齊美蕭慤芙蓉露下落楊栁月中疎先生有㣲雲淡河漢踈雨滴梧桐樂府美王融殘日霽沙嶼清風動甘泉先生則有氣蒸雲夢澤波撼岳陽城謝朓之詩句精者露濕寒塘草月映清淮流先生則有荷風送香氣竹露滴清聲此與古人爭勝於毫釐也稱是者衆不可悉類嗚呼先生之道復何言耶謂乎貧則天爵於身謂乎死則不朽於文為士之道亦以至矣先生襄陽人也日休亦襄陽人既慕其名覩其貎蓋思文王則嗜昌歜思仲尼則師有若吾於先生見之矣苕溪漁隠曰露濕寒塘草月映清淮流此以為謝朓詩東觀餘論以為何遜詩東觀見何遜集而云之則日休以為謝朓詩恐誤也皮日休韓文公掀雷抉電韓吏部歌詩累百首而驅駕氣勢若掀雷抉電撑決於天地之垠司空圖題栁集後變詩格書之美者莫如顔魯公然書法之壊自魯公始詩之美者莫如韓退之然詩格之變自退之始東坡用意退之詩酩酊馬上知為誰此七字用意哀悲過於痛哭又詩云銀燭未銷窓送曙金釵半醉坐添春殊不類其為人乃知能賦梅花不獨宋廣平許彦周詩話改一字遂失一篇之意詩中有一字人以私意竄易遂失古人一篇之意若相公親破蔡州來今親字改作新字是也苕溪漁隠曰酬王二十舍人雪中見寄云三日柴門擁不開堦庭平滿白皚皚今朝蹋作瓊瑶跡為有詩從鳳沼來今從字改作仙字則失詩題見寄之意也漫叟詩話公末年詩閒逺有味子美詩善叙事故號詩史其律詩多至百韻本末貫穿如一辭前此蓋未有然荆公作四家詩選而長韻律詩皆棄不取如夔府書懐一百韻亦不載退之詩豪徤奔放自成一家世特恨其深婉不足南溪始泛三篇乃末年所作獨為閒逺有淵明風氣而詩選亦無有皆不可解公宜自有㫖也苕溪漁隠曰退之詩如何人有酒身無事誰家多竹門可欵之句尤閒逺有味蔡寛夫詩話南溪始泛洪龜父言山谷於退之詩少所許可最愛南溪始泛以為有詩人句律之深意王直方詩話後山論退之詩韓詩如秋懐别元協律南溪始泛皆佳作也後山詩話琴操古樂府命題皆有主意後之人用樂府為題者直當代其人而措辭如公無渡河須作妻止其夫之辭太白輩或失之惟退之琴操得體琴操栁子厚不能作子厚皇雅退之亦不能作也唐子西語錄送李愿歸盤谷歐陽文忠公言晉無文章惟陶淵明歸去來一篇而巳余亦謂唐無文章惟韓退之送李愿歸盤谷序一篇而巳平生欲效此作一文毎執筆輒罷因自笑曰不若且放教退之獨歩退之尋常詩自謂不逮李杜至於昔尋李愿向盤谷一篇獨不減子美東坡晉公賡酬退之和裴晉公征淮西時過女几山詩云旗穿曉日雲霞雜山倚秋空劔㦸明敢請相公平賊後暫攜諸吏上崢嶸而晉公之詩無見惟白樂天集載其一聨云待平賊壘報天子莫指仙山示老夫方時意氣自信不疑如此豈容令狐楚輩沮撓乎晉公文字世不傳晚年與劉白放浪綠野橋多為唱和間見人文集語多質直渾厚計應似其為人如灰心縁忍事霜鬢為論兵之類可謂深婉李文定公迪在中書嘗諷誦此兩句親書於壁蔡寛夫詩話聫句雪浪齋日記云退之聫句古無此法自退之斬新開闢余觀謝宣城集有聫句七篇陶靖節集有聫句一篇杜工部集有聫句一篇則諸公已先為之至退之亦是沿襲其舊若言聫句自退之斬新開闢則非也漁隠彈琴詩退之聽穎師彈琴詩云浮雲栁絮無根蔕天地濶逺隨飛揚此泛聲也謂輕非絲重非木也喧啾百鳥羣忽見孤鳳凰泛聲中寄指聲也躋攀分寸不可上吟繹聲也失勢一落千文强順下聲也僕不曉琴聞之善琴者云此數聲最難工自文忠公與東坡論此詩作聴琵琶詩之後後生随例云云栁下恵則可吾則不可故特論之少為退之雪寃許彥周詩話評退之詩沈括存中吕恵卿吉甫王存正仲李常公擇治平中同在館下談詩存中曰韓退之詩乃押韻之文耳雖健美富贍而格不近詩吉甫曰詩正當如是我謂詩人以來未有如退之者正仲是存中公擇是吉甫四人交相詰難久而不決公擇忽正色謂正仲曰君子羣而不黨公何黨存中也正仲勃然曰我所見如是顧豈黨耶以我偶同存中遂謂之黨然則君非吉甫之黨乎一座大笑隠居詩話子由陋聖徳詩詩人詠歌文武征伐之事其於克密曰無矢我陵我陵我阿無飲我泉我泉我池其於克崇曰崇墉言言臨衝閑閑執訊連連攸馘安安是類是禡是致是附四方以無侮其於克商曰維師尚父時維鷹揚諒彼武王肆伐大商㑹朝清明其形容征伐之盛極於此矣退之作元和聖徳詩言劉闢之死曰婉婉弱子赤立傴僂牽頭曵足先斷腰膂次及其徒體骸撑柱末乃取闢駭汗如雨揮刀紛紜爭切膾脯此李斯頌秦所不忍言而退之自謂無愧於雅頌何其陋也蘇子由韓栁警句蔡天啓言嘗與張文潜論韓栁五字警句文潛舉退之暖風抽宿麥清雨巻歸旗子厚壁空殘月曙門掩候蟲秋皆集中第一栁儀曹東坡評栁州詩蘇李之天成曹劉之自得陶謝之超然固巳至矣而杜子美李太白以英偉絶世之資凌跨百代古之詩人盡廢然魏晉以來髙風絶塵亦少衰矣李杜之後詩人繼出雖有逺韻而才不逮意獨韋應物栁子厚發纎穠於簡古寄至味於淡泊非餘子所及也唐末司空圖﨑嶇兵亂之間而得詩人髙雅獨有承平之遺風其論詩曰梅止於酸鹽止於鹹飲食不可無鹽梅而其美常在於酸鹹之外可以一唱而三嘆也子厚詩在陶淵明下韋蘇州上退之豪放竒險則過之而温麗靖深不及也所貴於枯淡者謂外枯而中膏似淡而實美淵明子厚之流是也若中邊皆枯亦何足道佛言譬如食蜜中邊皆甜人食五味知其甘苦者皆是能分别其中邊者百無一也東坡休齋評子厚詩栁子厚小詩㓜眇清妍與元劉並馳而爭先而長句大篇便覺窘迫不若韓之雍容惟平淮詩二篇名為唐雅其序云雖不及尹吉甫召穆公等庶施之後代有以佐唐之光明其自視豈後於古人哉其一章云師是蔡人以宥以釐度拜稽首廟於元龜又云其危既安有長如林曽是讙譊化為謳吟甚似古人語而卒章震是朔南以告徳音歸牛休馬豐稼於野皆叶以古音南尼心切馬音毋野音墅其卒章云蔡人率止惟西平有子西平有子惟我有臣疇允大邦俾恵我人尤得古詩體也詩眼評子厚詩子厚詩尤深難識前賢亦未推重自老坡發明其妙學者方漸知之余嘗問人栁詩何好答曰大抵皆好又問君愛何處答云無不愛者便知不曉矣識文章者當如襌家有悟門夫法門百千差别要須自一轉語悟入如古人文章直須先悟得一處乃可通其他妙處向因讀子厚晨詣超師院讀襌經詩一叚至誠㓗清之意參然在前真源了無取妄跡世所逐㣲言冀可冥繕性何由熟真妄以盡佛理言行以盡薰修此外亦無詞矣道人庭宇靜苔色連深竹蓋逺過竹徑通幽處襌房花木深日出霧露餘青松如膏沐予家舊有大松偶見露洗而霧披真如洗沐未乾染以翠色然後知此語能傳造化之妙澹然離言說悟悦心自足蓋言因指而見月遺經而得道於是終焉其本末立意遣詞可謂曲盡其妙毫髪無遺恨者也哭呂衡州詩足以發明吕温之俊偉哭淩員外詩書盡凌凖平生掩役夫張進骸既盡役夫之事又反覆自明其意此二篇筆力規模不減莊周左丘明也劉夢得傷愚溪三首有溪水悠悠春自來草堂無主燕飛回又殘陽寂寞出樵車又栁門竹巷依依在野草青苔日日多謂之佳句正如今之海語於子厚了無益殆折楊黄華之雄易售於流俗耳詩眼南澗中詩絶妙古今南澗中詩秋氣集南澗獨遊亭午時回風一蕭瑟林影久參差始至若有得稍深遂忘疲羈禽響幽谷寒藻舞淪漪去國魂巳游懐人淚空垂孤生易為感失路少所宜索寞競何事徘徊只自知誰為後來者當與此心期栁儀曹詩憂中有樂樂中有憂蓋絶妙古今矣然老杜云王侯與螻蟻同盡随丘墟儀曹何憂之深也東坡古今絶唱楊華既奔梁元魏胡武靈後作楊白華歌令宫人連臂踏之聲甚淒斷子厚樂府云楊白華風吹渡江水坐令宫樹無顏色揺蕩春光千萬里茫茫曉日下長秋哀歌未斷城鵶起言婉而情深古今絶唱也許彥周詩話天賦不可及東坡言鄭谷詩江上晚來堪畫處漁人披得一簑歸此村學中詩也子厚云千山鳥飛絶萬逕人蹤滅孤舟簑笠翁獨釣寒江雪信有格也哉殆天所賦不可及也洪駒父兩句有不盡之意子厚聞鶯詩云一聲夢斷楚江曲滿眼故園春草緑其感物懐土不盡之意備見於兩句中不在多也漁隠孟東野賈浪仙論郊島詩唐之晚年詩人類多窮士如孟東野賈浪仙之徒皆以刻琢窮苦之言為工或謂郊島孰貧曰島為甚也曰何以知之以其詩知之郊曰種稻耕白水負薪斫青山島曰市中有樵山客舍寒無烟井底有甘泉釡中嘗苦乾孟氏薪米自足而島家俱無以是知之耳然及其至也清絶髙造殆非常人可到唐之野詩稱此兩人為最至於竒警之句往往有之如雞聲茅店月人跡板橋霜則覊旅窮愁想之在目若曰栁塘春水慢花塢夕陽遲則春物融治人心和暢有言不能盡之意亦未可以為小道無取也苕溪漁隠曰六一居士以雞聲茅店月人跡板橋霜是温庭筠詩栁塘春水慢花塢夕陽遲是嚴維詩文潛乃以為郊島詩豈非誤耶張文潛寒澁司空圗善論前人詩如謂元白為力勍氣僝乃都㑹之豪估郊島非附於寒澁無所置才皆切中其病及自評其作乃以南樓山最秀北路邑偏青為假令作者復生亦當以著題見許此殆不可曉當局者迷固人情之通患如樂天所謂斸石破山先觀鑱迹發矢中的兼聽弦聲使不見其詩而聞此語當以為如何哉蔡寛夫詩話僧敲月下門唐書載賈島字浪仙初為浮屠名無本來東都時洛陽令禁僧午後不得出島為詩自傷韓愈憐之因教其為文遂去浮屠舉進士當其苦唫雖逢值公卿貴人皆不之覺也一日見京兆尹跨驢不避謼詰之久乃得釋㑹昌初以普州參軍改司户未受命卒余按劉公嘉話云島初赴舉京師一日於驢上得句云鳥宿池邉樹僧敲月下門始欲著推字又欲著敲字煉之未定遂於驢上吟哦時時引手作推敲之勢時韓愈吏部權京兆島不覺衝至第三節左右擁至尹前島具對所得詩句云云韓立馬良久謂島曰作敲字佳矣遂與並轡而歸留連論詩與為布衣之交自此名著後以不第乃為僧居法乾寺號無本一日宣宗微行至寺聞鐘樓吟詠聲遂登樓於島案上取詩巻覽之島不識帝遂攘臂睨帝曰郎君何㑹此耶遂奪取詩巻帝慙恧下樓而去嘗為長江簿號賈長江唐詩與嘉話所載不同如此緗素雜記棹穿波底月髙麗使過海有詩云水鳥浮還沒山雲斷復連賈島詐為梢人聫下句云棹穿波底月船壓水中天麗使嘉歎久之自此不復言詩令是堂手錄桑乾長江二詩賈島詩有影略句韓退之喜之其渡桑乾詩曰客舍并州三十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉又赴長江道中詩曰䇿杖離山驛逢人問梓州長江那可到行客替生愁冷齋夜話苦吟孟郊詩蹇澁窮僻琢削不暇真苦吟而成觀其句法格力可見矣其自謂夜吟曉不休苦吟鬼神愁如何不自閒心與身為仇而退之薦其詩云榮華肖天秀㨗疾愈響報何也隠居詩話唐人陋於聞道唐人工於為詩而陋於聞道孟郊嘗有詩云食薺腸亦苦强歌聲無歡出門即有礙誰謂天地寛郊耿介之士雖天地之大無以容其身起居飲食有戚戚之憂是以卒窮以死而李翺稱之以為郊詩髙處在古無上平處猶下顧沈謝至韓退之亦談不容口甚矣唐人之不聞道也孔子稱顔子在陋巷人不堪其憂回也不改其樂回雖窮困早死而非其處身之非可以言命與郊異矣蘇子由郊之胷次形於詩句孟東野一不第而有出門即有礙誰謂天地寛語若無所容其身者老杜雖落魄不偶而氣常自若如納納乾坤大何其壯哉白樂天亦云無事日月長不羈天地闊與郊異矣然未若邵康節靜處乾坤大閒中日月長尤有味也休齋韓愈詩孟郊死𦵏北邙山日月風雲暫得閑天恐文章聲斷絶故留賈島在人間北夢瑣言枯寂氣味賈島哭柏巖禪師詩寫留行道影焚却坐禪身時謂燒殺活和尚此可笑也若歩随青山影坐學白塔骨又獨行潭底影數息樹邉身皆是島詩何精麄頓異也苕溪漁隠曰余於此兩聫但各取一句而已坐學白塔骨可見襌定之不動獨行潭底影可見形影之清孤島嘗為衲子故有此枯寂氣味形之於詩句也如此六一居士詩話郊寒島瘦東坡祭栁子玉文郊寒島瘦元輕白俗此語具眼客見詰曰子盛稱白樂天孟東野詩又愛元微之詩而取此話何也僕曰論道當嚴取人當恕此八字東坡論道之語也許彦周詩話玉川子月蝕詩韓退之月蝕詩一篇大半用玉川子句或者謂玉川子月蝕詩豪恠竒挺退之深所歎伏故所作盡摘玉川子佳句而補成之某竊以為不然退之月蝕詩題曰效玉川子作而詩中有以玉川子為言者玉川子涕泗下中庭獨自行又曰玉川子立於庭而言曰地行賤臣仝再拜敢告上天公然則退之㡬於代玉川子作也玉川子詩雖豪放然太險恠而不循詩家法度退之乃摘其句而約之以禮故退之詩中兩言玉川子其意若曰玉川子月蝕詩如此足矣故退之詩題曰效玉川子作此退之之深意也不然退之豈不能自為月蝕詩而必用玉川子句而後成詩耶以謂退之自為月蝕詩則詩中用玉川子涕泗告天公又非其類矣學林新編有所思飄逸可喜玉川子詩讀者易解識者當自知之蕭才子宅問答詩如莊子寓言髙僧對襌機惟有所思一篇語似不類疑他人所作然飄逸可喜其詞曰當時我醉美人家美人顔色嬌如花今日美人棄我去青樓朱箔天之涯娟娟姮娥月三五二八圎又缺翠眉蟬鬢生别離一望不見心斷絶心斷絶㡬千里夢中醉卧巫山雲覺來淚滴湘江水湘江兩岸花木深美人不見愁人心含愁更奏緑綺琴調髙絃絶無知音美人兮美人不知為暮雨兮為朝雲相思一夜梅花發忽到窗前疑是君雪浪齋日記評茶歌玉川子有謝孟諌議恵茶歌范希文亦有鬬茶歌此二篇皆佳作也殆未可以優劣論然玉川歌云至尊之餘合王公何事便到山人家而希文云北苑將期獻天子林下雄豪先鬬美若論先後之序則玉川之言差勝雖然如希文豈不知上下之分者哉亦各賦一時之事耳苕溪漁隠曰藝苑以此二篇皆佳作未可優劣論今並錄全篇余謂玉川之詩優於希文之歌玉川自出胷臆造言穏貼得詩人之句法希文排比故實巧欲形容宛成有韻之文是果無優劣耶玉川走筆謝孟諫議寄新茶云日髙文五睡正濃軍將扣門驚周公口云諫議送書信白絹斜封三道印開緘宛見諫議面手閲月團三百片聞道新年入山裏蟄蟲驚動春風起天子須嘗陽羡茶百草不敢先開花仁風暗結珠琲瓃先春抽出黄金牙摘鮮焙芳旋封裹至精至好且不奢至尊之餘合王公何事便到山人家柴門反闗無俗客紗㡌挂頭自煎喫碧雲引風吹不斷白花浮光凝椀靣一椀喉吻潤両椀破孤悶三椀搜枯腸惟有文字五千巻四椀發輕汗平生不平事盡向毛孔散五椀肌骨清六椀通仙靈七椀喫不得也唯覺兩掖習習清風生蓬萊山在何處玉川子乗此清風欲歸去山上羣仙司下土地位清髙隔風雨安得知百萬億蒼生命墮在顛崖受辛苦便為諌議問蒼生到頭合得蘇息否希文和章岷從事鬬茶歌云年年春自東南來建溪先暖微氷開溪邉竒茗冠天下武夷仙人從古栽新雷昨夜發何處家家嬉笑穿雲去露芽錯落一畨榮綴玉含珠散嘉樹終朝采掇未盈襜唯求精粹不敢貪研膏焙乳有雅製方中圭兮圎中蟾北苑將期獻天子林下雄豪先鬬美鼎磨雲外首山銅瓶携江上中􅍽水黄金碾畔緑塵飛碧玉甌中翠濤起鬬茶味兮輕醍醐鬬茶香兮薄蘭芷其間品第胡能欺十目視而十手指勝若登仙不可攀輸同降將無窮耻吁嗟天産石上英論功不愧堦前蓂衆人之濁我可清千日之醉我可醒屈原試與招魂魄劉伶却得聞雷霆盧仝不敢歌陸羽須作經森然萬象中焉知無茶星商山丈人休茹芝首陽先生休采薇長安酒價減千萬城都藥市無光輝不如仙山一啜好泠然便欲乗風飛君莫羡花間女郎只鬬草嬴得珠璣滿斗歸藝苑雌黄山中絶句盧仝山中絶句云陽坡草軟厚如織因與鹿麛相伴眠王介甫只用五字道盡此兩句詩云眠分黄犢草豈不簡而妙乎漁隠李長吉品題元和中韓吏部亦頗道其謌詩雲煙綿聯不足為其態也水之迢迢不足為其清也春之盎盎不足為其和也秋之明潔不足為其格也風檣陣馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國陊殿梗莾丘隴不足為其恨怨悲愁也鯨呿鰲擲牛鬼蛇神不足為其虛荒誕幻也蓋騷之苗裔理雖不及辭或過之騷有感怨刺懟言及君臣理亂時有以激發人意乃賀所為無得有是賀能探尋前事所以深嘆恨今古未嘗經道者如金銅仙人辭漢歌補梁庾肩吾宫體謡求取情状離絶逺去筆墨畦逕間亦殊不能知之賀生二十七年死矣世皆曰使賀且未死少加以理奴僕命騷可也杜牧之晦庵論李賀詩李賀較恠得些子不如太白自在又曰賀詩巧髙軒過李賀年七嵗以長短之製名動京華時韓文公與皇甫湜覽賀所作竒之因連騎造門求見賀總角荷衣而出二公不之信因令靣賦一篇賀承命欣然操觚染翰傍若無人仍名曰髙軒過云華裾織翠青如葱金環壓轡揺玲瓏馬蹄隠隠聲隆隆入門下馬氣如虹東京才子文章公二十八宿羅心胷元精耿耿貫當中殿前作賦聲摩空筆補造化天無功厖眉書客感秋蓬誰知死草生華風我今垂翅附㝠鴻他日不羞蛇作龍二公大驚遂以所乗馬命聯鑣而還所居親為束髪後舉進士賀父名瑨或謗賀不避家諱韓文公特為著辨諱一篇摭言古錦囊李賀未始立題然後為詩如他人牽合程課者毎旦出小奚奴背古錦囊遇所得書投囊中及暮歸足成之本傳楊花撲帳春雲熱長吉詩云楊花撲帳春雲熱才力絶人逺甚如栁塘春水慢花塢夕陽遲雖為歐陽公所稱然不迨長吉之語許彦周詩話桃花亂落如紅雨長吉有桃花亂落如紅雨之句以此名世余觀劉禹錫云花枝滿空迷處所揺動繁英墜紅雨劉李出一時决非相為剽竊復齋謾錄劉賓客獨歩元和劉夢得竹枝九章詞意髙妙元和間誠可以獨歩道風俗而不俚追古昔而不愧比之杜子美䕫州歌所謂同工而異曲也昔子瞻嘗聞余詠第一篇歎曰此奔軼絶塵不可追也淮隂行情調殊麗語意尤穩切白樂天元㣲之為之皆不入此律也唯無耐脫菜時不可解當待博物洽聞者説也三閣詞四章可以配黍離之詩有國存亡之鑑也大槩夢得樂府小章優於大篇詩優於它文耳山谷用意深逺蘇子由晚年多令人學劉禹錫詩以為用意深逺有曲折處後因見夢得歴陽詩云一夕為湖地千年列郡名霸王迷路處亞父所封城皆歴陽事語意雄健後殆難繼也呂氏童蒙訓明月可中庭山谷至廬山一寺與羣僧圍爐因舉生公講堂詩末云一方明月可中庭一僧率爾云何不曰一方明月滿中庭山谷笑去洪駒父詩話平淮西詩人豈不自知耶及自愛其文章乃更大繆何也劉禹錫詩固有好處及其自稱平淮西詩云城中喔喔晨雞鳴城頭鼓角聲和平為盡李愬之美又云始知元和十四載四海重見昇平年為盡憲宗之美吾不知此兩聫為何等語也賈島云獨行潭底影數息樹邉身其自注云二句三年得一吟雙淚流知音如不賞歸卧故山秋不知此兩句有何難道至於三年始成而一吟下淚也隠居詩話樂天評詩杜甫善評詩其稱薛稷詩云驅車越陜郊北顧臨大河美矣又稱李邕六公篇恨不見之皇甫湜題浯溪頌云次山有文章可惋只在碎亦善評文者若白居易殊不善評詩其稱徐凝瀑布詩云千古長如白練飛一條界破青山色又稱劉禹錫雪裏髙山頭白早海中仙果子生遲沉舟側畔千帆過病樹前頭萬木春此皆常語也禹錫自有可稱之句甚多顧不能知之耳隠居詩話碁詩夢得觀碁歌云初疑磊落曙天星次見搏擊三秋兵鴈行布陣衆未曉虎穴得子人皆驚余嘗愛此數語能摸寫奕碁之趣夢得必髙於手談也至東坡觀碁則云勝固欣然敗亦可喜優哉游哉聊復爾耳蓋東坡素不解碁不究此味也漁隠常建佳句丹陽殷璠撰河嶽英靈集首列常建詩愛其山光悦鳥性潭影空人心之句以為警䇿歐公又愛建竹徑通幽處禪房花木深欲效建作數語竟不能得以為恨予謂建此詩全篇皆工不獨此兩聫而巳其詩曰清晨入古寺初日照髙林竹徑通幽處禪房花木深山光悦鳥性潭影空人心萬籟此俱寂但聞鐘磬音洪駒甫詩話常建詩竹徑通幽處襌房花木深歐陽文忠公最愛賞以為不可及此語誠可人意然於公何足道豈非厭飫芻豢反思螺蛤耶東坡詩人玉屑巻十五
