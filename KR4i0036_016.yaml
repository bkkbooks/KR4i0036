body:
  text: 詩人玉屑巻十六宋魏慶之撰香山五長白樂天諷諭之詩長於激閑適之詩長於遣感傷之詩長於切律詩百言以上長於贍五字七字百言以下長於情詩苑類格造理富貴於人造物所靳自古以來多不在於少年嘗在於晚景若少年富貴者非曰無之葢亦鮮矣人至晚景得富貴未免置第宅售妓妾以償其平生所不足者如樂天詩云多少朱門鎖空宅主人到了不曾歸司空曙詩黄金用盡教歌舞留與他人樂少年讀此二詩使人悽然誠不足為此也漁隠達道白氏集中頗有遣懐之作故達道之人率多愛之余友李公維錄出其詩名曰養恬集余亦如之名曰助道其詞語葢於經教法門用此彌縫其闕而直截曉悟於人也余愛其詩云羲和走馭趂年光不許人間日月長遂使四時都似電争教兩鬢不成霜榮銷枯至無非命壯盡衰來亦是常巳共身心要約定窮通生死不驚忙予今擬其句語聊加變易入於别韻前述時景之迅遷後述世態之不一而終篇亦斷之以不驚也詩云羲和走馭趂年華不使人間嵗月賖春正艶陽春即老日方亭午日還斜時情莫測深如海世事難齊亂似麻巳共身心要約定古今如此勿驚嗟法蔵碎金逹者之詞白樂天詩曰無事日月長不覊天地濶此達者之詞也孟東野詩曰出門即有礙誰謂天地寛此褊狹者之詞也青箱雜記秀句樂天詩春色辭門栁秋聲到井桐此語未易及許彦周詩話工於對杜子美善於用故事及常語多離扸或倒其句而用之葢如此則語峻而體健意亦深穏矣如露從今夜白月是故鄉明之類是也樂天工於用對寄微之詩云白頭吟處變青眼望中穿可為佳句然不若别來頭併白相見眼終青尤為工也麈史草詩樂天以詩謁顧况况喜其咸陽原上草云野火燒不盡春風吹又生予以為不若劉長卿春入燒痕青之句語簡而意盡復齋謾録昭君同詞古今人作昭君詞多矣余獨愛白樂天一絶云漢使却回憑寄語黄金何日贖娥眉君王若問妾顔色莫道不如宫裏時葢其意優游而不廹切故也然樂天賦此時年甚少王直方詩話寒食詩東坡云與郭生遊寒溪主簿呉亮置酒郭生善作挽歌酒酣發聲坐為悽然郭生言恨無佳詞因改樂天寒食詩歌之坐客有泣者其詞曰烏啼鵲噪昏喬木清明寒食誰家哭風吹日野紙錢飛古墓纍纍春草緑棠梨花映白楊路盡是死生離别處㝠寞重泉哭不聞蕭簫暮雨人歸去毎句雜以散聲王直方桑落酒河中桑落坊有井毎至桑落時取其寒暄得所以井水釀酒甚佳故號桑落酒舊京人呼為桑郎葢語訛耳庾信詩云蒲城桑落酒㶚岸菊花秋白居易詩云桑落氣薫珠翠暖柘枝聲引筦絃髙後史補海圖屏風詩樂天題海圖屏風詩略曰或者不量力謂兹鰲可求贔屭牽不動綸絶沉其鈎一鰲既頓頷諸鰲齊掉頭噴風激飛㢘皷波怒陽侯遂使江漢水朝宗意亦休吾讀此詩感劉隗李訓薛文通等事為之太息隠居詩話呉元濟以蔡叛犯許汝以驚東都此豈可不討者也當時議者欲置之固為非䇿然不得武裴二傑事亦未易辦也樂天豈庸人哉然其議論亦似欲置之者其詩有海圖屏風者可見其意且注云時方討淮蔡吾以是知仁人君子之於兵葢不忍輕用如此淮蔡且欲以徳懐况欲弊所恃以勤無用乎悲夫此未易與世士談也二說未知孰是東坡玲瓏歌啇玲瓏餘杭歌者樂天作郡日賦歌與之云罷胡琴掩秦瑟玲瓏再拜歌初畢誰道使君不解歌聴唱黄鷄與白日黄鷄催曉丑時鳴白日催年酉前沒腰間紫綬繫未穏鏡裏朱顔看已失玲瓏玲瓏柰老何使君歌了汝還歌時元微之在越州厚幣邀至月餘使盡歌所唱之曲作詩送行兼寄樂天云休遣玲瓏唱我詞我詞多是寄君詩却向江邊整回棹月落潮平是去時苕溪漁隠曰東坡用此歌夜飲次韻畢推官云紅燭照庭嘶騕裊黄鷄催曉唱玲瓏又次韻蘇伯固主簿重九日云只有黄鷄與白日玲瓏應識使君歌又樂天與劉十九同宿詩紅旗破賊非吾事黄紙除書無我名惟共嵩陽劉處士圍碁賭酒到天明故東坡題杜介熈熈堂云白砂碧玉味方永黄紙紅旗心已灰白砂碧玉見續仙傳脞說東坡似樂天東坡平日最愛樂天之為人故有詩云我甚似樂天但無素與蠻又我似樂天君記取華顛賞徧洛陽春又他時要指集賢人知是香山老居士又定似香山老居士世縁終淺道根深而坡在錢塘與樂天所留嵗月略相似其句云在郡依前六百日是也王直方詩話纎艶不逞杜牧謂白居易詩纎艶不逞非莊人雅士所為滛言媟語入人肌骨不可去唐本賛甘露詩沈存中謂樂天詩不必皆好然識趣可尚章子厚謂不然樂天識趣最淺狹謂詩中言甘露事處幾如幸災雖私讎可快然朝廷當此不幸臣子不當形之歌詠也如當公白首同歸日是我青山獨往時之類詩史樂天為王涯所䜛謪江州司馬甘露之禍樂天在洛適游香山寺有詩云當君白首同歸日是我青山獨往時不知者以樂天為幸之樂天豈幸人之禍也哉葢悲之也東坡陵陽重厚之論公嘗曰白樂天詩今人多輕易之大可憫矣大率不曽道得一言半句乃輕薄至於非笑古人此所以不逺到僕曰杜子美云楊王盧駱當時體輕薄為文哂未休正公之意也公曰當時人已如此室中語老嫗解詩白樂天毎作詩令老嫗解之問曰解否嫗曰解則録之不解又改之故唐末之詩近於鄙俚也墨客揮犀玉谿生九日詩九日云曽共山公把酒巵霜天白菊遶堦墀十年泉下無消息九日樽前有所思不學漢臣栽苜蓿空教楚客詠江蘺郎君官貴施行馬東閤無因再得窺古今詩話云李商隠依令狐楚以牋奏受知後其子綯有韋平之拜浸疎商隠重陽日商隠造其㕔事題此詩綯覩之慙恨扄鎖此㕔終身不處又唐史本傳云令狐楚竒其文使與諸子遊楚徙天平宣武皆表署廵官後從王茂元之辟其子綯以為忘家恩放利偷合謝不通綯當國商隠歸窮綯憾不置則商隠此詩必此時作也若古今詩話以謂綯有韋平之拜浸疎商隠其言殊無所據余故以本傳證之但綯父名楚商隠又受知於楚詩中有楚客之語題於㕔事更不避其家諱何耶東坡九日云聞道郎君閉東閤且容老子上南樓又云南屏老宿閒相過東閤郎君懶重尋皆用商隠詩也漁隠殺風景義山雜纂品目數十葢以文滑稽者其一曰殺風景謂清泉濯足花上曬褌背山起樓燒琴煑鶴對花啜茶松下唱道晏元獻慶歴中罷相守頴以惠山泉烹日注從客置酒賦詩曰稽山新茗綠如烟静挈都藍煑惠泉未向人間殺風景更持醪醑醉花前王荆公元豐末居金陵蔣大漕之竒夜謁公於蔣山騶唱甚都公取松下喝道語作詩戱之云扶衰南陌望長楸燈火如星滿地流但怪傳呼殺風景豈知襌客夜相投自此殺風景之語頗著於世西清詩話唐人以對花啜茶謂之殺風景故荆公寄茶與平甫詩有金谷看花莫謾煎之句三山老人語録斫桂樹義山詩莫羡仙家有上真仙家暫謫亦千春月中桂樹髙多少試問西河斫桂人按酉陽雜爼云舊傳月中有桂有蟾蜍故異書言月桂髙五百丈下有一人常斫之樹創隨合人姓呉名剛西河人學道有過謫令伐樹故宋子京嘲月詩亦曰呉生斫鈍西河斧無柰婆娑又滿輪緗素雜記嘗論呉生斫樹事引李賀箜篌引云呉質不眠倚桂樹李賀謂之呉質叚成式謂之呉剛未詳其義竊意箜篌引所謂呉質非呉剛也恐别是一事魏有呉季重亦名質藝苑雌黄詞意深妙余知制誥日與余恕同考試恕曰夙昔師範徐騎省為文騎省有徐孺子亭記其警句云平湖千畆凝碧乎其下西山萬疊倒影乎其中它皆常語近得舍人所作涵虛閣記終篇皆竒語自渡江以來未嘗見此信一代之䧺文也其相推如此因出義山詩共讀酷愛一絶云珠箔輕明拂玉墀披香新殿鬭腰肢不須看盡魚龍戱終遣君王怒偃師擊節稱嘆曰古人措辭寓意如此之深妙令人感慨不已苕溪漁隠曰東坡快哉亭詞云一千頃都鏡净倒碧峯用徐騎省語意也談苑髙情逺意文章貴衆中傑出如同賦一事工拙尤易見余行蜀道過籌筆驛如石曼卿詩云意中流水逺愁外舊山青膾炙天下久矣然有山水處便可用不必籌筆驛也殷潛之與小杜詩甚健麗亦無髙意惟義山詩云魚鳥猶疑畏簡書風雲長為䕶儲胥簡書葢軍中法令約束言號令嚴明雖千百年之後魚鳥猶畏之也儲胥葢軍中藩籬言忠義貫神明風雲猶為䕶其壁壘也誦此兩句使人凛然復見孔明風烈至於管樂有才真不忝闗張無命欲何如屬對親切又自有議論他人亦不及也馬嵬驛唐詩尤多如劉夢得綠野扶風道一篇人頗誦之其淺近乃兒童所能義山云海外徒聞更九州他生未卜此生休語既親切髙雅故不用愁怨墮淚等字而聞者為之深悲空聞虎旅鳴宵柝無復鷄人報曉籌如親扈明皇寫出當時物色意味也此日六軍同駐馬他時七夕笑牽牛益竒義山詩世人但稱其巧麗至與温庭筠齊名葢俗學祗見其皮膚其髙情逺意皆不識也詩眼淺近李義山詩楊大年諸公皆深喜之然淺近者亦多如華清宫詩云華清恩幸古無倫猶恐蛾眉不勝人未免被他褒女笑只教天子暫蒙塵用事失體在當時非所宜言也豈若崔魯華清宫詩云障掩金鷄蓄禍機翠華西拂蜀雲飛珠簾一閉朝元閣不見人歸見燕歸又云草遮回磴絶鳴鸞雲樹深深碧殿寒明月自來還自去更無人倚玉闌干語意既精深用事亦隠而顯也義山又有馬嵬詩云如何四紀為天子不及盧家有莫愁渾河中詩云咸陽原上英雄骨半是君家養馬來如此等詩庸非淺近乎漁隠王建摭實歐陽永叔歸田錄言王建宫詞多言唐宫中事羣書闕紀者往往見其詩如内中數日無宣喚傳得滕王蛺蝶圖滕王元嬰髙祖子史不著所能獨名畫記言善畫亦不云工蛺蝶所書止此殊不知名畫記自紀嗣滕王湛然善花鳥蜂蝶又叚成式酉陽雜爼亦云嘗見滕王蝶圖有名江夏班大海眼小海眼菜花子葢湛然非元嬰孰謂張彦逺不載耶又建宫詞云魚藻宫中鎖翠娥先皇行處不曽過如今池底休鋪錦菱角鷄頭積漸多事見李石開成承詔録文宗論徳宗奢靡云聞得禁中老宫人毎引流泉先於池底鋪錦則知建詩皆摭實非鑿空語也西清詩話宫詞王建宫詞荆公獨愛其樹頭樹底覔殘紅一片西飛一片東自是桃花貪結子錯教人恨五更風陳輔之詩話花蘂夫人詩尤工王建宫詞云御厨不食索時新毎見花開即苦春白日卧多嬌似病隔簾教喚女醫人花蘂夫人宫詞云厨船進食簇時新侍宴無非列近臣日午殿頭宣索膾隔花催喚打魚人二詞紀事雖異造語頗同第花蘂之詞工建為不及也漁隠宫詞雜它人詩余閱王建宫詞選其佳者亦自少得只世所膾炙者數詞而巳其間雜以他人之詞如閒吹玉殿昭華管醉折梨園縹蒂花十年一夢歸人世綘縷猶封繫臂紗銀燭秋光冷畫屏輕羅小扇撲流螢天堦夜色凉如水卧看牽牛織女星此並杜牧之也淚滿羅巾夢不成夜深前殿按歌聲紅顔未老恩先斷斜倚薫籠坐到明此白樂天也寳仗平明金殿開暫將紈扇共徘徊玉顔不及寒鴉色猶帶昭陽日影來此王昌齡也建詞凡百有四篇又逸詞九篇或云元微之亦有詞雜於其間余以元氏長慶集撿尋却無之或者之言誤矣漁隠舊䟦王建太和中為陜州司馬與韓愈張籍同時而藉相友善工為樂府歌行思逺格幽初為渭南尉與宦者王守澄有宗人之分因過飲以相譏戱守澄深憾曰吾弟所作宫詞禁掖深邃何以知之將奏劾建因以詩解之曰先朝行坐鎮相隨今日春宫見長時脫下御衣偏得著進來龍馬毎教騎嘗承密㫖還家少獨奏邊情出殿遲不是當家頻向說九重争遣外人知事遂寢宫詞凡百絶天下傳播傚此體者雖有數家而建為之祖草唐王建宫詞舊䟦山居詩王建云閉門留野鹿分食與山鷄魏野云洗硯魚吞墨烹茶鶴避烟二人之詩巧欲摹寫山居之趣第理有當否如建所言二物何馴狎如此理必無之如野所言雖未必皆然理或有之至若少陵云得食堦除鳥雀馴東坡云為䑕長留飯憐蛾不㸃燈皆當於理人無得以議之矣漁隠望夫石詩陳無已詩話云望夫石在處有之古今詩話惟用一律惟劉夢得云望來况是幾千嵗只似當年初望時語雖拙而意工黄叔逹魯直之弟也以顧况為第一云山頭日日風和雨行人歸來石應語語意皆工江南望夫石毎過其下不風即雨疑况得句處也余家有王建集載望夫石詩乃知非况作其全章云望夫處江悠悠化為石不回頭山頭日日風復雨行人歸來石應語豈無已叔達偶忘之耶苕溪漁隠曰荆公選唐百家詩亦以此詩列建詩中則無已叔達之誤可無疑矣復齋謾録杜牧之二十八字史論牧之題桃花夫人廟詩細腰宫裏露桃新脉脉無言度幾春至竟息亡成縁事可憐金谷墜樓人僕嘗謂此詩為二十八字史論許彦周詩話好異牧之於題詠好異於人如赤壁云東風不與周郎便銅雀春深鎖二喬題商山四皓廟云南軍不袒左邊袖四老安劉是滅劉皆反說其事至題烏江亭則好異而畔於理詩云勝敗兵家事不期包羞忍恥是男兒江東子弟多才俊巻土重來未可知項氏以八千人渡江敗亡之餘無一還者其失人心為甚誰肯復附之其不能巻土重來决矣漁隠絶句牧之云無媒逕路草蕭蕭自古雲林逺市朝公道世間惟白髪貴人頭上不曽饒羅鄴云芳草和烟暖更青閒門要路一時生年年㸃撿人間事惟有春風不世情余嘗以此二詩作一聫云白髪惟公道春風不世情葢窮人不偶遣興之作也漁隠遣懐詩遣懐詩落魄江湖載酒行楚腰纎細掌中輕十年一覺楊州夢占得青樓薄倖名余嘗疑此詩必有謂焉因閲芝田錄云牛竒章帥維揚牧之在幕中多微服逸遊公聞之以街子數軰潛隨牧之以防不虞後牧之以拾遺召臨别公以縱逸為戒牧之始猶諱之公命取一篋皆是街子軰報貼云杜書記平善乃大感服方知牧之此詩言當日逸遊之事耳漁隠小杜華清宮詩雨露偏金穴乾坤入醉鄉如此天下焉得不亂許彦周詩話陵陽論赤壁詩杜牧之赤壁詩云折㦸沉沙鐵未消細磨蒼蘚認前朝東風不與周郎便銅雀春深鎖二喬今人多不曉卒章其意謂若是東風不與便即周郎不能破曹公二喬歸魏銅雀臺也僕嘗叩公更嘗有人如此立意下語否公曰正楚辭所謂太公不遇文王兮身至死而不得逞乃嚴助所作哀時命室中語命意之失牧之作赤壁詩謂赤壁不能縱火即為曹公奪二喬置之銅雀臺上也孫氏霸業繫此一戰社稷存亡生靈塗炭都不問只恐捉了二喬可見措大不識好惡許彦周詩話呉興張水戱太和末杜牧自侍御史出佐沈傳師宣城幕雅聞湖州為浙西名部風物妍好且多麗色往遊之時刺史崔君亦牧之素所厚者頗喻其意凡籍之名妓悉為致之牧殊不愜所望史君復候其意牧曰願得張水戱使州人畢觀俟其雲合牧當閒行寓目冀此際忽有閱焉史君大喜如其言至日兩岸觀者如堵迨暮竟無所得將罷忽有里姥引髽髻女年十餘嵗牧熟視之曰此真國色也因使語其姥將致舟中姥女皆懼牧曰且不即納當為後期吾十年必為此郡若不來乃從所適因以重幣結之尋拜黄池二州皆非意也洎周墀入相牧以其素善乃併上牋干墀乞守湖州大中三年移授湖州刺史比至郡則十四年所約之姝巳從人三載而生二子焉牧即政之夕亟使召之夫母懼其見奪也因携㓜以詣之牧詰其母曰曩既許我矣何為適人母拜曰向約十年不來而後嫁嫁已三年矣牧俛首曰詞也直强而不祥乃禮而遣之因為悵别詩曰自恨尋芳到已遲往年曽見未開時如今風擺花狼藉緑葉成隂子滿枝苕溪漁隠曰顔魯公題謝公塘碑隂云太保謝公東晉咸和中以呉興山水清逺求典此郡故東坡將之湖州戱贈莘老詩云亦知謝公到郡久應怪杜牧尋春遲鬢絲只好對襌榻湖亭不用張水嬉麗情集分司洛陽牧之為御史分司洛陽時李司徒罷鎮閒居聲妓為當時第一一日開筵朝士争赴以杜嘗持憲不敢邀飲杜諷坐客達意願預斯㑹李馳書杜聞命遽來㑹中女妓百餘皆絶色殊藝杜獨坐南行瞪目注視滿引三巵問李曰聞有紫雲者孰是李指示之杜凝睇良久曰名不虛得宜以見惠李俯首而笑諸妓亦皆回首破顔杜又自引三爵朗吟而起曰華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時回意氣閑逸傍若無人古今詩話杜荀鶴惟在一聨中杜荀鶴詩鄙俚近俗惟宫詞為唐第一云早被嬋娟誤欲粧臨鏡慵承恩不在貌教妾若為容風暖鳥聲碎日髙花影重年年越溪女相憶採芙蓉故諺云杜詩三百首惟在一聨中風暖鳥聲碎日髙花影重是也幕府燕閒録山谷甞云杜荀鶴詩舉世盡從愁裏老正好對退之詩誰人肯向死前休髙齋詩話韓致元不忘君山谷嘗謂余言老杜雖在流落顛沛中未嘗一日不在本朝故善陳時事句律精深超古作者忠義之氣激發而然韓偓貶逐後依王審知其集中所載手風慵展八行書眼暗休看九局圖牕裏日光飛野馬案頭筠管長蒲盧謀身拙為安蛇足報國危曽捋虎鬚滿世可能無黙識未知誰擬試齊竽其詞凄楚切而不廹不忘其君也潘子真詩話看天憶帝都致元昭宗時以翰林承㫖謫嶺表道湖南謝人惠含桃詩云金鑾嵗嵗長宣賜忍涙看天憶帝都自注云毎嵗初進之後先宣賜學士韓子蒼謝人惠茶云白髪前朝舊史官風爐煑茗暮江寒蒼龍不復從天下拭涙看君小鳳團自注云史官月賜龍團意雖本致元而語益工復齋漫録絶句致元醉著絶句云萬里清江萬里天一村桑柘一村烟漁翁醉著無人喚過午醒來雪滿船杜荀鶴亦有溪興絶句云山雨溪風巻釣絲瓦甌篷底獨斟時醉來睡著無人喚流下前溪也不知語句俱弱不若致元之雅健也漁隠香奩集髙秀實言元微之詩艶麗而有骨韓偓香奩集麗而無骨李端叔意喜韓偓詩誦其序云咀五色之靈芝香生九竅咽三危之瑞露美動七情秀實云勸不得也勸不得也許彦周詩話晚唐詩小巧無風騷氣味晚唐人詩多小巧無風騷氣味如崔魯山鵲詩云一林寒雨吹巢冷半朶山花咽觜香張林池上云菱葉半翻人採後荇花初沒舸行時蓮花云何人解把無塵袖盛取清香盡日憐皆浮艶無足尚而昔人愛重稱為佳作詩史陵陽論晚唐詩格卑淺唐末人詩雖格致卑淺然謂其非詩則不可今人作詩雖句語軒昂但可逺聽其理略不可究室中語誠齋論晚唐詩唐末詩人李推官咸用有振沙集如見後却無語别來長獨愁如危城三面水古樹一邊春如月明千嶠雪灘急五更風如燭殘偏有熖雪甚却無聲如春雨有五色灑來花旋成如雲蔵山色晴偏媚風約溪聲静又回如未醉已知醒後憶欲開先為落時愁葢征人凄苦之情讀之使人發融冶之驩於荒寒無聊之中動慘戚之感於笑談方懌之初然則謂唐人自李杜之後有不能詩之士者是曹丕火浣之論也謂詩至晚唐有不工之作者是栢靈寳哀棃之論也文集誠齋論晚唐詩有三百篇之遺味誠齋序順庵劉良佐詩藁云夫詩何為者也曰尚其詞而已矣曰善詩者去詞然則尚其意而已矣曰善詩者去意然則去詞去意則詩安在乎曰去詞去意而詩有在矣然則詩果焉在曰嘗食夫飴與荼乎人孰不飴之嗜也初而甘卒而酸至於荼也人病其苦也然苦未既而不勝其甘詩亦如是而已矣昔者暴公譛蘇公而蘇公刺之今求其詩無刺之之詞亦不見刺之之意也乃曰二人從行誰為此禍使暴公聞之未嘗指我也然非我其誰哉外不敢怒而其中愧死矣三百篇之後此味絶矣惟晚唐諸子差近之寄邊衣云寄到玉闗應萬里戍人猶在玉闗西弔戰塲云可憐無定河邊骨猶是春閨夢裏人折楊栁云羌笛何須怨楊栁春風不度玉門闗三百篇之遺味黯然猶存近世惟半山老人得之予不足以知之予敢言之哉云云先生此序深造作詩宗㫖故錄之詩人玉屑巻十六
