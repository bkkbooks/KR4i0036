body:
  text: 詩人玉屑卷四宋魏慶之撰風騷句法五言萬象入壺上接下下連上野曠天低樹江清月近人石梁髙㵼月樵路細侵雲重輪倒影上下接連落日下平楚孤煙生洞庭波光搖海月星影入城樓新月驚鼇上接下金波麗鳷鵲玉繩低建章曉雲僧衲潤殘月客帆眀衣衮乘龍下連上卷幔來風逺移床得月多水㴠天影濶山拔地形髙真人御風髙步清虛白露眀河影清風淡月華露彩方泛灔月華始徘徊常娥奔月脫棄塵凡看竹雲垂地尋僧雪滿船鑿池寒月入掃地白雲生公眀布卦推究物情馬倦時銜草人疲數望城犬迎曽宿客鴉護落巢兒東方占鵲精窮物理芹泥隨燕嘴花粉上蜂鬚魚爛緣吞餌蛾燋為撲燈陶壁飛梭雷電交馳江聲秋入寺雨氣夜侵樓雪埋寒樹短雲壓夜城低碧海求珠採托故實舜耕餘草木禹鑿舊山川卿月升金掌王春度玉墀華林擷芳搜捕事迹山藏伯禹穴城壓伍胥濤鷗眠陶令醉鶴唳屈原醒閒雲惹碧人逐景石縫銜枯草查根漬古苔林迸穿籬筍藤飄落水花遊絲拖翠景逐人石角鈎衣破藤枝刺眼新步壑風吹面看松露滴身怪石籠雲物對景春波何恨緑白鳥自由飛夕寒山翠重秋靜雁行髙晚山銜日景對物寒禽栖古栁破月入微雲曉來山鳥閙雨過杏花稀風轉斷蓬寄迹髙鳥黃雲暮寒蟬碧樹秋十暑岷山葛三霜楚户砧鱗處涸轍窮命萬事已黃髮殘生隨白鷗不㸑井晨凍無衣床夜寒龍吟虎嘯飛動野雲低度水簷雨細隨風亂雲低薄暮急雪舞回風鶴盤鳯翥變動林花掃更落徑草踏還生泉聲到池盡山色上樓多枕石潄流抱道貌將松共瘦心與竹俱空雨中耕白水雲外斸青山拂塵破暗修行觸風香損印霑雨磬生衣瓶殘秦地水錫入晋山雲月浸梨梢眀白蘿月掛眀鏡松風鳴夜絃小蓮娃欲語幽筍稚相擕泉飛雲竇清爽露館濤驚枕空庭月伴琴雪殘僧掃石風動鶴歸松獨鳥投林幽居門靜眠山鹿階閒立水禽秋草閒三徑寒塘獨一家孤鴻出塞旅情客愁連蟋蟀亭古帶蒹葭鳥聲非故國春色是他山曉粧呵鏡晦眀水暗蒹葭霧月眀楊栁風緑水明秋日青山隔暮雲夜筵滅燭池光不受月野氣欲沉山雪深迷郢路雲暗失陽臺文豹隱霧安時尋泉上山逺看笋出林遲紙窗眀覺曉布被暖知春靈龜曵尾守分風落收松子天寒割蜜房草閣平春水柴門掩夕陽絶壁垂藤攀仰鳥道挂踈雨人家殘夕陽逺水靜林色微雲生夕陽佩印還鄉喜恱罷扇風生竹移床月過庭乘舟泊山寺著履過漁家江南芳信春栁色煙中逺鶯聲雨後新風輕粉蝶喜花暖蜜蜂喧河朔劇飲夏乳燕並頭語紅葵相對開清風醒病骨快雨破煩心宋玉生悲秋晚花惟有菊寒葉已無蟬氣爽衣裳健風踈砧杵鳴袁安髙卧冬凍瓶粘住礎宿火熖爐灰凍泉依細石晴雪落長松啓眀戒旦早林殘數枝月髮冷一梳風路眀殘月在山靜宿雲收長庚告昏晚踈鐘吟落照歸路指平蕪牛羊歸徑險鳥雀聚枝深蜀錦舒空晝風暖鳥聲碎日髙花影重窺魚光照鶴洗鉢影搖僧承露擎虛夜露竹偷燈影煙松護月眀微雲淡河漢踈雨滴梧桐珠樹敲風風慢隨雲葉動髙逐桂枝生幽澗迷松韻閒窗動竹聲寶髻簮花花紫蠟粘為帶紅酥㸃作蕤落時猶自舞掃後更聞香寒梅欺雪雪宿浦人迷徑歸林鳥失巢客帆迷古渡蕃帳隱平沙澄江浸月月影開金鏡滿輪抱玉壺清流處水花急吐時雲葉鮮一氣飛灰青門㺯煙栁紫閣舞雲松白髮千莖雪丹心一寸灰二劒凌空池緑苔猶少林黃栁尚踈拔青松直上鋪碧水平流三星共色晚果紅低樹秋苔緑遍牆古壇青草合往事白雲空四瑞效靈鴨頭新緑水鴈齒小紅橋栁庭垂緑穗蓮浦落紅衣五色捧筆石苔縈棹緑山果拂舟紅浪花吹更白嵐色染還青麟角表瑞虎嘯夜林動鼉鳴秋澗寒燕靜銜泥處蜂喧抱蘂回老蚌含珠宫鶯嬌欲醉簷燕語還飛隨風收野蜜尋麝採生香荆山鑄鼎破海鯨波息登山豹霧開柱穿蜂溜蜜棧缺燕添巢商嶺採芝小池兼鶴靜古木帶蟬秋將軍分虎竹戰士卧龍沙連珠散彩醉上山翁馬寒歌寧戚牛寒草煙藏虎髙松月照鵬衆星環極繼體守文北斗承三獻南風入五絃冕旒當翠殿幢㦸滿彤庭彗氣橫天除舊布新業定商周鼎功包天地爐風塵三尺劒社稷一戎衣芟除荆棘禁暴箭飛瓊羽合旗動火雲張鼎魚猶假息穴蟻欲何逃蕩滌烟塵禦戎落日黃雲動隂風白草翻邊月隨弓影胡霜拂劒花王民鼓腹謳歌湛露浮堯酒薰風起舜歌漢典方寬律周官正採詩白鶴棲松髙尚石壁藤為路山窗雲作扉水痕侵岸栁山翠借厨煙𤣥蟬飲露清潔白石磨樵斧青竿理釣絲籬下黃花菊邱中白雪琴鷦鷯巢林隨分酒熟憑花勸詩成倩鳥吟無竹栽蘆看思山疊石為精衛填海辛苦藻密行舟澀灣多轉楫頻棧懸斜閉石橋斷却尋溪雷公拭劒晶熒木落寒郊逈煙開疊嶂眀沙眀連浦月帆白滿船霜蓮女遺簪棄置寶劒依塵席隂符寄藥囊雨拖金鎖甲苔卧緑沉槍眀鑑張空追感古殿吳花草深宫晋綺羅行人問宫殿耕者得珠璣竹敲寒夢悽愴寶筝橫塞雁怨笛落江梅風葉亂辭木雪猿清呌山火浣重燒始終皂鵰寒始急天馬老能行落日心猶壯秋風病欲蘇隴水分流向背巢許山林志䕫龍廊廟珍白日依山盡黃河入海流揮毫染素入畫鷺巢橫卧栁猿飲倒垂藤千峰隨雨暗一徑入雲斜炫紫奪朱逼真拂黛月生指理鬟雲滿梳雙眸剪秋水十指剝春葱麋鹿相親山林亂藤遮石壁絶澗護雲林籬落生孫竹門庭上女蘿梟鸞同處憎愛惜花愁夜雨病酒怨春鶯惜蜂收蜜少嫌蠧曝書頻洞庭搖櫓雙句有聲霜猿啼曉夢巖鳥和秋吟秋風吹渭水落葉滿長安蟾輪輾空雙句無聲孤舟依岸靜獨鳥向人閒流年川暗度往事月空眀天仙搖珮上句有聲興䦨啼鳥喚坐久落花多山虛風落石樓靜月侵門阿香挽車下句有聲音書秋鴈斷機杼夜蛩催澄潭寫度鳥空嶺應鳴猿鶯囀喬林先聞後見海風吹不斷江月照還空林晚鳥爭樹園春蝶護花鴈陳驚寒先見後聞塔影挂青漢鐘聲和白雲晴虹橋影出秋雁櫓聲來金鱗躍浪雙句俱動浴鳬含藻戲驚鷺帶魚飛鏡好鸞空舞簾踈燕誤飛秋水㴠虛雙句俱靜竹裏柴扉掩庭前鳥雀行蕭散煙霞晚凄清天地秋香斷金猊先動後靜笙歌歸院落燈火下樓臺衆鳥髙飛盡孤雲獨去閒髙僧出定先靜後動野花寒更發山月瞑還來秋盡蟲聲急夜深山雨重竹影掃塵動中有靜聽錫樵停斧窺禪鳥立槎雲穿搗藥屋雪壓釣魚船潭底遊犀靜中有動古木花猶發荒臺雨尚懸庭閒花自落門閉水空流飛鳥度池動中有靜靜中有動日出衆鳥散山瞑孤猿吟風轉雲頭斂煙消水面開齊學楚語借聲關河一棲旅楊栁十東風卷簾黃葉下鎖印子規啼句欲得健壯節初題柱生涯獨轉蓬獨鶴歸何晚昏鴉已滿枝字欲得清月生初學扇雲細不成衣粉牆猶竹色虛閣自松聲意欲得圓霄漢愁髙鳥泥沙困老龍草枯鷹眼疾雪盡馬蹄輕格欲得髙花枝臨太液燕語入披香無瑕勝玉美至潔過氷清聲律為竅别來頭併白相見眼終青花濃春寺靜竹細野池幽物象為骨雷霆驅號令星斗煥文章露濃金掌重天近玉繩低意格為髓勳業頻看鏡行藏獨倚樓感時花濺淚恨别鳥驚心諧㑹五音清便宛轉宫商迭奏金石相宣謂之聲律摹寫景象巧奪天真探索幽微妙與神㑹謂之物象茍無意與格以主之才雖華藻辭雖雄贍皆無取也要在意圎格髙纎穠俱備句老而字不俗理深而意不雜才縱而氣不怒言簡而事不晦如此之作方入風騷七言百川歸海朝㑹九天閶闔開宫殿萬國衣冠拜冕旒香飄合殿春風轉花覆千官淑景移雙龍輔日掖庭清洛曉光鋪碧簟上陽霜葉剪紅綃金爐香動螭頭暗玉佩聲來雉尾髙鴛鷺成行侍從鰲頭忽憶黃金闕鳯背還吹碧玉簫毫端蕙露滋仙草琴上薰風入禁松錦繡相鮮富貴簾箔垂珠光不夜林花剪綵景長新紅珠斗帳櫻桃熟金尾屏風孔雀開鵬翼摩天雄健陳兵劒閣山將動飲馬珠江水不流汴水波濤喧鼓角隋堤楊栁拂旌旗鶚翥秋碧遒徑擘開華嶽連天色放出黃河到海聲插天螮蝀玉腰闊跨海鯨鯢金背髙般輸運斤精巧樽當霞綺輕初散棹拂荷珠碎却圎林花著雨胭脂落水荇牽風翠帶長逸少揮毫物象魚吹細浪搖歌扇燕蹴飛花落舞筵樹頭蜂抱花鬚落池面魚吹栁絮行洛神凌波映帶煙開翠扇清風曉水泛紅衣白露秋靈胥引水清穿市神禹分山翠入簾文君織錦富艷觸散栁絲回玉勒約開蓮葉上蘭舟絲飄弱栁平橋晚雪㸃寒梅小院春文虹垂天精彩細水浮花歸别澗斷雲含雨入孤村江月轉空為白晝嶺雲分瞑與黃昏紫電掃巖炫轉春入水光成嫩碧日勻花色變鮮紅殘日花間浮暖艷斷雲樓外卷輕隂玉壺含氷洞徹千里好山雲乍斂一樓眀月雨初晴野色更無山隔斷天光直與水相通古鏡重磨晦眀饑鳯羽毛寒不鎩卧龍頭角老方髙驥雖老去壯心在鶴縱病來仙骨清遼鶴思歸感懷殊方日落𤣥猿哭舊國霜前白雁來踈燈自照孤帆宿新月猶懸雙杵鳴晴鷗㸃岸閒靜掛冠傲吏垂綸坐絶粒髙僧擁衲眠老鶴巢邊松最古毒龍濳處水偏清碔玞象玉比並草螢有耀終非火荷露雖圓豈是珠滿砌荆花鋪紫毯隔牆榆莢撒青錢玉葉飄空變態黃蜂衙退海潮上白蟻戰酣山雨來鶯驚鳯輦穿花去魚畏龍顔上釣遲篆香裊碧著莫流水帶花穿巷陌夕陽和樹入簾櫳拂石坐來衫䄂冷踏花歸去馬蹄香芳洲拾翠引用杯酒英雄君與操文章微婉我知邱詩成白也知無敵花落虞兮可奈何行雲度月隱見嘉樹倚樓青瑣暗晚雲藏雨碧山寒風吹藥蔓迷樵徑水暗蘆花失釣船貧女理粧隨分好鳥迎春歌後院飛花送酒舞前簷飛來白鷺即佳客相對好花如美人晚霞成綺相似蜃散雲收破樓閣虹殘水照斷橋梁魚下碧潭當鏡躍鳥還青嶂拂屏飛晴雲駐彩容色睡融春日揉金縷狂發秋霞顫翠翹皓齒乍分寒玉細黛眉輕蹙逺山微唾成珠玉辭藻翰林風月三千首吏部文章二百年詩篇落處風雲動筆力停時造化間妙入丹青模寫水隔淡煙踈栁寺路經微雨落花村雲藏島外啼猿樹竹鎖橋邊賣酒家穩步康莊平易睫在眼前長不見道非身外更何求無可奈何花落去似曽相識燕歸來長嘯雲煙髙致青山有雪諳松性碧落無雲稱鶴心共閒作伴無如鶴與老相隨秖有琴霞襯赤城神仙來時一見蟠桃熟别後三驚碧海乾六甲風雷藏寶籙一壺天地雜靈砂雲集金田禪律秋水靜於僧眼碧晚山濃似佛頭青瓶添澗水盛將月衲挂松枝惹得雲藕折輕絲飄蕩閒聽鶯語移時立思逐楊花觸處飛紅粉尚留香羃羃碧雲初斷信沉沉梅損瓠犀情味花邊馬嚼金銜去樓上人垂玉筯看窗殘花月人何處簾捲春風燕復來女夷鼓歌春景栁絲裊裊風繅出草縷茸茸雨剪齊梅無驛使飄零盡草怨王孫取次生祝融御轡夏景園林換葉梅初熟池館無人燕學飛緑香尉齒氷盤果清冷侵肌水殿風蓐收執矩秋景林間暖酒燒紅葉石上題詩掃緑苔風荷老葉蕭踈緑水蓼殘花寂寞紅元冥乘坎冬景雨被北風吹作雪水愁東海亦成氷氷堅九曲河聲斷雪擁千峯嶽色低碧落吹蕭上句有聲風引漏聲來枕上月移花影到窗前睡輕可忍風敲竹飲散那堪月在花清江鼓瑟下句有聲蒼苔路熟僧歸寺紅葉聲乾鹿在林一溪晚緑浮鸂䳵萬樹春紅呌杜鵑散耀垂文雙句可觀千竿碧立依林竹一㸃黃飛透樹鶯粉蝶圍飛花轉影彩鴛雙泳水生文鏗金戞玉雙句有聞羌管一聲何處曲流鶯百囀最髙枝深秋簾幕千家雨落日樓臺一笛風歸雲入洞先動後靜野蒿自發空臨水江燕初歸不見人緑竹挂衣凉處歇清風展簞困時眠蟄蟲應雷先靜後動放魚池涸蛙爭聚栖燕梁空雀自喧簾箔可垂嫌隔燕釣竿慵把恐驚魚緑樹吟鶯景對物巢燕養雛渾去盡江花結子已無多樂意相關禽對語生香不斷樹交花彩禽入鑑物對景映階碧草自春色隔葉黃鸝空好音寺隔江聲秋月上樓依野色夕禽邊龍吟雲起比附對夜棲少共雞爭樹曉浴先饒鳯占池鶴若非琥珀休為枕不是琉璃莫作屏簞虎嘯風生比類對初分隆凖山河秀乍㸃重瞳日月眀畫翼薄乍舒宫女鬢蛻輕全解羽人尸蟬蘭艾同畦愛憎對蛇蝎性靈生便毒蕙蘭根異死猶香風却有情偏動竹雨渾無賴不饒花鳥獸先知巢穴對湘潭雲盡暮山出巴蜀雪消春水來雷霆入地建溪險星斗逼人梨嶺髙葛藤相連疊韻對解凍池塘風淅瀝迎秋郊野月嬋娟鸂䳵刷毛花蕩漾鷺鷥拳足雪離披鄧艾稱名疊語對雲頭灔灔開金餅水靣沉沉卧彩虹青春背我堂堂去白髮欺人故故生詩人玉屑卷四
