body:
  text: 詩人玉屑卷十七宋魏慶之撰西昆體宗李義山楊大年錢文僖晏元獻劉子儀為詩皆宗李義山號西崑體後進效之多竊取義山詩句嘗內宴優人有為義山者衣服敗裂告人曰吾為諸館職撏扯至此聞者大噱然大年詠漢武詩云力通青海求龍種死諱文成食馬肝待詔先生齒編貝忍令乞米向長安義山不能過也古今詩話佳句楊億劉筠作詩務故實而語意輕淺一時慕之號西崑體識者病之歐公云劉子儀詩句有雨勢宮城濶秋聲禁樹多亦不可誣也隱居詩話歐公矯崑體歐公詩始矯崑體專以氣格為主故其詩多平易疏暢律詩意所到處雖語有不倫亦復不問而學之者往往遂失於快直傾囷倒廪無復餘地然公詩好處豈專在此如崇徽公主手痕詩玉顔自昔為身纍肉食何人與國謀此是兩假大議論抑揚曲折發見於七字之中婉麗雄勝字字不失相對雖崑體之工者亦未易比言所會處如是乃為至到石林詩話荆公晚年喜稱義山王荆公晚年亦喜稱義山詩以為唐人知學老杜而得其藩籬惟義山一人而已每誦其雪嶺未歸天外使松州猶駐殿前軍永憶江湖歸白髮欲回天地入扁舟與池光不受月暮氣欲沉山江海三年客乾坤百戰場之類雖老杜亡以過也義山詩合處信有過人若其用事深僻語工而意不及自是其短世人反以為竒而效之故崑體之弊適重其失義山本不至是云蔡寬夫詩話詩到義山謂之文章一厄以其用事僻澀時稱西崑體然荆公晚年亦或喜之而字字有根蒂如試問火城將䇿探何如雲屋聽窗知未愛京師傳谷口但知鄉里勝壺頭其用事琢句前輩無相犯者冷齋夜話溫公稱其佳句自西崑集出時人爭效之詩體一變而先生老輩患其多用故事語僻難曉殊不知自是學者之弊如楊大年新蟬云風來玉宇烏先覺露下金莖鶴未知雖用故事何害為佳句又如峭帆橫渡官橋栁疊鼓驚飛海岸鷗其不用故事又豈不佳乎蓋其雄文博學筆力有餘無施不可非前世號詩人者區區於風雪草木之類為許洞所困也歸田録六一居士六一之義居士初謫滁山自號醉翁既老而衰且病將退休於頴水之上則又更號六一居士客有問曰六一何謂也居士曰吾家藏書一萬卷集録三代以來金石遺文一千卷有琴一張有碁一局而嘗置酒一壺客曰是為五一爾奈何居士曰以吾一翁老於此五物之間是豈不為六一乎客笑曰子欲逃名乎而屢易其號此莊生所謂畏影而走乎日中者也余將見子疾走大喘渴死而名不得逃也居士曰吾固知名之不可逃然亦知夫不必逃也吾為此名聊以志吾之樂爾六一居士傳歐公自負石林詩話云歐公一日被酒語其子棐曰吾詩廬山髙今人莫能為惟李太白能之明妃曲後篇太白不能為惟杜子美能之至於前章則子美亦不能為惟吾能之也近觀本朝名臣傳乃云歐陽某為詩謂人曰廬山髙惟韓愈可及琵琶前引韓愈不可及杜甫可及後引李白可及杜甫不可及其自負如此則與石林所紀全不同琵琶引即明妃曲也此三詩並録於此廬山髙贈同年劉凝之歸南康其詩云廬山髙哉幾千仞兮根盤幾百里嶻然屹立乎長江長江西來走其下是為揚瀾左蠡兮洪濤巨浪日夕相舂撞雲消風止水鏡淨泊舟發岸而逺望兮上摩雲霄之暗靄下壓后土之鴻厖試往造乎其間兮攀緣石磴窺空谾千巖萬壑響松檜懸崖巨石飛流淙水聲聒聒亂人語六月飛雪灑石矼仙翁釋子亦往往而逢兮吾嘗惡其學幻而言哤但見丹霞翠壁逺近映樓閣晨鐘暮鼓杳靄羅幡幢幽花野草不知其名兮風吹露濕香澗谷時有白鶴飛來雙幽尋逺去不可極便欲絶世遺紛痝羡君買田築室老其下插秧盈疇兮釀酒盈缸欲令浮嵐暖翠千萬狀坐卧常對乎軒窗君懷磊砢有至寶世俗不辨珉與玒䇿名為吏二十載青衫白首困一邦寵榮聲利不可以茍屈兮自非青雲白石有深趣其氣兀硉何由降丈夫壯節似君少嗟我欲説安得巨筆如長杠明妃曲和王介甫作其一云胡人以鞍馬為家射獵為俗泉甘草美無常處鳥驚獸駭爭馳逐誰將漢女嫁胡兒風沙無情面如玉身行不遇中國人馬上自作思歸曲推手為琵却手琶胡人共聽亦咨嗟玉顔流落死天涯琵琶却傳來漢家漢宮爭按新聲譜遺恨已深聲更苦纎纎女手生洞房學得琵琶不下堂不識黃雲出塞路豈知此聲能斷腸其二云漢宫有佳人天子初未識一朝隨漢使逺嫁單于國絶色天下無一失難再得雖能殺畫工於事竟何益耳目所及尚如此萬里安能制夷狄漢計誠已拙女色難自誇明妃去時淚灑向枝上花狂風日暮起飄泊落誰家紅顔勝人多薄命莫怨春風當自嗟余觀介甫明妃曲二首辭格超逸誠不下永叔不可遺也因附益之其一云明妃初出漢宫時淚濕春風鬢腳垂低回顧影無顔色尚得君王不自持歸來却怪丹青手入眼平生未曽有意態由來畫不成當時枉殺毛延夀一去心知更不歸可憐著盡漢宫衣寄聲欲問塞南事只有年年鴻鴈飛家人萬里傳消息好在氈城莫相憶君不見咫尺長門閉阿嬌人生失意無南北其二云明妃出嫁與胡兒氈車百兩皆胡姬含情欲語獨無處傳與琵琶心自知黃金捍撥春風手彈看飛鴻勸胡酒漢宫侍女暗垂淚沙上行人却回首漢恩自淺胡自深人生樂在相知心可憐青塜已蕪漫尚有哀絃餘至今漁隱只欲平易或疑六一居士詩以為未盡妙以質於子和子和曰六一詩只欲平易耳西風酒旗市細雨菊花天豈不佳晚煙寒橘柚秋色老梧桐豈不似少陵雪浪齋日記佳句歐公云身行南鴈不到處山與北人相對愁汪彥章云路行歸鴈不到處家在長江欲盡頭彥章雖體歐公詩然終不及歐之自在也漁隱會趙公詩文忠與趙康靖公槩同在政府相得歡甚康靖先告老歸睢陽文忠相繼謝事歸汝隂康靖一日單車特往過之時年幾八十矣留劇飲踰月日於汝隂縱遊而後返前輩挂冠後能從容自適未有若此者文忠嘗賦詩云古來交道愧難終此會今時豈易逢出處三朝俱白首凋零萬木見青松公能不逺來千里我病猶堪釂一鍾已勝山隂空興盡且留歸駕為從容因榜其遊從之地為會老堂明年文忠欲往睢陽報之未果行而薨兩公名節固師表天下而風流襟義又如此誠可以激薄俗也蔡寬夫詩話才髙不見牽強之迹歐公作詩蓋欲自出胸臆不肯蹈襲前人亦其才髙故不見牽強之迹耳如六月十四夜飛蓋橋玩月云天形積輕清水德本虛靜雲收風波止始見天水性澄光與粹容上下相涵映乃於其兩間皎皎挂寒鏡餘輝所照耀萬物皆鮮瑩矧夫人之靈豈不醒視聽而我於此時翛然發孤詠紛昏欣洗滌俯仰恣涵泳人心曠而間月色髙逾逈惟恐清夜闌時時瞻斗柄漁隱蘇子美以詩得名蘇子美以詩得名書亦飄逸然其詩以奔放豪健為主梅堯臣詩雖乏髙致而平淡有工世謂之蘇梅其實正相反也子美嘗自歎曰平生作詩被人比梅堯臣寫字比周越良可笑也周越書輕俗不近古無足取也隱居詩話絶句山谷愛子美絶句云春隂垂野草青青時有幽花一樹明晚泊孤舟古祠下滿川風雨看潮生山谷纍書此詩或真草與大字王直方詩話聖俞子美聖俞子美齊名於一時而二家詩體特異子美筆力豪俊以超邁橫絶為竒聖俞覃思精微以深逺間淡為意各極其長雖善論者不能優劣余谷夜行詩略道其一二云子美氣方雄萬竅號一噫有時肆顛狂醉墨灑滂霈譬如千里馬已發不可殺盈前盡珠璣一一難㨂汰梅公事清淺石齒潄寒瀨作詩三十年視猶我後輩文詞愈清新心意雖老大有如妖饒女老自有餘態近詩尤苦硬咀嚼苦難嘬又如食橄欖真味久愈在蘇豪以氣轉舉世徒驚駭梅窮獨我知古貨今難賣語雖非工謂粗得髣佛然不能優劣之歐公詩話梅都官工於平淡自成一家聖俞詩工於平淡自成一家如東溪云野鳬眠岸有間意老樹著花無醜枝山行云人家在何處雲外一聲雞春隂云鳩鳴桑葉吐材暗杏花殘杜鵑云月樹啼方急山房人未眠似此等句須細味之方見其用意也漁隱句句精鍊聖俞詩句句精鍊如焚香露蓮泣聞磬清鷗邁之類宜乎為歐陽文忠公所稱其他古體如朱絃疏越一唱三嘆讀者當以意求之許彥周詩話寄馬遵詩馬遵謫守宣州及其去也郡僚軍民爭欲駐留至以鐵鎖絶江遵於餞筵倚醉令官妓剝棐實而食眷眷若留連狀又以所乘驄馬寄聖俞家郡人皆不疑其去也遵夜使人絶鎖解舟以水沃櫓牙使之不鳴逮曉舟去逺矣聖俞寄遵詩云三更醉下陵陽峯仙舟江上去無蹤杈牙鐵鎖漫橫絶櫓濕不驚潭底龍斷腸吳姬指如笋欲剝玉棐將何從短翎水鴨飛不逺那經細雨山重重却顧舊埒病驄馬塵沙歷盡空龍鍾隱居詩話莫打鴨吕士隆知宣州好以事笞官妓妓皆欲逃去而未得也會杭州有一妓到宣其色藝可取士隆喜之留之使不去一日郡妓復犯小過士隆又欲笞之妓泣訴曰某不敢辭罪但恐杭妓不能安也士隆愍而捨之聖俞因作莫打鴨一篇曰莫打鴨打鴨驚鴛鴦鴛鴦新向池北落不比孤洲老秃鶬秃鶬尚欲逺飛去何况鴛鴦羽翼長蓋謂此也隱居詩話石曼卿晦庵論其詩石曼卿詩極有好處如仁者雖無敵王師固有征無私乃時雨不殺是天聲長篇舊見曼卿大書此詩氣象方嚴遒徑極可寶愛真顔筋栁骨今人喜蘇子美字不及此逺甚曼卿詩極雄豪而縝密方嚴如籌筆驛詩意中流水逺愁外舊山青又樂意相關禽對語生香不斷樹交花之句極佳惜不見其全集西湖處士疏影橫斜歐陽公極賞林和靖疏影橫斜水清淺暗香浮動月黃昏之句而和靖别有一聨云雪後園林才半樹水邊籬落忽橫枝似勝前句不知歐陽何緣棄此賞彼苕溪漁隱曰王直方又愛和靖池水倒窺疏影動屋簷斜入一枝低以謂此句於前所稱真可處伯仲之間余觀此句略無佳處直方何為喜之真所謂一解不如一解也山谷林和靖梅花詩疏影橫斜水清淺暗香浮動月黃昏誠為警絶然其下聫乃云霜禽欲下先偷眼粉蝶如知合斷魂則與上聫氣格全不相類若出兩人乃知詩全篇佳者誠難得唐人多摘句為圖蓋以此大抵和靖詩喜於對意如伶倫近日無侯白奴僕當時有衛青破殿靜披虀臼古齋房間試酪奴春之類雖假對亦不草草故氣格不無少貶然五言如夕寒山翠重秋靜鳥行疏長句如橋橫水木已秋色樹倚雲峯更晚晴煙含晚樹人家逺雨濕春蒲燕子低等何害為工夫太過蔡寬夫詩話和靖言余頃得宛陵葛生所茹筆每用之如麾百勝之師橫行於紙墨間所向無不如意惜其日久且弊作詩以録其功云神鋒雖缺力終存架琢珊瑚欠策勳日暮間窗何所似灞陵憔悴故將軍殊有憫勞念舊之意漁隱邵康節出處大略邵堯夫居洛四十年安貧樂道自云未嘗皺眉故詩云平生不作皺眉事天下應無切齒人所居寢息處為安樂窩自號為安樂先生其西為甕牖讀書燕居其下旦則焚香獨坐晡時飲酒三四甌微醺便止不使至醉也嘗有詩云斟有淺深存燮理飲無多少繫經綸莫道山翁拙於用也能康濟自家身喜吟詩作大字書然遇興則為之不牽強也大寒暑則不出每出則乘小車為詩以自詠曰花似錦時髙閣望草如茵處小車行溫公贈以詩曰林間髙閣望已久花外小車猶未來堯夫隨意所之遇主人喜客則留三五日又之一家一如之或經月忘返雖性髙潔而對賔客接人無賢不肖貴賤皆歡然相親自言若至重疾自不能支其有小疾有客對話不自覺疾之去體也學者從之問經義精深浩博應對不窮思致幽逺妙極道數間有知之深者開口論天下事雖久存心世務者不能及也朝廷嘗用大臣薦以官起之不屈及其死以著作佐郎告賜其家邦人請易其名於朝太常考行諡之曰康節復齋謾録康節之學其骨髓在皇極經世其花草便是詩文鑑編詩天向一中分造化人於心上起經綸却不編入晦庵半山老人一唱三嘆荆公暮年作小詩雅麗精絶脫去流俗每諷味之便覺沆瀣生牙頰間苕溪漁隱曰荆公小詩如南浦隨花去回舟路已迷暗香無覔處日落畫橋西染雲為栁葉剪水作梨花不是春風巧何緣見嵗華簷日隂隂轉床風細細吹翛然殘午夢何許一黃鸝蒲葉清淺水杏花和暖風地偏緣底緑人老為誰紅愛此江邊好留連至日斜眠分黃犢草坐占白鷗沙日淨山如染風暄草欲薰梅殘數點雪麥漲一川雲觀此數詩真可使人一唱而三嘆也山谷得子美句法荆公詩得子美句法其詩云地蟠三楚大天入五湖低唐子西語録託意半山老人題雙忠詩云北風吹樹急西日照窗涼細詳味之其託意深逺非止詠廟中景物而已蓋巡逺守睢陽當是時安慶緒遣突厥徑騎攻之日以危困所謂北風吹樹急也是時肅宗在靈武號令不行於江淮諸將觀望莫肯救之所謂西日照窗涼也此深得老杜句法如老杜題蜀相廟詩云映階碧草自春色隔葉黃鸝空好音亦自别託意在其中矣漁隱少作荆公少以意氣自許故詩語惟其所向不復更為涵蓄如天下蒼生待霖雨不知龍向此中蟠又濃緑萬枝紅一點動人春色不須多又平治險穢非無力潤澤焦枯是有才之類皆直道其胸中事後為羣牧判官從宋次道盡假唐人詩集博觀而約取晚年始盡深婉不迫之趣乃知文字雖工拙有定限然必視其幼壯雖公方其未至亦不能力強而遽至也石林詩話荆公題金陵此君亭詩云誰憐直節生來瘦自許髙才老更剛賔客每對公稱頌此句公輒顰蹙不樂晚年與平甫坐亭上視詩牌曰少時作此題榜一傳不可追改大抵少年題詩可以為戒平甫曰此楊子雲所以悔其少作也髙齋詩話晚年詩荆公晚年詩律尤精嚴造語用字間不容髮然意與言會言隨意遣渾然天成殆不見有牽率排比處如含風鴨緑鱗鱗起弄日鵝黃裊裊垂讀之初不覺有對偶至細數落花因坐久緩尋芳草得歸遲但見舒間容與之態耳而字字細考之皆經櫽括權衡者其用意亦深刻矣嘗與葉致逺諸人和頭字韻詩往返數四其末篇云名譽子真居谷口事功新息困壺頭以谷口對壺頭其精切如此後數月取本追改云豈愛京師傳谷口但傳鄉里勝壺頭今集中兩本並存石林詩話精深華妙荆公定林後詩精深華妙非少作之比嘗作嵗晚詩云月映林塘靜風涵笑語涼俯窺憐淨緑小立佇幽香携幼尋新的扶衰上野航延緣久未已嵗晚惜流光自以比謝靈運議者亦以為然漫叟詩話格髙體下魯直謂荆公之詩莫年方妙然格髙而體下如云似聞青秧底復作龜兆坼乃前人所未道又云扶輿度陽熖窈窕一川花謂包含數箇意雖前人亦未易道然學三謝失於巧耳後山詩話用意髙妙蔡天啓言荆公每稱老杜鈎簾宿鷺起丸藥流鶯囀之句以為用意髙妙五字之模楷他日公作詩得青山捫風坐黃鳥挾書眠自謂不減杜詩以為得意然不能舉全篇余頃嘗以語薛肇明肇明時被旨編公集遍求之終莫之得或云公但得此一聨未嘗成章也石林詩話力去陳言荆公詩云力去陳言誇末俗可憐無補費精神而公平生文體數變莫年詩益工用意益苦故言不可不謹也後山詩話善下字豫與鄉人翁行可同舟泝汴因談及詩行可云介甫善下字如荒埭暗雞催月曉空場老雉挾春嬌下得挾字最好如孟子挾貴挾長之挾豫謂介甫又有紫莧凌風怯蒼苔挾雨驕陳無已有寒氣挾霜侵敗絮賔鴻將子度微明其用挾字亦與前一聫同藝苑雌黃用事精切苕溪漁隱曰上元戲劉貢甫詩云不知太一遊何處定把青藜獨照公此詩用事亦精切劉向校書天祿閣夜有老人著黃衣植青藜杖叩閣而進向請問姓名我是太一之精天帝聞卯金之子有博學者下而觀焉乃出懷中竹牒授之見王子年拾遺此事既與貢甫同姓又貢甫時在館閣也王直方詩話清景山谷嘗言天下清景初不擇貴賤賢愚而與之然吾特疑端為我輩設荆公在鍾山官牀與客夜坐作詩云殘生傷性老耽書年少東來復起豫各據稿梧同不寐偶然聞雨落階除東坡宿餘杭山寺詩云暮鼓朝鐘自擊撞閉門欹枕對殘釭白灰旋撥通紅火卧對蕭蕭雪打窗人以山谷之言為確論冷齋夜話霜筠雪竹熙寧庚戍冬王荆公安石自參知政事拜相是日官僚造門奔賀者相屬於路公以未謝皆不見之獨與余坐於西廡之小閣荆公語次忽顰蹙久之取筆書窗曰霜筠雪竹鍾山寺投老歸歟寄此生放筆揖余而入元豐癸亥公已謝事為會靈觀使居金陵白下門外余謁公公欣然邀余同遊鍾山憩法雲寺偶坐於僧房是日正當霜雪而虛窗松竹皆如詩中之景余因述昔日題窗并誦此詩公憮然曰有是乎領略微笑而已隱居詩話自然舒州三祖山金牛洞山水聞於天下荆公嘗題詩云水泠泠而北去山靡靡以旁圍欲窮源而不得竟悵望以空歸後人鑿山刋木寢失山水之勝非公題詩時比也魯直效公題六言云司命無心播物祖師有記傳衣白雲橫而不度髙鳥倦而猶飛識者云語雖竒亦不及荆公之自然也髙齋詩話紀實烏石岡距臨川三十里荆公外家吳氏居其間故詩云不知烏石岡邊路到老相尋得幾回鹽步門在荆公舊居之前故詩云曲池丘墓心空折鹽步庭闈眼欲穿復齋落星寺詩荆公集中有落星寺詩其末云勝槩惟詩可收拾不才羞作等間來落星寺在彭蠡湖中劉咸臨嘗親見寺僧言幼時目覩閩中章傆道作此詩其前六句皆同其末云勝槩詩人盡收拾可憐蘇石不曽來蘇石謂子美曼卿也後人愛其詩者改末句作荆公詩傳之遂使一篇之意不完其體與荆公所作詩亦不類苕溪漁隱曰直方所言非也余細觀此詩句語體格真是荆公作餘人豈能道此今具載全篇識者必能辨之詩云窣雲一殿起崔嵬萬里長江酒一杯坐見山川吞日月杳無車馬送塵埃鴈飛雲路聲低過客近天門夢易回勝概惟詩可收拾不才羞作等間來王直方詩話西山寺詩唐人題西山寺詩云終古礙新月半江無夕陽人謂冠絶古今以其盡得西山之景趣也金山寺留題者亦多而絶少佳句惟寺影中流見鐘聲兩岸聞又天多剩得月地少不生塵為人傳誦要亦未為至工若用之於落星寺有何不可乎熙寧中荆公有句云天末海門橫北固煙中沙岸似西興尤為中的遁齋間覽梅花詩凡詠梅多詠白而荆公詩獨云鬚撚黃金危欲墮蒂團紅蠟巧能粧不惟造語巧麗可謂能道人不到處矣又東坡詠梅一句云竹外一枝斜更好語雖平易然頗得梅之幽獨間靜之趣凡詩人詠物雖平淡巧麗不同要能以隨意造語為工公後復有詩云遙知不是雪為有暗香來蓋取蘇子卿詩只言花似雪不悟有香來之意公在金陵又有和徐仲文顰字韻詠梅詩二首東坡在嶺南有暾字韻梅詩三首皆韻險而語工非大手筆不能到也遁齋間覽碁詩荆公碁品殊下每與人對局未嘗致思隨手疾應覺其勢將敗便斂之謂人曰本圖適性忘慮反苦思勞神不如且已與葉致逺敵手嘗贈致逺詩云垂成忽破壞中斷俄連接是知公碁不甚髙又云諱輸寧斷頭悔誤仍摶頰是又未能忘情於一時之得喪也苕溪漁隱曰介甫有絶句云莫將戲事擾真情且可隨緣道我嬴戰罷兩奩收黑白一枰何處有虧成觀此詩則圖適性忘慮之語信有證矣若魯直於碁則不然如心似蛛絲遊碧落身如蜩甲化枯枝則苦思忘形較勝負於一著與介甫措意異矣遁齋間覽虎圖荆公嘗在歐公坐上賦虎圖衆客未落筆而荆公章已就歐公亟取讀之為之擊節稱嘆坐客閣筆不敢作苕溪漁隱曰西清詩話中亦載此事云此乃體杜甫畫鶻行以紓急解紛耳吾今具載二詩讀者當有以辨之荆公虎圖詩云壯哉非羆亦非貙目光夾鏡當坐隅橫行妥尾不畏逐顧盻欲去仍躊躇卒然我見心欲動熟視稍稍摩其鬚固知畫者巧為此此物安肯來庭除想當槃礴欲畫時睥睨衆史如庸奴神間意定始一掃功與造化論錙銖悲風颯颯吹黃蘆上有寒雀驚相呼槎牙死樹鳴老烏向之俯噣如哺雛山牆野壁黃昏後馮婦遙看亦下車杜甫畫鶻行云髙堂見老鶻颯爽動秋骨初驚無拘攣何得立突兀乃知畫師妙功刮造化窟寫此神俊姿充君眼中物烏鵲滿樛枝軒然恐其出側腦看青霄寧為衆禽沒長翮如刀劒人寰可超越乾坤空峥嶸粉墨且蕭瑟緬思雲沙際自有煙霞質吾今意何傷顧步獨紆鬱漫叟詩話集句荆公莫年喜為集句唐人號為四體黃魯直謂正堪一笑耳司馬溫公與武定從事同幕私幸營妓而於公諱之常會僧廬公往迫之使妓踰垣而去度不可隱乃具道公戲之曰年去年來來去忙暫偷間卧老僧床驚回一覺遊仙夢又逐流鶯過短墻杭之舉子中老榜第其子以緋裹之客賀之曰應是窮通自有時人生七十古來稀如今始覺為儒貴不著荷衣更著緋夀之醫者老娶少婦或嘲之曰倚他門户傍他牆年去年來來去忙採得百花成蜜後為他人作嫁衣裳真可笑也後山詩話猿鶴不知王介字中甫衢州人博學善譏謔嘗舉制科不中與荆公遊甚欵然未嘗降意少相下熙寧初荆公以翰林學士被召前此屢召不起至是始受命介以詩寄云草廬三顧動春蟄蕙帳一空生曉寒蓋有所諷荆公得之大笑他日作詩有丈夫出處非無意猿鶴從來自不知之句蓋為介發也石林詩話詩病今州縣之間隨其大小皆有富民此理勢之所必至所謂物之不齊物之情也然州縣賴之以為強國家恃之以為固非所當憂亦非所當去也能使富民安其富而不橫貧民安其貧而不匱貧富相恃以為長久而天下定矣介甫不忍貧民而深疾富民志欲破富民以惠貧民不知其不可也方其未得志也為兼并之詩其詩曰三代子百姓公私無異財人主擅操柄如天持斗魁賦豫皆自我兼并乃姦回姦回法有誅勢亦無自來後世始倒持黔首遂難裁秦王不知此更築懷清臺禮義日以偷聖經久堙埃法尚有存者欲言時所咍俗吏不知方掊克乃為才俗儒不知變兼并可無摧利孔至百出小人私闔開有司與之爭民愈可憐哉及其得志專以此為事設青苖法以奪富民之利民無貧富兩稅之外皆重出息十二吏緣為姦至倍息公私皆病矣吕惠卿繼之以手實之法私家一毫以上皆籍於官民知有奪取之心至於賣田殺牛以避其禍朝廷覺其不可中止不行僅免於亂然其徒世守其學刻下媚上謂之享上有一不享上皆廢不用至於今日民遂大病原其禍出於此詩蓋昔之詩病未有若此酷者也蘇子由秋菊落英歐公嘉祐中見王荆公詩黃昏風雨暝園林殘菊飄零滿地金笑曰百花盡落獨菊枝上枯耳因戲曰秋英不比春花落為報詩人子細看荆公聞之曰是豈不知楚詞夕餐秋菊之落英歐陽九不學之故也西清詩話荆公此詩子瞻跋云秋英不比春英落説與詩人子細看蓋為菊無落英故也荆公云蘇子瞻讀楚詞不熟耳豫以謂屈平餐秋菊之落英大槩言花衰謝之意若飄零滿地金則過矣東坡既以落英為非則屈原豈亦謬誤乎坡在海南謝人寄酒詩有云謾繞東籬嗅落英又何也苕溪漁隱曰秋英不比春花落為報詩人子細看此是兩句詩余於六一居士全集及東坡前後集遍尋並無之不知西清髙齋何從得此二句詩互有譏議亦疑其不審也髙齋詩話余按楚詞夕餐秋菊之落英落之為義始也初也如禮記所謂落成之落也蓋菊已花雖枯不落惟初英乃可餐荆公賦黃菊飄零滿地金固失之不知菊矣直有以來秋英不比春花落為報詩人子細看之譏西清以為歐公髙齋以為蘇公未詳孰是而所記半山借秋菊落英之説一則曰歐九不知楚詞一則曰子瞻不熟楚詞歐蘇二公非不知不熟楚詞者特知屈原之心不以落英為飄落之落耳雖然半山豈真不知不熟楚詞者歟亦不過執拗以遂非而已西澗葉公每誦先君菊莊翁菊似交情看嵗晚枝柎相伴到離披之句謂其真知菊者故併及之梅墅續評雪堂如天花變現東坡作文如天花變現初無根葉不可揣測如作蓋公堂記共六百餘字僅三百餘字説醫碎石道士詩共二十八句却二十六句作假説惟用兩句收拾作鶴嘆則替鶴分明室中語長於譬喻子瞻作詩長於譬喻如和子由詩云人生到處知何似應似飛鴻踏雪泥泥上偶然留指爪鴻飛那復計東西守嵗詩云欲知垂盡嵗有似赴壑蛇修鱗半已沒去意誰能遮况欲繫其尾雖勤知奈何畫水官詩云髙人豈學畫用筆乃其天譬如善遊人一一能操船龍眼詩云龍眼與荔枝異出同祖父端如柑與橘未易相可不皆纍數句也如一聨即少年辛苦真食參老境清間如啖蔗如一句即雪裏波菱如鐵甲之類不可勝紀陵陽室中語海棠詩東坡作此詩詞格超逸不復蹈襲前人其詩有嫣然一笑竹籬間桃李漫山總粗俗自然富貴出天姿不待金盤薦華屋朱唇得酒暈生臉翠袖卷紗紅映肉林深霧暗曉光遲日暖風輕春睡足雨中有淚亦凄愴月下無人更清淑元豐間東坡謫黃州寓居定惠院院之東小山上有海棠一株特繁茂每嵗盛開時必為携客置酒已五醉其下矣故作此長篇平生喜為人寫蓋人間刋石者自有五六本云軾平生得意詩也梅詩東坡暾字韻三首皆擺落陳言古今人未嘗經道者三首並妙絶第二首尤竒詩云羅浮山下梅花村玉雪為骨氷為魂紛紛初疑月挂樹耿耿獨與參橫昏先生索居江海上悄如病鶴棲荒園天香國艷肯相顧知我酒熟詩清溫蓬萊宫中花鳥使緑衣倒挂扶桑暾抱叢窺我方醉卧故遣啄木先敲門麻姑過君急灑掃鳥能歌舞花能言酒醒人散山寂寂惟有落朵粘空樽注云嶺南珍禽有倒挂子緑毛紅喙如鸚鵡而小自東海來非塵埃間物也芙蓉城詩遊芙蓉城元豐元年三月余始識子髙問之信然乃作此詩云芙蓉城中花冥冥誰其主者石與丁珠簾玉案翡翠屏雲舒霞卷千娉婷中有一人長眉青炯如微雲淡疏星往來三世空鍊形竟坐誤讀黃庭經天門夜開飛爽靈無復白日乘雲軿俗緣千劫磨不盡翠被冷落凄餘馨因過緱山朝帝廷夜聞笙簫弭節聽飄然而來誰使令皎如明月入窗櫺忽然而去不可尋寒衾虛幌風泠泠仙宫洞房本不扃夢中同躡鳳凰翎徑渡萬里如奔霆玉樓浮宫聳亭亭天書雲篆誰所銘繞樓飛步髙竛竮仙風鏘然韻流鈴蘧蘧形開如酒醒芳卿寄謝空丁寧一朝覆水不反瓶羅巾别淚空熒熒春風花開秋葉零世間羅綺紛膻腥此生流浪隨滄溟偶然相值兩浮萍願君收視觀三庭勿與嘉穀生蝗螟從渠一念三千齡下作人間尹與邢東坡此詩最為流麗故秦太虛與東坡簡云素紙一軸敢兾醉後揮掃近文并芙蓉城詩時得把玩以慰馳情詩人寫人物態度至不可移易元微之李娃行云髻鬟峩峩髙一尺門前立地看春風此定是娼婦退之華山女詩云洗粧拭面著冠帔白咽紅頰長眉青此定是女道士東坡作芙蓉城詩亦用長眉青三字云中有一人長眉青炯如微雲淡疏星便有神仙風度許彥周詩話三良詩秦繆公以三良殉葬詩人刺之則繆公信有罪矣雖然臣之事君猶子之事父也以陳尊已魏顆之事觀之則三良亦不容無譏焉昔之詠三良者有王仲宣曹子建陶淵明栁子厚或曰心亦有所施或曰殺身誠獨難或曰君命安可違或曰死沒寧分張曽無一語辨其非是者惟東坡和陶云殺身故有道大節要不虧君為社稷死我則同其歸顧命有治亂臣子得從違魏顆真孝愛三良安足希審如是言則三良不能無罪東坡一篇獨冠絶於古今苕溪漁隱云余觀東坡秦穆公墓詩意全與和三良詩意相反蓋是少年時議論如此至其晚年所見益髙超人意表此揚雄所以悔少作也詩云昔公生不誅孟明豈有死之日而忍用其良乃知三子徇公意亦如齊之二子從田橫藝苑雌黃與王慶源詩與王慶源詩云青衫半作霜葉枯遇民如兒吏如奴吏民莫作官長看我是識字耕田夫妻啼兒號刺史怒時有野人來挽鬚拂衣自注下下考芋魁豆飯吾豈無山谷云庭堅最愛此數韻王直方詩話語意髙妙題碧落洞詩云小語輒響答空山白雲驚此語全類李太白後自嶺外歸次韻江晦叔詩云浮雲時事改孤月此心明語意髙妙如參禪悟道之人吐露胸襟無一毫窒礙也漁隱詩意佳絶東坡云世謂樂天有鬻駱馬放楊栁枝詞嘉其主老病不忍去也然夢得有詩云春盡絮飛留不得隨風好去落誰家樂天亦云病與樂天相伴住春隨樊子一時歸則是樊素竟去也豫家有數妾四五年相繼辭去獨朝雲者隨豫南遷因讀樂天集戲作此詩朝雲姓王氏錢塘人嘗有子曰幹兒未期而天云不似楊枝别樂天恰如通德伴伶玄阿奴絡秀不同老天女維摩總解禪經卷藥爐新活計舞衫歌扇舊因緣丹成逐我三山去不作巫陽雲雨仙苕溪漁隱曰詩意佳絶善於為戲略去洞房之氣味翻為道人之家風非若樂天所云櫻桃樊素口楊栁小蠻腰但自詫其佳麗塵俗哉詠物詩首四句便能寫盡李太白潯陽紫極宫感秋云何處聞秋聲翛翛北窗竹回薄萬古心攬之不盈掬東坡和韻云寄卧虛寂堂月明浸疏竹冷然洗我心欲飲不可掬豫謂東坡此語清拔優於太白大率東坡每題詠景物於長篇中只篇首四句便能寫盡語仍快健如廬山開先潄玉亭首句云髙巖下赤日深谷來悲風擘開青玉峽飛出兩白龍谷林堂首句云深谷下窈窕髙林合扶疏美哉斯堂成及此秋風初行瓊儋間首句云四州環一島百洞蟠其中我行西北隅如渡月半弓藤州江下夜起對月首句云江月照我心江水洗我肝端如徑寸珠墮此白玉盤此聊舉四詩其他甚衆又棲賢三峽橋詩有清寒入山骨草木盡堅瘦之句此語尤精絶他人道不到也漁隱一洗萬古余作南征賦或者稱之然僅與曹大家爭衡耳惟東坡赤壁二賦一洗萬古欲髣佛其一語畢世不可得也唐子西語録南遷以後精深華妙吕丞相跋杜子美年譜云考其辭力少而鋭壯而肆老而嚴非妙於文章不足以至此余觀東坡自南遷以後詩全類子美夔州以後詩正所謂老而嚴者也子由云東坡謫居儋耳獨善為詩精深華妙不見老人衰憊之氣魯直亦云東坡嶺外文字讀之使人耳目聰明如清風自外來也觀二公之言如此則余非過論矣詩話文過有理東坡曰吾有詩云日日出東門步尋東城遊城門抱關卒怪我此何求我亦無所求駕言寫我憂章子厚謂參寥曰前步而後駕何其上下紛紛也僕聞之曰吾以尻為輪以神為馬何曽上下乎參寥曰子瞻文過有理似孫子荆子荆曰所以枕流欲洗其耳波瀾浩渺東坡長句波瀾浩大變化不測如作雜劇打猛顐入却打猛顐出也三馬贊振鬛長鳴萬馬皆瘖此記不傳之妙學文者能涵泳此等語自然有入處吕氏童蒙訓簟紋如水帳如煙邢惇夫言掃地焚香閉閣眠簟紋如水帳浮煙客來夢覺知何處挂起西窗浪接天此東坡詩也嘗題於余扇山谷初讀以為是劉夢得所作王直方詩話失於粗蘇詩始學劉禹錫故多怨刺學不可不謹也晚學太白至其得意則似之矣然失於粗以其得之易也後山詩話蘇過詩東坡云兒子邁嘗作林檎詩云熟顆無風時自落半腮迎日鬬鮮紅於等輩中亦號有思致者今已老無他技但亦時出新句也嘗作酸棗尉有詩云葉隨流水歸何處牛載寒鴉過别村此句亦可喜也苕溪漁隱曰蘇叔黨過賦鼠鬚筆云太倉失陳紅狡穴得餘腐既興丞相歎又發廷尉怒磔肉餧餓貓紛髯雜霜兔插架刀槊健落紙龍蛇騖物理未易詰時來即所遇穿墉何卑微託此得佳譽其步驟氣格殊有父風也詩人玉屑卷十七
