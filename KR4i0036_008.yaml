body:
  text: 詩人玉屑卷八宋魏慶之撰煅煉總論詩最難事也吾於他文不至蹇澀惟作詩甚苦悲吟纍日僅能成篇初讀時未見可羞處姑置之明日取讀瑕疵百出輒復悲吟纍日反復改正比之前時稍稍有加焉復數日取出讀之疵病復出凡如此數四方敢示人然終不能竒李賀毋責賀曰是兒必欲嘔出心乃巳非過論也今之君子動輒千百言略不經意其可貴哉唐子西語録煉字作詩在於煉字如老杜飛星過水白落月動沙虛是煉中間一字地折江帆隱天清木葉聞是煉末後一字酬李都督早春詩云紅入桃花嫩青歸栁葉新若非入與歸二字則與兒童之詩何異葛常之煉格煉句不如煉字煉字不如煉意煉意不如煉格以聲律為竅物象為骨意格為髓金針格煉意世俗所謂樂天金針集殊鄙淺然其中有可取者鍊句不如鍊意非老於文學不能道此又云鍊字不如鍊句則未安也好句要須好字詩眼煉韻陳君節字明信言煉句不如煉韻余以為若只覔好韻則失於首尾不相貫穿王直方詩話旬鍛月煉唐人雖小詩必極工而後巳所謂旬鍛月煉信非虛言小説崔護題城南詩其始曰去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風後以其意未完語未工改第三句云人面秪今何處在蓋唐人工詩大率如此雖有兩今字不恤也取語意為主耳筆談句中有眼汪彥章移守臨川曽吉甫以詩迓之云白玉堂中曽草詔水晶宫裏近題詩先以示子蒼子蒼為改兩字云白玉堂深曽草詔水晶宫冷近題詩逈然與前不侔蓋句中有眼也古人煉字只於眼上煉蓋五字詩以第三字為眼七字詩以第五字為眼也詩貴造微小律詩雖末技之工不造微不足以名家唐人皆盡一生之業為之至於字字皆鍊得之甚艱但患觀者滅裂不見其工耳若景意縱完一讀便盡此類最易為人激賞乃詩之折楊黃華也譬若三館楷書不可謂不精麗求其佳處到無一筆此病最難為醫也筆談求其疵而去之詩在與人商論求其疵而去之等間一字放過則不可殆近法家難以言恕矣故謂之詩律東坡云敢將詩律鬪深嚴豫亦云詩律傷嚴近寡恩大凡立意之初必有難易二塗學者不能強所為往往捨難而趨易文章罕工每坐此也作詩自有穩當字第思之未到耳唐子西語録剩一字皎然以詩名於唐有僧袖詩謁之然指其御溝詩云此波涵聖澤波字未穩當改僧怫然作色而去僧亦能詩者也皎然度其去必復來乃取筆作中字掌中握之以待僧果復來云欲更為中字如何然展手示之遂定交要當如此乃是又郡閣雅言云王貞白唐末大播詩名御溝為卷首云一𣲖御溝水緑槐相蔭清此波涵帝澤無處濯塵纓鳥道來雖逺龍池到自平朝宗心本切願向急流傾自謂冠絶無瑕呈僧貫休休公曰此甚好只是剩一字貞白揚袂而去休公曰此公思敏取筆書中字掌中逡巡貞白回欣然曰巳得一字云此中涵帝澤休公將掌中示之二説不同未知孰是同上老杜桃花細逐楊花落黃鳥時兼白鳥飛李商老云嘗見徐師川説一士大夫家有老杜墨迹其初云桃花欲共楊花語自以淡墨改三字乃知古人字不厭改也不然何以有日煆月煉之語漫叟詩話陵陽謂少陵改詩賦詩十首不若改詩一首少陵有新詩改罷自長吟之句雖少陵之才亦須改定室中語樂天冷齋夜話云白樂天每作詩令一老嫗解之問曰解否嫗曰解則録之不解則又復易之故唐末之詩近於鄙俚又張文潛云世以樂天詩為得於容易而耒嘗於洛中一士人家見白公詩草數紙點竄塗抹及其成篇殆與初作不侔苕溪漁隱曰樂天詩雖涉淺近不至盡如冷齋所云余舊嘗於一小説中曽見此説心不然之惠洪乃取而載之詩話是豈不思詩至於老嫗解烏得成詩也哉余故以文潛所言正其謬耳皮日休百煉為字千煉成句歐公老杜云新詩改罷自長吟文字頻改工夫自出近世歐公作文先貼於壁時加竄定有終篇不留一字者魯直長年多改定前作此可見大略如宗室挽詩云天網恢中夏賔筵禁列侯後乃改云屬舉左官律不通宗室侯此工夫自不同矣吕氏童蒙訓東坡東坡作蝸牛詩云中弱不勝觸外堅聊自郛升髙不知疲竟作粘壁枯後改云腥涎不滿殼聊足以自濡升髙不知回竟作粘壁枯余以為改者勝王直方詩話清詩要淘煉乃得鉛中銀坡詩山谷魯直嘲小德有學語春鶯囀書窗秋鴈斜後改曰學語囀春鳥塗窗行暮鴉以是詩文不厭改也東臯雜録山谷與余詩云百葉緗桃苦惱人又云欲作短歌憑阿素丁寧誇與落花風其後改苦惱作觸撥改歌作章改丁寧作緩歌余以為詩不厭多改王直方詩話荆公王駕晴景云雨前初見花間葉雨後兼無葉裏花蛺蝶飛來過墻去應疑春色在鄰家此唐百家詩選中詩也余因閲荆公臨川集亦有此詩云雨前不見花間葉雨後全無葉底花蜂蝶紛紛過墻去却疑春色在鄰家百家詩選是荆公所選想愛此詩因為改正七字遂使一篇語工而意足了無鑱斧之迹真削鐻手也漁隱王平甫嶺下保昌縣沙水村進士徐信言東坡北歸時過其書齋煮茗題壁又書一帖云嘗見王平甫自負其甘露寺詩平地風煙飛白鳥半山雲木卷蒼藤余應之曰精神全在卷字上但恨飛字不稱耳平甫沉吟久之請余易余遂易之以橫字平甫歎服大抵作詩當日煆月煉非欲誇竒鬪異要當淘汰出合用字此建中靖國元年正月五日甲子玉局老書而趙德麟以為陳知默詩東坡必不誤矣遺珠王仲至王仲至召至館中試罷作一絶題於壁云古木森森白玉堂長年來此試文章日斜奏賦長楊罷間拂塵埃看畫牆舊云奏罷長楊賦亦荆公所改王直方詩話韓子蒼公嘗賦送宜黃丞周表卿詩云昔年束帶侍明光曽見揮毫對御床將為驊騮巳騰踏不知雕鶚尚摧藏官居四合峯巒緑驛路千林橘柚黃莫戀鄉關留不去漢廷今重甲科郎表卿既行久之乃改對字作照字蓋子瞻送孫勉詩云君為淮南秀文采照金殿注云君嘗考中進士第一人也改峯巒緑為峯巒雨橘柚黃為橘柚霜改莫戀鄉關留不去作莫為艱難歸故里益見其工又題辛仲及鬪牛圖詩云好事誰如公子賢斷縑求買不論錢後改云千金買畫亦欣然亦於卷中斷取舊詩别題室中語詩不可不改余在龍安道中嘗作五言詩其初云雨時萬木翳雨後羣山開後改為未雨萬木翳既雨羣山開與其初大段不同室中語論用工之過天下事有意為之輒不能盡妙而文章尤然文章之間詩尤然世乃有日煅月煉之説此所以用功者雖多而名家者終少也晚唐諸人議論雖淺俚然亦有暗合者但不能守之耳所謂盡日覔不得有時還自來者使所見果到此則采菊東籬下悠然見南山之句有何不可為惟徒能言之此禪家所謂語到而實無見處也往往有好句當面蹉過若吟成一箇字撚斷數莖鬚不知何處合費許多辛苦正恐雖撚盡鬚不過能作藥杵聲中搗殘夢茶鐺影裏煮孤燈句耳人之相去固不逺哉蔡寬夫詩話沿襲誠齋論沿襲句有偶似古人者亦有述之者杜子美武侯廟詩云映階碧草自春色隔葉黃鸝空好音此何遜行孫氏陵云山鶯空樹響壠月自秋暉也杜云薄雲岩際宿孤月浪中翻此庾信白雲岩際出清月波中上也出上二字勝矣隂鏗云鶯隨入戶樹花逐下山風杜云月明垂葉露雲逐渡溪風又云水流行地日江入度山雲此一聮勝庾信云永韜三尺劔長捲一戎衣杜云風塵三尺劔社稷一戎衣亦勝庾矣南朝蘇子卿梅詩云秪言花是雪不悟有香來介甫云遙知不是雪為有暗香來述者不及作者陸龜蒙云殷勤與解丁香結從放繁枝散誕春介甫云殷勤與解丁香結放出枝頭自在春作者不及述者誠齋論淵明子美無巳詩相似淵明子美無巳三人作九日詩大概相似子美云竹葉於人既無分菊花從此不須開此淵明所謂塵爵恥虛罍寒華徒自榮也無巳云人事自生今日意寒花秪作去年香此淵明所謂日月依辰舉俗愛其名也誠齋論東坡介甫詩流麗相似東坡云春宵一刻直千金花有清香月有隂歌管樓臺聲細細鞦􅀈院落夜沉沉介甫云金爐香盡漏聲殘剪剪輕風陳陳寒春色惱人眠不得月移花影上欄干二詩流麗相似然亦有甲乙東坡歐公自揚州移汝州作西湖詩云緑芰紅蓮畫舸浮使君那復憶楊州都將二十四橋月換得西湖十頃秋後東坡復自汝移揚作詩曰二十四橋亦何有換此十頃玻璃風用歐公詩也侯鯖録陵陽論山谷一日因坐客論魯直詩體致新巧自作格轍次客舉魯直題子瞻伯時畫竹石牛圖詩云石吾甚愛之勿使牛礪角牛礪角尚可牛鬬殘我竹如此體製甚新公徐云獨漉水中泥水濁不見月不見月尚可水深行人沒蓋是李白獨漉篇也室中語誠齋論山谷詩山谷集中有絶句云草色青青栁色黃桃花零落杏花香春風不解吹愁去春日偏能惹恨長此唐人賈至詩也特改五字耳賈云桃花歷亂杏垂香又不為吹愁又惹夢長山谷取唐人詩唐朱晝喜陳懿老至詩云一别一千日一日十二憶苦心旡間時今日見玉色乃知山谷五更歸夢三百日一日思親十二時之句取此復齋漫録山谷倣歐公詩永叔送原甫出守永興詩云酌君以荆州魚枕之蕉贈君以宣城鼠鬚之管酒如長虹飲滄海筆若駿馬馳平坂黃魯直送王郎詩云酌君以蒲城桑落之酒泛君以湘纍秋菊之英贈君以黟川點漆之墨送君以陽關墮淚之聲酒澆胸中之磊塊菊制短世之頽齡墨以傳千古文章之印歌以寫從來兄弟之情近時學者以謂此格獨魯直為之殊不知永叔巳先有也漁隱簡齋鄭谷蜀中海棠詩一首前一云穠麗最宜新著雨妖嬈全在半開時然歐公以鄭詩為格卑近世陳去非嘗用鄭意賦海棠云海棠默默要詩催日暮紫綿旡數開欲識此花竒絶處明朝有雨試重來雖本鄭意便覺方力相去不侔矣山谷亦有紫綿揉色海棠開之句復齋漫録吳可韓子蒼喜吳可小詩東風可是間來往時送江梅一陳香殊不知張藝叟荼䕷詩云晚風亦自知人意時去時來管送香吳取此耳復齋漫録同機軸老杜雨詩云紫崖奔處黑白鳥去邉明而江碧鳥逾白山青花欲燃之句似之贈王侍御云曉鶯工送淚秋月解傷神而感時花濺淚恨别鳥驚心之句似之殆是同一機軸也葛常之有家法杜審言子美之祖也則天時以詩擅名與宋之問相唱和其詩有綰霧青條弱牽風紫蔓長寄與洛城風月道明年春色倍還人之句若子美林花帶雨胭脂落水荇牽風翠帶長又云傳語風光共流轉暫時相賞莫相違雖不襲取其意而語脈蓋有家法矣塵史暗合子美王元之本學白樂天詩在商州嘗賦春日雜興云兩株桃杏映籬斜裝點商州副使家何事春風容不得和鶯吹折數枝花其子嘉祐云老杜嘗有恰似春風相欺得夜來吹折數枝花之句語頗相似因請易之元之欣然曰吾詩精詣遂能暗合子美耶更為詩曰本與樂天為後進敢期杜甫是前身卒不復易蔡寬夫詩話模寫東坡西清詩話記其父蔡元長喜周邦彥祝夀詩化行禹貢山川外人在周公禮樂中乃模寫東坡藏春塢詩年拋造物甄陶外春在先生杖屨中復齋承襲其意燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨此辭可泣鬼神矣張子野長短句云眼力不知人逺上溪橋東坡送子由詩云登髙回首陂壠隔惟見烏帽出復沒皆逺紹其意許彥周詩話用其意范季隨曰僕嘗往外邑迎婦故公有詩見寄云萬里投殊俗餘生老一丘常憐之子秀能慰此生愁只欲連牆住胡為下邑留黃塵詩思盡乞與四山秋孫內翰見謂曰此詩卒章豈用詩思人間盡今將秋景求之意耶室中語取其意朝元忠西歸詩安得龍山潮駕回安河水水從樓前來中有美人淚韓子蒼取其意以代葛亞卿作詩云君往江濵起畫樓妾居海角送潮頭潮中有妾相思淚流到樓前更不流唐孫叔向有經昭應溫泉詩云一道泉回繞御溝先皇曽向此中遊雖然水是無情物也到宫前咽不流子蒼末句又用孫語也復齋漫録意同辭異天街小雨潤如酥草色遙看近却無最是一年春好處絶勝煙栁滿皇都此退之早春詩也荷盡巳無擎雨蓋菊殘惟有傲霜枝一年好處君須記正是橙黃橘緑時此子瞻初冬詩也二詩意同而辭殊皆曲盡其妙漁隱辭同意異豫初喜杜紫微南山與秋色氣勢兩相髙語巳乃知出於老杜千崖秋氣髙蓋一語領略盡秋色也然二家言嵓崖間秋氣耳猶未及江天水國氣象宏闊處一日雨後過太湖泊舟洞庭山下乃得句云木落洞庭秋或云此蹈襲楓落吳江冷語第變冷為秋則氣象自不同彼記時耳是安知秋色之髙盡在洞庭裏許乎此淵源自楚騷中來九歌云洞庭波兮木葉下其陶寫物象宏放如此詩可以易言哉休齋即舊為新庾信宇文盛墓志銘云受圖黃石不無師表之心學劔白猿遂得風雲之志牧之題李西平宅詩云受圖黃石老學劔白猿翁亦即舊為新之一端也潘子真詩話摹擬許昌西湖展江夢成宋元憲留題云鑿開魚鳥忘情地展盡江湖極目天之句皆以謂曠古未有此語然本於五代馬殷據潭州時建明月圃命幕客徐仲雅賦詩云鑿開青帝春風圃移下姮娥夜月樓用古句摹擬詞人類如此但有勝與否耳西清詩話剽竊余舊見顔持約所畫淡墨杏花題小詩於後仍題持約二字意謂此詩必持約所作比因閲唐宋類詩方知是羅隱作乃持約竊之耳詩云暖氣潛催次第春梅花巳謝杏花新半開半落間園裏何異榮枯世上人古之詩人如王維猶竊李嘉祐水田飛白鷺夏木囀黃鸝僧惠崇為其徒所嘲云河分岡勢司空曙春入燒痕劉長卿不是師兄多犯古古人詩句犯師兄皆可軒渠一笑也漁隱相襲公嘗有詩送李節夫云治聲臨頴復臨川籍甚臨江巳預傳僕曰正似王介甫同官同齒復同科朋友婚姻分最多公笑曰偶爾室中語一日因論詩圭粹中曰魯直清江引渾家醉著蓬底眠舟在寒沙夜潮落説盡漁父快活公曰醉著二字是用韓偓漁翁醉著無人喚室中語一日有坐客問公曰全用古人一句可乎公曰然如杜少陵詩云使君自有婦而無車馬喧之類是也室中語襲全句東坡送人守嘉州古詩其中云峨眉山月半輪秋影入平羌江水流謫仙此語誰解道請君見月時登樓上兩句全是李謫仙詩故繼之以謫仙此語誰解道請君見月時登樓之句此格本出於李謫仙其詩云解道澄江淨如練令人還憶謝元暉蓋澄江淨如練即元暉全句也後人襲用此格愈變愈工漁隱依仿太甚東坡作藏春塢詩有年拋造物甄陶外春在先生杖屨中而少遊作俞充哀詞乃云風生使者旌旄上春在將軍爼豆中余以為依仿太甚王直方詩話屋下架屋南方浮圖能詩者多士大夫鮮有汲引多汩沒不顯福州僧有詩百餘篇其中佳句如虹收千嶂雨潮展半江天不減古人也苕溪漁隱曰此一聮乃體李義山虹收青嶂雨鳥沒夕陽天所謂屋下架屋者非不經人道語不足貴也古今詩話著力大過開簾風動竹疑是故人來與徘徊花上月空度可憐宵此兩聮雖唐人小説其實佳句也鄭谷詩睡輕可忍風敲竹飲散那堪月在花蓋與此同然論其格力適堪揭酒家壁與為市人書扇耳天下事每患自以為工處著力太過何但詩也石林詩話不約而合退之心訝愁來惟貯火眼知别後自添花臨川云髮為感傷無翠葆眼從瞻望有元花又久欽江總文才妙自歎虞翻骨相屯又云久諳郭璞言多驗老比顔含意更踈韓我今罪重無歸望直去長安路八千永叔今日始知豫罪大夷陵此去更三千栁十年憔悴到秦京誰料今為嶺外行王十年江海别常輕豈料今隨寡婦行栁直以踈慵招物議休將文字趂時名王直以文章歸潤色未應風月負登臨栁十一年前南渡客四千里外北歸人又一身去國六千里萬死投荒十二年蘇七千里外二毛人十八灘頭一葉身又五更歸夢三千里一日思親十二時皆不約而合句法使然故也䂬溪古人亦有所祖樊宗師墓銘云惟古於詞必巳出云云後皆指前公相襲真是如此子虛大人賦全倣逺遊而屈子心事非相如所可窺識故氣象自别淵明歸去來辭千古絶唱亦是祖歸田賦意此類甚多只如退之平淮西碑全是尚書句法秋懷詩全是選詩體漫塘録祖習不足道江淹擬湯惠休詩日暮碧雲合佳人殊未來古今以為佳句然謝靈運圓景皂巳滿佳人猶未適謝元暉春草秋更緑公子未西歸即是此意嘗怪兩漢間所作騷文初未嘗有新語直是句句規模屈宋但換字不同耳至晉宋以後詩人之辭其弊亦然若是雖工亦何足道蓋當時祖習共以為然故未有譏之者耳述者工於作者詩惡蹈襲古人之意亦有襲而愈工若出於巳者蓋思之愈精則造語愈深也魏人章疏云福不盈身禍將溢世韓愈則曰歡華不滿眼咎責塞兩儀李華弔古戰場曰其存其沒家莫聞知人或有言將信將疑睊睊心目寢寐見之陳陶則曰可憐無定河邉骨猶是春閨夢裏人蓋工於前也隱居語録述者不及作者梅堯臣贈鄰居詩有云壁隙透燈光籬根分井口徐鉉亦有喜李少保卜鄰云井泉分地脈砧杵共秋聲此句尤間逺也同上玉林云按唐于鶴有題鄰居詩云蒸梨常共竈澆薤亦同渠二公之詩蓋本乎此不沿襲太白云解道澄江靜如練令人還憶謝元暉至魯直則云憑誰説與謝元暉休道澄江靜如練王文海云鳥鳴山更幽至介甫則曰茅簷相對坐終日一鳥不鳴山更幽皆反其意而用之蓋不欲沿襲之耳漁隱不蹈襲太白俠客行云事了拂衣去深藏身與名元微之俠客行云俠客不怕死怕在事不成事成不肯藏姓名二公寓意不同復齋漫録陵陽云目前景物自古及今不知凡經幾人道今人一下筆要不蹈襲故有終篇無一字可解者蓋欲新而反不可曉耳室中語奪胎換骨總説山谷言詩意無窮而人才有限以有限之才追無窮之意雖淵明少陵不得工也不易其意而造其語謂之換骨法規摹其意而形容之謂之奪胎法如鄭谷詩自緣今日人心别未必秋香一夜衰此意甚佳而病在氣不長西漢文章雄深雅健其氣長故也曽子固曰詩當使人一覽語盡却意有餘乃古人用心處荆公菊詩曰千花百卉雕零後始見間人把一枝東坡曰萬事到頭都是夢休休明日黃花蝶也愁又李翰林曰鳥飛不盡暮天碧又曰青天盡處沒孤鴻其病如前所論山谷逹觀臺詩曰瘦藤拄到風煙上乞與遊人眼豁開不知眼界闊多少白鳥去盡青天回凡此之類皆換骨法也顧况詩曰一别二十年人堪幾回別其詩簡緩而意精確荆公與故人詩曰一日君家把酒杯六年波浪與塵埃不知烏石岡頭路到老相尋得幾回樂天詩臨風抄秋樹對酒長年身醉貌如霜葉雖紅不是春東坡詩兒童誤喜朱顔在一笑那知是酒紅凡此之類皆奪胎法也冷齋夜話誠齋論奪胎換骨有用古人句律而不用其句意者庾信月詩云渡河光不濕杜云入河蟾不沒唐人云因過竹院逢僧話又得浮生半日間坡云殷勤昨夜三更雨又得浮生一日涼杜夢李白云落月滿屋梁猶疑照顔色山谷簟詩云落日映江波依稀比顔色退之云如何連曉語秪是説家鄉吕居仁云如何今夜雨秪是滳芭蕉此皆以故為新奪胎換骨白道猷曰連峯數千里修林帶平津茅茨隱不見雞鳴知有人後秦少遊云菰蒲深處疑無地忽有人家笑語聲僧道潛云隔林倣佛聞機杼知有人家在翠微其源乃出於道猷而更加鍛鍊亦可謂善奪胎者也庚溪意同辭異鄭毅夫云夜來過嶺忽聞雨今日滿溪俱是花語意清絶頃在澄江見一詩云坐見茅齋一葉秋小山叢桂鳥聲幽不知疊嶂夜來雨清曉石楠花亂流狀霽後景物語不凡也或云司馬才叔作詩選載在何正平詩中同上當有别意杜陵謁玄元廟其一聮云五聖聮龍衮千官列鴈行蓋紀吳道子廟中所畫者徽宗嘗製哲廟挽詞用此意作一聮云北極聮龍衮西風拆鴈行亦以鴈行對龍衮然語意中的其親切過於本詩兹不謂之奪胎可乎不然則徒用前人之語殊不足貴蘇子美云峽束滄淵深貯月巖排紅樹巧裝秋非不佳也然正用杜陵峽束滄江起巖排石樹圓之句耳語雖工而無別意藝苑雌黃點化尤更精巧詩選云朱喬年絶句春風吹起籜龍兒戢戢滿山人未知急喚蒼頭斸煙雨明朝吹作碧參差蓋前人有詠筍云急忙且喫莫踟蹰一夜南風變成竹喬年點化乃爾精巧余觀魯直巳先有此句從斌老乞苦笋云煩君更致蒼玉束明日風雨皆成竹前詩並蹈襲魯直也漁隱玉林云按白樂天笋詩云且喫莫踟蹰南風吹作竹亦襲此語耳用古人意詩家有換骨法謂用古人意而點化之使加工也李白詩云白髮三千丈緣愁似箇長荆公點化之則云繅成白髮三千丈劉禹錫云遙望洞庭湖面水白銀盤裏一青螺山谷點化之云可惜不當湖水面銀山堆裏看青山孔稚圭白苧歌云山虛鐘響徹山谷點化之云山空響管絃盧同詩云草石是親情山谷點化之云小山作友朋香草當姬妾學詩者不可不知此精彩數倍山谷黔南十絶七篇全用樂天花下對酒渭川舊居東城尋春西樓委順竹窗等詩餘三篇用其詩略點化而巳葉少藴云詩人點化前作正如李光弼將郭子儀之軍重經號令精彩數倍此語誠然韻語陽秋點化古語徐陵鴛鴦賦云山雞映水那相得孤鸞照鏡不成雙天下真成長會合無勝比翼兩鴛鴦黃魯直題畫睡鴨曰山雞照影空自愛孤鸞舞鏡不作雙天下真成長會合兩鳬相倚睡秋江全用徐陵語點化之末句尤工隨筆句優於古吳僧錢塘白塔院詩到江吳地盡隔岸越山多陳後山詩話鄙其語不文曰是分界堠子耳及後山在錢塘仍有句云語音隨地改吳越到江分此如李光弼用郭子儀旗幟士卒而號令所及精采皆變者也程素之考古編詩人玉屑卷八
