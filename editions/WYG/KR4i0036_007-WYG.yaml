  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0036_WYG_007-1a, image: WYG1481/WYG1481-0115a.png}
body:
  text: 詩人玉屑巻七宋魏慶之撰用事三易沈隠侯曰文章當從三易易見事一也易識事二也易讀誦三也邢子才曰沈侯文章用事不使人覺若胷臆語祖孝徴曰沈詩云崖傾䕶石髓此豈用事耶昇按坡詩神山一合五百年風吹石髓堅如鐵乃嵇康王烈事則崖傾石髓非不用事也詩不貴用事夫屬詞比事乃為通談吟詠情性何貴用事思君如流水既是即目髙臺多悲風亦唯所見清晨登隴首尤無故實明月照積雪詎出經史古今勝語多非補假皆由直尋大明泰始中文章殆同書抄邇來作者浸以成俗遂乃句無虛語語無虛字拘攣補衲蠧文巳甚詩品不可有意用事天下書雖不可不讀然謹不可有意於用事却掃編使事不為事使荆公嘗云詩家病使事太多盖皆取其與題合者類之如此乃是編事雖工何益若能自出巳意借事以相發明變態錯出則用事雖多亦何所妨故公詩如董生只被公羊惑豈信捐書一語真桔橰俯仰何妨事抱甕區區著此身之類皆意與本處不類此真所謂使事也安祿山之亂哥舒翰與賊將崔乾祐戰潼闗見黄旗軍數百隊官軍以為賊賊以為官軍相持久之忽不知所在是日昭陵奏陵内前石馬皆汗流子羙詩所謂玉衣晨自舉鐵馬汗常趨盖記此事也李晟平朱泚李義山作詩復引用之云天教李令心如日可待昭陵石馬來此雖一等用事然義山但知推美西平不知於昭陵似不當耳乃知詩家使事難若子羙所謂不為事使者也蔡寛夫詩話反其意而用之文人用故事有直用其事者有反其意而用之者李義山詩可憐半夜虛前席不問蒼生問鬼神雖説賈誼然反其意而用之矣林和靖詩茂陵他日求遺藁猶喜曽無封禪書雖說相如亦反其意而用之矣直用其事人皆能之反其意而用之者非學業髙人超越尋常拘攣之見不規規然蹈襲前人陳迹者何以臻此藝苑雌黄放翁仕於蜀海棠詩最多其間一絶尤精妙云蜀地名花擅古今一枝氣可壓千林譏評更到無香處當恨人言太刻深此前軰所謂翻案法盖反其意而用之也小園解后錄昇案黄白石作雪詩云説道羞明却不羞日光玉潔共飛浮天人胷次明如洗肯似人間只暗投盖世謂雪之夜落為羞明此反其語而用之與用海棠無香事如出一律尤覺清新用事要無迹杜少陵云作詩用事要如禪家語水中着鹽飲水乃知鹽味此說詩家秘要藏也如五更皷角聲悲壯三峽星河影動揺人徒見凌轢造化之工不知乃用事也禰衡傳撾漁陽􅋵聲悲壯漢武故事星辰動揺東方朔謂民勞之應則善用事者如繫風捕影豈有迹耶西清詩話事如巳出天然渾厚江鄰幾善為詩清淡有古風蘓子美坐進奏院謫官後死吳中江作詩云郡邸獄冤誰與辨臯橋客死世同悲用事甚精嘗有古作云五十踐衰境加我在明年論者謂人莫不用事能令事如巳出天然渾厚乃可言詩用其事而隠其語蕭文奐能書善畫於扇上圖山水咫尺之内便覺萬里為遥老杜戱題山水圖云尤工逺勢古莫比咫尺應湏論萬里乍讀似非用事如男兒既介胄長揖别上官用介胄之士不拜婦人在軍中兵氣恐不揚用軍中豈有女子乎皆用其事而隠其語作詩湏飽其材料李商隠詩好積故實如喜雪詩班扇慵裁素曹衣詎比麻鵝歸逸少宅鶴滿令威家又洛水妃虚妬姑山客謾誇聮辭雖許謝和曲本慙巴一篇中用事者十七八以是知凡作者湏飽材料傳稱任昉用事過多屬辭不得流便余謂昉詩所以不能傾沈約者乃才有限非事多之過坡集有全篇用事者如賀人生子自欝葱佳氣夜充閭喜見徐卿第二雛至我亦從來識英物試教啼看定何如戯張子野買妾自錦里先生自笑狂身長九尺鬢眉蒼至平生謬作安昌客略遣彭宣到後堂句句用事曷嘗不流便哉兩句用一事律詩有一對通用一事者更尋佳樹傳莫忘角弓詩乃左傳韓宣子聘魯嘗賦角弓及譽嘉樹魯人請封植以無忘角弓介甫久諳郭璞言多驗老比顔含意更踈乃景純為顔含筮含曰年在天位在人修巳而天不與命也守道不回性也自有性命無勞蓍龜䂬溪用自巳詩為故事用自巳詩為故事湏作詩多者乃有之太白云滄浪吾有曲相子棹歌聲樂天湏知菊酒登髙㑹從此多無二十場明年云去秋共數登髙㑹又被今年减一場過栗里云昔嘗詠遺風著為十六篇盖居渭上醖熱獨飲曽效淵明體為十六篇又贈㣲之云昔我十年前曽與君相識曽將秋竹竿比君孤且直盖舊詩云有節秋竹竿也坡赴黄州過春風嶺有絶句後詩云去年今日闗山路細雨梅花正斷魂至海外又云春風嶺下淮南村昔年梅花曽斷魂又云柯邱海棠吾有詩獨笑深林誰敢侮又有竹詩云吾詩固云爾可使食無肉䂬溪用其意用其語有意用事有語用事李義山海外徒聞更九州其意則用楊妃在蓬萊山其語則用鄒子云九州之外更有九州如此然後深穏健麗妙於用事元祐中元夕上御樓觀燈有御製詩時王禹玉蔡持正為左右相持正叩禹玉云應制上元詩如何使故事禹玉曰鰲山鳳輦外不可使章子厚笑曰此誰不知後兩日登對上獨賞禹玉詩云妙於使事詩云雪消華月滿僊臺萬燭當樓寳扇開䨇鳳雲中扶輦下六鰲海上駕山來鎬京春酒沾周宴汾水秋風陋漢才一曲昇平人盡樂君王又進紫霞杯是夕以髙麗進樂又添一杯侯鯖錄不拘故常韋應物詩云心同野鶴與塵逺詩似氷壺徹底清又送人詩氷壺見底未為清少年如玉有詩名此可謂用事之法盖不拘故常也黄常明詩話用事天然東坡最善用事既顯而易讀又切當若招持服人遊湖不赴云頗憶呼盧袁彦道難邀罵坐灌將軍栁氏求書答云君家自有元和脚莫厭家雞更問人天然竒特漫叟詩話用事清切東坡和李公擇詩云弊裘羸馬古河濵野闊天低糝玉塵自笑飡氈典屬國來看換酒謫仙人為蘇李也用事親切如此它人不及也用事的當東坡自揚州召還郊禮後有次韻蔣穎叔錢穆甫從駕景靈宫二詩一云歸來病鶴記城闉舊踏松枝雨露新半白不羞垂領雪軟紅猶戀屬車塵雨收九陌豐登後日麗三元下降辰粗識君王為民意不才何以助精禋王仲至和之末云誰知第七車中客天遣歸來助慶禋坡稱歎久之盖漢倪寛川人自揚州太守召來坡亦川人自揚州太守召來漢武帝郊禮回至渭橋上見一婦人洗乳於渭水上帝遣問之婦人曰第七車中客知我也上使使問是倪寛寛奏曰天上長乳星祭祀不潔即見帝􅌶然坡時為尚書亦乘車在駕前藜藿野人詩話用事精確夏文莊守安州莒公兄弟尚在布衣文莊異待之命作落花詩莒公一聮云漢臯佩冷臨江失金谷樓危倒地香子京一聮云將飛更作回風舞巳落猶成半面粧余觀南史宋元帝妃徐氏無容質不見禮以帝眇一目知帝將至必為半面粧以待此半面粧所從出也若回風舞無出處則對偶偏枯不為佳句殊不知乃出李賀詩云花臺欲暮春辭去落花起作回風舞前輩用事必有來處又精確如此誠可為法也漁隠余襄公有落花詩云金谷巳空新歩障馬嵬徒見舊香囊可亞二宋三山老人語錄諺云去家千里勿食蘿摩枸杞山谷嘗賦道院枸杞詩云去家尚勿食出家安用許時同賦者服其用事精確漫叟詩話用事精宻魯直善用事若正爾填塞故實舊謂之㸃鬼簿今謂之牽絆死屍如詠猩猩毛筆詩云平生幾兩屐身後五車書又云管城子無食肉相孔方兄有絶交書精妙穏宻不可加矣當以此語反三隅也類苑荆公送吳仲庶待制守潭詩云自古楚有材醽醁多羙酒不知樽前客更得賈生否賈誼初為吳公召置門下後謫死長沙其用事之精可以為法王直方詩話叙事詳盡熈寜元年有司言日當食四月朔上為撤膳避正殿時方㣲雨明日不見日食百官入賀是日有皇子之慶蔡持正為樞副獻詩前四句曰昨夜薰風入舜韶君王端御正衙朝陽輝已得前星助隂沴潜隨夜雨消其叙四月一日避正殿皇子慶誕雲隂不見日食四句盡之當時旡能過之者筆錄用人名前輩譏作詩多用古人名姓謂之㸃鬼簿其語雖然如此亦在用之如何耳不可執以為定論也如山谷種竹云程嬰杵臼立孤難伯夷叔齊食薇瘦接花云雍也本犁子仲由元鄙人此雖多用善於比喻何害其為好句也漁隠用經史中語大率詩語出入經史自然有力然湏是看多做多使自家機杼風骨先立然後使得經史中全語作一體也如是自出語弱却使經史中全語則頭尾不相勾副如兩村夫􅐝一枝畫梁自覺經史中語在人眼中不入看也漫齋語錄皆用古語荆公賦梅花云肌冰綽約如姑射膚雪參差是玉真莊子曰藐姑射之山有神人居焉肌膚若冰雪綽約若處子樂天長恨歌曰中有一人字玉真雪膚花貌參差似兩句皆用古語但易一如字爾東平雜錄一字不茍熈寜初張掞以二府初成作詩賀荆公公和曰功落蕭䂓慙漢第恩從隗始詫燕臺以示陸農師農師曰蕭䂓曹隨髙帝論功蕭何第一皆摭故實而請從隗始初無恩字公笑曰子善問也韓退之闘雞聮句感恩慙隗始若無據豈當對功字也乃知前人以用事一字偏枯為倒置眉目反易巾裳盖謹之如此苕溪漁隠曰荆公春日絶句云春風過栁綠如繰晴日蒸紅出小桃余嘗疑蒸紅必有所據後讀退之桃源圖詩云種桃處處惟開花川原逺近蒸紅霞盖出此也西清詩話不可牽彊詩之用事不可牽彊必至於不得不用而後用之則事辭為一莫見其安排闘湊之迹蘇子瞻嘗作人挽詩云豈意日斜庚子後忽驚歳在巳辰年此乃天生作對不假人力石林詩話不可牽出處蘇子瞻嘗兩用孔稚圭鳴蛙事如水底笙歌蛙兩部山中奴𨽻橘千頭雖以笙歌易皷吹不礙其意同至巳遣亂蛙成兩部更邀明月作三人則成兩部不知謂何物亦是歇後盖用事寜與出處語小異而意同不可盡牽出處語而意不顯也石林詩話晦翁詩先生言阿骨打初破遼國勇鋭無敵及既下遼席巻其子女而北肆意蠱惑行未至其國而死因笑謂趙昌父曰頃年於吕季克處見一畫巻畫主將與燕姬並轡而語季克苦求詩某勉為之賦未兩句云却是燕姬解迎敵不教行到殺胡林正用阿骨打事也此詩首兩句云傳聞姑覲欲南侵愁殺窮邉猛將心誠齋論用經語詩句固難用經語然善用者不勝其韻李師中云夜如何其斗欲落歳云莫矣天無晴又山如仁者靜風似聖之清又詩成白也知無敵花落虞兮可奈何誠齋論用事以俗為雅有用法家吏文語為詩句者所謂以俗為雅坡云避謗詩尋醫畏病酒入務如前巻僧顯萬探支䦨入亦此類也誠齋論使事法詩家借用古人語而不用其意最為妙法如山谷猩猩毛筆是也猩猩喜着屐故用阮孚事其毛作筆用之抄書故用恵施事二事皆借人以詠物初非猩猩毛筆事也左傳云深山大澤實生龍蛇而山谷中秋月詩云寒藤老本被光景深山大澤皆龍蛇周禮考工記車人盖圜以象天軫方以象地而山谷云丈夫要𢎞毅天地為盖軫孟子云武成取二三䇿而山谷稱東坡云平生五車書未吐二三䇿陵陽論用事使事要事自我使不可反為事使僕曰如公太乙圖詩不是峯頭十丈花世間那得蓮如許當如是耶公徐曰事可使即使不湏强使耳室中語誤用事唐人以詩為專門之學雖名世善用故事者或未免少誤如王摩詰詩衛青不敗由天幸李廣無功縁數竒不敗由天幸乃霍去病非衛青也去病傳云其軍嘗先大將軍軍亦有天幸未嘗困絶意有大將軍字誤指去病作衛青耳李太白山隂道士如相訪為寫黄庭換白鵝乃道徳經非黄庭也逸少嘗寫黄庭經與王脩故二事相紊杜牧之尤不勝數前輩每云用事雖了在心目間亦當就時討閲則記牢而不誤端名言也西清詩話古今詩話美方諤上廣守詩鰐去溪潭韓吏部珠還合補孟嘗君不知珠還合浦乃後漢孟嘗不可以孟嘗君遷就也復齋漫錄失事實杜牧華清宫詩云長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知道荔支來尤膾炙人口據唐紀明皇以十月幸驪山至春即還宫是未嘗六月在驪山也然荔枝盛暑方熟詞意雖美而失事實遯齋閒覽用事失照管荆公桃源行云望夷宫中鹿為馬秦人半死長城下指鹿為馬乃二世事而長城之役乃始皇也又指鹿事不在望夷宫中荆公此詩追配古人惜乎用事失照管為可恨耳髙齋詩話用事未盡善摩詰山中送别詩云山中相送罷日暮掩柴扉春草年年綠王孫歸不歸盖用楚詞王孫遊兮不歸春草生兮萋萋此善用事也余舊記一小詞不知誰人作云楊栁青青着地垂楊花漫漫攪天飛栁條折盡花吹盡借問行人歸不歸古樂府有折楊栁云曲城攀折處惟言久别離又云攀折思為贈心期别路長又云曲中無别意併是為相思皆言折楊栁以寄相思之意不言其歸則前詩用事為未盡善也漁隠用事重疊韓熈載云風栁揺揺無定枝陽臺雲雨夢中歸他年蓬島音塵絶留取樽前舊舞衣此詩既言陽臺又言蓬島何用事重疊如此詩載小說稱為佳句余謂疵病如此殆非佳句也率爾用事古人作詩引用故實或不原其美惡但以一時中的而巳如李端於郭曖席上賦詩其警句云新開金埒教調馬舊賜銅山許鑄錢乃比鄧通耳既非令人又非美事何足筭哉凡用故事多以事淺語熟更不思䆒率爾用之徃徃有誤西齋話紀壓韻工於押韻冦萊公延僧恵崇於池亭分題為詩公採得池上栁青字韻崇探得池鷺明字韻自午至晡崇忽㸃頭曰得之矣此篇功在明字凡五壓不倒公曰試口占曰雨歇方塘溢遲回不復驚暴翎沙日暖引歩島風清照水千尋逈棲煙一㸃明主人池上鳳見爾憶蓬瀛公笑曰吾栁之功在青字而四壓不倒不如且巳古今詩話巧於押韻作詩押韻是一巧中秋夜月詩押尖字數首之後一婦人云蚌胎光透殻犀角暈盈尖許彦周詩話古今詩用韻謂字有通作他聲押韻者泛引詩及文選古詩為證殊不知蔡寛夫詩話嘗云秦漢以前字書未備既多假借而音無反切平側皆通用自齊梁後既拘以四聲又限以音韻故士率以偶儷聲病為工然則字通作他聲押韻於古詩則可若於律詩誠不當如此余謂裴䖍餘之詩落韻又本此耳學林新編落韻裴䖍餘云滿額鵝黄金縷衣翠翹浮動玉釵垂從教水濺羅襦濕疑是巫山行雨歸廣韻集韻韻略垂與歸皆不同韻此詩為落韻矣漁隠不可强押韻前史稱王筠善押强韻固是詩家要處然人貪於捉對用事者徃徃多有趂韻之失退之筆力雄贍務以詞采憑陵一時故間亦不免此患如和席八絳闕銀河曉東風古掖春詩終篇皆叙西垣事然其一聮云傍砌看紅藥廵池詠白蘋事除栁惲外别無出處若是用此則於前後詩意無相干且趂蘋字韻而巳然則人亦有事非當用而罏錘驅駕若出自然者杜子美收東京詩以櫻桃對杖杜薦櫻桃事初若不類及其云賞因歌杕杜歸及薦櫻桃則渾然天成略不見率强之迹如此乃為工耳蔡寛夫詩話古詩不拘韻世俗相傳古詩不必拘於用韻余謂不然如杜少陵早發射洪縣南途中作及字韻詩皆用緝字一韻未嘗用外韻也及觀東坡與陳季常汁字韻一篇詩而用六韻殊與老杜異其他側韻詩多如此以其名重當世無敢訾議至荆公則無是弊矣其得子固書因寄以及字韻詩其一篇中押數韻亦止用緝字一韻他皆類此正與老杜合苕溪漁隠曰黄朝英之言非也老杜側韻詩何嘗不用外韻如戱呈元二十一曹長未字韻一篇詩而用五韻南池谷字韻一篇詩而用四韻客堂蜀字韻一篇詩而用三韻此特舉其二三耳其他如此者甚衆今若以一篇詩偶不用外韻遂為定格則老杜何以謂之能兼衆體也黄既不細考老杜諸詩又且輕議東坡尤為可笑六一居士云韓退之工於用韻其得韻寛則波瀾横溢泛入傍韻乍還乍離出入回合殆不可拘以常格如此日足可惜之類是也得韻窄則不復傍出而因難以見巧愈險愈竒如病中贈張十八之類是也譬夫善馭良馬者通衢廣陌縱横馳逐惟意所之至於水曲蟻封疾徐中節而不蹉跌乃天下之至工也且退之於用韻猶能如此孰謂老杜反不能之是又非黄所能知也細素雜記重押韻退之詩好押狹韻累句以示工而不知重疊用韻之為病也䨇鳥詩押兩頭字杏花詩押兩花字苕溪漁隠曰讀皇甫湜公安園池詩亦押兩閑字日夜不得閑君子不可閑盖退之好重疊用韻以盡巳之詩意不恤其為病也孔毅夫雜記杜子美飲中八仙歌曰知章騎馬似乘船又天子呼來不上船一曰眼花落井水底眠又長安市上酒家眠一曰汝陽三斗始朝天又舉觴白眼望青天一曰皎如玉樹臨風前又曰蘇晉長齋繡佛前又曰脱㡌露頂王公前此歌三十二句而押二船字二眠字二天字三前字近時論詩者曰此歌一首是八段不嫌於重用韻也某按子美此歌以飲中八仙歌五字為題則是一歌也此歌首尾於船字韻中押未嘗移别韻則非分為八段盖子美古律詩重用韻者亦多况於歌乎如園人送𤓰詩曰沈浮亂氷玉愛惜如芝草又曰園人非故侯種此何草草一篇押二草字也上後園山脚詩曰蓐收困用事元㝠蔚彊梁又曰登髙欲有徃蕩析川無梁一篇押二梁字也北征詩曰維時遇艱虞朝野少暇日又曰老夫情懐惡嘔泄卧數日一篇押二日字也䕫府詠懐詩曰雖云隔禮數不敢墜周旋又曰淡交隨聚散澤國遶回旋一篇押二旋字也贈李八秘書詩曰事殊迎代邸喜異賞朱虛又曰風煙巫峽逺臺榭楚宫虛一篇押二虛字也贈李邕詩曰放逐早聮翩低垂困炎厲又曰哀贈竟蕭條恩波延掲厲一篇押二厲字也贈汝陽王詩曰自多親棣蕚誰敢問山陵又曰鴻寳全寜秘丹梯庶可陵一篇押二陵字也喜薛璩岑參遷官詩曰栖遲分半菽浩蕩逐浮萍又曰仰思調玉燭誰定握青萍一篇押二萍字也寄賈岳州嚴巴州兩閣老詩曰討胡愁李廣奉使待張騫又曰如公盡雄雋志必在騰騫一篇押二騫字也子美詩如此類甚多雖然子美非剏意為此者盖有所本也按文選載古詩曰晨風懐苦心蟋蟀傷局促又曰音響一何悲絃急知柱促一篇押二促字也曹子建美女篇曰明珠交玉體珊瑚間木難又曰佳人慕髙義求賢良獨難一篇押二難字也謝靈運述祖徳詩曰段生蕃魏國展季救魯人又曰外物辭所賞勵志故絶人一篇押二人字也又南圃詩曰樵隠俱在山由來事不同又曰賞心不可忘妙善冀皆同一篇押二同字也又初去郡詩曰或可優貪競豈足稱逹生又曰畢娶類尚子薄遊似邴生一篇押二生字陸士衡擬古詩曰此思亦何思思君徽與音又曰驚飇褰反信歸雲難寄音一篇押二音字又豫章行曰汎舟清川渚遥望髙山隂又曰寄世將幾何日昃無停隂一篇押二隂字阮嗣宗詠懐詩曰何當行路子磬折忘所歸又曰黄鵠游四海中路將安歸一篇押二歸字江淹雜體詩曰韓公淪賣藥梅生隠市門又曰太平多懽娛飛盖東都門一篇押二門字王仲宣從軍詩曰連舫踰萬艘帶甲千萬人又曰我有素餐責誠愧伐檀人一篇押二人字古人詩自有體格杜子美亦傚古人之作耳韓退之贈張籍詩一篇押二更字二陽字又岳陽樓别竇司直詩押二向字又李花詩押二花字又䨇鳥詩押二州字二頭字二秋字二休字又和盧郎中送槃谷子詩押二行字又示爽詩押二愁字又义魚詩押二銷字寄孟郊詩押二奥字此日足可惜詩押二光字白樂天渭村退居詩押二房字夢遊春詩押二行字寄元㣲之詩押二夷字出守杭州路次藍溪詩押二水字遊悟真寺詩押二槃字其餘詩人如此疊用韻者甚多不可具舉意到即押耳奚獨於飲中八仙歌而致恠耶子瞻送江公著詩曰忽憶釣臺歸洗耳又曰亦念人生行樂耳自注曰二耳義不同故得重用盖子瞻自不必注和韻工妙東坡和栁子玉岡字韻詩至七篇云屢把鈆刀齒歩光更遭華衮照龎凉乃用曹子建七啓兮歩光之劔華藻繁縟及左傳龎凉冬殺事雖第一韻人所更易而七篇未嘗改又貫穿精絶如此黄常明詩話為韻所牽寰宇記載西施事云施其姓也是時有東施家西施家故李太白詩自古有秀色西施與東鄰而東坡代人贈別乃云絳蠟燒殘玉斚飛離歌唱徹萬行啼他年一舸鴟夷去記取儂家舊姓西豈為韻所牽耶丹鵷集屬對六對唐上官儀曰詩有六對一曰正名對天地日月是也二曰同類對花葉草芽是也三曰連珠對蕭蕭赫赫是也四曰䨇聲對黄槐綠栁是也五曰疊韻對彷徨放曠是也六曰䨇擬對春樹秋池是也又曰詩有八對一曰的名對送酒東南去迎琴西北來是也二曰異類對風織池間樹虫穿草上文是也三曰䨇聲對秋露香佳菊春風馥麗蘭是也四曰疊韻對放蕩千般意遷延一个心是也五曰聮綿對殘河若帶初月如眉是也六曰䨇擬對議月眉欺月論花頰勝花是也七曰囬文對情新因意得意得逐情新是也八曰隔句對相思復相憶夜夜淚沾衣空歎復空泣朝朝君未歸是也詩苑類格誠齋稱木天金地之對廬陵村落地名何山有金地寺壁間有廬陵丞某人留題云今朝憩息來金地何日翺翔到木天觀者歎其的對後美中再入館職唱和云見説木天猶突兀暫時金地亦清閒是時南渡之後駐蹕臨安百司官寺未立暫寓一僧舍為秘書省而汴京本省猶未毁美中此聮朝士歎其親切陵陽謂對偶不必拘繩墨嘗與公論對偶如剛腸欺竹葉衰鬢怯菱花以鏡名對酒名雖為親切至如杜子美云竹葉於人既無分菊花從此不湏開直以菊花對竹葉便蕭散不為繩墨所窘公曰枸杞因吾有雞栖奈汝何盖借枸杞以對雞栖冬温蚊蚋在人逺鳬鴨亂人逺如鳬鴨然又直以字對而不對意此皆例子不可不知子瞻岐亭詩云洗盞酌鵝黄磨刀切熊白是用例者也巧對荆公詩草深留翠碧花逺没黄鸝人只知翠碧黄鸝為精切不知是四色也又以武邱對文鷁殺青對生白苦吟對甘飲飛瓊對弄玉世皆不及其工小村以錦字對琴心荆公以帶眼對琴心謝夷季以鏡約對琴心亦荆公為最精切近時洪駒父以青奴對黄妳黄妳出金樓子青奴山谷所名也予讀國史補得銀鹿後以對子建集中金瓠濕螢出李長吉集乾鵲出西京雜記予以濕螢對乾鵲又王存以河魚對海鳥人以為工雪浪齊日記屬對精切潘子真為予言晉公詩綠楊垂手舞黄鳥緩聲歌樂府有大垂手小垂手前緩聲後緩聲故予用之其屬對律切如此洪駒父詩話對偶親切帝與九齡雖吉夢山呼萬歳是虛聲此樂天作開成大行挽詞對事親切少有其比也王直方詩話銖兩不差晩唐詩句尚切對然氣韻甚卑鄭棨山居云童子病歸去鹿麑寒入來自謂銖兩輕重不差有人作梅花詩云强半瘦因前夜雪數枝愁向曉來天對屬雖偏亦有佳處詩史無斧鑿㾗文之所以貴對偶者謂出於自然非假於牽强也潘子真詩話記禹玉元豐間以錢一萬酒二壺餉吕夢得夢得作啓謝之有白水真人青州從事禹玉歎賞為其切題東坡得章質夫書遺酒六瓶書至而酒亡因作詩寄之云豈意青州六從事化為烏有一先生二句渾然一意無斧鑿㾗更覺有功復齋謾錄一字不茍晉公自朱崖内徙浮光清逸尚㓜侍曽祖母夀安縣君歸寜陶商翁其族姪也亦自義郴來晉公一日循江湄散歩見舟行戱為語曰舟移水面曲令諸甥對之陶應聲云雲過山眉展予以謂水實有面眉以况山虛實不等當作雲過山腰細規模雖出一時不甚超卓然前輩屬詞之切教導後生亦自有方潘子真詩話老杜對偶天闚象緯逼雲卧衣裳冷先生詩該衆美者不惟近體嚴於屬對至於古風句對者亦然觀此詩可見矣近人論詩多以不必屬對為髙古何耶少陵詩正異不可參以異代荆公詩用法甚嚴尤精於對偶嘗云用漢人語止可以漢人語對若參以異代語便不相類如一水護田將綠遶兩山排闥送青來之類皆漢人語也此法惟公用之不覺拘窘卑凡如周顒宅作阿蘭若婁約身歸窣堵波皆以梵語對梵語亦此類嘗有人面稱公詩自喜田園歸五栁最嫌尸祝擾庚桑之句以為的對公笑曰君但知栁對桑為的然庚亦自是數盖以十千數之也石林詩話佳對杜詩有自天題處濕當暑着來清自天當暑乃全語也東坡詩云公獨未知其趣耳臣今時復一中之可謂青出於藍苕溪漁隠曰東坡此詩戯徐君猷孟亨之皆不飲酒不止天生此對其全篇用事親切尤為可喜詩云孟嘉嗜酒桓温笑徐邈狂言孟德疑公獨未知其趣耳臣今時復一中之風流自有髙人識通介寜隨薄俗移二子有靈應撫掌吾孫還有獨醒時皆徐孟二人事也又王直方詩話載蔡寛夫天啓為太學博士和人治字韻詩有先生萬古名何用博士三年冗不治與此相類亦佳對也漫叟詩話的對唐許渾題孫處士居云髙歌懐地肺逺賦憶天台極為的對真誥曰金陵者洞墟之膏腴勾曲之地肺注云其地肥故曰膏腴水至則浮故曰地肺餘話竒對對句法人不過以事以意出處備具謂之妙荆公曰平昔離愁寛帶眼迄今歸思滿琴心又曰欲寄荒寒無善畫頼傳悲壯有能琴不若東坡竒特如曰見説騎鯨遊汗漫亦曽捫虱話辛酸又曰龍驤萬斛不敢過漁舟一葉從掀舞以鯨為虱對龍驤為漁舟對大小氣熖之不等其意若玩世謂之秀傑之氣終不可沒借對沈佺期回波詞云姓名雖䝉齒錄袍笏未換牙緋杜子美詩飲子頻通汗懐君想報珠以飲子對懐君亦齒錄牙緋之比也東坡荆公和人詩以庚桑對五栁黄耇日對白雞年漫叟詩話根非生下土葉不墜秋風五峯髙不下萬木幾經秋以下對秋盖夏字聲同也因尋樵子徑偶到葛洪家殘春紅藥在終日子規啼以子對紅以紅對子皆假其色也閑聽一夜雨更對栢巖僧住山今十載明日又遷居以一對栢以十對遷假其數也禁臠詩家有假對本非用意盖造語適到因以用之若杜子美本無丹竈術那免白頭翁韓退之眼穿長訝雙魚斷耳熱何辭數爵頻丹對白爵對魚皆偶然相值立意下句初不在此而晩唐諸人遂立以為格賈島巻簾黄葉落開戸子規啼崔峒因尋樵子徑偶到葛洪家為例以為假對勝的對謂之髙手所謂癡人面前不得説夢也蔡寛夫詩話不可泥對荆公云凡人作詩不可泥於對屬如歐陽公作泥滑滑云畫簾隂隂隔宫燭禁漏杳杳深千門千字不可以對宫字若當時作朱門雖可以對而句力便弱耳王直方退之古詩故避屬對退之作古詩有故避屬對者如淮之水舒舒楚山且叢叢是也唐子西語錄詩人玉屑巻七
