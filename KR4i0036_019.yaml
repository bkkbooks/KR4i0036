body:
  text: 詩人玉屑卷十九宋魏慶之撰中興諸賢誠齊品藻中興以後詩見第二卷詩評類誠齊白石之評楊誠齊序千巖摘藁云余嘗論近世之詩人若范石湖之清新尤梁溪之平淡陸放翁之敷腴蕭千巖之工緻皆余之所畏者姜白石詩藁自序云尤延之先生為余言近世士人喜宗江西溫潤有如范至能者乎痛快有如楊廷秀者乎高古如蕭東夫俊逸如陸務觀是皆自出機軸亶有可觀者又奚以江西為觀二公推許想見當時騷雅之盛建安大歷風斯在下矣趙威伯詩餘話周益公周益公兄乘成居士周子中生於乙巳益公丙午誠齊丁未郡人劉訥敏叔寫為三老圖益公題詩云同辭宦路返鄉閭兩驌驦中間以駑前後顧瞻羞倚玉支干引從偶連珠三人不必邀明月九老何妨續畫圖從漢二疏唐尹後相親相近此應無誠齊題二絶云旦奭行間著季真黃冠不合附青雲二南風裏君知麼添個委蛇退食人劉郎寫照妙通神三老圖成又一新只道老韓同傳好被人指㸃也愁人益公形容甚工誠齊謙遜自處真一時盛事云餘話曾茶山唐人詩喜以兩句道一事曾茶山詩中多用此體如界從江北路重到竹西亭若無三日雨那復一年秋似知重九日故放兩三花次第翻經集呼兒理在亡又得清新句如聞謦咳音如何萬家縣不見一枝梅此格亦甚省力也王林中與詩話補遺曾文清謝路憲送蟹詩從來嘆賞內黃侯風味尊前第一流只合蹣跚赴湯鼎不須辛苦上糟邱內黃侯三字甚新餘話曾文清云山谷以竹夫人為竹奴余亦名腳婆為錫奴戲作絶句霧帳桃笙晝寢餘此君那可一朝無秋來冷落同班扇歲晚溫柔是錫奴餘話陸放翁嘉泰壬戌九月陸放翁夢一故人相語曰我為蓮花博士鏡湖新置官也我且去矣君能暫為之乎月得酒千壺亦不惡也遂以詩記之曰白首歸修汗簡書每因囊粟歎侏儒不知月給千壺酒得似蓮花博士無又夢到萬頃荷華中有詩云天風無際路茫茫老作花王風露郎只把千樽為月俸為嫌銅臭雜花香此事甚新奇可入詩料趙章泉梅課東坡謂晨飲為澆書李黃門謂午睡為攤飯陸務觀嘗有絶句云澆書滿挹浮蛆瓮攤飯橫眠夢蝶牀莫笑山翁見機晚也勝朝士一生忙餘話陸放翁詩本於茶山故趙仲白題曾文清公詩集云清於月出初三夜淡似湯烹第一泉咄咄逼人門弟子劒南已見一燈傳劒南謂放翁也然茶山之學亦出於韓子蒼三家句律大概相似至放翁則加豪矣近歲又有學唐人詩而實用陸之法度者其間亦多酷似處遍參諸家之詩者當自知之玉林劉忠肅勸駕詩十載湘江守重來白髮垂初無下車教再賦食革詩天闊摶鵬翼春融長桂枝功名倘來事大節要須持此劉忠肅公珙帥潭日勸駕詩也斷章可見前修勉厲後學之意比近世一例以倫魁相期者遠矣玉林韋齊先生韋齊先生自為兒童時出語已驚人及去場屋始放意為詩文其詩初亦不事雕飾而天然秀發格力閒暇超然有出塵之趣晦庵病翁病翁少時所作聞箏詩規摹意態全是學文選樂府諸篇不雜近世俗體故其氣韻高古而音節華暢一時流輩少能及之其詩曰月高夜鳴箏聲從綺忩來隨風更迢遞縈雲暫徘徊餘音若可玩繁弦互相催不見理箏人遙知心所懷寧悲舊寵弃豈念新期乖含情鬱不發寄曲宣餘哀一彈飛霜零再撫流光頽每恨聽者稀銀甲生浮埃幽幽孤鳯吟衆鳥聲難諧盛年嗟不偶况乃容華衰道同符片諾志異勞事媒栖栖牆東客亦抱凌雲才晦庵楊誠齊六言絶句如王摩詰桃紅復含夜雨及王荆公楊栁鳴蜩緑暗二詩最為警絶後難繼者近世惟楊誠齊醉歸一章月在荔枝梢上人行豆蔲花間但覺胸吞碧海不知身落南蠻雄健富麗殆將及之玉林天下未嘗無對東坡以章質夫寄酒不至作詩云豈意青州六從事化為烏有一先生或以緑研寄楊誠齊為人以柏木簡換去誠齊用此意作詩謝云如何緑玉含風面化作青銅溜雨枝二事可為奇對亦善用坡詩也玉林晦庵先生與誠齊吟詠甚多然頗好戲謔劉約之丞廬陵過誠齊語及晦庵足疾誠齊因贈約之詩云忠顯聞孫定不虛西樞猶子固應殊鸞停梧上遺風在鶩進松間得句無䞉有老農歌贊府未多薦墨送清都晦庵若問誠齊叟上下千峯不用扶晦翁後視詩笑云我疾猶在足誠齊疾在口耳栁溪呂炎近録康伯可康伯可與之紹興間過清江遊慧力寺題二詩於松風亭其一云天涯芳草盡緑路傍柳絮爭飛啼鳥一聲春晚落花滿地人歸其二云江上濃隂曉未開瘦笻支我上蒼苔春寒前日已去盡今日又從何處來餘話康與之在高宗朝以詩章應制與左璫狎適睿思殿有徽祖御畫特為卓絶上時持玩以起羮牆之悲璫下直竊攜至家而康適來留之飲因出示之康紿璫入取殽核輒書一絶于上曰玉輦宸遊事已空尚餘奎藻繪春風年年花鳥無窮恨盡在蒼梧夕照中璫見之大駭然無可奈何明日伺間扣頭請死上大怒亟取視之天威頓霽一慟而已餘話姜堯章姜堯章䕫居苕溪與白石洞天為鄰潘轉翁字之曰白石道人且畀以詩曰人間官爵似摴蒱采到枯松亦大夫白石道人新拜號斷無繳駁任稱呼堯章報以長句其詞云南山仙人何所食夜夜山中煮白石世人喚作白石仙一生費齒不費錢仙人食罷腹便便七十二峯生肺肝真租只在南山南我欲從之不憚逺無方煮石何由軟佳名錫我何敢辭但愁自此長苦饑囊中只有轉庵詩便當掬水三咽之餘話敖器之慶元間韓托胄用事貶趙忠定公于永州次衡陽泊古酃一夕而死敖器之陶孫時處上庠以詩哭之曰左手旋乾右轉坤羣邪嫉正竟流言狼胡無地歸姬旦魚腹終天痛屈原一死固知公不免孤忠賴有史長存九原若遇韓忠獻休說渠家末世孫餘話趙章泉趙章泉哭蔡西山云鵑呌春林復遞詩鴈回霜月忽傳悲蘭枯蕙死迷三楚雨暗雲昏礙九嶷早歲力辭公府檄暮年名與黨人碑嗚呼季子延陵墓不待鑱辭行可知蓋晦庵書西山墓碣云嗚呼有宋蔡季通父之墓效夫子書延陵季子之墓也當時哭詩推此篇為冠栁溪韓澗泉甲申秋澗泉韓仲止有三詩其一云近城人語雜深山人語少重露滴煙嵐野水見魚鳥稻梁豐稔外耕鑿願溫飽所以桃源人不與外人道其二云往來是日月變動是寒暑伏臘雖不周爾且對妻子遙知風塵表萬象互吞吐所以鹿門人江左不得取其三云少壯既奚為老矣復難强紫芝未必仙採之亦可餉耆耄八九十道可無俯仰所以商山人辭漢寧復往蓋絶筆之作戴石屏哭詩所謂凄凉絶筆篇可竝史書傳者此也章泉先生跋云周漢歷歷上下秦侯王將相史疊陳辱斯榮斯仁不仁桃源鹿門商山人南澗遠孫澗之濵所以三人入呻吟桃源本是耕稼民鹿門商山抱經綸一世雖屈九原伸所以絶筆於獲麟我之擬賦非厥倫威公語我淚沾巾兩公之詩英妙高絶真可以並傳千古然而寄大音於穴寥之表存至味於淡泊之中非具眼者不能識也玉林歐陽伯威廬陵歐陽伯威鈇少與周益公同場屋連戰不利遂篤意於詩誠齊嘗摘其警句抄之如西風五更雨南雁數行書詩成夔子國人在仲宣樓細雨雙飛鷺寒簑獨釣船夢回千里外燈轉一窗深誰知花過半才與酒相尋故人驚㑹面新恨說從頭天上張公子雲間陸士龍月白𤣥猿哭更殘絡緯悲語離遽如許話舊復何時巷南巷北人招飲一雨一晴花耐看有客過門湖海士隔籬呼酒咄嗟間夢回金馬玉堂上文在冰甌雪碗中青山如故情非故芳草喚愁詩遣愁擾擾征人相顧語蕭蕭落木不勝秋風色似傳花信到夕陽微放柳梢晴千里歸來人事改十年猶幸此身存絶句四首戀樹殘紅濕不飛楊花雪落水生衣年來百念成灰冷無語送春春自歸桑麻得雨更青葱芍藥留春結晚紅怪得鳥聲如許好此身還在亂山中為憐紅杏卧枝斜看到斜陽送亂鴉又是一春窮不死天教留眼看鶯花蓬忩卧聽踈疏雨却似芭蕉夜半聲煙浪蔽天天倚蓋略容一㸃白鷗明公跋云鳥啼花落欣然㑹心處酌大白咽伯威詩欲馭風騎氣也餘話餘話載歐陽伯威摘句尚有遺者其五言古體遊禾山寺云愛山如愛酒畏暑如畏虎出門尋舊遊缺月四更吐名二子云先君以官貧我仍遺以安但願兩兒健扶持一翁孱何須待門生悠然柴桑間和人云更闌待月華風露寒欲僵論文云讀書豈為官病暑云心清時自暑其七言古體卜居云此生老矣益飄零湯餅來年又何所是身如寓敢求安更著小軒名以寓憑誰呌閽與帝語有客多艱乃如許水花為客啼紅雨遊愚堂云聞說名園尚修竹花壓頽垣笋穿屋雨痕半掩壁間詩饑鼠跳梁狐晝啼前人已為後人笑後人更使誰人悲全盛幾時奈衰何古來興廢何其多和伍武仲云未知一歲於此水幾回照影慙栖栖失身竟墮管城計錯路不為田舍兒此皆措詞之精絶誠齊所拈出者不知趙公何為刪之也豈别有意耶玉林曾景建蔡西山貶道州曾景建寄詩云四海朱夫子徵君獨典刑青雲伯夷傳白首太元經有客憐孤憤無人問獨醒瑶琴空寶匣絃斷不堪聽晦庵跋有云景建詩甚佳顧老拙不足以當之栁溪曾景建作文公先生挽詞皇天開太極庚戌聖賢生六籍文將絶千年道復明淵源羅仲素師友李延平繞舍閩溪急潺湲洛水聲蓋夫子與文公皆生於庚戌故也然惟文公當之無愧若他人則擬非其倫如世人作達官挽章例用夢奠兩楹者皆非也玉林馬古洲古洲馬莊父嘗賦烏林詞云荆州兒曹不足恃何物老瞞欺一世兵書浪讀十三篇不料烏林出奇計隆凖雲孫驅伏龍紫髯强援要江東戈船植羽蔽寒日雪浪崩崖驚晚風行間一卒如兒戲持火絶江人不意灰銷漢賊終老心功入喬家少年壻君不見華容道旁春草生魂銷不聽車馬聲哀猿夜啼霜月冷空餘野燐沙邊明辭意精深不減張籍王建之樂府惜世無知者録以遺後人共評之玉林吳明老西風颯颯動長林斗酒沽來伴月斟慷慨未應憂裋褐悲歌元不為秋砧誰云塞馬年年健自是君門浩浩深世祖神丰似高帝楚囚珍重莫沾襟吳明老之詩也明老建陽人剛介有志操詩文雖不純意趣亦殊可采小園解后録蕭千岩黃白石蕭千岩立春詩云半夜新春入管城平明銅雀緑苔生浮澌把斷東風路訴與青州借援兵黃白石雪詩云瑶林中有翳桑兒鼎貴生涯不救饑願縮天人散花手放渠奔走趂晨炊白石學於千岩此二詩未易伯仲也玉林孫花翁孫花翁嘗賦所見云疊却霞綃上醮衣女童髽髻緑楊垂重調峨黛為眉淺再試弓鞋舉步遲紫府煙花鶯喚醒仙房雲雨鶴通知簾低紅杏春風暖清夢曾應見舊師蓋為女冠還俗而作其屬思佳處殆不減唐人也玉林孫南叟麻姑山瀑布泉兩派而下灌溉甚博豐城孫南叟伯溫為南城簿嘗遊賦古風云九關守不嚴失却兩玉龍塵世著不得忽來此山中雷霆白晝間冰雪詩人胸天公不汝尤為人作年豐甚有江西體餘話蕭梅坡誠齊跋蕭梅坡詩卷云西昌有客學南昌衣鉢真傳快閣旁坡底詩人梅底醉花為句子蘂為章想應踏月枝枝瘦贈我盈編字字香若畫江西後宗派不愁擒賊不擒王周益公和云詩句驚人日以昌巍科只待賦阿旁源深元自流三峽幹老今誰敵豫章肯向香山尋白傳自謂也曾從江夏學黃香漢庭結綬君家事休羡彈冠貢與王坡詩云妙語有黃香正指山谷君姓字又與蕭育適同徐竹隱和云知君得法自南昌作舍何須問道旁二老未嘗輕許可兩詩固已為平章胸橫雲岫無窮意語帶梅坡不盡香政乏綺紈相嫵媚不妨風氣似諸王君名彥育其西湖雜詠云花心亭上坐滿眼是湖光只為便幽趣能來倚夕陽水邊春寺靜栁下小舟藏不待清明近鶯花已自忙其梁家渡云遠水環沙翠作灣紅塵飛不入青山凉風一枕秋宵夢夢繞千岩萬壑間其清明日早出太平門云江頭楊柳暗藏鴉江上鵝兒浴淺沙早起一風如此惡路傍落盡拆桐花嘗鼎一臠其㫖可知况有三老為之印可乎玉林劉伯寵劉褒伯寵武夷之文士詩筆甚工嘗宦于朝以臺評而歸有句云去日春蠶吐素絲歸時秋菊剝金衣沙鷗不入鴛鴻侣依舊滄浪繞釣磯怨而不怒之辭也栁溪游伯莊游儀伯莊長平之勝士早遊京師自北方縱覽名山已而浮洞庭歸隱武溪之上過武昌時有題黃鶴樓詩膾炙人口游默齊嘗書置南樓游受齊漕湖北日復為之刻石其詩云長川巨浪拍天浮城郭相望萬景投漢水北吞雲夢入蜀江西帶洞庭流角聲交送千家月野色中分兩岸秋黃鶴樓前人不見却尋鸚鵡過汀洲柳溪劉改之梅和勝執禮未第時家極貧雪中以詩謁里宰云有令可干難閉户無人堪訪懶移舟近世劉改之過詠雪詩云功名有分平吳易貧賤無交訪戴難句法亦相似玉林趙南塘趙南塘題三山黃瀛父擬陶集云閩士工雕篆陶翁暇討論暇之一字蓋他人不能到處惟用工於詩者知之趙天樂趙天樂冷泉夜坐詩云樓鐘晴更響池水夜如深後改更為聽改如為觀病起詩云朝客偶知承送藥野僧相保為持經後改承作親改為作密二聯改此四字精神頓異真如光弼入子儀軍矣玉林天樂送真玉堂詩云每於言事際便作去朝心用唐人林寬語也林寬送惠補闕云長因抗疏日便作去朝心寄趙昌父詩云憶就江樓别雪晴江月圓用無可語也無可同劉升宿云臆就西池宿月圓松竹深贈孔道士詩云生來還姓孔何不戴儒冠用姚合語也姚合贈傅山人云悲君還姓傅獨不夢高宗寶冠寺詩云流來橋下水半是洞中雲用于武陵語也武陵贈王隱人云飛來南浦水半是華山雲瓜廬詩云野水多於地春山半是雲亦用姚合語也姚合送宋愼言云驛路多連水州城半在雲此類甚多姑舉一二蓋讀唐詩既多下筆自然相似非蹈襲也其間又有青於藍者識者自能辨之玉林天樂詩黃梅時節家家雨青草池塘處處蛙約客不來過夜半間敲棊子落燈花意雖腐而語新柳溪東臯子倪壽峯云詩和則歡適雄則偉麗新則清挍遠則閒暇東臯子詩小園無事日徘徊頻報家人送酒來歡適也惜樹不磨修月斧愛花須築避風臺偉麗也引些渠水添池滿移箇柴門傍竹開清拔也多謝有情雙白鷺暫時飛去又飛回間暇也備是四體一篇足矣况鶴鳴子和清唳方徹九臯耶東臯子字敏才戴石屏之先君子平生好吟而詩之存者惟此一篇與人行躑躅紅邊路日落秭歸啼處山一聯而已故壽峯謂其一篇足矣而清徹九臯蓋謂石屏方以詩鳴云玉林戴石屏嚴子陵釣臺題詠尚矣天台戴式之復古一絶云萬事無心一釣竿三公不換此江山平生恨識劉文叔惹起虛名滿世間亦新奇可喜餘話天台山與鴈山鄰只隔中間一片雲一片雲邊不相識三千里外却逢君人謂石屏此詩視唐人無愧栁溪東坡嘗謂柳子厚漁翁夜傍西嵓宿一篇後兩句雖無亦可余謂戴石屏達觀一詩雖無前四句亦可只云一心似水惟平好萬事如棊不著高王謝功名有遺恨爭如劉阮醉陶陶自是一佳絶句也玉林趙懶庵為戴石屏選詩百餘篇南塘稱其識精到其間白紵歌最古雅今世難得此作云雪為緯玉為經一織三滌手織成一片冰清如夷齊可以為衣陟彼西山于以采薇語簡意深所謂一不為少玉林趙章泉先生云學詩者莫不以杜為師然能如師者鮮矣句或有似之而篇之全似者絶難得陳後山寄外舅郭大夫巴蜀通歸使妻孥且定居深知報消息不忍問何如身健何妨遠情親未肯踈功名欺老病淚盡數行書此陳之全篇似杜者也戴式之亦有思家用陳韻云湖海三年客妻孥四壁居饑寒應不免疾病又何如日夜思歸切平生作計疏愁來仍酒醒不忍讀家書此式之全篇似陳者也趙蹈中所選乃不在數何耶玉林高九萬唐劉言史觀繩伎一篇末聯云坐中還有沾巾者曾見先皇初教時蓋謂元宗遺樂近時高九萬賦觀恩陵御製墨本絶句正用此意詩云淡黃越紙打殘碑盡是先皇御製詩白髮內人和淚看為曾親見寫詩時玉林高菊澗杜小山高菊澗山行即事主人一笑先呼酒勸客三杯便當茶杜小山詩釀雪不成微有雨被風吹散却為晴皆直述其事意脉貫通前輩所謂作文字如寫家書殆謂是歟玉林杜小山杜小山詩尋常一樣窗前月才有梅花便不同蘇召叟詩人家一樣垂楊柳種在宫牆自不同二聯一意任斯庵詩了無公事鈎簾坐一樹冬青落細花趙紫芝詩滿地緑苔看不見細花如雪落冬青意亦相似不知孰先孰後其優劣必有能辨之者玉林劉後村劉後村嘗言古樂府惟李賀最工余觀後村有齊人少翁招魂歌云夜月抱秋衾支枕玉鸞小艷骨泣紅蕪茂陵三十老卧聞秦王女兒吹鳯簫淚入星河翻鵲橋素娥剗襪跨玉兔回望桂宫一㸃霧粉紅小蝶沒柳煙白茅老仙方瞳圓尋愁不見入香髓露花㸃衣碧成水又趙昭儀春浴行花奴一雙鬢垂耳緑繩夜汲露桃蘂青桂寒煙濕不飛玉龍呵暖紅薇水翠靴踏雲雲帖妥燕叉微缷香絲鬌小蓮夾擁真天人紅梅犯雪欹一朵鸞錦屏風畫水月鵁鶄抱頸唼蘭葉劉郎散盡金餅歸笑引香綃護癡蝶又東阿王紀夢行月青露紫翠衾白相思一夜貫地脈帝遣纎阿控緑鸞崑崙低小海如席曲房小幄雙杏坡玉鳬吐麝熏錦窠軟香蕙雨裙叉濕紫雲三尺生紅鞾金蟾吞漏不入咽柔情一㸃薔薇血海山重結千年期碧桃小核生孫枝陳王此恨屏山知此三篇絶類長吉其間精妙處恐賀集中亦不多見也玉林李莊簡李莊簡公光詩清絶可愛越州雙鴈道中一絶云晚潮落盡水涓涓栁老秧齊過禁煙十里人家雞犬靜竹扉斜護掩蠶眠後在政府與秦檜議論不合為中司所擊送藤州安置差密院使臣伴送公戲贈之云日日孤村對落暉蠻煙深處忍分離追攀重見蔡明遠贖罪難逢郭子儀南渡每憂鳶共墮北轅應許鴈相隨馬蹄慣踏關山路他日重來又送誰亦婉而有深意餘話王武臣王武臣度豫章新吳人吟詩有警句如雲生坐來石風掩讀殘書危紅賖晚景漲緑上平沙鴉分供餘食鴿亂著殘棊樵斧和雲斫漁簑帶雪披皆清奇可誦張紫微謝艮齊極稱賞之餘話黃景說周益公休致白石黃景說賀以古風云相公能辭一品官不能辭他九轉丹相公能郤萬鍾粟不能郤他長生籙潭潭之居移氣體新年七十兒童似朝明見客步如飛窗下時時看細字高車得似垂車榮巍冠何如掛冠清深衣獨樂真天人誰其友之聃與彭餘話徐思叔明妃曲古今作者多矣近時徐思叔得之所賦一篇亦為時人膾炙其詞云妾生豈願為胡婦失信寧當纍明主已傷畫史忍欺君莫忍君王更欺虜琵琶却解將心語一曲才終恨何所朦朧胡霧染宫花淚眼橫波時自雨專房更倚黃金賂多少專房棄如土寧從别去得深嚬一步思君一回顧胡山不隔思歸路只把琵琶寫辛苦君不見有言不食古高辛生女無嫌嫁盤瓠高辛事出後漢書餘話黃小園趙章泉為先人賦山居詩云何謂雪名寮應同立積腰要為膏以潤不作睍而消園小鋤斯食書多腹不􅑎青雲附能顯况乃白雲招青雲蓋用遷史伯夷叔齊得夫子而名益章事人所能識惟末句難曉故章泉自注云白雲謂方遠庵伯謨玉林林楚良賦先人小園詩多少名園錢甃地金鈴撼雀護千花君家無此奢豪事七尺慈孫導母車使事而不為事所使佳句也劉溪翁亦甚稱其工玉林馮雙溪雙溪馮熙之有送劉篁㟳絶句云來似孤雲出岫間去如高月耿難攀若為化作修修竹長伴先生篁㟳山辭意灑落送别之作少能及之其自賦交游風月樓詩有一溪流水一溪月八面疏櫺八面風詩流膾炙以為秀傑之句玉林左經臣許少伊被召左經臣追送至白沙不及作詩云短棹無尋處嚴城欲閉門水邊人獨自沙上月黃昏此二十字可謂道盡惜别之情矣至今讀之使人黯然銷魂也玉林劉溪翁劉溪翁淮題韓府詩云寶蓮山下韓家府鬱鬱沉沉深幾許主人飛頭去和虜緑户𤣥牆鎖風雨九世卿家一朝覆太師之誅魏公辱後車不信有前車突兀眼前看此屋趙章泉跋之云何人詠出韓家府是我建陽劉叔通盡道唐人工樂府罕能褒貶似渠工又云誰詠韓家府建陽劉叔通是為聞以戒斯可謂之風妄矣彼托胄哀哉吾魏公向來歌頌者豈但劇秦雄蓋作於嘉定初年也玉林游塘林塘林游子䝉有絶句云黃陵廟前湘水春春煙愁殺渡湘人人隨歸雁去無迹水遠山長歌又新蓋全用唐人李遠詩遠之詩云黃陵廟前莎草春黃陵女兒舊裙新輕舟小棹唱歌去水遠山長愁殺人初不嫌其蹈襲也雖王荆公亦然唐皇甫冉問李二司直云門外水流何處天邊樹繞誰家山絶東西多少朝朝幾度雲遮此蓋用屈原天問體也荆公勘㑹賀蘭山主云賀蘭山上幾株松南北東西共幾峯貿得住來今幾日尋常誰與坐從容全用其意此體甚新詩話中未有拈出者因併及之玉林方北山方北山豐之紹興名士也有絶句云舍人早定江西派句法須將活處參參取陵陽正法眼寒花承露落毿毿舍人即呂居仁陵陽正法眼即韓子蒼夜泊寧陵一詩也玉林危逢吉柴與之中行嘉定間仕于朝與時宰議論不合出守章貢危逢吉稹以詩送云力為君王乞得州補天未了石還收人才自係國輕重吾道亦關公去留殿角才辭槐影日船頭便轉荻花秋競誇祖帳都門外誰識眉攢杜甫愁餘話裘元量裘元量萬頃豫章人性恬退不樂仕以薦者召為司直在朝嘗賦歸興云新築書堂壁未乾馬蹄催我上長安兒時秪道為官好老去方知行路難千里關山千里念一番風雨一番寒何如靜坐茅齊下翠竹蒼梧子細看遂乞歸餘話趙伯林豫曾伯祖伯琳官止右選平生喜為詩嘗賦五月菊有云為嫌陶令醉來伴屈原醒之句人所傳誦餘話王從周王從周鎬吉之永豐人仕至忠州守喜為詩亦有警句早行云髮爽帶風梳齒疏和月潄觀橋寓樓云避喧那厭雨宜睡不思茶將雨云雲學催詩黑風仍作誦清望嶽云未知真是嶽秪見半為雲紹師覔詩云凍雪寒梅雙屐蠟澄江明月一竿絲送潘文叔云催租例擾潘邠老付麥誰憐石曼卿出舂陵云山色兩間供步障松隂半畝當郵亭上何尚書云籍通上界神仙府身現甘泉侍從臣移竹後雨絶句洗紅窣窣烏蓲雨落紫颼颼皂角風掛起北窗聊問訊新移來竹定惺鬆餘話劉良佐劉良佐應時四明人平生用力為詩見稱於范石湖誠齊亦喜其寂寞黃昏愁弔影雪窗怕上短檠燈睡魔正與詩魔戰窗外一聲婆餅焦之句陸放翁跋其集云如頗識造物意長容我輩閒日晏猶便睡犬鳴知有人世事不復問舊書時一看一夜催花雨數家臨水村青山空解供眼界濁酒不能澆别愁覔句忍饑貧亦樂鈔書得趣老何傷雖前輩以詩鳴者何以加焉餘話鄒應可豫章鄒應可定有詩名誠齊志其墓云其詩句法目徐師川上遡魯直以趨少陵户牖嘗過杜工部祠賦云疇昔哦詩憶耒陽兹因捧檄過祠堂一生忠義孤吟裏千載凄凉古道旁自是風霜侵病骨非干牛酒涴詩腸明朝解纜秋江上問訊先生一瓣香餘話武允蹈武允蹈字德由高安人連蹇場屋刻意於詩日煆月鍊時出新句如露萱鉗宿蝶風木撼鳴鳩屋頭風過鴈燈背月移窗霜林五色錦煙渡一縈絲午簟展風供睡課夜窗扃雨辦詩逋眼昏書字不著紙耳重聽言常問人皆警䇿可味其集雷竹溪序之餘話黃岩老居鄉如處子居官如戰士處子常畏人戰士惟有死兒曹書諸紳勿謂平平耳此白石黃岩老詩可謂至言餘話陳覺民陳覺民宰建陽嘗喜靖安山水暇日與名勝登覽賦詩有曰却憶當時江處士能言秋色露人家靖安寺在邑西十里乃江為故居江詩云山形圍澤國秋色露人家又云何當尋舊隱泉石好生涯蓋殿院陳公洙詩云處士亡來二百年舊居牢落變祗園詩名長伴江山在寃氣欲摩星斗昏處士生五代間王氏據閩日遇讒而死臺榭幾人留好句昔人留題寺經洪水今無存者漁樵何處問曾孫舊時泉石生涯地日暮寒雲繞寺門栁溪葉水心論唐詩與嚴滄浪異葉水心志徐山民墓云山民有詩數百琢思尤奇皆橫絶歘起冰懸雪跨使讀者變踔憀栗肯首吟嘆不自已然無異語皆人所知也人不能道爾蓋魏晉名家多發興高遠之言少驗物切近之實及沈約謝眺永明體出士爭效之初猶甚艱或僅得一偶句便已名世矣夫束字十餘五色彰施而律呂相應豈易工哉善為是者取成於心寄妍於物融㑹一法含受萬象狶苓桔梗時而為帝無不按節赴之君尊臣卑賔順主穆如丸投區矢破的此唐人之精也然厭之者謂其纎碎而害道淫肆而亂雅至於庭設九奏廣袖大舞而反以浮響疑宫商布縷謬組繡則失其所以為詩矣然則發今人未悟之機回百年已廢之學使後之言唐詩者自君始不亦詞人墨卿之一快也今按水心所謂驗物切近四字於唐詩無遺論矣然與嚴滄浪之說相反故録於此與詩流商略之玉林壁間詩先君嘗於逆旅間録一詩云山行險而修老我驂且羸獨驅六月暑躡此千仞梯世故不貸人牽去復挽歸茗碗參世味甘苦常相持白雲抱溪石令人心愧之豈無跌座處逸固不療饑大呌天上人凉風為吹衣蓋學簡齊詩法者莫知為何人作也玉林諸賢絶句中興以來詩人絶句載於江湖集者未論此外如黃白石梨嶺遇雨黑風吹雨又黃昏雞犬數聲何處村身在嶺雲飛處濕不關别淚濺成痕黃榖城梅花詩玉簫吹徹北樓寒野月崢嶸動萬山一夜霜清不成夢起來春意滿人間秋日詩曉日初浮萬里暉西風搖蕩送秋歸冥鴻直上三千丈社燕春鶯不敢飛于去非春晚詩舍南舍北草萋萋原上行人路欲迷已是春寒仍禁火楝花風急子規啼劉遂初閣皂山詩春山靈草百花香誰識仙家日月長滿院莓苔緑隂匝棋聲何處隔宮牆路德章盱眙旅舍詩道傍草屋兩三家見客擂麻旋㸃茶漸近中原語音好不知淮水是天涯游寒岩釣磯詩竹裏茅茨竹外溪粼粼白石護漁磯想應日日來垂釣石上蓑衣不帶歸與近世喻汝楫征夫詩白骨茫茫散不收朔風吹雪度瓜州殘陽欲落未落處照盡行人今古愁嚴坦叔兵火後還鄉詩萬屋煙消餘塔身還家何處訪情親舊時巷陌今難認却問新移來住人嚴滄浪酬友人詩湘江南去少人行瘴雨蠻煙白草生誰念梁園舊詞客桄榔樹下獨聞鶯此數詩雖體製不同然匠意琢句皆精絶非茍作者玉林葉靖逸嶽王墳詩嶽王之死天下寃之墳在西湖之傍人多題詠獨葉靖逸一詩甚佳公之孫珂守武昌日以此詩嘗致遺於靖逸焉詩云萬古知心只老天英雄堪恨亦堪憐如公少緩須臾死此輩安能九十年漠漠凝塵空偃月堂堂遺像在凌煙早知埋骨西湖路學取鴟夷理釣船栁溪高菊澗九萬忠言歷歷未曾行盡載圖書出帝城餘子但知才可忌先生當以去為榮門䦨竹石關心久部曲溪山照眼明長嘯歸歟莫惆悵浙江風定自潮平右菊澗送方巖先生以諫去國時人以為其詩不下劉改之送王侍郎歸天台詩云栁溪龍洲道人劉遇改之送王簡卿歸天台欲數人才難倒指有如公者莫東歸班行失士國輕重道路不言心是非載酒青山隨處飲談詩玉麈為誰揮歸期趂得東風早莫放梅花一片飛千巖萬壑天台路一日分為兩日程事可語人酬對易面無慙色去留輕放開筆下間風月收斂胸中舊甲兵世事看來忙不得百年到手是功名辛稼軒簡云夜來見示送王簡卿詩偉甚真所謂橫空盤硬語妥帖力排奡者也健羡健羡栁溪詩人玉屑卷十九
