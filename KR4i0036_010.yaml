body:
  text: 詩人玉屑卷十宋魏慶之撰含蓄總說篇章以含蓄天成為上破碎雕鎪為下如楊大年西崑體非不佳也而弄斤操斧太甚所謂七日而混沌死也以平夷恬淡為上怪險蹶趨為下如李長吉錦囊句非不奇也而牛鬼蛇神太甚所謂施諸廊廟則駭矣珊瑚鈎詩話尚意詩文要含蓄不露便是好處古人說雄深雅健此便是含蓄不露也用意十分下語三分可幾風雅下語六分可追李杜下語十分晚唐之作也用意要精深下語要平易此詩人之難漫齊語録句含蓄意含蓄詩有句含蓄者老杜曰勳業頻看鏡行藏獨倚樓鄭雲叟曰相看臨遠水獨自上孤舟是也有意含蓄者如宫詞曰銀燭秋光冷畫屏輕羅小扇撲流螢天階夜色凉如水卧看牽牛織女星又嘲人詩曰怪來粧閣閉朝下不相迎總向春園裏花間笑語聲是也有句意俱含蓄者如九日詩曰明年此㑹知誰健更把茱茰仔細看又宫怨曰寶仗平明宫殿開暫將紈扇共徘徊玉容不及寒雅色猶帶昭陽日影來是也又白樂天云淚滿羅巾夢不成夜深前殿按歌聲紅顏未老恩先斷斜倚薰籠坐到明子美含蓄戲作花卿歌云成都猛將有花卿學語小兒知姓名用如快鶻風火生見賊唯多身始輕綿州刺史著柘黃我卿掃除即日平子章髑髏血模糊手提擲還崔大夫李侯重見此節度人道我卿絶世無既稱絶世無天子何不喚取守京都細看此歌想花卿當時在蜀中雖有一時平賊之功然驕恣不法人甚苦之故子美不欲顯言之但云人道我卿絶世無既稱絶世無天子何不喚取守京都語句含蓄蓋可知矣山谷云花卿塜在丹稜之東館鎮至今有英氣血食其鄉漁隱元微之詩嬉笑之怒甚於裂眥長歌之哀過於慟哭此語誠然元微之在江陵聞白樂天降江州作絶句云殘燈無熖影幢幢此夕聞君謫九江垂死病中驚起坐暗風吹雨入寒窗樂天以為此句他人尚不可聞况僕心哉隨筆語意有無窮之味長恨歌上陽人歌連昌宫詞道開元天寶宫禁事最為深切然微之有行宫絶句云寥落古行宫宫花寂寞紅白頭宫女在閒坐說𤣥宗語少意足有無窮之味隨筆詩趣天趣王摩詰山中詩曰荆溪白石出天寒紅葉稀山路元無雨空翠濕人衣舒王百家衣體曰相看不忍發慘淡暮潮平語罷更攜手月明洲渚生此得天趣問曰何以識其天趣曰能知蕭何所以識韓信則天趣可解余竟不能詰冷齊奇趣東坡曰淵明詩初看若散緩熟讀有奇趣如曰日莫巾柴車路暗光已夕歸人望烟火稚子候簷隙又曰採菊東籬下悠然見南山又曰藹藹遠人村依依墟里烟犬吠深巷中雞鳴桑樹顚才意高遠造語精到如此如大匠運斤無斧鑿痕不知者疲精力至死不悟東坡則曰山中老宿依然在桉上楞嚴已不看細味之無齟齬態對甚的而字不露得淵明遺意耳栁子厚詩曰漁翁夜傍西巖宿曉汲清湘燃楚竹烟消日出不見人欸乃一聲山水緑回看天際下中流巖上無心雲相逐東坡云以奇趣為宗反常合道為趣熟味之此詩有奇趣其尾兩句雖不必亦可欸乃三老相呼聲相應也野人趣閒居云妻喜栽花活童誇鬬草嬴得野人趣非急務故也又云燒葉爐中無宿火讀書窗下有殘燈有嫌燒葉貧寒太甚改葉為藥不唯壞此一句併下句亦減氣味所謂求益反損也歐公詩話登高臨遠之趣山谷言庾子山云澗底百重花山根一片雲有以盡登高臨遠之趣喜晴應詔全篇可為楷式其卒章云有慶兆民同論年天子萬不獨清新其氣韻尤更深穩潘子真詩思總說詩之有思卒然遇之而莫遏有物敗之則失之矣故昔人言覃思垂思抒思之類皆欲其思之來而所謂亂思蕩思者言敗之者易也鄭棨詩思在灞橋風雪中驢子上唐求詩所游歷不出二百里則所謂思者豈尋常咫尺之間所能發哉前輩論詩思多生於杳冥寂寞之境而志意所如往往出乎埃溘之外茍能如是於詩亦庶幾矣謝旡逸問潘大臨近曾作詩否潘云秋來日日是詩思昨日捉筆得滿城風雨近重陽之句忽催租人至令人意敗輒以此一句奉寄亦可見思難而易敗也有佳思余舊見郵亭壁間題云山月曉仍在林風凉不絶殷勤如有情惆悵令人别亦有佳思不知何人詩後讀王維集乃王縉别輞川别業詩附在集中漁隱詩思悽惋忠愍詩思悽惋蓋富於情者如江南春云波渺渺栁依依孤村芳草遠斜日杏花飛江南春盡離腸斷蘋滿汀洲人未歸又云杳杳烟波隔千里白蘋香散東風起日落汀洲一望時愁情不斷如春水觀此語意疑若優柔無斷者至其端委廟堂决澶淵之策其氣鋭然奮仁者之勇全與此不相類蓋人之難知也如此漁隱詩思不出二百里唐求臨池洗硯詩云恰似有龍深處卧被人驚起黑雲生又漸寒沙上路欲瞑水邊村早行云沙上鳥猶睡渡頭人已行詩思不出二百里間北瑣夢言詩味杜烟爐消盡寒燈晦童子開門雪滿松子厚云日午獨覺無餘聲山童隔竹敲茶臼秀老云夜深童子喚不醒猛虎一聲山月高閒棄山中纍年頗得此數詩氣味䂬溪詩境韓愈寄孟刑部聯句云美君知道腴逸步謝天械或問道果有味乎余曰如介甫午雞聲不到禪林柏子烟中坐擁衾竹雞呼我出華胥起滅篝燈擁燎爐各據槁梧同不寐偶然聞雨落階除淡泊中味非造此境不能形容也䂬溪體用十不可一曰高不可言高二曰遠不可言遠三曰閒不可言閒四曰靜不可言靜五曰憂不可言憂六曰喜不可言喜七曰落不可言落八曰碎不可言碎九曰苦不可言苦十曰樂不可言樂陳永康吟忩録序言用勿言體嘗見陳本明論詩云前輩謂作詩當言用勿言體則意深矣若言冷則云可咽不可潄言靜則云不聞人聲聞履聲之類本明何從得此漫叟詩話言其用而不言其名用事琢句妙在言其用而不言其名此法惟荆公東坡山谷三老知之荆公曰含風鴨緑鱗鱗起弄日鵝黃裊裊垂此言水栁之名也東坡答子由詩曰猶勝相逢不相識形容變盡語音存此用事而不言其名山谷曰管城子無食肉相孔方兄有絶交書又曰語言少味無阿堵氷雪相看有此君又曰眼看人情如格五心知外物等朝三格五今之蹙融是也後漢注云常置人於險惡處也苕溪漁隱曰荆公詩云繅成白雪桑重緑割盡黃雲稻正青白雪即絲黃雲即麥亦不言其名也余嘗效之云為官兩部喧朝夢在野千機促婦功蛙與促織二蟲也冷齊不名其物臨川云蕭蕭出屋千尋玉靄靄當窗一炷雲皆不名其物然子厚破額山前碧玉流已有此格䂬溪闕如詠禽須言其標致秖及羽毛飛鳴則陋矣衆禽中唯鶴標致高逸其次鷺亦閒野不俗又嘗見於六經後之詩人形於賦詠者不少而其規橅秖及羽毛飛鳴之間如詠鶴云低頭乍恐丹砂落斂翅常疑白雪銷此白樂天詩丹頂西施頰霜毛四皓鬚此杜牧之詩皆格卑無遠韻也至於鮑明遠鶴賦云鍾浮曠之藻思抱清迥之明心杜子美曰老鶴萬里心李太白畫鶴贊云長唳風宵寂立霜曉劉禹錫云徐引竹間步遠含雲外情此乃奇語也如詠鷺云拂日疑星落凌風訝雪飛此李文饒詩立當青草人先見行近白蓮魚未知此陶雍詩亦格卑無遠韻至於晚晴賦云忽八九之紅芰如婦如女墮蘂黦顏似見放棄白鷺潛來邈風標之公子窺此美人兮如慕悅其容媚雖語近於纖豔然亦善比興者至於許渾云雲漢知心遠林塘覺思孤僧惠崇云曝翎沙日暖引步島風清照水千尋迥棲烟一㸃明此乃奇語也庚溪詩話胡五峯謂晦菴此詩有體而無用先生送胡藉溪有詩云甕牖前頭列翠屏晚來相對靜儀刑浮雲一任閒舒卷萬古青山只麼青胡五峯見之因謂其學者張敬夫曰吾未識此人然觀其詩知其庶幾能有進矣特其言有體而無用故吾為是詩以針警之庶其聞而有發也五峯詩云幽人偏愛青山好為是青山青不老山中出雲雨太虛一洗塵埃山更好晦菴風調高古為難古人作詩正以風調高古為主雖意遠語踈皆為佳作後人有切近的當氣格凡下者終使人可憎李希聲詩話薛能劉白薛能晚唐詩人格調不高而妄自尊大有栁枝詞五首最後一章曰劉白蘇臺總近時當初章句是誰推纖腰舞盡春陽栁未有儂家一首詩自注云劉白二尚書繼為蘇州刺史皆賦楊栁枝詞世多傳唱但文字太僻宫商不高耳能之大言如此但稍推杜陵視劉白蔑如也今讀其詩正堪一笑劉之詞云城外春風吹酒旗行人揮袂日西時長安陌上無窮樹惟有垂楊管别離白之詞云紅板江橋青酒旗館娃宫暖日斜時可憐雨歇東風定萬樹千條各自垂其風流氣概豈能所可髣佛哉隨筆平淡先組麗而後平淡欲造平淡當自組麗中來落其紛華然後可造平淡之境如此陶謝不足進矣今之人多作拙易詩而自以為平淡者未嘗不絶倒也梅聖俞和晏相詩云因令適情性稍欲到平淡苦詞未聞圓刺口劇菱芡言到平淡處甚難也所以贈杜挺之詩有作詩無古今欲造平淡難之句李白云清水出芙蓉天然去雕飾平淡而到天然處則善矣韻語陽秋非力所能作詩到平淡處要似非力所能東坡嘗有書與其姪云大凡為文當使氣象崢嶸五色絢爛漸老漸熟乃造平淡余以謂不但為文作詩者尤當取法於此竹坡詩話卒造平淡余少攻歌詩欲與造物者爭柄遇事輒變化不一其體裁始則陵鑠波濤穿穴險固囚鎖怪異破碎陳敵卒造平淡而已陸魯望文晦菴云梅聖俞詩不是平淡乃是枯槁閒適苕溪漁隱詩余卜居苕溪日以漁釣自適因自稱苕溪漁隱臨流有屋數椽亦以此命名僧了宗善墨戲落筆瀟灑為余作苕溪漁隱圖覽景攄懷時有鄙句皆題之左方既久益多不能盡録聊舉其一二云溪邊短短長長栁波上來來去去船鷗鳥近人渾不畏一雙飛下鏡中天秋雲漠漠烟蒼蒼蓮花初白蓮葉黃釣船盡日來往處南村北村粳稻香卷起綸竿撇櫂歸短篷斜掩宿漁磯日高春睡無人喚撩亂楊花繞夢飛漁隱車蓋亭絶句蔡持正守安州夏日登車蓋亭作十絶句為吳處厚箋注得罪謫新州其間一絶云紙屏石枕竹方牀手倦拋書午夢長睡起莞然成獨笑數聲漁笛在滄浪殊有閒適自在之意自得要到自得處方是詩詩吟函得到自有得處如化工生物千花萬草不名一物一態若摸勒前人旡自得只如世間剪裁諸花見一件樣只做得一件也漫齊語録變態縳虎手薛許昌答書生贈詩云百首如一首卷初如卷終譏其不能變態也大抵屑屑較量屬句平勻不免氣骨寒局殊不知詩家要當有情致抑揚高下使氣宏拔快字凌紙又用事皆破䱄為圓挫剛成柔如為有功者昔人所謂縳虎手也西清詩話韓文公韓昌黎醉贈張祕書詩云君詩多態度藹藹春空雲唐扶詩子美題道林嶽麓寺詩云宋公放逐登臨後物色分留與老夫宋公之問也此語句法清新故為傑出其後唐扶題詩復云兩祠物色採拾盡壁間杜甫真少恩意雖相反而語亦秀拔乃知文章變態初無窮盡惟能者得之不能變態僧祖可作詩多佳句如懷人更作夢千里歸思欲迷雲一灘窗間一榻篆烟碧門外四山秋葉紅等句皆清新可喜然讀書不多故變態少觀其體格亦不過雲烟草樹山川鷗鳥而已而徐師川極稱其詩不知何也丹陽集圓熟好詩如彈丸謝眺嘗語沈約曰好詩圓美流轉如彈丸故東坡答王鞏云新詩如彈丸及送歐陽弼云中有清圓句銅丸飛柘彈蓋謂詩貴圓熟也余以謂圓熟多失之平易老硬多失之乾枯能不失於二者之間可與古之作者並驅王直方詩話詞勝小石調鍾嶸稱張茂先惜其兒女情多風雲氣少喻鳬嘗謁杜紫微不遇乃曰我詩無綺羅鉛粉宜不售也淮海詩亦然人戲謂可入小石調然率多美句但綺麗太勝爾子美並蒂芙蓉本自雙水荇牽風翠帶長退之金叉半醉坐添春牧之春風十里揚州路誰謂不可入黃鐘宫耶䂬溪元祐中祕閣上巳日集西池王仲至有詩張文潛和最工云翠浪有聲黃繖動春風無力綵旗垂秦少游云簾幕千家錦繡垂仲至笑曰又待入小石調也孔氏談苑綺麗不可以綺麗害正氣世俗喜綺麗知文者能輕之後生好風花老大即厭之然文章論當理與不當理耳茍當於理則綺麗風花同入於妙茍不當理則一切皆為長語上自齊梁諸公下至劉夢得溫飛卿輩往往以綺麗風花纍其正氣其過在於理不勝而詞有餘也老杜云緑垂風折笋紅綻雨肥梅岸花飛送客墻燕語留人亦極綺麗其模寫景物意自親切所以絶妙古今至於言春容間適則有穿花蛺蝶深深見㸃水蜻蜓欵欵飛落花遊絲白日靜鳴鳩乳燕青春深言秋景悲壯則有藍水遠從千澗落玉山高並兩峯寒無邊落木蕭蕭下不盡長江袞袞來其富貴之詞則有香飄合殿春風轉花覆千官淑景移麒麟不動爐烟轉孔雀徐開扇影還其弔古則有映階碧草自春色隔葉黃鸝空好音竹送清溪月苔移玉座春皆出於風花然窮盡性理移奪造化又云絶壁過雲開錦繡疏松隔水奏笙簧自古詩人巧即不壯壯即不巧巧而能壯乃如是也䂬溪富貴富貴佳致溫飛卿晚春曲云家臨長信往來道乳燕雙雙拂烟草油壁車輕金犢肥流蘇帳曉春雞報籠中嬌鳥暖猶睡簾外落花間不掃衰桃一樹近前池似惜容顏鏡中老殊有富貴佳致也漁隱非窮兒家語存中云山谷稱晏叔原舞低楊栁樓心月歌盡桃花扇裏風定非窮兒家語王直方詩話詩原乎心歐陽文忠曰詩原乎心者也富貴愁怨見乎所處江南李氏巨富有詩曰簾日已高三丈透金爐次第添香獸紅錦地衣隨步皺佳人舞徹金叉溜酒惡時拈花蘂嗅别殿微聞簫鼓奏與時挑野菜和根煮旋斫生柴帶葉燒異矣托遺善言富貴歸田録云晏元獻喜評詩嘗曰老覺腰金重慵便玉枕凉未是富貴語不如笙歌歸院落燈火下樓臺此善言富貴者也人皆以為知言漫叟詩話品藻韓退之詩中有一字人以私意竄易遂失古人一篇之意若相公親破蔡州來今親字改作新字是也酬王二十舍人雪中見寄云三日柴門擁不開階庭平滿白皚皚今朝踏作瓊瑤跡為有詩從鳳沼來今從字改作仙字則失詩題見寄之意也漫叟詩話栁子厚楊華既奔梁元魏胡武靈作楊白華歌令宫人連臂踏之聲甚凄斷子厚樂府云楊白華風吹渡江水坐令宫樹無顏色搖蕩春光千萬里茫茫曉日下長秋哀歌未斷城鴉起言婉而情深古今絶唱也許彥周詩話杜牧之牧之題桃花夫人廟詩細腰宫裏露桃新脉脉無言幾度春空憶息亡成底事可憐金谷墜樓人同前賈閬仙賈島詩有影略句韓退之喜之其渡桑乾詩曰客舍并州三十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉又赴長江道中詩曰䇿杖離山驛逢人問梓州長江那可到行客替生愁冷齊夜話李長吉長吉有桃花落亂如紅雨之句以此名世余觀劉禹錫云花枝滿空迷處所搖動繁英墜紅雨劉李同一時决非相為剽竊復齊謾録劉夢得蘇子由晚年多令人學劉禹錫詩以為用意深遠有曲折處後因見夢得歷陽詩云一夕為湖地千年列郡名霸王迷路處亞父所封城皆歷陽事語意雄健後殆難繼也吕氏童䝉訓常建河嶽英靈集首列常建詩愛其山光悅鳥性潭影空人心之句以為警䇿歐公又愛建竹徑通幽處禪房花木深欲效之作數語竟不能得以為恨余謂建此詩全篇皆工不獨此兩聯而已其詩曰清晨入古寺初日照高林竹徑通幽處禪房花木深山光悅鳥性潭影空人心萬籟此俱寂但聞鐘磬音洪駒甫詩話李義山李義山詩用事僻澀然荆公晚年亦喜之如試問火城將䇿探何如雲屋聽窗知未愛京師傳谷口但知鄉里勝壺頭其用事琢句前輩無相犯者冷齊夜話王荆公王荆公最愛陶詩謂不可及故歲晚懷古詩云先生歲晚事田園魯叟遺書廢討論問訊桑麻憐已長按行松菊喜猶存農人調笑追尋壑稚子歡呼出候門遙謝載醪祛惑者吾今欲辨已忘言所謂四韻全使淵明詩者即此詩是也漁隱項斯楊祭酒嘗見江表士人項斯詩贈之詩云度度見君詩句好及觀標格過於詩平生不解藏人善到處相逢說項斯由是四方知名古今詩詁白樂天樂天初舉名未振以歌詩投顧况况戲之曰長安物貴居大不易及讀至原上草云野火燒不盡春風吹又生曰有句如此居亦何難老夫前言戲之耳古今詩話趙倚樓杜紫微覽趙渭南早秋詩云殘星幾㸃鴈橫塞長笛一聲人倚樓因目之為趙倚樓古今詩話謝蝴蝶謝學士吟蝴蝶詩三百首人呼為謝蝴蝶其間絶有佳句如狂隨栁絮有時見舞入梨花何處尋又曰江天春晚暖風細相逐賣花人過橋古詩有陌上斜飛去花間倒翅回又云身似何郎全傳粉心如韓壽愛偷香終不若謝句意深遠古今詩話鮑孤鴈鮑當為河南府法曹嘗忤知府薛映因賦孤鴈詩所謂天寒稻粱少萬里孤難進不惜充君㕑為帶邊城信薛大稱賞因號鮑孤鴈司馬文正詩話夏英公夏鄭公竦以父殁王事得三班差使然自少好讀書攻為詩一日攜所業伺宰相李文靖沆退朝拜於馬首而獻之文靖讀其句有山勢蜂腰斷溪流燕尾分之句深愛之終卷皆佳句翊日袖詩呈真宗及叙死事之後乞與換文資遂改潤州金壇主簿東軒筆録王文穆王文穆欽若未第時寒窘依幕府家時章聖以壽王尹開封一日晚過其家左右不虞王至亟取紙屏障風王顧屏間一聯云龍帶晚烟歸洞府鴈拖秋色入衡陽大加賞愛曰此語落落有貴氣何人詩也對曰某門客王欽若王遽召之一見欽其風素其後信任頗專致位上相風雲之㑹實基於此焉西清詩話王琪晏元獻公赴杭州道過維楊憩大明寺瞑目徐行使侍吏誦壁間詩板戒其勿言爵里姓名終篇者無幾又俾别誦一詩云水調隋宫曲當年亦九成哀音已亡國廢落尚留名儀鳳終陳迹鳴蛙只廢聲凄凉不可問落日下蕪城徐問之江都尉王琪詩也召至同飯又同步遊池上時春晚已有落花晏云每得句書牆壁間或彌年未嘗强對且如無可奈何花落去至今未能也王應聲曰似曾相識燕歸來自此辟置薦館職遂躋侍從遺珠薛簡肅公薛簡肅公舉進士時摯謁馮魏公首篇有囊書空自負早晚達明君之句馮掩卷而謂之曰不知秀才所負何事讀至第三篇春詩云千林如有喜一氣自無私乃曰秀才所負者如此東齊記事荆公以三詩取三士復齊漫録云王公韶少日讀書於廬山東林裕老庵庵前有老松因賦詩云緑皮皴剝玉嶙峋高節分明似古人解與乾坤生氣概幾因風雨長精神裝添景物年年别擺捭窮愁日日新惟有碧霄雲裏月共君孤影最相親王荆公為憲江東過而見之大加稱賞遂為知已苕溪漁隱曰蔡寬夫詩話云靈龍圖秉少豪逸熙寧初游京師久不得調嘗作詩曰青衫白髮病參軍旋糶黃糧置酒樽但得有錢留客醉那須騎馬傍人門荆公一見曰此定非碌碌者即薦用之前此蓋未嘗相識也又石林詩話云劉季孫初以右班殿直監饒州酒荆公為憲江東巡歷至饒按酒務始至㕔事見小屏間有題小詩曰呢喃燕子語梁間底事來驚夢裏間說與傍人應不解杖藜攜酒看支山大稱賞之即召與語嘉歎久之升車而去不復問務事荆公以三詩取三士其樂善之心今人所未有也吾故表而出之葛敏修山谷南遷還至南華竹軒亦令侍史誦詩板有一絶云不用山僧供帳迎世間無此竹風清獨拳一手攴頥卧偷眼看雲生未生稱嘆不已徐視姓名曰果吾學子葛敏修也復齊賀方回賀方回題一絶於定林寺云破氷泉脉潄籬根壞衲遙疑掛樹猿蠟屐舊㾗尋不見東風先為我開門舒王見之大稱賞緣此知名王直方詩話蘇後湖蘇伯固之子名庠字養直作清江曲云屬玉雙飛水滿塘菰蒲深處浴鴛鴦白蘋滿棹歸來晚秋著蘆花一片霜扁舟繫岸依林樾蕭蕭兩鬢吹華髮萬事不理醉復醒長占烟波弄明月坡曰若置在李太白集中誰疑其非王直方詩話曹翰曹武毅公翰平江南歸環衛數年不調一日內宴侍臣皆賦詩翰以武人獨不預乃陳曰臣少亦學詩乞應詔太宗曰卿武人以刀字為韻因以寄意曰三十年前學六韜英名常得預時髦曾因國難披金甲不為家貧賣寶刀臂健尚嫌弓力軟眼明猶識陳雲高庭前昨夜秋風起羞見蟠花舊戰袍青箱雜記伍喬伍喬張洎少相友善張為翰林學士眷寵優異伍為歙州通判作詩寄張戒去僕曰張遊宴時投之一日張與僚友近郊㑹燕歡甚僕投詩詩云不知何處可消憂公退攜壺即上樓職事久參侯伯幕夢魂長繞帝王州黃山向晚盈軒翠黟水含春繞郡流遙想玉堂多暇日花時誰伴出城遊得詠動容久之為言於上召還為考功員外郎詩史劉子先章子厚常與劉子先定有場屋之舊又頗相厚善隔濶十年子厚拜相亦不通問寄書責其相忘遠引之意子先以詩謝曰故人天上有書來責我疏愚喚不回兩處共瞻千里月十年不寄一枝梅塵泥自與雲霄隔駑馬難追德驥才莫謂無心向門下也曽終夕望三台公得詩甚喜即召為宰屬遂遷户部侍郎高齊詩話龍太初郭功父方與荆公坐有一人展刺云詩人龍太初功父勃然曰相公前敢稱詩人其不識去就如此荆公曰且請來相見既坐功父曰賢道能作詩能為我賦乎太初曰甚好功父曰只從相公請箇詩題時方有一老兵以沙捺銅器荆公曰可作沙詩太初不頃刻誦曰茫茫黃出塞漠漠白鋪汀鳥去風平篆潮回日射星功父閣筆太初緣此名聞東南王直方詩話姚嗣宗華州狂子張元天聖間坐纍終身每託興吟詠如雪詩戰退玉龍三百萬敗鱗殘甲滿天飛詠白鷹詩有心待搦月中兔更向白雲頭上飛怪譎類是後竄夏國教元昊為邊患朝廷方厭兵時韓魏公撫陜右書生姚嗣宗獻崆峒山詩有云踏碎賀蘭石掃清西海塵布衣能辦此可惜作窮鱗顧謂僚屬曰此人若不收拾又一張元矣因表薦官之西清詩話白馬詩王曾獻金陵牧薛大夫白馬詩白馬披絲練一團今朝被絆欲行難雪中放去唯留迹月下牽來只就鞍向北長鳴天外遠臨風斜墜耳邊寒自知毛骨還應異更請王良仔細看雲溪友議毛國英毛國英澤民之從子也以詩自鳴嘗經嶽侯駐兵之地江禁方嚴國英投詩云鐵鎖沉沉截碧江風旗獵獵駐危檣禹門縱使高千尺放過蛟龍也不妨侯曰詩人也委舟以渡之詩人玉屑卷十
