body:
  text: 詩人玉屑卷一宋魏慶之撰詩辨第一滄浪謂當學古人之詩夫學詩者以識為主入門須正立志須髙以漢魏盛唐為師不作開元天寶以下人物若自生退屈即有下劣詩魔入其肺腑之間由立志之不髙也行有未至可加工力路頭一差愈騖愈逺由入門之不正也故曰學其上僅得其中學其中斯為下矣又曰見過於師僅堪傳授見與師齊减師半德也工夫須從上做下不可從下做上先須熟讀楚詞朝夕諷詠以為之本及讀古詩十九首樂府四篇李陵蘇武漢魏五言皆須熟讀即以李杜二集枕藉觀之如今人之治經然後博取盛唐名家醖釀胸中久之自然悟入雖學之不至亦不失正路此乃從頂𩕳上做來謂之向上一路謂之直截根源謂之頓門謂之單刀直入也詩之法有五曰體製曰格力曰氣象曰興趣曰音節詩之品有九曰髙曰古曰深曰逺曰長曰雄渾曰飄逸曰悲壯曰凄婉其用工有三曰起結曰句法曰字眼其大概有二曰優游不迫曰沉著痛快詩之極致有一曰入神詩而入神至矣盡矣蔑以加矣惟李杜得之他人得之蓋寡也禪家者流乘有小大宗有南北道有邪正具正法眼看是謂第一義若聲聞辟支果皆非正也論詩如論禪漢魏晉等作與盛唐之詩則第一義也大歷以還之詩則巳落第二義矣晚唐之詩則聲聞辟支果也學漢魏晉與盛唐詩者臨濟下也學大歷以還者曹洞下也大抵禪道惟在妙悟詩道亦在妙悟且孟襄陽學力下韓退之逺甚而其詩獨出退之之上者一味妙悟故也惟悟乃為當行乃為本色然悟有淺深有分限之悟有透徹之悟有但得一知半解之悟漢魏尚矣不假悟也謝靈運至盛唐諸公透徹之悟也他雖有悟者皆非第一義也吾評之非僣也辨之非妄也天下有可廢之人無可廢之言詩道如是也若以為不然則是見詩之不廣參詩之不熟耳試取漢魏之詩而熟參之次取晉宋之詩而熟參之次取南北朝之詩而熟參之次取沈宋王楊盧駱陳拾遺之詩而熟參之次取開元天寶諸家之詩而熟參之次獨取李杜二公之詩而熟參之又取大歷十才子之詩而熟參之又取元和之詩而熟參之又取晚唐諸家之詩而熟參之又取本朝蘇黃以下諸公之詩而熟參之其真是非亦有不能隱者儻猶於此而無見焉則是為外道䝉蔽其真識不可救藥終不悟也夫詩有别材非關書也詩有别趣非關理也而古人未嘗不讀書不窮理所謂不涉理路不落言筌者上也詩者吟詠情性也盛唐詩人惟在興趣羚羊掛角無跡可求故其妙處瑩徹玲瓏不可湊泊如空中之音相中之色水中之月鏡中之象言有盡而意無窮近代諸公作竒特解㑹以文字為詩以議論為詩以才學為詩以是為詩夫豈不工終非古人之詩也蓋於一唱三嘆之音有所歉焉且其作多務使事不問興致用字必有來歷押韻必有出處讀之終篇不知著到何在其末流甚者呌噪怒張殊乖忠厚之風殆以罵詈為詩詩而至此可謂一厄也可謂不幸也然則近代之詩無取乎曰有之吾取其合於古人者而已國初之詩尚㳂襲唐人王黃州學白樂天楊文公劉中山學李商隱盛文肅學韋蘇州歐陽公學韓退之古詩梅聖俞學唐人平淡處至東坡山谷始自出已法以為詩唐人之風變矣山谷用工尤深刻其後法席盛行海內稱為江西宗𣲖近世趙紫芝翁靈舒輩獨喜賈島姚合之語稍稍復就清苦之風江湖詩人多效其體一時自謂之唐宗不知止入聲聞辟支之果豈盛唐諸公大乘正法眼者哉嗟乎正法眼之無傳久矣唐詩之說未唱唐詩之道有時而明也今既唱其體曰唐詩矣則學者謂唐詩誠止於是耳非詩道之重不幸耶故豫不自量度輒定詩之宗㫖且借禪以為喻推原漢魏以來而截然謂當以盛唐為法後捨漢魏而獨言盛唐者謂唐律之體備也雖獲罪於世之君子不辭也詩法第二晦庵謂胸中不可著一字世俗言語古今之詩凡有三變蓋自書傳所記虞夏以來下及漢魏自為一等自晉宋間顔謝以後下及唐初自為一等自沈宋以後定著律詩下及今日又為一等然自唐初以前其為詩者固有髙下而法猶未變至律詩出而後詩之與法始皆大變以至今日益巧益密而無復古人之風矣故嘗妄欲抄取經史諸書所載韻語下及文選漢魏古詞以盡乎郭景純陶淵明之所作自為一編而附於三百篇楚詞之後以為詩之根本凖則又於其下二等之中擇其近於古者各為一編以為之羽翼輿衛且以李杜言之則如李之古風五十首杜之秦蜀紀行遣興出塞潼關石濠夏日夏夜諸篇律詩則如王維韋應物輩亦自有蕭散之趣未至如今日之細碎卑冗旡餘味也其不合者則悉去之不使其接於吾耳目而入於吾之胸次要使方寸之中無一字世俗言語意思則其詩不期於髙逺而自髙逺矣晦庵抽關啓鑰之論來諭欲漱六藝之芳潤以求真淡此誠極至之論然亦恐須先識得古今體製雅俗鄉背仍更洗滌得盡腸胃間夙生葷血脂膏然後此語方有所措如其未然竊恐穢濁為主芳潤入不得也近世詩人正緣不曽透得此關而規規於近局故其所就皆不滿人意無足深論誠齊翻案法孔子老子相見傾蓋鄒陽云傾蓋如故孫侔與東坡不相識以詩寄東坡和云與君蓋亦不須傾劉寬為吏以蒲為鞭寬厚至矣東坡云有鞭不使安用蒲杜詩云忽憶往時秋井塌古人白骨生蒼苔如何不飲令心哀東坡云何須更待秋井塌見人白骨方銜杯此皆翻案法也余友人安福劉浚字景明重陽詩云不用茱萸仔細看管取明年各强健得此法矣誠齊又法唐律七言八句一篇之中句句皆竒一句之中字字皆竒古今作者皆難之余嘗與林謙之論此事謙之慨然曰但吾輩詩集中不可不作數篇耳如杜九日詩老去悲秋强自寬興來今日盡君歡不徒入句便字字對屬又第一句頃刻變化才說悲秋忽又自寬以自對君自者我也羞將短髮還吹帽笑倩旁人為正冠將一事翻騰作一聮又孟嘉以落帽為風流少陵以不落為風流翻盡古人公案最為妙法藍水逺從千澗落玉山髙並兩峯寒詩人至此筆力多衰今方且雄傑挺拔喚起一篇精神非筆力拔山不至於此明年此㑹知誰健醉把茱萸仔細看則意味深長幽然無窮矣東坡煎茶詩云活水還將活火烹自臨釣石汲深清第二句七字而具五意水清一也深處取清者二也石下之水非有泥土三也石乃釣石非尋常之石四也東坡自汲非遣卒奴五也大瓢貯月歸春甕小杓分江入夜瓶其狀水之清美極矣分江二字此尤難下雪乳巳翻煎處腳松風仍作瀉時聲此倒語也尤為詩家妙法即少陵紅稻啄餘鸚鵡粒碧梧棲老鳯凰枝也枯腸未易禁三碗卧聽山城長短更又翻却盧同公案同喫到七碗坡不禁三碗山城更漏無定長短二字有無窮之味趙章泉詩法或問詩法於晏叟因以五十六字答之云問詩端合如何作待欲學耶毋用學今一秃翁曽總角學竟無方作無略欲從鄙律恐坐縳力若不加還病弱眼前草樹聊渠若子結成隂花自落趙章泉謂規模既大波瀾自闊贛川曽文清公題吳郡所刋東萊吕居仁公詩後語云詩卷熟讀治擇工夫已勝而波瀾尚未闊欲波瀾之闊須令規模宏放以涵養吾氣而後可規模既大波瀾自闊少加治擇功巳倍於古矣蕃嘗苦人來問詩答之費辭一日閲東萊詩以此語為四十字異日有來問者當謄以示之云若欲波瀾闊規模須放𢎞端由吾氣養匪自歷階升勿漫二夫覔况於治擇能斯言誰語汝吕昔告於曽趙章泉論詩貴乎似論詩者貴乎似論似者可以言盡耶少陵春水生二首云二月六夜春水生門前小灘渾欲平鸕鷀鸂䳵莫漫喜吾與汝曹俱眼明一夜水髙二尺强數日不敢更禁當南市津頭有船賣無錢即買繫籬傍曽空青清樾軒二詩云卧聽灘聲㶁㶁流冷風凄雨似深秋江邉石上烏臼樹一夜水長到梢頭竹間嘉樹密扶踈異鄉物色似吾廬清曉開門出負水巳有小舟來賣魚似耶不似耶學詩者不可以不辨趙章泉題品三聮隔林倣佛聞機杼知有人家住翠微片片梅花隨雨脫渾疑春雪墮林梢三年受用惟栽竹一日工夫半為梅淵明不可得見矣得見菊花斯可爾前十四字或以為坡語或以為參寥子十四字師號余亦以後六句為道章少隱王夢㢸應求范炎黃中十四字師號范乃稼軒壻也章泉謂可與言詩王摩詰云行到水窮處坐看雲起時少陵云水流心不競雲在意俱遲介甫云細數落花因坐久緩尋芳草得歸遲徐師川云細落李花那可數偶行芳草步因遲知詩者於此不可以無語或以二小詩復之曰水窮雲起初無意雲在水流終有心儻若不將無有判渾然誰㑹伯牙琴誰將古瓦磨成硯坐久歸遲總是機草自偶逢花偶見海漚不動瑟音希公曰此所謂可與言詩矣趙章泉學詩閲復齊間紀所載吳思道龔聖任學詩三首因次其韻學詩渾似學參禪識取初年與暮年巧匠曷能雕朽木燎原寧復死灰然學詩渾似學參禪要保心傳與耳傳秋菊春蘭寧易地清風明月本同天學詩渾似學參禪束縛寧論句與聮四海九州何歷歷千秋萬歲孰傳傳吳思道學詩吳可思道學詩渾似學參禪竹榻蒲團不計年直待自家都了得等間拈出便超然學詩渾似學參禪頭上安頭不足傳跳出少陵窠臼外丈夫志氣本衝天學詩渾似學參禪自古圓成有幾聮春草池塘一句子驚天動地至今傳龔聖任學詩龔相聖任學詩渾似學參禪悟了方知歲是年㸃鐵成金猶是妄髙山流水自依然學詩渾似學參禪語可安排意莫傳㑹意即超聲律界不須錬石補青天學詩渾似學參禪幾許搜腸覔句聮欲識少陵竒絶處初無言句與人傳白石詩說大凡詩自有氣象體面血脉韻度氣象欲其渾厚其失也俗體面欲其宏大其失也狂血脉欲其貫穿其失也露韻度欲其飄逸其失也輕作大篇尤當布置首尾停勻腰腹肥滿多見人前面有餘後面不足前面極工後面草草不可不知也詩之不工只是不精思耳不思而作雖多亦奚以為雕刻傷氣敷演露骨若鄙而不精巧是不雕刻之過拙而無委曲是不敷演之過人所易言我寡言之人所難言我易言之自不俗花必用栁對是兒曹語若其不切亦病也難說處一語而盡易說處莫便放過僻事實用熟事虛用說理要簡易說事要圓活說景要微妙多看自知多作自好矣小詩精深短章醖藉大篇有開闔乃妙喜辭鋭怒辭戾哀辭傷樂辭荒愛辭結惡辭絶欲辭屑樂而不淫哀而不傷其唯關雎乎學有餘而約以用之善用事者也意有餘而約以盡之善措辭者也乍叙事而間以理言得活法者也不知詩病何由能詩不觀詩法何由知病名家者各有一病大醇小疵差可耳篇終出人意表或反終篇之意皆妙守法度曰詩載始末曰引體如行書曰行放情曰歌缺之曰歌行悲如蛩螿曰吟通乎俚俗曰謡委曲盡情曰曲詩有出於風者出於雅者出於頌者屈宋之文風出也韓栁之詩雅出也杜子美獨能兼之三百篇美刺針怨皆無跡當以心㑹心陶淵明天資既髙趣詣又逺故其詩散而莊淡而腴斷不容作邯鄲步也語貴含蓄東坡云言有盡而意無窮者天下之至言也山谷尤謹於此清廟之瑟一倡三嘆逺矣哉後之學詩者可不務乎若句中無餘字篇中無長語非善之善者也句中有餘味篇中有餘意善之善者也體物不欲寒乞須意中有景景中有意思有窒礙涵養未至也當益以學歲寒知松柏難處見作者波瀾開闔如在江湖中一波未平一波巳作如兵家之陳方以為正又復是竒方以為竒忽復是正出入變化不可紀極而法度不可亂文以文而工不以文而妙然捨文無妙聖處要自悟意出於格先得格也格出於意先得意也吟詠情性如印印泥土乎禮義貴涵養也沈著痛快天也自然與學到其為天一也意格欲髙句法欲響只求工於句字亦末矣故始於意格成於句字句意欲深欲逺句調欲清欲古欲和是為作者詩有四種髙妙一曰理髙妙二曰意髙妙三曰想髙妙四曰自然髙妙礙而實通曰理髙妙出事意外曰意髙妙寫出幽微如清潭見底曰想髙妙非竒非怪剝落文采知其妙而不知其所以妙曰自然髙妙一篇全在尾句如截奔馬辭意俱盡如臨水送將歸辭盡意不盡若夫辭盡意不盡剡溪歸櫂是以辭意俱不盡溫伯雪子是巳所謂辭意俱盡者急流中截後語非謂辭窮理盡者也所謂意盡辭不盡者意盡於未當盡處則辭可以不盡矣非以長語益之者也至如辭盡意不盡者非遺意也辭中巳倣佛可見矣辭意俱不盡者不盡之中固巳深盡之矣一家之語自有一家之風味如樂之二十四調各有韻聲乃是歸宿處摸倣者語雖似之韻亦無矣雞林其可欺哉詩說之作非為能詩者作也為不能詩者作而使之能詩能詩而後能盡吾之說是亦為能詩者作也雖然以吾之說為盡而不造乎自得是足以為詩哉後之賢者有如以水投水者乎有如得魚忘筌者乎嘻吾之說巳得罪於古之詩人後之人其勿重罪豫乎滄浪詩法學詩先除五俗一曰俗體二曰俗意三曰俗句四曰俗字五曰俗韻有語忌有語病語病易除語忌難變語病古人亦有之惟語忌不可有須是本色須是當行對句好可得結句好難得發句好尤難得發端忌作舉止收拾貴有出場不必大著題不在多使事押韻不必有出處用字不必拘來歷下字貴響造語貴圓意貴透不可隔靴搔癢語貴脫灑不可拖泥帶水最忌骨董最忌趂貼語忌直意忌淺脉忌露味忌短音韻忌散緩亦忌迫促詩難處在結褁譬如畨刀須用北人結裹若南人便非本色須參活句勿參死句詞氣可頡頏不可乖崖律詩難於古詩絶句難於八句七言律詩難於五言律詩五言絶句難於七言絶句學詩有三節其初不識好惡連篇纍牘肆筆而成既識羞愧始生畏縮成之極難及其透徹則七縱八橫信手拈來頭頭是道矣看詩當具金剛眼睛庶不眩於旁門小法禪家有金剛眼睛之說辨家數如辨蒼白方可言詩荆公評文章先體製而後文之工拙詩之是非不必爭以巳詩置古人詩中與識者觀之而不能辨則真古人矣詩人玉屑卷一
