盡長江滚滚來杜甫但將酩酊酬佳節不用登臨怨落暉杜牧之九日上三下二七言上五下二野店寒無客風巢動有禽周繇送宇文虞似梅花落地如栁絮因風王淡交雪詩送終時有雪歸𦵏處無雲任藩哭友人永夜角聲愁自語中天月色好誰看杜甫宿府輕重對意髙則不覺江流天地外山色有無中王維漢江獨来成悵望不去泥欄干唐彦謙惜花自當舟楫路應濟往来人張衆甫三州渡桑麻深雨露燕雀半生成杜甫屏跡三分割據紆籌䇿萬古雲霄一羽毛杜甫門臨蒼莽經年閉身逺嫖姚幾日歸李嘉祐宋朝警句五言野水無人渡孤舟盡日横㓂萊公山勢蜂腰㫁溪流燕尾分夏英公栁間黄鳥路波底白鷗天蔡天啟井泉分地脉砧杵共秋聲徐鉉峯多巧障日江逺欲浮天東坡一鳩鳴午寂雙燕語春愁陳傳道溪聲長在耳山色不離門李濤掃地樹留影拂床琴有聲李濤手香橙熟後髪脫草枯時唐子西片雲眀外暗斜日雨邊晴一朝厭蝸角萬里騎鵬背洪龜父着衣輕有暈入水淡無痕徐忻新霜染楓葉皓月借蘆花楊㣲之境閒僧度水雲静鶴歸松恵崇驚蟬移古栁鬭雀墮寒庭惠崇寒禽棲古栁破月入微雲惠崇曙分林影外春盡鳥聲中蔡懋去路正黄葉别君堪白頭僧惟鳯秋日送人雨勢宫城闊秋聲禁樹多劉筠直禁中七言船中聞雁洞庭夜床下有蛩長信秋錢昭度風前有恨梅千㸃溪上無人月一痕呉可雲埋山麓藏秋雨葉脫林梢帶晚風陳知黙樹移午影重簾静門對春風十日閒吕居仁鶴歸已改新城郭牛卧重尋舊墓田錢熙送人拜掃干斗氣沉龍已化置芻人去榻猶懸晏元獻送人知洪州偶題巖石雲生筆閒遶庭松露濕衣楊徽之僧舍逰魚顧影驚寒月宿鷺迷羣下夕陽蔡九峯白蓮静尋啄木藏身處閒看逰絲到地時緑章封事緘初啟青鳯来凰尾乍開丁謂芭蕉窺人鳥喚悠颺夢隔水山供宛轉愁荆公午枕細數落花因坐久緩尋芳草得歸遲荆公一水䕶田將緑遶兩山排闥送青來荆公隴鴈半驚天在水征人相顧月如霜王君玉聞角萬壑松聲山雨過一川花氣水風生沙軟緑頭相並鴨水深紅尾自跳魚髙子勉客子光隂詩巻裏杏花消息雨聲中陳去非負郭生涯千畆竹長年心事四愁詩石敏若千里江山漁笛晚十年燈火客氊寒石敏若桃李春風一盃酒江湖夜雨十年燈山谷雪意未成雲着地秋聲不㫁鴈連天錢惟演詩人玉屑巻三
