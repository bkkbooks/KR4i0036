body:
  text: 詩人玉屑卷五宋魏慶之撰口訣三不可危稹逢吉曰詩不可强作不可徒作不可茍作强作則無意徒作則無益茍作則無功驪塘文集八句法方回言學詩於前輩得八句法平澹不流於淺俗竒古不鄰於怪僻題詠不窘於物象叙事不病於聲律比興深者通物理用事工者如已出格見於成篇渾然不可鐫氣出於言外浩然不可屈盡心於詩守此勿失王直方四不下八條並釋皎然述氣髙而不怒力勁而不犯情多而不暗才贍而不踈四深氣象氛氲由深於體勢意度盤薄由深於作用用律不滯由深於聲對用事不直由深於義類二要要力全而不苦澁要氣足而不怒張二廢雖欲廢巧尚直而神思不得直雖欲廢言尚意而典麗不得遺四離欲道情而離深僻欲經史而離書生欲髙逸而離闊逺欲飛動而離輕浮六迷以虛大為髙古以緩慢為淡佇以詭差為新竒以錯用意為獨善以爛熟為穏約以氣劣弱為容易七至至險而不僻至竒而不差至苦而無迹至近而意逺至放而不迂至難而狀易至麗而自然七徳識理髙古典麗風流精神質幹體裁三多歐公謂為文有三多看多做多商量多僕於詩亦云三偷詩有三偷偷語最是鈍賊如傅長虞日月光太清陳主日月光天徳是也偷意事雖可罔情不可原如栁渾太液微波起長楊髙樹秋沈佺期小池殘暑退髙樹早凉歸是也偷勢才巧意精各無朕迹盖詩人偷狐白裘手也如嵇康目送歸鴻手揮五絃王昌齡手擕雙鯉魚目送千里鴈是也李淑詩苑類格十難下四條並陳永康吟窓雜録序一曰識理難二曰精神難三曰髙古難四曰風流難五曰典麗難六曰質幹難七曰體裁難八曰勁健難九曰耿介難十曰悽切難十易氣髙而易怒力勁而易露情多而易暗才贍而易踈道情而易僻思深而易澁放逸而易迂飛動而易浮新竒而易怪容易而易弱十戒一戒乎生硬二戒乎爛熟三戒乎差錯四戒乎直置五戒乎妄誕六戒乎綺靡七戒乎蹈襲八戒乎濁穢九戒乎砌合十戒乎俳諧十貴一貴乎典重二貴乎抛擲三貴乎出塵四貴乎瀏亮五貴乎縝宻六貴乎雅淵七貴乎温蔚八貴乎宏麗九貴乎純粹十貴乎瑩浄二十四名詩訖於周離騷訖扵楚是後詩人流為二十四名賦頌銘贊文誄箴詩行詠吟題怨嘆篇章操引謡謳歌曲詞調自操而下八名皆是起於郊祭軍兵吉㓙苦樂由詩而下九名皆屬事而作雖題號不同而悉謂之詩元稹集初學蹊徑初學初學作詩寧失之野不可失之靡麗失之野不害氣質失之靡麗不可復整頓吕氏童蒙訓寧拙無巧寜撲無華寜粗無弱寧僻無俗詩文皆然后山詩話學古大槩學詩須以三百篇楚辤及漢魏間人詩為主方見古人好處自無齊梁間綺靡氣象也吕氏童蒙訓東坡教人作詩曰熟讀毛詩國風離騷曲折盡在是矣僕嘗以此語太髙後年齒益長乃知東坡之善誘人也許彦周詩話學詩須是熟看古人詩求其用心處盖一語一句不茍作也如此看了須是自家下筆要追及之不問追及與不及但只是當如此學乆之自有箇道理若今人不學不看古人做詩様子便要與古人齊肩恐無此道理陳无已云學詩如學仙時至骨自換此語得之漫齊語録晦庵誨人學陶栁選詩韋蘇州作詩須從陶栁門庭中来乃佳不如是無以發蕭散冲澹之趣不免於局促塵埃無由到古人佳處也如選詩及韋蘇州詩亦不可不熟讀晦庵誨人學六朝李杜作詩不學六朝又不學李杜只學那嶢嵠底今便學得十分好後把作甚麽用作詩先用看李杜如士人治本經然本既立次第方可看蘇黄以次諸家詩陵陽誨人學韋詩公每勸讀韋蘇州詩且云余晩年酷愛此詩後有書見抵猶云多讀杜陵韋栁也室中語又讀少陵詩學古人詩嘗有一少年請益公諭之令熟讀杜少陵詩後數日復來云少陵詩有不可解者公曰且讀可解者室中語杜少陵作八句近體詩卒章有時而對然語意皆卒章之辭今人效之臨了却作一景聮一篇之意無所歸大可笑也室中語一日有客擕所業謁公客退公觀之竟語僕曰此人多讀東坡詩大率作文須學古人學古人尚恐不至古人况學今人哉其不至古人也必矣室中語吕居仁誨人楚詞杜黄固法度所在然不若徧考精取悉為吾用則姿態横出不窘一律矣如東坡太白詩雖規模廣大學者難依然讀之使人敢道澡雪滯思無窮苦艱難之狀亦一助也向背學老杜詩所謂刻鶻不成尚類騖也學晩唐諸人詩所謂作法於凉其弊猶貪作法於貪弊將若何黄魯直與趙伯充書學詩當以子美為師有規矩故可學退之於詩本無解處以才髙而好耳淵眀不為詩寫其胸中之妙耳學杜無成不失為功無韓之才與陶之妙而學其詩終樂天耳后山近時學詩者率宗江西然殊不知江西本亦學少陵者也故陳旡已曰豫章之學慱矣而得法於少陵故其詩近之今少陵之詩後生少年不復過目抑亦失江西之意乎江西平日語學者為詩㫖趣亦獨宗少陵一人而已余為是說盖欲學詩者師少陵而友江西則兩得之矣漁隠悟入作文必要悟入處悟入必自工夫中来非僥倖可得也如老蘇之於文魯直之於詩盖盡此理矣吕氏童蒙訓須令有所悟入則自然度越諸子悟入之理正在工夫勤惰間耳如張長史見公孫大娘舞劒頓悟筆法如張者專意此事未嘗少忘胸中故能遇事有得遂造神妙使他人觀舞劒有何干渉非獨作文學書而然也吕居仁去陋作詩淺易鄙陋之氣不除大可惡客問何從去之僕曰熟讀唐李義山與本朝黄魯直詩而深思之則去也許彦周忌俗陳叅政去非少學詩於崔鷗徳符嘗問作詩之要崔曰凡作詩工拙所未論大要忌俗而已忌隨人後文章必自名一家然後可以傳不朽若體規畫圓凖方作矩終為人之臣僕古人譏屋下架屋信然陸機曰謝朝花於已披啟夕秀於未振韓愈曰惟陳言之務去此乃為文之要苕溪漁隠曰學詩亦然若循習陳言規摹舊作不能變化自出新意亦何以名家魯直詩云隨人作計終後人又云文章最忌隨人後誠至論也宋子京筆記勤讀多為頃嵗孫莘老識文忠公乗間以文字問之云無他術唯勤讀書而多為之自工世人患作文字少又懶讀書每一篇出即求過人如此少有至者疵病不必待人指摘多作自能見之此公以其嘗試者告人故尤有味苕溪漁隠曰舊說梅聖俞日課一詩寒暑未嘗易也聖俞詩名滿世盖身試此說之效耳東坡陵陽謂詩本於讀書公一日見謂曰余老矣固願與後生東說西話但近年人家子弟往往恃其小有才更不肯讀書但要作詩到古人地位殊不知古人未有不讀書者大可憫嘆耳陵陽論詩本於學范季隨嘗請益曰今人有少時文名大著久而不振者其咎安在公曰無他止學耳初無悟解無益也如人操舟入蜀窮極艱阻則曰吾至矣於中流棄去篙榜不施維䌫不特其退甚速則將傾覆矣如人之詩止學也藝熟必精昔梅聖俞日課一詩余為方孚若作行狀其家似陸放翁手録詩藁一巻為潤筆題其前云七月十一日至九月二十九日計七十八日得詩一百首陸之日課尤勤於梅二公豈貪多哉藝之熟者必精理勢然也劉後村文不可彊作或勵精潛思不便下筆或遇事因感時時舉揚工夫一也古之作者正如是耳惟不可鑿定彊作出於牽彊如小兒就學俯就課程耳吕居仁詩文不可鑿空彊作待境而生便自工耳每作一篇先立大意長篇須曲折三致意乃可成章山谷不可泛泛文章貴衆中傑出如同賦一事工拙尤易見余行蜀道過籌筆驛如石曼卿詩云意中流水逺愁外舊山青膾炙天下久矣然有山水處皆可用不必籌筆驛也詩興不可費力黄魯直與郭公甫曰公做詩費許多氣力做甚此語切當有益於學詩者許彦周不可作意朝來庭樹有鳴禽紅緑扶春上逺林忽有好詩生眼底安排句法已難尋此簡齋之詩也觀末後兩句則詩之為詩豈可以作意為之耶小園解后録不露斧鑿有意中無斧鑿痕有句中無斧鑿痕有字中無斧鑿痕須要體認得漫齋語録不可露斧鑿粘皮骨作詩貴雕琢又畏有斧鑿痕貴破的又畏粘皮骨此所以為難李商隠栁詩云動春何限葉撼曉幾多枝其有斧鑿痕也石曼卿梅詩云認桃無綠葉辨杏有青枝恨其粘皮骨也能脫此二病始可以言詩矣不可粘皮着骨亭亭思婦石下閱幾人代蕩子長不歸山椒久相待微雲䕃髮彩初月輝蛾黛秋雨疊苔衣春風舞蘿帶宛然姑射子矯首塵冥外陳迹遂亡窮佳期從莫再脫如魯秋氏妄結桑下愛玉質委泥沙悠悠復安在此賀方回作望夫石詩也交游間無不愛者余謂田承君云此詩可以見方回得失其所得者琢磨之功所失者太粘着皮骨耳承君以為然王直方詩話言其意不言其名東坡曰善畫者畫意不畫形善詩者道意不道名東坡詩曰論畫以形似見與兒童隣作詩必此詩定知非詩人禁臠不可太着題世有青衿集一編以授學徒可以諭蒙若天詩云戴盆徒仰止測管詎知之席詩云孔堂曽子避漢殿戴馮重可謂着題乃東坡所謂賦詩必此詩也漫叟詩話得其短處學古人文字須得其短處如杜子美詩頗有近質野處如封主簿親事不合詩之類是也東坡詩有汗漫處魯直詩有太尖新太巧處皆不可不知吕氏童蒙訓詩意貴開闢凡作詩使人讀第一句知有第二句讀第二句知有第三句次第終篇方為至妙如老杜莽莽天涯雨江村獨立時不愁巴道路恐濕漢旌旗是也室中語詩要聮屬大槩作詩要從首至尾語脉聮屬如有理詞狀古詩云喚婢打鵶兒莫教枝上啼啼時驚妾夢不得到遼西可為標凖室中語次韻公平日雖有次韻詩然性不喜為嘗云古人不和况次韻乎室中語詩貴傳逺又云人生作詩不必多只要傳逺如栁子厚能幾首詩萬世不能磨㓕僕曰老杜遣興詩謂孟浩然云賦詩不必多往往凌鮑謝正謂此也室中語又云詩雖細事然古人出語必期於傳故少陵有老去新詩誰與傳清新句句自堪傳將詩不必萬人傳之句詩有正邪公云詩道如佛法當分大乗小乗邪魔外道惟知者可以語此室中語得人印可韓子蒼云作詩文當得文人印可乃自不疑所以前輩汲汲於求知也遺珠自成一家學詩須是有始有卒自能名家方不枉下工夫如羅隠杜荀鶴輩至卑弱至今不能冺㓕者以其自成一家耳室中語詩不可言什詩二雅及頌前二巻題曰某詩之什陸徳眀釋云歌詩之作非止一人篇數既多故以十篇編為一巻名之為什今人以詩為篇什或稱譽他人所作為佳什非也詩有力量詩有力量猶如弓之斗力其未挽時不知其難也及其挽之力不及處分寸不可强若出塞曲落日照大旗馬鳴風蕭蕭悲笳數聲動壯士惨不驕又八哀詩汝陽譲帝子眉宇真天人虬鬚似太宗色映塞外春此等力量不容他人到許彦周詩話焚詩余每見舊所作文章憎之必欲燒棄梅堯臣喜云公之文進矣僕之詩亦然宋子京筆記詩人玉屑巻五
